<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <defs>
    <radialGradient id="dg-bg" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#041008"/><stop offset="100%" stop-color="#010602"/>
    </radialGradient>
    <radialGradient id="dg-atm" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#2a5a1a" stop-opacity="0.22"/><stop offset="100%" stop-color="#2a5a1a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="dg-glow" cx="50%" cy="100%" r="55%">
      <stop offset="0%" stop-color="#70c040" stop-opacity="0.35"/><stop offset="60%" stop-color="#70c040" stop-opacity="0.12"/><stop offset="100%" stop-color="#70c040" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="dg-r1" x1="50%" y1="0%" x2="5%" y2="100%">
      <stop offset="0%" stop-color="#2a5a1a"/><stop offset="100%" stop-color="#2a5a1a" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="dg-r2" x1="50%" y1="0%" x2="95%" y2="100%">
      <stop offset="0%" stop-color="#f5e8a0"/><stop offset="100%" stop-color="#c0a030" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="dg-gl"><feGaussianBlur stdDeviation="9" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="dg-g2"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="dg-gf"><feGaussianBlur stdDeviation="13" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="600" fill="url(#dg-bg)"/>
  <rect width="400" height="600" fill="url(#dg-atm)"/>
  <ellipse cx="200" cy="530" rx="180" ry="100" fill="url(#dg-glow)" filter="url(#dg-gf)" opacity="0.85"/>
  <!-- Rays -->
  <polygon points="196,268 -30,610 110,610" fill="url(#dg-r1)" filter="url(#dg-gl)" opacity="0.45"/>
  <polygon points="204,268 430,610 290,610" fill="url(#dg-r2)" filter="url(#dg-gl)" opacity="0.55"/>
  <!-- Celtic/Welsh landscape suggestion: green hills, sea hint -->
  <ellipse cx="80" cy="490" rx="90" ry="38" fill="#1a4010" opacity="0.45"/>
  <ellipse cx="320" cy="500" rx="100" ry="32" fill="#1a4010" opacity="0.38"/>
  <path d="M0,510 Q100,480 200,490 Q300,500 400,475 L400,600 L0,600 Z" fill="#0a2806" opacity="0.60"/>
  <!-- Monastic habit — dark gray/brown (Welsh monastic) -->
  <path d="M153,158 Q122,208 108,420 Q200,448 292,420 Q278,208 247,158 Z" fill="#18100a" opacity="0.96"/>
  <!-- White collar -->
  <path d="M177,158 Q184,172 200,175 Q216,172 223,158 Q215,165 200,168 Q185,165 177,158 Z" fill="#e0ddd8" opacity="0.55"/>
  <!-- Staff / crozier — bishop's staff -->
  <line x1="298" y1="150" x2="310" y2="450" stroke="#8a6030" stroke-width="5" stroke-linecap="round" opacity="0.72"/>
  <!-- Crozier head -->
  <path d="M298,150 Q275,120 285,105 Q295,90 308,105 Q312,118 298,150" fill="none" stroke="#c8a040" stroke-width="3" stroke-linecap="round" opacity="0.72"/>
  <!-- Arms -->
  <path d="M152,170 Q125,228 115,315" stroke="#18100a" stroke-width="18" fill="none" stroke-linecap="round" opacity="0.90"/>
  <path d="M248,170 Q272,225 285,300" stroke="#18100a" stroke-width="18" fill="none" stroke-linecap="round" opacity="0.90"/>
  <!-- Right hand raised in blessing -->
  <ellipse cx="286" cy="306" rx="11" ry="9" fill="#b07850" opacity="0.75"/>
  <!-- Left hand open — water / simple gesture -->
  <ellipse cx="113" cy="321" rx="11" ry="9" fill="#b07850" opacity="0.75"/>
  <!-- Small water vessel on left (the Waterman) -->
  <path d="M94,320 Q90,340 96,360 Q105,365 112,360 Q118,340 114,320 Z" fill="#305080" opacity="0.55"/>
  <ellipse cx="104" cy="320" rx="10" ry="5" fill="#3a6090" opacity="0.45"/>
  <!-- Neck -->
  <rect x="194" y="142" width="12" height="16" rx="3" fill="#b07850" opacity="0.88"/>
  <!-- Head — Welsh monk, Celtic features, short beard -->
  <ellipse cx="200" cy="108" rx="27" ry="30" fill="#a86840" opacity="0.90"/>
  <!-- Hair and tonsure (Celtic tonsure — front shaved) -->
  <path d="M174,104 Q177,74 200,70 Q223,74 226,104" fill="#2a1808" opacity="0.80"/>
  <!-- Short beard -->
  <path d="M183,130 Q200,140 217,130 Q215,148 200,152 Q185,148 183,130 Z" fill="#2a1808" opacity="0.55"/>
  <!-- Eyes — clear, contemplative -->
  <ellipse cx="189" cy="106" rx="5" ry="4.5" fill="#1a2a10" opacity="0.80"/>
  <ellipse cx="211" cy="106" rx="5" ry="4.5" fill="#1a2a10" opacity="0.80"/>
  <path d="M182,97 Q188,94 194,97" stroke="#2a1808" stroke-width="1.7" fill="none" opacity="0.65"/>
  <path d="M206,97 Q212,94 218,97" stroke="#2a1808" stroke-width="1.7" fill="none" opacity="0.65"/>
  <path d="M192,122 Q200,126 208,122" stroke="#8a4030" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.58"/>
  <!-- Halo — Celtic green-gold -->
  <circle cx="200" cy="108" r="51" fill="none" stroke="#90c850" stroke-width="1.8" stroke-opacity="0.70" filter="url(#dg-g2)"/>
  <circle cx="200" cy="108" r="45" fill="none" stroke="#f5e8a0" stroke-width="0.5" stroke-opacity="0.20"/>
  <!-- Celtic knotwork hint on halo -->
  <circle cx="200" cy="108" r="48" fill="none" stroke="#c8a040" stroke-width="0.7" stroke-opacity="0.30" stroke-dasharray="6,4"/>
  <!-- Daffodil (Welsh national flower) at feet -->
  <path d="M100,440 Q96,410 94,380" stroke="#3a6020" stroke-width="2.5" fill="none" opacity="0.58"/>
  <ellipse cx="94" cy="375" rx="8" ry="14" fill="#c8b020" opacity="0.52" transform="rotate(-12,94,375)"/>
  <ellipse cx="86" cy="368" rx="6" ry="10" fill="#f0d030" opacity="0.45" transform="rotate(20,86,368)"/>
  <!-- Frame -->
  <rect x="6" y="6" width="388" height="588" rx="8" fill="none" stroke="#2a5a1a" stroke-width="1.2" stroke-opacity="0.45"/>
  <rect x="12" y="12" width="376" height="576" rx="5" fill="none" stroke="#c9a030" stroke-width="0.5" stroke-opacity="0.18"/>
  <!-- Name panel -->
  <rect x="18" y="528" width="364" height="66" rx="6" fill="#010602" opacity="0.90"/>
  <text x="200" y="548" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#c9a030" letter-spacing="3" opacity="0.95">SAN DAVID DE GALES  ·  SAINT DAVID OF WALES</text>
  <text x="200" y="567" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#d0c0a0" font-style="italic">«San David de Gales»</text>
  <text x="200" y="585" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#b0a080" font-style="italic" opacity="0.8">«Saint David of Wales»</text>
</svg>

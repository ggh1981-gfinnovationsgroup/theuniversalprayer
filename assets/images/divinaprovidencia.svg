<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <defs>
    <radialGradient id="dp-bg" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#141008"/><stop offset="100%" stop-color="#080600"/>
    </radialGradient>
    <radialGradient id="dp-atm" cx="50%" cy="38%" r="46%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.28"/><stop offset="100%" stop-color="#16a085" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="dp-r1" x1="50%" y1="0%" x2="10%" y2="100%">
      <stop offset="0%" stop-color="#e8c050" stop-opacity="1"/><stop offset="100%" stop-color="#8a6000" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="dp-r2" x1="50%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#50d8b0" stop-opacity="1"/><stop offset="100%" stop-color="#16a085" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="dp-gl"><feGaussianBlur stdDeviation="9" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="dp-g2"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="600" fill="url(#dp-bg)"/>
  <rect width="400" height="600" fill="url(#dp-atm)"/>
  <!-- Rays: gold left, teal right -->
  <polygon points="198,262 -25,610 115,610" fill="url(#dp-r1)" filter="url(#dp-gl)" opacity="0.75"/>
  <polygon points="198,262 20,600  85,600"  fill="#e8c050" opacity="0.40"/>
  <polygon points="202,262 425,610 285,610" fill="url(#dp-r2)" filter="url(#dp-gl)" opacity="0.72"/>
  <polygon points="202,262 375,600 315,600" fill="#50d8b0" opacity="0.36"/>
  <!-- White robe -->
  <path d="M168,155 Q140,205 126,388 Q200,412 274,388 Q260,205 232,155 Z" fill="#f8f4e8" opacity="0.88"/>
  <!-- Teal mantle left -->
  <path d="M168,155 Q122,192 106,318 Q120,330 146,312 Q150,228 178,168 Z" fill="#16a085" opacity="0.82"/>
  <!-- Teal mantle right -->
  <path d="M232,155 Q260,200 270,318 Q290,322 296,300 Q288,200 248,158 Z" fill="#16a085" opacity="0.76"/>
  <!-- Arms slightly open -->
  <path d="M138,212 Q110,252 100,292" stroke="#f8f4e8" stroke-width="18" fill="none" stroke-linecap="round" opacity="0.84"/>
  <path d="M262,212 Q290,252 300,292" stroke="#16a085" stroke-width="16" fill="none" stroke-linecap="round" opacity="0.78"/>
  <!-- Hands -->
  <ellipse cx="98"  cy="297" rx="13" ry="16" fill="#d4a06a" opacity="0.9"/>
  <ellipse cx="301" cy="297" rx="13" ry="16" fill="#d4a06a" opacity="0.9"/>
  <!-- Child Jesus in arms (small figure) -->
  <ellipse cx="88" cy="290" rx="8" ry="9" fill="#d4a06a" opacity="0.85"/>
  <circle  cx="88" cy="280" r="7"          fill="#d4a06a" opacity="0.82"/>
  <circle  cx="88" cy="280" r="10" fill="none" stroke="#e8c97a" stroke-width="1" stroke-opacity="0.5"/>
  <!-- Neck -->
  <rect x="193" y="142" width="14" height="18" rx="4" fill="#d4a06a" opacity="0.9"/>
  <!-- Head (Mary) -->
  <ellipse cx="200" cy="110" rx="26" ry="30" fill="#d4a06a" opacity="0.92"/>
  <!-- Veil (teal) -->
  <path d="M174,100 Q172,65 200,60 Q228,65 226,100 Q220,78 200,76 Q180,78 174,100 Z" fill="#16a085" opacity="0.86"/>
  <path d="M174,100 Q154,128 150,168 L168,155 Z" fill="#16a085" opacity="0.78"/>
  <path d="M226,100 Q246,128 250,168 L232,155 Z" fill="#16a085" opacity="0.72"/>
  <!-- Halo -->
  <circle cx="200" cy="108" r="52" fill="none" stroke="#e8c97a" stroke-width="1.8" stroke-opacity="0.62" filter="url(#dp-g2)"/>
  <circle cx="200" cy="108" r="46" fill="none" stroke="#e8c97a" stroke-width="0.5" stroke-opacity="0.22"/>
  <!-- Stars -->
  <text x="145" y="200" font-family="Arial" font-size="9" fill="#e8c97a" opacity="0.7">★</text>
  <text x="248" y="215" font-family="Arial" font-size="8" fill="#e8c97a" opacity="0.65">★</text>
  <text x="132" y="260" font-family="Arial" font-size="8" fill="#e8c97a" opacity="0.6">★</text>
  <!-- Frame -->
  <rect x="6" y="6" width="388" height="588" rx="8" fill="none" stroke="#c9a84c" stroke-width="1.2" stroke-opacity="0.5"/>
  <rect x="12" y="12" width="376" height="576" rx="5" fill="none" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.18"/>
  <!-- Panel -->
  <rect x="18" y="528" width="364" height="66" rx="6" fill="#080600" opacity="0.86"/>
  <line x1="46" y1="535" x2="354" y2="535" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.28"/>
  <text x="200" y="547" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#c9a84c" letter-spacing="2" opacity="0.9">NTRA. SRA. DIVINA PROVIDENCIA  ·  OUR LADY OF DIVINE PROVIDENCE</text>
  <text x="200" y="566" text-anchor="middle" font-family="Georgia,serif" font-size="13" fill="#f5e060" font-style="italic">«Nuestra Señora de la Divina Providencia»</text>
  <text x="200" y="585" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#50d8b0" font-style="italic" opacity="0.8">«Our Lady of Divine Providence»</text>

  <!-- Minimal facial features for visual consistency across intercessors -->
  <g id="tup-face-features" opacity="0.9">
    <ellipse id="tup-eye-left" cx="186" cy="110" rx="3.1" ry="2.2" fill="#2a1a12"/>
    <ellipse id="tup-eye-right" cx="214" cy="110" rx="3.1" ry="2.2" fill="#2a1a12"/>
    <path id="tup-nose" d="M200 114 C198 120, 198 122, 200 125" stroke="#7b4a35" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <path id="tup-mouth" d="M192 134 Q200 139 208 134" stroke="#8f3a3a" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  </g>
</svg>

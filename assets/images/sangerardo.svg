<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <defs>
    <radialGradient id="gm-bg" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#061210"/><stop offset="100%" stop-color="#020806"/>
    </radialGradient>
    <radialGradient id="gm-atm" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#1a6a3a" stop-opacity="0.22"/><stop offset="100%" stop-color="#1a6a3a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gm-glow" cx="50%" cy="100%" r="55%">
      <stop offset="0%" stop-color="#60d090" stop-opacity="0.35"/><stop offset="60%" stop-color="#60d090" stop-opacity="0.12"/><stop offset="100%" stop-color="#60d090" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gm-r1" x1="50%" y1="0%" x2="5%" y2="100%">
      <stop offset="0%" stop-color="#1a6a3a" stop-opacity="1"/><stop offset="100%" stop-color="#1a6a3a" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="gm-r2" x1="50%" y1="0%" x2="95%" y2="100%">
      <stop offset="0%" stop-color="#f5e8a0" stop-opacity="1"/><stop offset="100%" stop-color="#c0a030" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="gm-gl"><feGaussianBlur stdDeviation="9" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="gm-g2"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="gm-glow-f"><feGaussianBlur stdDeviation="13" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="600" fill="url(#gm-bg)"/>
  <rect width="400" height="600" fill="url(#gm-atm)"/>
  <!-- Green glow from below -->
  <ellipse cx="200" cy="530" rx="180" ry="100" fill="url(#gm-glow)" filter="url(#gm-glow-f)" opacity="0.85"/>
  <!-- Rays -->
  <polygon points="196,268 -30,610 110,610" fill="url(#gm-r1)" filter="url(#gm-gl)" opacity="0.45"/>
  <polygon points="204,268 430,610 290,610" fill="url(#gm-r2)" filter="url(#gm-gl)" opacity="0.55"/>
  <!-- Redemptorist habit — dark brown/red -->
  <path d="M153,158 Q122,208 108,420 Q200,448 292,420 Q278,208 247,158 Z" fill="#2a1008" opacity="0.96"/>
  <!-- White collar -->
  <path d="M177,158 Q185,172 200,175 Q215,172 223,158 Q215,165 200,168 Q185,165 177,158 Z" fill="#e8e0d0" opacity="0.58"/>
  <!-- Red Redemptorist cross on chest -->
  <rect x="196" y="205" width="8" height="26" rx="2" fill="#a02010" opacity="0.72"/>
  <rect x="184" y="213" width="32" height="8" rx="2" fill="#a02010" opacity="0.72"/>
  <!-- Arms — left arm holds baby, right holds handkerchief -->
  <!-- Left arm extended outward holding baby -->
  <path d="M152,170 Q125,225 110,310" stroke="#2a1008" stroke-width="18" fill="none" stroke-linecap="round" opacity="0.90"/>
  <!-- Baby wrapped in cloth — cradled at left -->
  <ellipse cx="106" cy="322" rx="18" ry="13" fill="#e8d8c0" opacity="0.82"/>
  <ellipse cx="103" cy="315" rx="10" ry="11" fill="#c09870" opacity="0.80"/>
  <!-- Baby face tiny -->
  <circle cx="103" cy="312" r="4" fill="#c09870" opacity="0.70"/>
  <ellipse cx="101" cy="311" rx="1.5" ry="1.5" fill="#2a1808" opacity="0.55"/>
  <ellipse cx="105" cy="311" rx="1.5" ry="1.5" fill="#2a1808" opacity="0.55"/>
  <!-- Right arm holding handkerchief -->
  <path d="M248,170 Q275,225 290,305" stroke="#2a1008" stroke-width="18" fill="none" stroke-linecap="round" opacity="0.90"/>
  <!-- Handkerchief — white linen -->
  <path d="M278,302 Q292,298 308,304 Q310,320 296,325 Q280,322 278,302 Z" fill="#f5f0e8" opacity="0.82"/>
  <!-- Cross monogram on handkerchief -->
  <text x="293" y="316" text-anchor="middle" font-family="Georgia,serif" font-size="7" fill="#2a1808" opacity="0.60">✝G</text>
  <!-- Neck -->
  <rect x="194" y="142" width="12" height="16" rx="3" fill="#b07850" opacity="0.88"/>
  <!-- Head — young Italian man, dark hair, tonsure or close-cropped -->
  <ellipse cx="200" cy="108" rx="28" ry="31" fill="#b07850" opacity="0.90"/>
  <!-- Dark hair, simple -->
  <path d="M173,100 Q177,74 200,70 Q223,74 227,100" fill="#2a1808" opacity="0.80"/>
  <!-- Eyes — warm, compassionate -->
  <ellipse cx="190" cy="106" rx="5" ry="4.5" fill="#2a1808" opacity="0.78"/>
  <ellipse cx="210" cy="106" rx="5" ry="4.5" fill="#2a1808" opacity="0.78"/>
  <!-- Eyebrows -->
  <path d="M183,98 Q189,95 195,98" stroke="#2a1808" stroke-width="1.7" fill="none" opacity="0.65"/>
  <path d="M205,98 Q211,95 217,98" stroke="#2a1808" stroke-width="1.7" fill="none" opacity="0.65"/>
  <!-- Mouth — gentle smile -->
  <path d="M192,122 Q200,126 208,122" stroke="#8a4030" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.58"/>
  <!-- Halo — gold-green for healing -->
  <circle cx="200" cy="108" r="50" fill="none" stroke="#90c870" stroke-width="1.8" stroke-opacity="0.72" filter="url(#gm-g2)"/>
  <circle cx="200" cy="108" r="44" fill="none" stroke="#f5e8a0" stroke-width="0.5" stroke-opacity="0.22"/>
  <!-- Lily / plants — symbol of purity and miracles -->
  <path d="M310,380 Q315,340 318,300" stroke="#3a7a40" stroke-width="3" fill="none" opacity="0.65"/>
  <ellipse cx="318" cy="296" rx="8" ry="14" fill="#4a9a50" opacity="0.55" transform="rotate(-15,318,296)"/>
  <ellipse cx="310" cy="290" rx="6" ry="11" fill="#f5f5e8" opacity="0.48" transform="rotate(20,310,290)"/>
  <!-- Frame -->
  <rect x="6" y="6" width="388" height="588" rx="8" fill="none" stroke="#1a6a3a" stroke-width="1.2" stroke-opacity="0.45"/>
  <rect x="12" y="12" width="376" height="576" rx="5" fill="none" stroke="#c9a030" stroke-width="0.5" stroke-opacity="0.18"/>
  <!-- Name panel -->
  <rect x="18" y="528" width="364" height="66" rx="6" fill="#020806" opacity="0.90"/>
  <text x="200" y="548" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#c9a030" letter-spacing="3" opacity="0.95">SAN GERARDO MAJELLA  ·  SAINT GERARD MAJELLA</text>
  <text x="200" y="567" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#d0c0a0" font-style="italic">«San Gerardo Majella»</text>
  <text x="200" y="585" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#b0a080" font-style="italic" opacity="0.8">«Saint Gerard Majella»</text>

  <!-- Minimal facial features for visual consistency across intercessors -->
  <g id="tup-face-features" opacity="0.9">
    <ellipse id="tup-eye-left" cx="186" cy="108" rx="3.1" ry="2.2" fill="#2a1a12"/>
    <ellipse id="tup-eye-right" cx="214" cy="108" rx="3.1" ry="2.2" fill="#2a1a12"/>
    <path id="tup-nose" d="M200 112 C198 118, 198 120, 200 123" stroke="#7b4a35" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <path id="tup-mouth" d="M192 132 Q200 137 208 132" stroke="#8f3a3a" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  </g>
</svg>

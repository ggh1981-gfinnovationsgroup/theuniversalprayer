<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <defs>
    <radialGradient id="scb-bg" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#081810"/><stop offset="100%" stop-color="#040e08"/>
    </radialGradient>
    <linearGradient id="scb-r1" x1="50%" y1="0%" x2="10%" y2="100%">
      <stop offset="0%" stop-color="#2a7a4a" stop-opacity="1"/><stop offset="100%" stop-color="#0e3820" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="scb-r2" x1="50%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#f5e060" stop-opacity="1"/><stop offset="100%" stop-color="#c9a84c" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="scb-gl"><feGaussianBlur stdDeviation="9" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="scb-g2"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="600" fill="url(#scb-bg)"/>
  <rect width="400" height="600" fill="#103828" opacity="0.10"/>
  <polygon points="198,265 -25,610 115,610" fill="url(#scb-r1)" filter="url(#scb-gl)" opacity="0.72"/>
  <polygon points="198,265 20,600  85,600"  fill="#2a7a4a" opacity="0.36"/>
  <polygon points="202,265 425,610 285,610" fill="url(#scb-r2)" filter="url(#scb-gl)" opacity="0.70"/>
  <polygon points="202,265 375,600 315,600" fill="#f5e060" opacity="0.34"/>
  <!-- Water/river at feet (teal) -->
  <ellipse cx="200" cy="428" rx="120" ry="22" fill="#2a7a6a" opacity="0.40"/>
  <path d="M80,425 Q130,415 200,430 Q270,445 320,425" stroke="#5ab0a0" stroke-width="2" fill="none" opacity="0.35"/>
  <!-- Green robe (large/giant figure — wider) -->
  <path d="M150,175 Q115,230 98,400 Q200,430 302,400 Q285,230 250,175 Z" fill="#3a6838" opacity="0.88"/>
  <!-- Darker green mantle overtop -->
  <path d="M150,175 Q98,218 82,340 Q100,350 130,332 Q138,252 166,184 Z" fill="#285030" opacity="0.80"/>
  <path d="M250,175 Q302,218 318,340 Q300,350 270,332 Q262,252 234,184 Z" fill="#285030" opacity="0.74"/>
  <!-- Left arm extended + tall staff/tree for support -->
  <path d="M120,238 Q86,262 68,310" stroke="#3a6838" stroke-width="20" fill="none" stroke-linecap="round" opacity="0.88"/>
  <!-- Right arm: Child Jesus on right shoulder -->
  <path d="M280,238 Q306,215 322,192" stroke="#285030" stroke-width="18" fill="none" stroke-linecap="round" opacity="0.84"/>
  <!-- Hands -->
  <ellipse cx="68"  cy="314" rx="14" ry="17" fill="#c8a060" opacity="0.9"/>
  <ellipse cx="322" cy="188" rx="14" ry="17" fill="#c8a060" opacity="0.9"/>
  <!-- Tall staff/tree trunk in left hand -->
  <line x1="68" y1="315" x2="68" y2="450" stroke="#6a4818" stroke-width="8" opacity="0.75"/>
  <!-- Branches at top of staff -->
  <path d="M68,400 Q52,382 58,370" stroke="#4a8038" stroke-width="3" fill="none" opacity="0.55"/>
  <path d="M68,400 Q84,382 78,370" stroke="#4a8038" stroke-width="3" fill="none" opacity="0.55"/>
  <!-- Child Jesus on right shoulder (small, with halo) -->
  <ellipse cx="325" cy="175" rx="13" ry="15" fill="#c8a060" opacity="0.85"/>
  <circle  cx="320" cy="162" r="9" fill="#c8a060" opacity="0.85"/>
  <!-- Child halo -->
  <circle  cx="320" cy="162" r="13" fill="none" stroke="#e8c97a" stroke-width="1.2" opacity="0.55"/>
  <!-- Child's right hand raised blessing -->
  <ellipse cx="330" cy="172" rx="6" ry="8" fill="#c8a060" opacity="0.72"/>
  <!-- Neck + head (large bearded man) -->
  <rect x="191" y="158" width="18" height="20" rx="5" fill="#c8a060" opacity="0.9"/>
  <ellipse cx="200" cy="122" rx="30" ry="35" fill="#c8a060" opacity="0.92"/>
  <path d="M170,121 Q172,78 200,73 Q228,78 230,121 Q223,98 200,96 Q177,98 170,121 Z" fill="#4a2c10" opacity="0.80"/>
  <path d="M176,148 Q188,160 200,162 Q212,160 224,148 Q213,156 200,158 Q187,156 176,148 Z" fill="#4a2c10" opacity="0.72"/>
  <!-- Halo (larger for Christopher) -->
  <circle cx="200" cy="122" r="57" fill="none" stroke="#e8c97a" stroke-width="1.8" stroke-opacity="0.65" filter="url(#scb-g2)"/>
  <circle cx="200" cy="122" r="50" fill="none" stroke="#e8c97a" stroke-width="0.5" stroke-opacity="0.22"/>
  <!-- Frame -->
  <rect x="6" y="6" width="388" height="588" rx="8" fill="none" stroke="#c9a84c" stroke-width="1.2" stroke-opacity="0.5"/>
  <rect x="12" y="12" width="376" height="576" rx="5" fill="none" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.18"/>
  <!-- Panel -->
  <rect x="18" y="528" width="364" height="66" rx="6" fill="#040e08" opacity="0.86"/>
  <line x1="46" y1="535" x2="354" y2="535" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.28"/>
  <text x="200" y="548" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#c9a84c" letter-spacing="3" opacity="0.9">SAN CRISTOBAL  ·  SAINT CHRISTOPHER</text>
  <text x="200" y="567" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#60c898" font-style="italic">«San Cristóbal, Portador de Cristo»</text>
  <text x="200" y="585" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#f5e060" font-style="italic" opacity="0.8">«Saint Christopher, Bearer of Christ»</text>
</svg>

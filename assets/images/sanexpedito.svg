<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <defs>
    <radialGradient id="sex-bg" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#1a0808"/><stop offset="100%" stop-color="#0e0404"/>
    </radialGradient>
    <linearGradient id="sex-r1" x1="50%" y1="0%" x2="10%" y2="100%">
      <stop offset="0%" stop-color="#c03020" stop-opacity="1"/><stop offset="100%" stop-color="#601008" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="sex-r2" x1="50%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#f5e060" stop-opacity="1"/><stop offset="100%" stop-color="#c9a84c" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="sex-gl"><feGaussianBlur stdDeviation="9" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="sex-g2"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="600" fill="url(#sex-bg)"/>
  <rect width="400" height="600" fill="#3a1008" opacity="0.10"/>
  <polygon points="198,265 -25,610 115,610" fill="url(#sex-r1)" filter="url(#sex-gl)" opacity="0.72"/>
  <polygon points="198,265 20,600  85,600"  fill="#c03020" opacity="0.36"/>
  <polygon points="202,265 425,610 285,610" fill="url(#sex-r2)" filter="url(#sex-gl)" opacity="0.70"/>
  <polygon points="202,265 375,600 315,600" fill="#f5e060" opacity="0.34"/>
  <!-- Roman soldier breastplate -->
  <path d="M168,155 Q140,205 126,390 Q200,415 274,390 Q260,205 232,155 Z" fill="#8a7050" opacity="0.88"/>
  <!-- Red military cape/paludamentum -->
  <path d="M168,155 Q124,192 108,318 Q122,330 148,312 Q150,228 178,168 Z" fill="#b02818" opacity="0.82"/>
  <path d="M232,155 Q260,198 270,318 Q290,322 296,300 Q286,198 248,158 Z" fill="#b02818" opacity="0.78"/>
  <!-- Armor detail - chest band -->
  <path d="M155,185 Q200,195 245,185" stroke="#c0a850" stroke-width="3" fill="none" opacity="0.55"/>
  <path d="M150,215 Q200,225 250,215" stroke="#c0a850" stroke-width="2" fill="none" opacity="0.42"/>
  <!-- Right arm raised holding cross with HODIE -->
  <path d="M260,215 Q295,185 315,168" stroke="#8a7050" stroke-width="16" fill="none" stroke-linecap="round" opacity="0.86"/>
  <!-- Left arm down (sword on side) -->
  <path d="M140,215 Q120,255 115,285" stroke="#b02818" stroke-width="17" fill="none" stroke-linecap="round" opacity="0.82"/>
  <!-- Hands -->
  <ellipse cx="315" cy="165" rx="12" ry="15" fill="#c8a070" opacity="0.9"/>
  <ellipse cx="115" cy="288" rx="12" ry="15" fill="#c8a070" opacity="0.9"/>
  <!-- Cross with HODIE in right hand -->
  <line x1="322" y1="175" x2="322" y2="138" stroke="#f0e8c0" stroke-width="4" opacity="0.85"/>
  <line x1="312" y1="152" x2="332" y2="152" stroke="#f0e8c0" stroke-width="3" opacity="0.85"/>
  <text x="322" y="147" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" fill="#c03020" font-weight="bold">HODIE</text>
  <!-- Raven underfoot (banished procrastination) -->
  <ellipse cx="200" cy="410" rx="18" ry="10" fill="#181818" opacity="0.68"/>
  <circle  cx="188" cy="406" r="6" fill="#181818" opacity="0.70"/>
  <path d="M182,406 L172,404" stroke="#181818" stroke-width="2.5" opacity="0.65"/>
  <!-- Roman helmet above head -->
  <path d="M174,68 Q180,50 200,46 Q220,50 226,68 Q215,62 200,61 Q185,62 174,68 Z" fill="#8a7050" opacity="0.78"/>
  <line x1="200" y1="46" x2="200" y2="36" stroke="#b02818" stroke-width="3" opacity="0.55"/>
  <ellipse cx="200" cy="35" rx="5" ry="8" fill="#b02818" opacity="0.55"/>
  <!-- Neck + head (Roman) -->
  <rect x="193" y="142" width="14" height="16" rx="4" fill="#c8a070" opacity="0.9"/>
  <ellipse cx="200" cy="108" rx="26" ry="30" fill="#c8a070" opacity="0.92"/>
  <!-- Halo -->
  <circle cx="200" cy="108" r="53" fill="none" stroke="#e8c97a" stroke-width="1.8" stroke-opacity="0.65" filter="url(#sex-g2)"/>
  <circle cx="200" cy="108" r="47" fill="none" stroke="#e8c97a" stroke-width="0.5" stroke-opacity="0.22"/>
  <!-- Frame -->
  <rect x="6" y="6" width="388" height="588" rx="8" fill="none" stroke="#c9a84c" stroke-width="1.2" stroke-opacity="0.5"/>
  <rect x="12" y="12" width="376" height="576" rx="5" fill="none" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.18"/>
  <!-- Panel -->
  <rect x="18" y="528" width="364" height="66" rx="6" fill="#0e0404" opacity="0.86"/>
  <line x1="46" y1="535" x2="354" y2="535" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.28"/>
  <text x="200" y="548" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#c9a84c" letter-spacing="3" opacity="0.9">SAN EXPEDITO  ·  SAINT EXPEDITUS</text>
  <text x="200" y="567" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#e05040" font-style="italic">«San Expedito, Auxilio Urgente»</text>
  <text x="200" y="585" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#f5e060" font-style="italic" opacity="0.8">«Saint Expeditus, Urgent Help»</text>

  <!-- Minimal facial features for visual consistency across intercessors -->
  <g id="tup-face-features" opacity="0.9">
    <ellipse id="tup-eye-left" cx="186" cy="108" rx="3.1" ry="2.2" fill="#2a1a12"/>
    <ellipse id="tup-eye-right" cx="214" cy="108" rx="3.1" ry="2.2" fill="#2a1a12"/>
    <path id="tup-nose" d="M200 112 C198 118, 198 120, 200 123" stroke="#7b4a35" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <path id="tup-mouth" d="M192 132 Q200 137 208 132" stroke="#8f3a3a" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  </g>
</svg>

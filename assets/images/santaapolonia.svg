<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <defs>
    <radialGradient id="ap-bg" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#120810"/><stop offset="100%" stop-color="#06020a"/>
    </radialGradient>
    <radialGradient id="ap-glow" cx="50%" cy="38%" r="44%">
      <stop offset="0%" stop-color="#a03060" stop-opacity="0.22"/><stop offset="100%" stop-color="#a03060" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ap-fire" cx="50%" cy="80%" r="55%">
      <stop offset="0%" stop-color="#e04808" stop-opacity="0.60"/><stop offset="50%" stop-color="#e04808" stop-opacity="0.28"/><stop offset="100%" stop-color="#e04808" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ap-r1" x1="50%" y1="0%" x2="5%" y2="100%">
      <stop offset="0%" stop-color="#a03060" stop-opacity="1"/><stop offset="100%" stop-color="#a03060" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="ap-r2" x1="50%" y1="0%" x2="95%" y2="100%">
      <stop offset="0%" stop-color="#f5e0a0" stop-opacity="1"/><stop offset="100%" stop-color="#c09030" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="ap-gl"><feGaussianBlur stdDeviation="9" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="ap-g2"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="ap-glow-f"><feGaussianBlur stdDeviation="13" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="600" fill="url(#ap-bg)"/>
  <rect width="400" height="600" fill="url(#ap-glow)"/>
  <!-- Fire glow (she leapt into flames) -->
  <ellipse cx="200" cy="560" rx="200" ry="120" fill="url(#ap-fire)" filter="url(#ap-glow-f)" opacity="0.90"/>
  <!-- Flames at base -->
  <path d="M60,600 Q90,545 110,560 Q115,530 135,548 Q145,510 160,535 Q170,495 185,520 Q192,480 200,510 Q208,480 215,520 Q230,495 240,535 Q255,510 265,548 Q285,530 290,560 Q310,545 340,600 Z" fill="#e04808" opacity="0.45"/>
  <path d="M100,600 Q125,555 145,570 Q155,538 168,554 Q178,518 190,540 Q198,505 200,530 Q202,505 210,540 Q222,518 232,554 Q245,538 255,570 Q275,555 300,600 Z" fill="#f0780a" opacity="0.38"/>
  <!-- Rays -->
  <polygon points="196,260 -30,580 110,580" fill="url(#ap-r1)" filter="url(#ap-gl)" opacity="0.50"/>
  <polygon points="204,260 430,580 290,580" fill="url(#ap-r2)" filter="url(#ap-gl)" opacity="0.60"/>
  <!-- Roman martyr dress — deep red/magenta tunic -->
  <path d="M155,160 Q125,205 112,400 Q200,430 288,400 Q275,205 245,160 Z" fill="#7a1040" opacity="0.94"/>
  <!-- White stola/veil over -->
  <path d="M172,155 Q162,185 156,295 Q200,308 244,295 Q238,185 228,155 Z" fill="#e0d8d0" opacity="0.32"/>
  <!-- Left arm — holding pincers (iconic attribute) -->
  <path d="M148,188 Q115,235 108,295" stroke="#7a1040" stroke-width="17" fill="none" stroke-linecap="round" opacity="0.90"/>
  <!-- Pincers — dental forceps, iconic -->
  <rect x="96" y="286" width="6" height="24" rx="2" fill="#b0a080" opacity="0.88" transform="rotate(-20 99 298)"/>
  <rect x="108" y="286" width="6" height="24" rx="2" fill="#b0a080" opacity="0.88" transform="rotate(20 111 298)"/>
  <!-- Tooth held by pincers -->
  <ellipse cx="104" cy="285" rx="7" ry="5" fill="#e8e0d0" opacity="0.82"/>
  <path d="M100,285 Q104,278 108,285" stroke="#c8c0b0" stroke-width="1.5" fill="none" opacity="0.55"/>
  <!-- Right arm — raised upward, about to leap into flames -->
  <path d="M252,188 Q275,235 282,285" stroke="#7a1040" stroke-width="17" fill="none" stroke-linecap="round" opacity="0.90"/>
  <ellipse cx="284" cy="290" rx="10" ry="8" fill="#c09070" opacity="0.80"/>
  <!-- White veil head covering -->
  <path d="M168,120 Q170,96 200,90 Q230,96 232,120 Q225,108 200,106 Q175,108 168,120 Z" fill="#e8e0d0" opacity="0.85"/>
  <path d="M168,120 Q163,140 166,158" stroke="#e8e0d0" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.70"/>
  <path d="M232,120 Q237,140 234,158" stroke="#e8e0d0" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.70"/>
  <!-- Neck -->
  <rect x="194" y="142" width="12" height="17" rx="3" fill="#c09070" opacity="0.88"/>
  <!-- Head — Alexandrian woman, serene expression -->
  <ellipse cx="200" cy="110" rx="26" ry="30" fill="#c09070" opacity="0.90"/>
  <!-- White veil tight over hair -->
  <path d="M175,102 Q177,78 200,72 Q223,78 225,102" fill="#e8e0d0" opacity="0.80"/>
  <!-- Eyes — peaceful, slightly upward gaze (towards God/fire) -->
  <ellipse cx="190" cy="108" rx="5" ry="4" fill="#3a2010" opacity="0.78"/>
  <ellipse cx="210" cy="108" rx="5" ry="4" fill="#3a2010" opacity="0.78"/>
  <!-- Eyebrows -->
  <path d="M183,100 Q189,97 195,100" stroke="#3a2010" stroke-width="1.6" fill="none" opacity="0.68"/>
  <path d="M205,100 Q211,97 217,100" stroke="#3a2010" stroke-width="1.6" fill="none" opacity="0.68"/>
  <!-- Gentle mouth -->
  <path d="M193,124 Q200,128 207,124" stroke="#8a4030" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.65"/>
  <!-- Halo — martyrs' golden -->
  <circle cx="200" cy="110" r="52" fill="none" stroke="#f5e0a0" stroke-width="1.8" stroke-opacity="0.72" filter="url(#ap-g2)"/>
  <circle cx="200" cy="110" r="46" fill="none" stroke="#f5e0a0" stroke-width="0.5" stroke-opacity="0.22"/>
  <!-- Martyr's palm branch (upper right) -->
  <path d="M330,60 Q320,90 310,110" stroke="#4a7a30" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M312,68 Q320,85 325,95" stroke="#4a7a30" stroke-width="1.5" fill="none"/>
  <path d="M330,60 Q340,80 345,92" stroke="#4a7a30" stroke-width="1.5" fill="none"/>
  <!-- Frame -->
  <rect x="6" y="6" width="388" height="588" rx="8" fill="none" stroke="#a03060" stroke-width="1.2" stroke-opacity="0.45"/>
  <rect x="12" y="12" width="376" height="576" rx="5" fill="none" stroke="#c9a030" stroke-width="0.5" stroke-opacity="0.18"/>
  <!-- Name panel -->
  <rect x="18" y="528" width="364" height="66" rx="6" fill="#06020a" opacity="0.90"/>
  <text x="200" y="548" text-anchor="middle" font-family="Arial,sans-serif" font-size="7.5" fill="#c9a030" letter-spacing="3" opacity="0.95">SANTA APOLONIA  ·  SAINT APOLLONIA</text>
  <text x="200" y="567" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#d0c0a0" font-style="italic">«Santa Apolonia»</text>
  <text x="200" y="585" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#b0a080" font-style="italic" opacity="0.8">«Saint Apollonia»</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="celina-bg" cx="50%" cy="38%" r="60%">
      <stop offset="0%" stop-color="#060a18"/>
      <stop offset="100%" stop-color="#020508"/>
    </radialGradient>
    <radialGradient id="celina-glow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="rgba(30,55,120,0.22)"/>
      <stop offset="100%" stop-color="rgba(30,55,120,0)"/>
    </radialGradient>
  </defs>

  <!-- Background: deep blue -->
  <rect width="800" height="600" fill="url(#celina-bg)"/>
  <rect width="800" height="600" fill="url(#celina-glow)"/>

  <!-- Border -->
  <rect x="28" y="28" width="744" height="544" rx="6" fill="none" stroke="#2a4a7a" stroke-width="1" stroke-opacity="0.55"/>
  <rect x="36" y="36" width="728" height="528" rx="4" fill="none" stroke="#2a4a7a" stroke-width="0.5" stroke-opacity="0.25"/>

  <!-- Side accent strips -->
  <rect x="28" y="28" width="6" height="544" rx="3" fill="#2a4a7a" opacity="0.75"/>
  <rect x="766" y="28" width="6" height="544" rx="3" fill="#2a4a7a" opacity="0.75"/>

  <!-- Lily (symbol of purity and motherhood) center -->
  <!-- Stem -->
  <line x1="400" y1="420" x2="400" y2="240" stroke="#3a6a3a" stroke-width="3.5" stroke-linecap="round" opacity="0.88"/>
  <!-- Leaves -->
  <path d="M 400 360 Q 355 350 340 320 Q 365 330 400 340 Z" fill="#3a6a3a" opacity="0.70"/>
  <path d="M 400 360 Q 445 350 460 320 Q 435 330 400 340 Z" fill="#3a6a3a" opacity="0.70"/>
  <!-- Main flower (three petals upward) -->
  <!-- Center petal -->
  <path d="M 400 240 Q 388 215 390 195 Q 400 178 410 195 Q 412 215 400 240 Z" fill="#d8e8f8" stroke="#a0b8d8" stroke-width="0.8" opacity="0.90"/>
  <!-- Left petal -->
  <path d="M 395 244 Q 368 225 360 208 Q 368 192 382 200 Q 392 214 395 244 Z" fill="#d8e8f8" stroke="#a0b8d8" stroke-width="0.8" opacity="0.85"/>
  <!-- Right petal -->
  <path d="M 405 244 Q 432 225 440 208 Q 432 192 418 200 Q 408 214 405 244 Z" fill="#d8e8f8" stroke="#a0b8d8" stroke-width="0.8" opacity="0.85"/>
  <!-- Stamens -->
  <line x1="400" y1="240" x2="400" y2="220" stroke="#e8c97a" stroke-width="1.5" opacity="0.75"/>
  <circle cx="400" cy="218" r="3" fill="#e8c97a" opacity="0.75"/>
  <line x1="397" y1="242" x2="390" y2="224" stroke="#e8c97a" stroke-width="1.2" opacity="0.65"/>
  <circle cx="389" cy="222" r="2.5" fill="#e8c97a" opacity="0.65"/>
  <line x1="403" y1="242" x2="410" y2="224" stroke="#e8c97a" stroke-width="1.2" opacity="0.65"/>
  <circle cx="411" cy="222" r="2.5" fill="#e8c97a" opacity="0.65"/>

  <!-- Second smaller bud on side branch -->
  <line x1="400" y1="310" x2="445" y2="285" stroke="#3a6a3a" stroke-width="2.5" stroke-linecap="round" opacity="0.75"/>
  <path d="M 445 285 Q 438 268 442 258 Q 450 252 456 260 Q 458 270 452 283 Z" fill="#d8e8f8" opacity="0.70"/>

  <!-- Stars scattered (early Christian symbol, also link to Gaul) -->
  <!-- 8-pointed stars at top corners -->
  <!-- Top left star -->
  <g transform="translate(145,105)">
    <polygon points="0,-12 3,-4 11,-4 5,1 7,10 0,5 -7,10 -5,1 -11,-4 -3,-4" fill="#e8c97a" opacity="0.55"/>
  </g>
  <!-- Top right star -->
  <g transform="translate(655,105)">
    <polygon points="0,-12 3,-4 11,-4 5,1 7,10 0,5 -7,10 -5,1 -11,-4 -3,-4" fill="#e8c97a" opacity="0.55"/>
  </g>
  <!-- Smaller stars scattered -->
  <circle cx="180" cy="200" r="2" fill="#e8c97a" opacity="0.42"/>
  <circle cx="620" cy="200" r="2" fill="#e8c97a" opacity="0.42"/>
  <circle cx="150" cy="340" r="1.8" fill="#e8c97a" opacity="0.35"/>
  <circle cx="650" cy="340" r="1.8" fill="#e8c97a" opacity="0.35"/>
  <circle cx="250" cy="130" r="1.5" fill="#c9a84c" opacity="0.38"/>
  <circle cx="550" cy="130" r="1.5" fill="#c9a84c" opacity="0.38"/>

  <!-- Small chi-rho monogram (early Christian symbol of baptism / link to Clovis baptism) -->
  <text x="400" y="445" text-anchor="middle" font-family="Georgia, serif" font-size="28" fill="#2a4a7a" opacity="0.38">☧</text>

  <!-- Decorative corner flourishes -->
  <path d="M 80 80 Q 90 70 100 80 Q 90 90 80 80 Z" fill="#2a4a7a" opacity="0.35"/>
  <path d="M 720 80 Q 730 70 720 60 Q 710 70 720 80 Z" fill="#2a4a7a" opacity="0.35"/>

  <!-- Name text -->
  <text x="400" y="498" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#e8c97a" letter-spacing="1">Santa Celina</text>
  <text x="400" y="520" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#c9a84c" font-style="italic" opacity="0.85">Saint Céline</text>
  <text x="400" y="546" text-anchor="middle" font-family="Lato, sans-serif" font-size="11" fill="#1a3050" letter-spacing="2.5">21 DE OCT · OCT 21</text>
</svg>

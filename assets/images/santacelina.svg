<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <defs>
    <radialGradient id="sce-bg" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#080c1a"/><stop offset="100%" stop-color="#040810"/>
    </radialGradient>
    <linearGradient id="sce-r1" x1="50%" y1="0%" x2="10%" y2="100%">
      <stop offset="0%" stop-color="#3060c0" stop-opacity="1"/><stop offset="100%" stop-color="#102050" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="sce-r2" x1="50%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#f5e060" stop-opacity="1"/><stop offset="100%" stop-color="#c9a84c" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="sce-gl"><feGaussianBlur stdDeviation="9" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="sce-g2"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="600" fill="url(#sce-bg)"/>
  <rect width="400" height="600" fill="#102048" opacity="0.10"/>
  <polygon points="198,265 -25,610 115,610" fill="url(#sce-r1)" filter="url(#sce-gl)" opacity="0.72"/>
  <polygon points="198,265 20,600  85,600"  fill="#3060c0" opacity="0.36"/>
  <polygon points="202,265 425,610 285,610" fill="url(#sce-r2)" filter="url(#sce-gl)" opacity="0.70"/>
  <polygon points="202,265 375,600 315,600" fill="#f5e060" opacity="0.34"/>
  <!-- Blue mantle (Celine — Mère de Sainte Thérèse) -->
  <path d="M168,155 Q140,205 126,390 Q200,415 274,390 Q260,205 232,155 Z" fill="#e8e8f8" opacity="0.88"/>
  <!-- Blue mantle -->
  <path d="M168,155 Q124,192 108,318 Q122,330 148,312 Q150,228 178,168 Z" fill="#3060c0" opacity="0.68"/>
  <path d="M232,155 Q260,198 270,318 Q290,322 296,300 Q286,198 248,158 Z" fill="#3060c0" opacity="0.60"/>
  <!-- Left arm cradling infant (mother of St. Thérèse) -->
  <path d="M140,215 Q116,248 110,288" stroke="#e8e8f8" stroke-width="17" fill="none" stroke-linecap="round" opacity="0.85"/>
  <!-- Right arm supporting -->
  <path d="M260,215 Q278,248 282,278" stroke="#3060c0" stroke-width="16" fill="none" stroke-linecap="round" opacity="0.80"/>
  <!-- Hands -->
  <ellipse cx="110" cy="291" rx="12" ry="15" fill="#d4b090" opacity="0.9"/>
  <ellipse cx="282" cy="281" rx="12" ry="15" fill="#d4b090" opacity="0.9"/>
  <!-- Infant (swaddled) -->
  <ellipse cx="118" cy="312" rx="15" ry="11" fill="#f8f0e0" opacity="0.82"/>
  <circle  cx="130" cy="305" r="9" fill="#f0d8c0" opacity="0.80"/>
  <!-- White head veil -->
  <path d="M168,155 Q142,142 136,126 Q152,112 176,118 Q184,135 188,152 Z" fill="#f0ece0" opacity="0.90"/>
  <path d="M232,155 Q258,142 264,126 Q248,112 224,118 Q216,135 212,152 Z" fill="#f0ece0" opacity="0.86"/>
  <!-- Neck + head -->
  <rect x="193" y="142" width="14" height="16" rx="4" fill="#d4b090" opacity="0.9"/>
  <ellipse cx="200" cy="108" rx="25" ry="29" fill="#d4b090" opacity="0.92"/>
  <path d="M175,107 Q177,73 200,69 Q223,73 225,107 Q218,87 200,85 Q182,87 175,107 Z" fill="#9a7858" opacity="0.60"/>
  <!-- Halo -->
  <circle cx="200" cy="108" r="53" fill="none" stroke="#e8c97a" stroke-width="1.8" stroke-opacity="0.65" filter="url(#sce-g2)"/>
  <circle cx="200" cy="108" r="47" fill="none" stroke="#e8c97a" stroke-width="0.5" stroke-opacity="0.22"/>
  <!-- Frame -->
  <rect x="6" y="6" width="388" height="588" rx="8" fill="none" stroke="#c9a84c" stroke-width="1.2" stroke-opacity="0.5"/>
  <rect x="12" y="12" width="376" height="576" rx="5" fill="none" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.18"/>
  <!-- Panel -->
  <rect x="18" y="528" width="364" height="66" rx="6" fill="#040810" opacity="0.86"/>
  <line x1="46" y1="535" x2="354" y2="535" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.28"/>
  <text x="200" y="548" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#c9a84c" letter-spacing="3" opacity="0.9">SANTA CELINA  ·  SAINT CELINE</text>
  <text x="200" y="567" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#80a8f8" font-style="italic">«Santa Celina, Madre de Teresita»</text>
  <text x="200" y="585" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#f5e060" font-style="italic" opacity="0.8">«Saint Céline, Mother of Thérèse»</text>

  <!-- Minimal facial features for visual consistency across intercessors -->
  <g id="tup-face-features" opacity="0.9">
    <ellipse id="tup-eye-left" cx="186" cy="108" rx="3.1" ry="2.2" fill="#2a1a12"/>
    <ellipse id="tup-eye-right" cx="214" cy="108" rx="3.1" ry="2.2" fill="#2a1a12"/>
    <path id="tup-nose" d="M200 112 C198 118, 198 120, 200 123" stroke="#7b4a35" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <path id="tup-mouth" d="M192 132 Q200 137 208 132" stroke="#8f3a3a" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  </g>
</svg>

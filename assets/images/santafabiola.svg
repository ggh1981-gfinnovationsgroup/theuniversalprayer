<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="fab-bg" cx="50%" cy="38%" r="60%">
      <stop offset="0%" stop-color="#1e0e00"/>
      <stop offset="100%" stop-color="#0a0500"/>
    </radialGradient>
    <radialGradient id="fab-glow" cx="50%" cy="35%" r="48%">
      <stop offset="0%" stop-color="rgba(200,120,30,0.22)"/>
      <stop offset="100%" stop-color="rgba(200,120,30,0)"/>
    </radialGradient>
  </defs>

  <!-- Background: warm amber-brown -->
  <rect width="800" height="600" fill="url(#fab-bg)"/>
  <rect width="800" height="600" fill="url(#fab-glow)"/>

  <!-- Border -->
  <rect x="28" y="28" width="744" height="544" rx="6" fill="none" stroke="#c87820" stroke-width="1" stroke-opacity="0.55"/>
  <rect x="36" y="36" width="728" height="528" rx="4" fill="none" stroke="#c87820" stroke-width="0.5" stroke-opacity="0.25"/>

  <!-- Side accent strips -->
  <rect x="28" y="28" width="6" height="544" rx="3" fill="#8a5010" opacity="0.75"/>
  <rect x="766" y="28" width="6" height="544" rx="3" fill="#8a5010" opacity="0.75"/>

  <!-- Cross — large central symbol -->
  <line x1="400" y1="120" x2="400" y2="450" stroke="#c87820" stroke-width="8" stroke-linecap="round" opacity="0.88"/>
  <line x1="270" y1="220" x2="530" y2="220" stroke="#c87820" stroke-width="8" stroke-linecap="round" opacity="0.88"/>
  <!-- Cross highlight -->
  <line x1="400" y1="122" x2="400" y2="448" stroke="#f0c060" stroke-width="2" stroke-linecap="round" opacity="0.30"/>
  <line x1="272" y1="220" x2="528" y2="220" stroke="#f0c060" stroke-width="2" stroke-linecap="round" opacity="0.30"/>

  <!-- Oil lamp — symbol of charity -->
  <!-- Lamp base -->
  <ellipse cx="400" cy="370" rx="44" ry="14" fill="#8a5010" opacity="0.85"/>
  <!-- Lamp body -->
  <path d="M 358 370 Q 352 340 360 318 Q 368 300 400 295 Q 432 300 440 318 Q 448 340 442 370 Z" fill="#6a3808" stroke="#c87820" stroke-width="1.5" opacity="0.90"/>
  <!-- Lamp spout -->
  <path d="M 440 338 Q 468 330 475 318 Q 468 310 458 315 Q 452 328 442 330 Z" fill="#6a3808" stroke="#c87820" stroke-width="1" opacity="0.85"/>
  <!-- Flame -->
  <ellipse cx="475" cy="308" rx="7" ry="12" fill="#f0a030" opacity="0.9"/>
  <ellipse cx="475" cy="304" rx="4" ry="7" fill="#ffe080" opacity="0.85"/>
  <!-- Handle -->
  <path d="M 358 355 Q 338 340 340 320 Q 342 305 358 310" fill="none" stroke="#c87820" stroke-width="3" stroke-linecap="round" opacity="0.75"/>

  <!-- Decorative stars -->
  <circle cx="160" cy="110" r="2" fill="#c87820" opacity="0.45"/>
  <circle cx="640" cy="130" r="2" fill="#c87820" opacity="0.45"/>
  <circle cx="185" cy="440" r="1.5" fill="#c87820" opacity="0.35"/>
  <circle cx="615" cy="420" r="1.5" fill="#c87820" opacity="0.35"/>
  <circle cx="200" cy="270" r="1.3" fill="#c87820" opacity="0.30"/>
  <circle cx="600" cy="290" r="1.3" fill="#c87820" opacity="0.30"/>

  <!-- Name text -->
  <text x="400" y="498" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#e8c97a" letter-spacing="1">Santa Fabiola de Roma</text>
  <text x="400" y="520" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#c9a84c" font-style="italic" opacity="0.85">Saint Fabiola of Rome</text>
  <text x="400" y="546" text-anchor="middle" font-family="Lato, sans-serif" font-size="11" fill="#7a5a30" letter-spacing="2.5">27 DE DIC · DEC 27</text>
</svg>

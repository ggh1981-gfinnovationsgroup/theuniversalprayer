<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <defs>
    <radialGradient id="stf-bg" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#180e08"/><stop offset="100%" stop-color="#0c0804"/>
    </radialGradient>
    <linearGradient id="stf-r1" x1="50%" y1="0%" x2="10%" y2="100%">
      <stop offset="0%" stop-color="#c06820" stop-opacity="1"/><stop offset="100%" stop-color="#603008" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="stf-r2" x1="50%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#f5e060" stop-opacity="1"/><stop offset="100%" stop-color="#c9a84c" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="stf-gl"><feGaussianBlur stdDeviation="9" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="stf-g2"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="600" fill="url(#stf-bg)"/>
  <rect width="400" height="600" fill="#602810" opacity="0.10"/>
  <polygon points="198,265 -25,610 115,610" fill="url(#stf-r1)" filter="url(#stf-gl)" opacity="0.72"/>
  <polygon points="198,265 20,600  85,600"  fill="#c06820" opacity="0.36"/>
  <polygon points="202,265 425,610 285,610" fill="url(#stf-r2)" filter="url(#stf-gl)" opacity="0.70"/>
  <polygon points="202,265 375,600 315,600" fill="#f5e060" opacity="0.34"/>
  <!-- Rich Roman dress + red mantle (noble Roman matron) -->
  <path d="M168,155 Q140,205 126,390 Q200,415 274,390 Q260,205 232,155 Z" fill="#c06820" opacity="0.82"/>
  <!-- Red mantle -->
  <path d="M168,155 Q124,192 108,318 Q122,330 148,312 Q150,228 178,168 Z" fill="#a04010" opacity="0.80"/>
  <path d="M232,155 Q260,198 270,318 Q290,322 296,300 Q286,198 248,158 Z" fill="#a04010" opacity="0.75"/>
  <!-- Both arms extended caring gesture (founder of hospitals) -->
  <path d="M140,215 Q104,248 92,278" stroke="#c06820" stroke-width="17" fill="none" stroke-linecap="round" opacity="0.86"/>
  <path d="M260,215 Q296,248 308,278" stroke="#a04010" stroke-width="16" fill="none" stroke-linecap="round" opacity="0.82"/>
  <!-- Hands open/caring -->
  <ellipse cx="91"  cy="281" rx="13" ry="16" fill="#c8a070" opacity="0.9"/>
  <ellipse cx="309" cy="281" rx="13" ry="16" fill="#c8a070" opacity="0.9"/>
  <!-- Small cross on garment -->
  <line x1="200" y1="200" x2="200" y2="230" stroke="#f5e060" stroke-width="2.5" opacity="0.55"/>
  <line x1="192" y1="212" x2="208" y2="212" stroke="#f5e060" stroke-width="2.5" opacity="0.55"/>
  <!-- Head veil (Roman matron) -->
  <path d="M168,155 Q142,142 136,128 Q152,114 176,120 Q184,136 188,152 Z" fill="#f0e8d8" opacity="0.82"/>
  <path d="M232,155 Q258,142 264,128 Q248,114 224,120 Q216,136 212,152 Z" fill="#f0e8d8" opacity="0.78"/>
  <!-- Neck + head (older woman) -->
  <rect x="193" y="142" width="14" height="16" rx="4" fill="#c8a070" opacity="0.9"/>
  <ellipse cx="200" cy="108" rx="26" ry="30" fill="#c8a070" opacity="0.92"/>
  <path d="M174,107 Q176,72 200,68 Q224,72 226,107 Q219,86 200,84 Q181,86 174,107 Z" fill="#6a4820" opacity="0.78"/>
  <!-- Halo -->
  <circle cx="200" cy="108" r="53" fill="none" stroke="#e8c97a" stroke-width="1.8" stroke-opacity="0.65" filter="url(#stf-g2)"/>
  <circle cx="200" cy="108" r="47" fill="none" stroke="#e8c97a" stroke-width="0.5" stroke-opacity="0.22"/>
  <!-- Frame -->
  <rect x="6" y="6" width="388" height="588" rx="8" fill="none" stroke="#c9a84c" stroke-width="1.2" stroke-opacity="0.5"/>
  <rect x="12" y="12" width="376" height="576" rx="5" fill="none" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.18"/>
  <!-- Panel -->
  <rect x="18" y="528" width="364" height="66" rx="6" fill="#0c0804" opacity="0.86"/>
  <line x1="46" y1="535" x2="354" y2="535" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.28"/>
  <text x="200" y="548" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#c9a84c" letter-spacing="3" opacity="0.9">SANTA FABIOLA  ·  SAINT FABIOLA</text>
  <text x="200" y="567" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#f0a060" font-style="italic">«Santa Fabiola de Roma»</text>
  <text x="200" y="585" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#f5e060" font-style="italic" opacity="0.8">«Saint Fabiola of Rome»</text>
</svg>

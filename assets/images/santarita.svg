<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <defs>
    <radialGradient id="srt-bg" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#180808"/><stop offset="100%" stop-color="#0c0404"/>
    </radialGradient>
    <linearGradient id="srt-r1" x1="50%" y1="0%" x2="10%" y2="100%">
      <stop offset="0%" stop-color="#a81828" stop-opacity="1"/><stop offset="100%" stop-color="#500810" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="srt-r2" x1="50%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#f5e060" stop-opacity="1"/><stop offset="100%" stop-color="#c9a84c" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="srt-gl"><feGaussianBlur stdDeviation="9" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="srt-g2"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="600" fill="url(#srt-bg)"/>
  <rect width="400" height="600" fill="#480810" opacity="0.12"/>
  <polygon points="198,265 -25,610 115,610" fill="url(#srt-r1)" filter="url(#srt-gl)" opacity="0.72"/>
  <polygon points="198,265 20,600  85,600"  fill="#a81828" opacity="0.36"/>
  <polygon points="202,265 425,610 285,610" fill="url(#srt-r2)" filter="url(#srt-gl)" opacity="0.70"/>
  <polygon points="202,265 375,600 315,600" fill="#f5e060" opacity="0.34"/>
  <!-- Black Augustinian habit -->
  <path d="M168,155 Q140,205 126,390 Q200,415 274,390 Q260,205 232,155 Z" fill="#1a1210" opacity="0.92"/>
  <!-- Black mantle -->
  <path d="M168,155 Q124,192 108,318 Q122,330 148,312 Q150,228 178,168 Z" fill="#120c08" opacity="0.90"/>
  <path d="M232,155 Q260,198 270,318 Q290,322 296,300 Q286,198 248,158 Z" fill="#120c08" opacity="0.84"/>
  <!-- Left arm with crucifix + crown of thorns -->
  <path d="M140,215 Q112,252 104,294" stroke="#1a1210" stroke-width="17" fill="none" stroke-linecap="round" opacity="0.88"/>
  <!-- Right arm open -->
  <path d="M260,215 Q285,252 292,292" stroke="#120c08" stroke-width="16" fill="none" stroke-linecap="round" opacity="0.82"/>
  <!-- Hands -->
  <ellipse cx="104" cy="297" rx="12" ry="15" fill="#c8a06a" opacity="0.9"/>
  <ellipse cx="292" cy="296" rx="12" ry="15" fill="#c8a06a" opacity="0.9"/>
  <!-- Crown of thorns -->
  <circle cx="104" cy="296" r="14" fill="none" stroke="#7a4820" stroke-width="2.5" stroke-opacity="0.85"/>
  <path d="M98,284 L100,276 L104,284 L108,276 L110,284" fill="none" stroke="#7a4820" stroke-width="1.5" opacity="0.7"/>
  <!-- Crucifix -->
  <line x1="104" y1="297" x2="104" y2="248" stroke="#c8a870" stroke-width="4" opacity="0.82"/>
  <line x1="94"  y1="260" x2="114" y2="260" stroke="#c8a870" stroke-width="3" opacity="0.82"/>
  <!-- Thorn on forehead (distinctive icon of Rita) -->
  <circle cx="200" cy="100" r="3" fill="#a81828" opacity="0.80"/>
  <!-- White veil -->
  <path d="M168,155 Q142,142 136,128 Q152,116 176,122 Q184,136 188,152 Z" fill="#f0ece0" opacity="0.88"/>
  <path d="M232,155 Q258,142 264,128 Q248,116 224,122 Q216,136 212,152 Z" fill="#f0ece0" opacity="0.84"/>
  <!-- Neck + head -->
  <rect x="193" y="142" width="14" height="16" rx="4" fill="#c8a06a" opacity="0.9"/>
  <ellipse cx="200" cy="108" rx="25" ry="29" fill="#c8a06a" opacity="0.92"/>
  <path d="M175,107 Q177,73 200,69 Q223,73 225,107 Q218,87 200,85 Q182,87 175,107 Z" fill="#3a2010" opacity="0.80"/>
  <!-- Halo -->
  <circle cx="200" cy="108" r="53" fill="none" stroke="#e8c97a" stroke-width="1.8" stroke-opacity="0.65" filter="url(#srt-g2)"/>
  <circle cx="200" cy="108" r="47" fill="none" stroke="#e8c97a" stroke-width="0.5" stroke-opacity="0.22"/>
  <!-- Frame -->
  <rect x="6" y="6" width="388" height="588" rx="8" fill="none" stroke="#c9a84c" stroke-width="1.2" stroke-opacity="0.5"/>
  <rect x="12" y="12" width="376" height="576" rx="5" fill="none" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.18"/>
  <!-- Panel -->
  <rect x="18" y="528" width="364" height="66" rx="6" fill="#0c0404" opacity="0.86"/>
  <line x1="46" y1="535" x2="354" y2="535" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.28"/>
  <text x="200" y="548" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#c9a84c" letter-spacing="3" opacity="0.9">SANTA RITA  ·  SAINT RITA OF CASCIA</text>
  <text x="200" y="567" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#f07080" font-style="italic">«Santa Rita de Casia»</text>
  <text x="200" y="585" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#f5e060" font-style="italic" opacity="0.8">«Saint Rita of Cascia»</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <defs>
    <radialGradient id="sj-bg" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#1a0404"/><stop offset="100%" stop-color="#080102"/>
    </radialGradient>
    <radialGradient id="sj-atm" cx="50%" cy="38%" r="46%">
      <stop offset="0%" stop-color="#8a1a1a" stop-opacity="0.28"/><stop offset="100%" stop-color="#8a1a1a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sj-r1" x1="50%" y1="0%" x2="10%" y2="100%">
      <stop offset="0%" stop-color="#cc2020" stop-opacity="1"/><stop offset="100%" stop-color="#6a0808" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="sj-r2" x1="50%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#f5e060" stop-opacity="1"/><stop offset="100%" stop-color="#c9a84c" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="sj-gl"><feGaussianBlur stdDeviation="9" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="sj-g2"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="600" fill="url(#sj-bg)"/>
  <rect width="400" height="600" fill="url(#sj-atm)"/>
  <!-- Rays: crimson left, gold right -->
  <polygon points="198,268 -25,610 115,610" fill="url(#sj-r1)" filter="url(#sj-gl)" opacity="0.72"/>
  <polygon points="198,268 20,600  85,600"  fill="#cc2020" opacity="0.38"/>
  <polygon points="202,268 425,610 285,610" fill="url(#sj-r2)" filter="url(#sj-gl)" opacity="0.70"/>
  <polygon points="202,268 375,600 315,600" fill="#f5e060" opacity="0.34"/>
  <!-- White surcoat over chain mail -->
  <path d="M168,158 Q140,205 126,395 Q200,418 274,395 Q260,205 232,158 Z" fill="#e8e4dc" opacity="0.90"/>
  <!-- Red cross on surcoat (George's Cross) -->
  <rect x="192" y="200" width="16" height="80" rx="3" fill="#cc1010" opacity="0.88"/>
  <rect x="164" y="225" width="72" height="16" rx="3" fill="#cc1010" opacity="0.88"/>
  <!-- Red battle cloak -->
  <path d="M168,158 Q122,195 108,320 Q122,332 148,315 Q148,232 176,168 Z" fill="#a01818" opacity="0.86"/>
  <path d="M232,158 Q262,198 268,320 Q290,324 296,302 Q286,200 248,162 Z" fill="#a01818" opacity="0.78"/>
  <!-- Left arm holding shield -->
  <path d="M142,215 Q108,252 100,285" stroke="#d0ccc4" stroke-width="18" fill="none" stroke-linecap="round" opacity="0.90"/>
  <!-- George's Cross shield -->
  <path d="M78,275 L122,275 L122,315 L100,332 L78,315 Z" fill="#f0f0f0" opacity="0.95"/>
  <rect x="98" y="275" width="8" height="57" rx="2" fill="#cc1010" opacity="0.90"/>
  <rect x="78" y="295" width="44" height="8" rx="2" fill="#cc1010" opacity="0.90"/>
  <rect x="80" y="278" width="14" height="14" rx="2" fill="#ffffff" opacity="0.35"/>
  <!-- Right arm: lance raised -->
  <path d="M258,215 Q280,245 288,268" stroke="#d0ccc4" stroke-width="18" fill="none" stroke-linecap="round" opacity="0.88"/>
  <line x1="286" y1="265" x2="350" y2="98" stroke="#8a6030" stroke-width="5" stroke-linecap="round"/>
  <polygon points="350,98 356,88 362,98 350,110" fill="#c8c8c0"/>
  <ellipse cx="289" cy="272" rx="13" ry="15" fill="#c0bcb4" opacity="0.92"/>
  <ellipse cx="100" cy="332" rx="11" ry="13" fill="#d4a06a" opacity="0.90"/>
  <!-- Belt -->
  <rect x="162" y="295" width="76" height="11" rx="3" fill="#c9a84c" opacity="0.58"/>
  <!-- Neck -->
  <rect x="193" y="142" width="14" height="18" rx="4" fill="#d4a06a" opacity="0.90"/>
  <!-- Head -->
  <ellipse cx="200" cy="108" rx="26" ry="30" fill="#d4a06a" opacity="0.92"/>
  <path d="M174,108 Q176,72 200,68 Q224,72 226,108 Q219,87 200,85 Q181,87 174,108 Z" fill="#2a1a10" opacity="0.85"/>
  <!-- Halo -->
  <circle cx="200" cy="108" r="53" fill="none" stroke="#e8c97a" stroke-width="1.8" stroke-opacity="0.65" filter="url(#sj-g2)"/>
  <circle cx="200" cy="108" r="47" fill="none" stroke="#e8c97a" stroke-width="0.5" stroke-opacity="0.22"/>
  <!-- Small dragon defeated at feet -->
  <path d="M128,490 Q165,472 210,476 Q228,478 232,490 Q222,506 190,510 Q155,512 128,490 Z" fill="#1a3a08" opacity="0.80"/>
  <ellipse cx="126" cy="488" rx="18" ry="11" fill="#1a3a08" opacity="0.80"/>
  <circle cx="120" cy="484" r="4" fill="#cc4010" opacity="0.70"/>
  <ellipse cx="210" cy="478" rx="8" ry="5" fill="#8a1010" opacity="0.65"/>
  <!-- Frame -->
  <rect x="6" y="6" width="388" height="588" rx="8" fill="none" stroke="#c9a84c" stroke-width="1.2" stroke-opacity="0.5"/>
  <rect x="12" y="12" width="376" height="576" rx="5" fill="none" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.18"/>
  <!-- Panel -->
  <rect x="18" y="528" width="364" height="66" rx="6" fill="#080102" opacity="0.88"/>
  <line x1="46" y1="535" x2="354" y2="535" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.28"/>
  <text x="200" y="548" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#c9a84c" letter-spacing="3" opacity="0.9">SAN JORGE  ·  SAINT GEORGE</text>
  <text x="200" y="567" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#f5c060" font-style="italic">«Mártir y caballero de Cristo»</text>
  <text x="200" y="585" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#d4a840" font-style="italic" opacity="0.8">«Martyr and knight of Christ»</text>
</svg>
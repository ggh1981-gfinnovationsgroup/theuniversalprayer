<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="sg-bg" cx="50%" cy="40%" r="62%">
      <stop offset="0%" stop-color="#0d1a2e"/>
      <stop offset="100%" stop-color="#060c18"/>
    </radialGradient>
    <radialGradient id="sg-glow" cx="50%" cy="38%" r="48%">
      <stop offset="0%" stop-color="rgba(80,140,255,0.22)"/>
      <stop offset="100%" stop-color="rgba(80,140,255,0)"/>
    </radialGradient>
    <radialGradient id="sg-lily-glow" cx="50%" cy="68%" r="38%">
      <stop offset="0%" stop-color="rgba(200,220,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(200,220,255,0)"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#sg-bg)"/>
  <rect width="800" height="600" fill="url(#sg-glow)"/>
  <rect width="800" height="600" fill="url(#sg-lily-glow)"/>

  <!-- Border -->
  <rect x="28" y="28" width="744" height="544" rx="6" fill="none" stroke="#4a7acc" stroke-width="1" stroke-opacity="0.50"/>
  <rect x="36" y="36" width="728" height="528" rx="4" fill="none" stroke="#4a7acc" stroke-width="0.5" stroke-opacity="0.22"/>

  <!-- Side accent strips -->
  <rect x="28" y="28" width="6" height="544" rx="3" fill="#2255aa" opacity="0.65"/>
  <rect x="766" y="28" width="6" height="544" rx="3" fill="#2255aa" opacity="0.65"/>

  <!-- Stars -->
  <circle cx="160" cy="110" r="2"   fill="#aaccff" opacity="0.45"/>
  <circle cx="220" cy="75"  r="1.5" fill="#aaccff" opacity="0.35"/>
  <circle cx="640" cy="100" r="2"   fill="#aaccff" opacity="0.45"/>
  <circle cx="670" cy="180" r="1.5" fill="#aaccff" opacity="0.38"/>
  <circle cx="140" cy="360" r="1.8" fill="#aaccff" opacity="0.32"/>
  <circle cx="660" cy="390" r="1.8" fill="#aaccff" opacity="0.32"/>
  <circle cx="190" cy="490" r="1.3" fill="#6699dd" opacity="0.38"/>
  <circle cx="610" cy="480" r="1.3" fill="#6699dd" opacity="0.38"/>

  <!-- Light rays from center -->
  <g opacity="0.12" fill="#5588dd">
    <polygon points="400,300 375,100 400,118 425,100"/>
    <polygon points="400,300 595,265 582,292 598,320"/>
    <polygon points="400,300 425,500 400,482 375,500"/>
    <polygon points="400,300 205,335 218,308 202,280"/>
    <polygon points="400,300 545,140 548,172 578,150"/>
    <polygon points="400,300 558,448 528,438 544,468"/>
    <polygon points="400,300 260,450 276,422 248,428"/>
    <polygon points="400,300 238,158 258,183 232,200"/>
  </g>

  <!-- Trumpet -->
  <!-- Bell of trumpet -->
  <ellipse cx="320" cy="230" rx="34" ry="24" fill="none" stroke="#d4af37" stroke-width="3" opacity="0.85"/>
  <ellipse cx="320" cy="230" rx="28" ry="18" fill="#0d1a2e" opacity="0.6"/>
  <!-- Tube -->
  <path d="M 320 218 Q 360 210 410 214 Q 440 216 456 222" fill="none" stroke="#d4af37" stroke-width="5" stroke-linecap="round" opacity="0.88"/>
  <path d="M 320 242 Q 360 248 410 244 Q 440 242 456 236" fill="none" stroke="#d4af37" stroke-width="5" stroke-linecap="round" opacity="0.88"/>
  <!-- Valves/bell top highlight -->
  <circle cx="378" cy="211" r="6" fill="#d4af37" opacity="0.60"/>
  <circle cx="408" cy="212" r="6" fill="#d4af37" opacity="0.60"/>
  <!-- Mouthpiece -->
  <ellipse cx="460" cy="229" rx="10" ry="8" fill="#d4af37" opacity="0.82"/>
  <!-- Trumpet bell highlight -->
  <ellipse cx="308" cy="223" rx="8" ry="5" fill="#f0dc80" opacity="0.30" transform="rotate(-15 308 223)"/>

  <!-- Main halo/icon circle -->
  <circle cx="400" cy="194" r="64" fill="#080f1e" stroke="#4a7acc" stroke-width="2" stroke-opacity="0.72"/>
  <circle cx="400" cy="194" r="58" fill="none" stroke="#aaccff" stroke-width="0.8" stroke-opacity="0.30"/>

  <!-- Cross inside circle -->
  <line x1="400" y1="150" x2="400" y2="238" stroke="#aaccff" stroke-width="2.5" stroke-opacity="0.72"/>
  <line x1="366" y1="176" x2="434" y2="176" stroke="#aaccff" stroke-width="2.5" stroke-opacity="0.72"/>

  <!-- IHS monogram -->
  <text x="400" y="203" text-anchor="middle" font-family="Georgia,serif" font-size="20"
        fill="#aaccff" opacity="0.85" letter-spacing="2">IHS</text>

  <!-- Lily (symbol of the Annunciation) -->
  <!-- Stem -->
  <line x1="400" y1="455" x2="400" y2="390" stroke="#4a8a6a" stroke-width="3" stroke-opacity="0.80"/>
  <!-- Leaves -->
  <ellipse cx="382" cy="435" rx="14" ry="6" fill="#4a8a6a" opacity="0.70" transform="rotate(-40 382 435)"/>
  <ellipse cx="418" cy="425" rx="14" ry="6" fill="#4a8a6a" opacity="0.70" transform="rotate(40 418 425)"/>
  <!-- Three lily blooms -->
  <ellipse cx="400" cy="380" rx="8" ry="20" fill="#e8eeff" opacity="0.88"/>
  <ellipse cx="382" cy="388" rx="7" ry="18" fill="#e8eeff" opacity="0.78" transform="rotate(-18 382 388)"/>
  <ellipse cx="418" cy="388" rx="7" ry="18" fill="#e8eeff" opacity="0.78" transform="rotate(18 418 388)"/>
  <!-- Lily stamens -->
  <circle cx="400" cy="366" r="4" fill="#d4af37" opacity="0.90"/>
  <circle cx="380" cy="374" r="3" fill="#d4af37" opacity="0.75"/>
  <circle cx="420" cy="374" r="3" fill="#d4af37" opacity="0.75"/>

  <!-- Name -->
  <text x="400" y="492" text-anchor="middle" font-family="Georgia,serif" font-size="22"
        fill="#d4af37" letter-spacing="1">San Gabriel Arcángel</text>
  <text x="400" y="512" text-anchor="middle" font-family="Georgia,serif" font-size="14"
        fill="#8ab4e8" font-style="italic" opacity="0.85">Saint Gabriel the Archangel</text>

  <!-- Motto -->
  <text x="400" y="536" text-anchor="middle" font-family="Georgia,serif" font-size="12"
        font-style="italic" fill="#4a6aaa" opacity="0.58" letter-spacing="2">Gaḇrîʾēl — Dios es mi fuerza</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <defs>
    <radialGradient id="tc-bg" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#080c1a"/><stop offset="100%" stop-color="#040810"/>
    </radialGradient>
    <linearGradient id="tc-r1" x1="50%" y1="0%" x2="10%" y2="100%">
      <stop offset="0%" stop-color="#e0e8ff" stop-opacity="1"/><stop offset="100%" stop-color="#a0b0e0" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="tc-r2" x1="50%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#3060c0" stop-opacity="1"/><stop offset="100%" stop-color="#102050" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="tc-gl"><feGaussianBlur stdDeviation="9" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="tc-g2"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="600" fill="url(#tc-bg)"/>
  <rect width="400" height="600" fill="#102050" opacity="0.12"/>
  <polygon points="198,265 -25,610 115,610" fill="url(#tc-r1)" filter="url(#tc-gl)" opacity="0.65"/>
  <polygon points="198,265 20,600  85,600"  fill="#e0e8ff" opacity="0.32"/>
  <polygon points="202,265 425,610 285,610" fill="url(#tc-r2)" filter="url(#tc-gl)" opacity="0.70"/>
  <polygon points="202,265 375,600 315,600" fill="#3060c0" opacity="0.34"/>
  <!-- White sari (main drape, full robe) -->
  <path d="M168,155 Q140,205 126,390 Q200,415 274,390 Q260,205 232,155 Z" fill="#f8f8f8" opacity="0.90"/>
  <!-- Blue border on sari left side -->
  <path d="M126,390 Q113,350 118,280 Q115,240 128,205 Q130,240 136,310 Q142,360 158,388 Z" fill="#3060c0" opacity="0.75"/>
  <!-- White head veil -->
  <path d="M168,155 Q140,142 132,130 Q148,120 172,125 Q180,138 185,152 Z" fill="#f8f8f8" opacity="0.92"/>
  <path d="M232,155 Q260,142 268,130 Q252,120 228,125 Q220,138 215,152 Z" fill="#f8f8f8" opacity="0.88"/>
  <!-- Blue border on veil -->
  <path d="M132,130 Q128,125 136,110 Q148,118 152,126 Z" fill="#3060c0" opacity="0.65"/>
  <!-- Left arm holding rosary / beads -->
  <path d="M140,215 Q112,252 104,294" stroke="#f8f8f8" stroke-width="16" fill="none" stroke-linecap="round" opacity="0.86"/>
  <!-- Right arm joined in prayer -->
  <path d="M260,215 Q275,248 278,278" stroke="#f8f8f8" stroke-width="16" fill="none" stroke-linecap="round" opacity="0.82"/>
  <!-- Hands joined in prayer -->
  <ellipse cx="104" cy="297" rx="12" ry="15" fill="#8a6040" opacity="0.88"/>
  <ellipse cx="278" cy="280" rx="12" ry="15" fill="#8a6040" opacity="0.88"/>
  <!-- Prayer beads (simple dots) -->
  <circle cx="98"  cy="315" r="3" fill="#c9a84c" opacity="0.7"/>
  <circle cx="93"  cy="324" r="3" fill="#c9a84c" opacity="0.7"/>
  <circle cx="90"  cy="334" r="3" fill="#c9a84c" opacity="0.7"/>
  <!-- Blue border hem at bottom -->
  <path d="M126,388 Q145,405 200,410 Q255,405 274,388 Q255,400 200,405 Q145,400 126,388 Z" fill="#3060c0" opacity="0.60"/>
  <!-- Neck + head (small Indian woman) -->
  <rect x="193" y="142" width="14" height="16" rx="4" fill="#8a6040" opacity="0.9"/>
  <ellipse cx="200" cy="108" rx="25" ry="30" fill="#8a6040" opacity="0.92"/>
  <path d="M175,107 Q177,73 200,69 Q223,73 225,107 Q218,87 200,85 Q182,87 175,107 Z" fill="#3a2010" opacity="0.92"/>
  <!-- Halo -->
  <circle cx="200" cy="108" r="53" fill="none" stroke="#e8c97a" stroke-width="1.8" stroke-opacity="0.65" filter="url(#tc-g2)"/>
  <circle cx="200" cy="108" r="47" fill="none" stroke="#e8c97a" stroke-width="0.5" stroke-opacity="0.22"/>
  <!-- Frame -->
  <rect x="6" y="6" width="388" height="588" rx="8" fill="none" stroke="#c9a84c" stroke-width="1.2" stroke-opacity="0.5"/>
  <rect x="12" y="12" width="376" height="576" rx="5" fill="none" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.18"/>
  <!-- Panel -->
  <rect x="18" y="528" width="364" height="66" rx="6" fill="#040810" opacity="0.86"/>
  <line x1="46" y1="535" x2="354" y2="535" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.28"/>
  <text x="200" y="548" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#c9a84c" letter-spacing="3" opacity="0.9">MADRE TERESA  ·  MOTHER TERESA OF CALCUTTA</text>
  <text x="200" y="567" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#a0b8ff" font-style="italic">«Santa Teresa de Calcuta»</text>
  <text x="200" y="585" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#e0e8ff" font-style="italic" opacity="0.8">«Saint Teresa of Calcutta»</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="tcBg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#061428"/>
      <stop offset="100%" stop-color="#020810"/>
    </radialGradient>
    <radialGradient id="tcGlow" cx="50%" cy="35%" r="40%">
      <stop offset="0%" stop-color="rgba(41,128,185,0.20)"/>
      <stop offset="100%" stop-color="rgba(41,128,185,0)"/>
    </radialGradient>
  </defs>

  <!-- Background: deep navy -->
  <rect width="800" height="600" fill="url(#tcBg)"/>
  <rect width="800" height="600" fill="url(#tcGlow)"/>

  <!-- Accent strips: white + blue (her sari colors) -->
  <rect x="0"   y="0" width="7" height="600" fill="#f0ece4" opacity="0.7"/>
  <rect x="7"   y="0" width="4" height="600" fill="#2980b9" opacity="0.8"/>
  <rect x="789" y="0" width="7" height="600" fill="#f0ece4" opacity="0.7"/>
  <rect x="786" y="0" width="4" height="600" fill="#2980b9" opacity="0.8"/>

  <!-- Blue stripe at top and bottom (sari border) -->
  <rect x="0" y="0"   width="800" height="10" fill="#2980b9" opacity="0.6"/>
  <rect x="0" y="590" width="800" height="10" fill="#2980b9" opacity="0.6"/>

  <!-- Sari-like draped shape (simplified silhouette) -->
  <!-- Outer white robe shape -->
  <ellipse cx="400" cy="360" rx="140" ry="195" fill="#f0ece4" opacity="0.12"/>
  <ellipse cx="400" cy="360" rx="120" ry="175" fill="#f0ece4" opacity="0.08"/>

  <!-- Blue border stripes on sari — 3 horizontal stripes -->
  <rect x="270" y="308" width="260" height="9" rx="2" fill="#2980b9" opacity="0.55"/>
  <rect x="270" y="326" width="260" height="9" rx="2" fill="#2980b9" opacity="0.45"/>
  <rect x="270" y="344" width="260" height="9" rx="2" fill="#2980b9" opacity="0.35"/>

  <!-- Large white cross -->
  <rect x="387" y="120" width="26" height="270" rx="5" fill="#f0ece4" opacity="0.90"/>
  <rect x="310" y="195" width="180" height="22" rx="5" fill="#f0ece4" opacity="0.90"/>
  <!-- Blue tint on cross -->
  <rect x="396" y="120" width="7" height="270" rx="2" fill="#2980b9" opacity="0.18"/>

  <!-- Praying hands (simplified) -->
  <!-- Left hand -->
  <path d="M 340 430 C 330 415 325 400 335 390 C 342 383 350 388 350 395 L 348 435 Z" fill="#d4b896" opacity="0.75"/>
  <!-- Right hand -->
  <path d="M 460 430 C 470 415 475 400 465 390 C 458 383 450 388 450 395 L 452 435 Z" fill="#d4b896" opacity="0.75"/>
  <!-- Clasped fingers -->
  <path d="M 348 395 Q 380 378 400 380 Q 420 378 452 395 L 450 435 Q 420 428 400 430 Q 380 428 348 435 Z" fill="#c8a882" opacity="0.70"/>

  <!-- Small gold heart -->
  <path d="M 400 510 C 397 505 388 500 388 493 C 388 487 393 483 400 490 C 407 483 412 487 412 493 C 412 500 403 505 400 510 Z" fill="#d4af37" opacity="0.7"/>

  <!-- Subtle stars -->
  <circle cx="155" cy="120" r="1.8" fill="#f0ece4" opacity="0.35"/>
  <circle cx="645" cy="140" r="1.8" fill="#f0ece4" opacity="0.35"/>
  <circle cx="175" cy="480" r="1.4" fill="#2980b9" opacity="0.45"/>
  <circle cx="625" cy="460" r="1.4" fill="#2980b9" opacity="0.45"/>
  <circle cx="200" cy="320" r="1.3" fill="#f0ece4" opacity="0.28"/>
  <circle cx="600" cy="300" r="1.3" fill="#f0ece4" opacity="0.28"/>

  <!-- Name + Feast day -->
  <text x="400" y="528" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#e8c97a" letter-spacing="1">Santa Teresa de Calcuta</text>
  <text x="400" y="550" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#8ab4d8" font-style="italic" opacity="0.85">Saint Teresa of Calcutta</text>
  <text x="400" y="574" text-anchor="middle" font-family="Lato, sans-serif" font-size="11" fill="#5a7a9a" letter-spacing="2.5">5 DE SEPTIEMBRE · SEPTEMBER 5</text>
</svg>

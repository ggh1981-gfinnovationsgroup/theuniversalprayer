<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#f5e8d0"/>
      <stop offset="60%" stop-color="#e0c8a0"/>
      <stop offset="100%" stop-color="#7a3a50"/>
    </radialGradient>
    <radialGradient id="haloGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe89a" stop-opacity="0.95"/>
      <stop offset="70%" stop-color="#d4a020" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#d4a020" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowLight" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff5d0" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#fff5d0" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="600" fill="url(#bgGrad)"/>

  <!-- Subtle arch architectural frame -->
  <path d="M 60 520 L 60 200 Q 60 120 200 100 Q 340 120 340 200 L 340 520 Z"
        fill="none" stroke="#c8a060" stroke-width="1.5" opacity="0.35"/>

  <!-- Halo -->
  <ellipse cx="200" cy="158" rx="62" ry="62" fill="url(#haloGrad)"/>
  <circle cx="200" cy="158" r="56" fill="none" stroke="#d4a020" stroke-width="1.8" opacity="0.7"/>

  <!-- Figure — white-robed early Christian woman -->
  <!-- Head -->
  <ellipse cx="200" cy="158" rx="32" ry="36" fill="#f5dcc0"/>
  <!-- Veil -->
  <ellipse cx="200" cy="140" rx="44" ry="18" fill="#e8d8c0" opacity="0.8"/>
  <path d="M 156 140 Q 170 100 200 96 Q 230 100 244 140 L 244 220 Q 220 226 200 226 Q 180 226 156 220 Z"
        fill="#ddd0b8" opacity="0.9"/>

  <!-- White robe body -->
  <path d="M 162 230 Q 148 280 140 380 Q 155 390 200 392 Q 245 390 260 380 Q 252 280 238 230 Q 220 240 200 240 Q 180 240 162 230 Z"
        fill="#f8f4ee"/>
  <!-- Robe highlight -->
  <path d="M 175 235 Q 165 290 158 370 Q 175 376 200 377 Q 190 295 185 240 Z"
        fill="#ffffff" opacity="0.45"/>
  <!-- Robe shadow fold -->
  <path d="M 225 235 Q 235 290 242 370 Q 225 376 200 377 Q 210 295 215 240 Z"
        fill="#c8b898" opacity="0.3"/>

  <!-- Sleeves -->
  <path d="M 162 248 Q 128 268 118 310 Q 128 316 140 312 Q 148 280 162 262 Z"
        fill="#f0ece4"/>
  <path d="M 238 248 Q 272 268 282 310 Q 272 316 260 312 Q 252 280 238 262 Z"
        fill="#f0ece4"/>

  <!-- Hands -->
  <ellipse cx="126" cy="318" rx="14" ry="10" fill="#f0d0b0"/>
  <ellipse cx="274" cy="318" rx="14" ry="10" fill="#f0d0b0"/>

  <!-- Palm frond (martyr's symbol) — left hand -->
  <path d="M 118 310 Q 100 280 90 250 Q 106 256 114 272 Q 102 248 98 220 Q 116 232 120 256 Q 112 234 114 208 Q 130 222 126 248 Q 118 228 124 202 Q 138 218 132 248 Q 126 226 132 202 Q 144 218 136 248" 
        fill="none" stroke="#4a8030" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="100" y1="256" x2="120" y2="316" stroke="#5a9040" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Small cross — right hand -->
  <rect x="268" y="290" width="5" height="28" rx="2" fill="#c8a060"/>
  <rect x="261" y="299" width="19" height="5" rx="2" fill="#c8a060"/>

  <!-- Gentle light rays from above -->
  <line x1="200" y1="20" x2="200" y2="95" stroke="#ffe880" stroke-width="2" opacity="0.5"/>
  <line x1="180" y1="22" x2="192" y2="97" stroke="#ffe880" stroke-width="1.2" opacity="0.3"/>
  <line x1="220" y1="22" x2="208" y2="97" stroke="#ffe880" stroke-width="1.2" opacity="0.3"/>
  <line x1="162" y1="28" x2="184" y2="100" stroke="#ffe880" stroke-width="0.8" opacity="0.2"/>
  <line x1="238" y1="28" x2="216" y2="100" stroke="#ffe880" stroke-width="0.8" opacity="0.2"/>

  <!-- Small stars — light in the name motif -->
  <g fill="#d4a020" opacity="0.7">
    <polygon points="68,80 70,74 72,80 78,80 73,84 75,90 70,86 65,90 67,84 62,80" transform="scale(0.6) translate(50,60)"/>
    <polygon points="330,60 332,54 334,60 340,60 335,64 337,70 332,66 327,70 329,64 324,60" transform="scale(0.5) translate(140,40)"/>
    <polygon points="42,160 44,154 46,160 52,160 47,164 49,170 44,166 39,170 41,164 36,160" transform="scale(0.45) translate(30,120)"/>
  </g>

  <!-- Name panel -->
  <rect x="18" y="528" width="364" height="66" rx="6" fill="#5a1a3a" opacity="0.88"/>
  <text x="200" y="548" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#c9a030" letter-spacing="3" opacity="0.95">SANTA DELIA  ·  SAINT DELIA</text>
  <text x="200" y="567" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#f5d070" font-style="italic">«Fiel aunque nadie lo vio»</text>
  <text x="200" y="585" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#e8c878" font-style="italic" opacity="0.8">«Faithful though no one saw it»</text>
</svg>

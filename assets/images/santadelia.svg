<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <defs>
    <radialGradient id="std-bg" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#180810"/><stop offset="100%" stop-color="#060204"/>
    </radialGradient>
    <radialGradient id="std-atm" cx="50%" cy="38%" r="46%">
      <stop offset="0%" stop-color="#a03070" stop-opacity="0.26"/><stop offset="100%" stop-color="#a03070" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="std-r1" x1="50%" y1="0%" x2="10%" y2="100%">
      <stop offset="0%" stop-color="#c03878" stop-opacity="1"/><stop offset="100%" stop-color="#601030" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="std-r2" x1="50%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#f5e060" stop-opacity="1"/><stop offset="100%" stop-color="#c9a84c" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="std-gl"><feGaussianBlur stdDeviation="9" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="std-g2"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="600" fill="url(#std-bg)"/>
  <rect width="400" height="600" fill="url(#std-atm)"/>
  <!-- Rays: rose-purple left, gold right -->
  <polygon points="198,262 -25,610 115,610" fill="url(#std-r1)" filter="url(#std-gl)" opacity="0.72"/>
  <polygon points="198,262 20,600  85,600"  fill="#c03878" opacity="0.38"/>
  <polygon points="202,262 425,610 285,610" fill="url(#std-r2)" filter="url(#std-gl)" opacity="0.70"/>
  <polygon points="202,262 375,600 315,600" fill="#f5e060" opacity="0.34"/>
  <!-- White robe body -->
  <path d="M168,158 Q140,208 126,392 Q200,416 274,392 Q260,208 232,158 Z" fill="#f0ece4" opacity="0.90"/>
  <!-- Robe highlight -->
  <path d="M178,162 Q158,215 150,375 Q172,392 200,394 Q188,222 182,165 Z" fill="#ffffff" opacity="0.30"/>
  <!-- Robe shadow -->
  <path d="M222,162 Q242,215 250,375 Q228,392 200,394 Q212,222 218,165 Z" fill="#c0b8b0" opacity="0.28"/>
  <!-- White veil -->
  <path d="M172,130 Q174,98 200,92 Q226,98 228,130 L228,168 Q214,174 200,174 Q186,174 172,168 Z" fill="#e8e4dc" opacity="0.92"/>
  <path d="M172,130 Q160,136 156,160 Q172,168 172,168 Z" fill="#dedad0" opacity="0.80"/>
  <path d="M228,130 Q240,136 244,160 Q228,168 228,168 Z" fill="#dedad0" opacity="0.80"/>
  <!-- Left sleeve -->
  <path d="M164,215 Q128,248 116,298 Q128,306 140,302 Q148,268 164,232 Z" fill="#f0ece4" opacity="0.90"/>
  <!-- Right sleeve -->
  <path d="M236,215 Q272,248 284,298 Q272,306 260,302 Q252,268 236,232 Z" fill="#f0ece4" opacity="0.90"/>
  <!-- Hands -->
  <ellipse cx="122" cy="305" rx="14" ry="10" fill="#d4a06a" opacity="0.90"/>
  <ellipse cx="278" cy="305" rx="14" ry="10" fill="#d4a06a" opacity="0.90"/>
  <!-- Palm frond (left — martyr's symbol) -->
  <line x1="108" y1="298" x2="92" y2="218" stroke="#4a8030" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M92,218 Q80,205 88,195 Q98,208 92,218 Z" fill="#5a9040"/>
  <path d="M92,218 Q78,212 80,200 Q94,212 92,218 Z" fill="#4a8030" opacity="0.7"/>
  <path d="M92,218 Q82,228 84,240 Q96,228 92,218 Z" fill="#5a9040" opacity="0.8"/>
  <path d="M98,228 Q85,222 85,210 Q100,222 98,228 Z" fill="#4a8030" opacity="0.6"/>
  <path d="M98,228 Q86,235 88,248 Q102,236 98,228 Z" fill="#5a9040" opacity="0.7"/>
  <path d="M104,238 Q90,234 88,222 Q105,234 104,238 Z" fill="#4a8030" opacity="0.6"/>
  <!-- Small cross (right hand) -->
  <rect x="272" y="278" width="5" height="26" rx="2" fill="#c9a84c" opacity="0.88"/>
  <rect x="265" y="287" width="19" height="5" rx="2" fill="#c9a84c" opacity="0.88"/>
  <!-- Head -->
  <ellipse cx="200" cy="110" rx="27" ry="31" fill="#d4a06a" opacity="0.92"/>
  <path d="M174,110 Q176,73 200,68 Q224,73 226,110 Q219,88 200,86 Q181,88 174,110 Z" fill="#3a2010" opacity="0.78"/>
  <!-- Halo -->
  <circle cx="200" cy="110" r="53" fill="none" stroke="#e8c97a" stroke-width="1.8" stroke-opacity="0.65" filter="url(#std-g2)"/>
  <circle cx="200" cy="110" r="47" fill="none" stroke="#e8c97a" stroke-width="0.5" stroke-opacity="0.22"/>
  <!-- Frame -->
  <rect x="6" y="6" width="388" height="588" rx="8" fill="none" stroke="#c9a84c" stroke-width="1.2" stroke-opacity="0.5"/>
  <rect x="12" y="12" width="376" height="576" rx="5" fill="none" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.18"/>
  <!-- Panel -->
  <rect x="18" y="528" width="364" height="66" rx="6" fill="#060204" opacity="0.88"/>
  <line x1="46" y1="535" x2="354" y2="535" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.28"/>
  <text x="200" y="548" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#c9a84c" letter-spacing="3" opacity="0.9">SANTA DELIA  ·  SAINT DELIA</text>
  <text x="200" y="567" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#f0b0d0" font-style="italic">«Fiel aunque nadie lo vio»</text>
  <text x="200" y="585" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#f5e060" font-style="italic" opacity="0.8">«Faithful though no one saw it»</text>

  <!-- Minimal facial features for visual consistency across intercessors -->
  <g id="tup-face-features" opacity="0.9">
    <ellipse id="tup-eye-left" cx="186" cy="110" rx="3.1" ry="2.2" fill="#2a1a12"/>
    <ellipse id="tup-eye-right" cx="214" cy="110" rx="3.1" ry="2.2" fill="#2a1a12"/>
    <path id="tup-nose" d="M200 114 C198 120, 198 122, 200 125" stroke="#7b4a35" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <path id="tup-mouth" d="M192 134 Q200 139 208 134" stroke="#8f3a3a" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  </g>
</svg>
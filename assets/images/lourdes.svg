<svg viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-8px); }
      }
      @keyframes glow {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 0.75; }
      }
      @keyframes shimmer {
        0% { opacity: 0.4; }
        50% { opacity: 0.9; }
        100% { opacity: 0.4; }
      }
      .virgin-float { animation: float 3.5s ease-in-out infinite; }
      .halo-glow { animation: glow 2.8s ease-in-out infinite; }
      .light-shimmer { animation: shimmer 3s ease-in-out infinite; }
    </style>
    <radialGradient id="heavenly-light">
      <stop offset="0%" style="stop-color:#ffeaa7;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#6c5ce7;stop-opacity:0.05"/>
    </radialGradient>
    <linearGradient id="dress-grad">
      <stop offset="0%" style="stop-color:#f0f0f0;stop-opacity:0.95"/>
      <stop offset="50%" style="stop-color:#e8e8e8;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#d4d4d4;stop-opacity:0.9"/>
    </linearGradient>
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="600" fill="#0a0814"/>
  
  <!-- Heaven light -->
  <circle cx="200" cy="100" r="250" fill="url(#heavenly-light)"/>
  
  <!-- Soft stars -->
  <circle cx="50" cy="40" r="1.2" fill="#ffeaa7" opacity="0.5"/>
  <circle cx="350" cy="60" r="1" fill="#ffeaa7" opacity="0.45"/>
  <circle cx="80" cy="90" r="0.8" fill="#dfe6e9" opacity="0.4"/>
  <circle cx="320" cy="100" r="1.2" fill="#ffeaa7" opacity="0.5"/>
  
  <!-- Grotto base (soft) -->
  <ellipse cx="200" cy="380" rx="120" ry="40" fill="rgba(80,70,60,0.3)"/>
  <path d="M 90 380 Q 80 360 100 350 L 110 420 Z" fill="rgba(100,85,75,0.4)" opacity="0.6"/>
  <path d="M 310 380 Q 320 360 300 350 L 290 420 Z" fill="rgba(100,85,75,0.4)" opacity="0.6"/>
  
  <!-- Water pool -->
  <ellipse cx="200" cy="450" rx="95" ry="28" fill="rgba(100,150,200,0.3)"/>
  <ellipse cx="200" cy="448" rx="95" ry="26" fill="rgba(150,200,255,0.2)"/>
  
  <!-- Water shimmer -->
  <g class="light-shimmer">
    <ellipse cx="200" cy="445" rx="80" ry="8" fill="#ffeaa7" opacity="0.08"/>
  </g>
  
  <!-- Light rays -->
  <g opacity="0.12">
    <line x1="120" y1="0" x2="140" y2="150" stroke="#ffeaa7" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="160" stroke="#ffeaa7" stroke-width="1.5"/>
    <line x1="280" y1="0" x2="260" y2="150" stroke="#ffeaa7" stroke-width="1"/>
    <line x1="70" y1="50" x2="100" y2="180" stroke="#b19cd9" stroke-width="0.8"/>
    <line x1="330" y1="50" x2="300" y2="180" stroke="#b19cd9" stroke-width="0.8"/>
  </g>
  
  <!-- Virgin Mary figure -->
  <g class="virgin-float" filter="url(#soft-glow)">
    <!-- Halo -->
    <circle cx="200" cy="140" r="50" fill="none" stroke="#ffeaa7" stroke-width="2.5" opacity="0.8" class="halo-glow"/>
    <circle cx="200" cy="140" r="55" fill="none" stroke="#ffeaa7" stroke-width="1" opacity="0.4" class="halo-glow"/>
    
    <!-- Head -->
    <ellipse cx="200" cy="140" rx="24" ry="26" fill="#e8c9a0"/>
    
    <!-- Hair -->
    <path d="M 178 130 Q 176 140 178 154 Q 200 168 222 154 Q 224 140 222 130" fill="#9b7653" opacity="0.9"/>
    
    <!-- Veil (flows gracefully) -->
    <path d="M 178 128 Q 175 115 200 108 Q 225 115 222 128 Q 222 138 220 155 Q 200 175 180 155 Q 178 138 178 128" fill="#f5f5f5" opacity="0.92"/>
    <path d="M 180 145 Q 185 165 200 185 Q 215 165 220 145" fill="#f0f0f0" opacity="0.88"/>
    
    <!-- Face details - serene -->
    <circle cx="192" cy="135" r="2.2" fill="#6b4423" opacity="0.8"/>
    <circle cx="208" cy="135" r="2.2" fill="#6b4423" opacity="0.8"/>
    <path d="M 200 142 Q 198 144 200 145" stroke="#8b6f47" stroke-width="1" fill="none" opacity="0.7"/>
    <path d="M 196 150 Q 200 152 204 150" stroke="#d4a77d" stroke-width="1"/>
    
    <!-- Neck -->
    <rect x="195" y="162" width="10" height="8" fill="#e8c9a0" opacity="0.9"/>
    
    <!-- White dress - elegant and flowing -->
    <path d="M 178 170 Q 170 200 168 260 Q 170 300 200 315 Q 230 300 232 260 Q 230 200 222 170 Z" fill="url(#dress-grad)"/>
    
    <!-- Dress folds - graceful -->
    <path d="M 185 190 Q 175 240 180 290" fill="none" stroke="#d4d4d4" stroke-width="2.5" opacity="0.6"/>
    <path d="M 215 190 Q 225 240 220 290" fill="none" stroke="#d4d4d4" stroke-width="2.5" opacity="0.6"/>
    <path d="M 200 175 Q 198 240 200 310" fill="none" stroke="#e0e0e0" stroke-width="1.8" opacity="0.4"/>
    
    <!-- Blue sash/mantle -->
    <path d="M 177 185 Q 168 220 170 270" fill="none" stroke="#4a7ba7" stroke-width="7" stroke-linecap="round" opacity="0.75"/>
    <path d="M 223 185 Q 232 220 230 270" fill="none" stroke="#4a7ba7" stroke-width="7" stroke-linecap="round" opacity="0.75"/>
    
    <!-- Arms (graceful) -->
    <path d="M 178 175 Q 160 195 155 235" fill="none" stroke="#e8c9a0" stroke-width="10" stroke-linecap="round" opacity="0.9"/>
    <path d="M 222 175 Q 240 195 245 235" fill="none" stroke="#e8c9a0" stroke-width="10" stroke-linecap="round" opacity="0.9"/>
    
    <!-- Hands (gentle) -->
    <circle cx="154" cy="238" r="7" fill="#e8c9a0" opacity="0.9"/>
    <circle cx="246" cy="238" r="7" fill="#e8c9a0" opacity="0.9"/>
    
    <!-- Rosary strands -->
    <path d="M 154 238 Q 160 265 175 295" fill="none" stroke="#b8956a" stroke-width="1.8" opacity="0.8"/>
    <path d="M 246 238 Q 240 265 225 295" fill="none" stroke="#b8956a" stroke-width="1.8" opacity="0.8"/>
    
    <!-- Rosary beads -->
    <circle cx="154" cy="238" r="2" fill="#ffd700"/>
    <circle cx="158" cy="248" r="1.8" fill="#f0c050"/>
    <circle cx="162" cy="258" r="1.8" fill="#f0c050"/>
    <circle cx="167" cy="270" r="2" fill="#ffd700"/>
    <circle cx="172" cy="283" r="1.8" fill="#f0c050"/>
    
    <circle cx="246" cy="238" r="2" fill="#ffd700"/>
    <circle cx="242" cy="248" r="1.8" fill="#f0c050"/>
    <circle cx="238" cy="258" r="1.8" fill="#f0c050"/>
    <circle cx="233" cy="270" r="2" fill="#ffd700"/>
    <circle cx="228" cy="283" r="1.8" fill="#f0c050"/>
  </g>
  
  <!-- Border frame -->
  <rect x="12" y="12" width="376" height="576" rx="12" fill="none" stroke="#c9a84c" stroke-width="1.5" opacity="0.55"/>
  <rect x="24" y="24" width="352" height="552" rx="8" fill="none" stroke="#c9a84c" stroke-width="0.8" opacity="0.22"/>
  
  <!-- Info panel -->
  <rect x="36" y="528" width="328" height="60" rx="8" fill="#0a0814" opacity="0.94"/>
  <line x1="60" y1="545" x2="340" y2="545" stroke="#c9a84c" stroke-width="0.6" opacity="0.32"/>
  
  <!-- Text content - Bilingual -->
  <text x="200" y="538" text-anchor="middle" font-family="Arial,sans-serif" font-size="7.5" fill="#c9a84c" letter-spacing="2" opacity="0.9">VIRGEN DE LOURDES  ·  IMMACULADA</text>
  
  <text x="200" y="558" text-anchor="middle" font-family="Georgia,serif" font-size="12" fill="#b8d8f8" font-weight="bold">«Nuestra Señora de Lourdes»</text>
  
  <text x="200" y="574" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#e8d4b8" font-style="italic">«Our Lady of Lourdes»</text>
</svg>

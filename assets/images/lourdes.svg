<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560">
  <defs>
    <style>
      @keyframes glow { 0%, 100% { filter: drop-shadow(0 0 10px rgba(201,168,76,0.5)) drop-shadow(0 0 20px rgba(255,215,0,0.3)); } 50% { filter: drop-shadow(0 0 20px rgba(201,168,76,0.8)) drop-shadow(0 0 30px rgba(255,215,0,0.5)); } }
      @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-12px); } }
      @keyframes sway { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(0.8deg); } 75% { transform: rotate(-0.8deg); } }
      @keyframes breathe { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
      .virgin-glow { animation: glow 3s ease-in-out infinite; }
      .virgin-float { animation: float 4.5s ease-in-out infinite; }
      .virgin-sway { animation: sway 4s ease-in-out infinite; }
      .light-rays { animation: breathe 3s ease-in-out infinite; }
    </style>
    
    <radialGradient id="haloGrad" cx="50%" cy="35%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:0.5" />
      <stop offset="60%" style="stop-color:#c9a84c;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#c9a84c;stop-opacity:0" />
    </radialGradient>
    
    <linearGradient id="dressGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#f9f9f9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#efefef;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="veilGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b8d4e8;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#a0c4dd;stop-opacity:0.8" />
    </linearGradient>
    
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Outer radiant halo -->
  <circle cx="200" cy="200" r="200" fill="none" stroke="url(#haloGrad)" stroke-width="40" opacity="0.4" class="virgin-glow" />
  <circle cx="200" cy="200" r="160" fill="none" stroke="url(#haloGrad)" stroke-width="30" opacity="0.3" class="virgin-glow" />

  <!-- Main figure group -->
  <g class="virgin-float virgin-sway">
    <!-- Halo ring around head -->
    <circle cx="200" cy="130" r="42" fill="none" stroke="#ffd700" stroke-width="2" opacity="0.6" class="virgin-glow" />
    <circle cx="200" cy="130" r="48" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.4" class="virgin-glow" />

    <!-- Veil (flowing, ethereal) -->
    <path d="M 165 105 Q 200 85 235 105 Q 240 140 238 180 Q 235 220 230 260 L 170 260 Q 165 220 162 180 Q 160 140 165 105" 
          fill="url(#veilGrad)" filter="url(#softShadow)" />
    
    <!-- Veil shadow/depth -->
    <path d="M 170 110 Q 200 95 230 110 Q 233 140 232 175 Q 230 210 227 255 L 175 255 Q 172 210 170 175 Q 168 140 170 110" 
          fill="#a8c5dd" opacity="0.4" />
    
    <!-- Veil flowing side details -->
    <path d="M 165 140 Q 155 160 152 200" stroke="#a8c5dd" stroke-width="8" fill="none" opacity="0.6" stroke-linecap="round" />
    <path d="M 235 140 Q 245 160 248 200" stroke="#a8c5dd" stroke-width="8" fill="none" opacity="0.6" stroke-linecap="round" />

    <!-- Head (peachy skin tone) -->
    <ellipse cx="200" cy="130" rx="34" ry="38" fill="#f5d5b8" filter="url(#softShadow)" />

    <!-- Ears -->
    <ellipse cx="168" cy="125" rx="8" ry="12" fill="#f5d5b8" opacity="0.8" />
    <ellipse cx="232" cy="125" rx="8" ry="12" fill="#f5d5b8" opacity="0.8" />

    <!-- Face details (serene expression) -->
    <!-- Eyes -->
    <ellipse cx="188" cy="120" rx="5.5" ry="7.5" fill="#6b5344" />
    <ellipse cx="212" cy="120" rx="5.5" ry="7.5" fill="#6b5344" />
    <circle cx="189.5" cy="119" r="2" fill="#ffffff" opacity="0.7" />
    <circle cx="213.5" cy="119" r="2" fill="#ffffff" opacity="0.7" />

    <!-- Eyebrows (gentle) -->
    <path d="M 184 112 Q 188 110 193 111" stroke="#8b6f47" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.6" />
    <path d="M 207 111 Q 212 110 216 112" stroke="#8b6f47" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.6" />

    <!-- Nose (delicate) -->
    <path d="M 200 120 L 200 135" stroke="#e8c8a8" stroke-width="1.5" fill="none" stroke-linecap="round" />

    <!-- Mouth (serene, peaceful) -->
    <path d="M 190 145 Q 200 150 210 145" stroke="#d4945a" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.8" />

    <!-- Cheeks (soft blush) -->
    <circle cx="175" cy="130" r="6" fill="#e8b4a0" opacity="0.5" />
    <circle cx="225" cy="130" r="6" fill="#e8b4a0" opacity="0.5" />

    <!-- Neck -->
    <rect x="191" y="165" width="18" height="15" fill="#f5d5b8" rx="4" />

    <!-- Crown of roses -->
    <g filter="url(#softShadow)">
      <!-- Left side roses -->
      <circle cx="175" cy="98" r="6" fill="#d32f2f" />
      <circle cx="173" cy="92" r="5" fill="#e74c3c" />
      <circle cx="182" cy="88" r="5" fill="#f44336" />
      
      <!-- Center crown -->
      <circle cx="200" cy="85" r="7" fill="#b71c1c" />
      <circle cx="200" cy="77" r="5" fill="#c62828" />
      
      <!-- Right side roses -->
      <circle cx="225" cy="98" r="6" fill="#d32f2f" />
      <circle cx="227" cy="92" r="5" fill="#e74c3c" />
      <circle cx="218" cy="88" r="5" fill="#f44336" />
      
      <!-- Gold leaves/accents -->
      <circle cx="179" cy="95" r="2.5" fill="#ffd700" opacity="0.8" />
      <circle cx="221" cy="95" r="2.5" fill="#ffd700" opacity="0.8" />
      <circle cx="200" cy="92" r="2" fill="#ffd700" opacity="0.8" />
    </g>

    <!-- Arms (gracefully positioned, welcoming gesture) -->
    <!-- Left arm -->
    <path d="M 168 185 Q 145 190 132 220" stroke="#f5d5b8" stroke-width="14" fill="none" stroke-linecap="round" filter="url(#softShadow)" />
    <ellipse cx="130" cy="223" rx="9" ry="10" fill="#f5d5b8" filter="url(#softShadow)" />
    
    <!-- Right arm -->
    <path d="M 232 185 Q 255 190 268 220" stroke="#f5d5b8" stroke-width="14" fill="none" stroke-linecap="round" filter="url(#softShadow)" />
    <ellipse cx="270" cy="223" rx="9" ry="10" fill="#f5d5b8" filter="url(#softShadow)" />

    <!-- Hands detail -->
    <circle cx="128" cy="225" r="7" fill="#f5d5b8" opacity="0.9" />
    <circle cx="272" cy="225" r="7" fill="#f5d5b8" opacity="0.9" />

    <!-- Dress (flowing, graceful) -->
    <path d="M 170 180 Q 165 200 168 260 L 232 260 Q 235 200 230 180" 
          fill="url(#dressGrad)" filter="url(#softShadow)" />

    <!-- Dress side panels (for depth) -->
    <path d="M 170 180 Q 155 200 158 280" stroke="#f0f0f0" stroke-width="12" fill="none" opacity="0.8" stroke-linecap="round" />
    <path d="M 230 180 Q 245 200 242 280" stroke="#f0f0f0" stroke-width="12" fill="none" opacity="0.8" stroke-linecap="round" />

    <!-- Dress center fold -->
    <path d="M 200 180 L 200 280" stroke="#e8e8e8" stroke-width="2" opacity="0.6" />

    <!-- Dress side folds (graceful) -->
    <path d="M 180 190 Q 175 230 178 280" stroke="#e0e0e0" stroke-width="2.5" opacity="0.5" stroke-linecap="round" />
    <path d="M 220 190 Q 225 230 222 280" stroke="#e0e0e0" stroke-width="2.5" opacity="0.5" stroke-linecap="round" />

    <!-- Rosary in left hand -->
    <g filter="url(#softShadow)">
      <circle cx="125" cy="230" r="4" fill="#8b0000" />
      <circle cx="120" cy="238" r="3" fill="#c41e3a" />
      <circle cx="118" cy="246" r="3" fill="#c41e3a" />
      <circle cx="122" cy="252" r="2.5" fill="#a20d1a" />
      <path d="M 125 230 Q 120 238 118 246 Q 120 252 122 252" stroke="#8b0000" stroke-width="1.8" fill="none" stroke-linecap="round" />
      
      <!-- Cross at end -->
      <g transform="translate(122, 258)">
        <rect x="-1.5" y="-3" width="3" height="6" fill="#c41e3a" />
        <rect x="-3" y="-0.5" width="6" height="1" fill="#c41e3a" />
      </g>
    </g>

    <!-- Light rays/spiritual light -->
    <g class="light-rays" opacity="0.5">
      <line x1="200" y1="50" x2="200" y2="20" stroke="#ffd700" stroke-width="2" stroke-linecap="round" />
      <line x1="245" y1="75" x2="270" y2="50" stroke="#ffd700" stroke-width="1.8" stroke-linecap="round" />
      <line x1="270" y1="130" x2="300" y2="130" stroke="#ffd700" stroke-width="1.8" stroke-linecap="round" />
      <line x1="245" y1="185" x2="275" y2="210" stroke="#ffd700" stroke-width="1.8" stroke-linecap="round" />
      
      <line x1="155" y1="75" x2="130" y2="50" stroke="#ffd700" stroke-width="1.8" stroke-linecap="round" />
      <line x1="130" y1="130" x2="100" y2="130" stroke="#ffd700" stroke-width="1.8" stroke-linecap="round" />
      <line x1="155" y1="185" x2="125" y2="210" stroke="#ffd700" stroke-width="1.8" stroke-linecap="round" />
    </g>
  </g>

  <!-- Bilingual panel at bottom -->
  <rect x="15" y="490" width="370" height="65" fill="rgba(20,20,30,0.85)" rx="10" filter="url(#softShadow)" />
  <rect x="15" y="490" width="370" height="65" fill="none" stroke="rgba(201,168,76,0.3)" stroke-width="1.5" rx="10" />
  
  <text x="200" y="512" font-family="serif" font-size="15" font-weight="bold" fill="#c9a84c" text-anchor="middle" data-lang="es">
    Virgen de Lourdes
  </text>
  <text x="200" y="512" font-family="serif" font-size="15" font-weight="bold" fill="#c9a84c" text-anchor="middle" data-lang="en" style="display:none">
    Virgin of Lourdes
  </text>
  
  <text x="200" y="533" font-family="sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" data-lang="es">
    Intercesora de milagros y curaciones
  </text>
  <text x="200" y="533" font-family="sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" data-lang="en" style="display:none">
    Intercessor of miracles and healings
  </text>
  
  <text x="200" y="550" font-family="sans-serif" font-size="10" fill="#b8b8c8" text-anchor="middle" data-lang="es">
    "Ruega por nosotros, Madre de Dios"
  </text>
  <text x="200" y="550" font-family="sans-serif" font-size="10" fill="#b8b8c8" text-anchor="middle" data-lang="en" style="display:none">
    "Pray for us, Mother of God"
  </text>
</svg>

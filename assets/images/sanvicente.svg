<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <defs>
    <radialGradient id="sv-bg" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#080c1a"/><stop offset="100%" stop-color="#040810"/>
    </radialGradient>
    <linearGradient id="sv-r1" x1="50%" y1="0%" x2="10%" y2="100%">
      <stop offset="0%" stop-color="#3060c8" stop-opacity="1"/><stop offset="100%" stop-color="#102050" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="sv-r2" x1="50%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#f5e060" stop-opacity="1"/><stop offset="100%" stop-color="#c9a84c" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="sv-gl"><feGaussianBlur stdDeviation="9" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="sv-g2"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="600" fill="url(#sv-bg)"/>
  <rect width="400" height="600" fill="#202870" opacity="0.10"/>
  <polygon points="198,265 -25,610 115,610" fill="url(#sv-r1)" filter="url(#sv-gl)" opacity="0.72"/>
  <polygon points="198,265 20,600  85,600"  fill="#3060c8" opacity="0.36"/>
  <polygon points="202,265 425,610 285,610" fill="url(#sv-r2)" filter="url(#sv-gl)" opacity="0.70"/>
  <polygon points="202,265 375,600 315,600" fill="#f5e060" opacity="0.34"/>
  <!-- Black Vincentian habit -->
  <path d="M168,155 Q140,205 126,390 Q200,415 274,390 Q260,205 232,155 Z" fill="#1a1820" opacity="0.92"/>
  <!-- Black mantle -->
  <path d="M168,155 Q124,192 108,318 Q122,330 148,312 Q150,228 178,168 Z" fill="#121018" opacity="0.90"/>
  <path d="M232,155 Q260,198 270,318 Q290,322 296,300 Q286,198 248,158 Z" fill="#121018" opacity="0.84"/>
  <!-- Both arms open toward poor (welcoming) -->
  <path d="M140,215 Q100,250 88,280" stroke="#1a1820" stroke-width="17" fill="none" stroke-linecap="round" opacity="0.88"/>
  <path d="M260,215 Q300,250 312,280" stroke="#121018" stroke-width="16" fill="none" stroke-linecap="round" opacity="0.85"/>
  <!-- Hands open wide -->
  <ellipse cx="87"  cy="283" rx="13" ry="16" fill="#d4a06a" opacity="0.9"/>
  <ellipse cx="313" cy="283" rx="13" ry="16" fill="#d4a06a" opacity="0.9"/>
  <!-- Poor persons at feet (small symbolic figures) -->
  <ellipse cx="155" cy="432" rx="14" ry="17" fill="#8a7060" opacity="0.55"/>
  <circle  cx="155" cy="418" r="10" fill="#8a7060" opacity="0.52"/>
  <ellipse cx="245" cy="432" rx="14" ry="17" fill="#7a6050" opacity="0.50"/>
  <circle  cx="245" cy="418" r="10" fill="#7a6050" opacity="0.48"/>
  <!-- White collar -->
  <rect x="190" y="153" width="20" height="12" rx="3" fill="#f8f8f8" opacity="0.75"/>
  <!-- Neck + head (older, balding) -->
  <rect x="193" y="142" width="14" height="18" rx="4" fill="#d4a06a" opacity="0.9"/>
  <ellipse cx="200" cy="108" rx="27" ry="31" fill="#d4a06a" opacity="0.92"/>
  <path d="M173,117 Q178,80 200,76 Q222,80 227,117 Q225,100 200,97 Q175,100 173,117 Z" fill="#3a2810" opacity="0.70"/>
  <!-- Halo -->
  <circle cx="200" cy="108" r="53" fill="none" stroke="#e8c97a" stroke-width="1.8" stroke-opacity="0.65" filter="url(#sv-g2)"/>
  <circle cx="200" cy="108" r="47" fill="none" stroke="#e8c97a" stroke-width="0.5" stroke-opacity="0.22"/>
  <!-- Frame -->
  <rect x="6" y="6" width="388" height="588" rx="8" fill="none" stroke="#c9a84c" stroke-width="1.2" stroke-opacity="0.5"/>
  <rect x="12" y="12" width="376" height="576" rx="5" fill="none" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.18"/>
  <!-- Panel -->
  <rect x="18" y="528" width="364" height="66" rx="6" fill="#040810" opacity="0.86"/>
  <line x1="46" y1="535" x2="354" y2="535" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.28"/>
  <text x="200" y="548" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#c9a84c" letter-spacing="3" opacity="0.9">SAN VICENTE DE PAUL  ·  SAINT VINCENT DE PAUL</text>
  <text x="200" y="567" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#80a8f8" font-style="italic">«San Vicente de Paúl»</text>
  <text x="200" y="585" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#f5e060" font-style="italic" opacity="0.8">«Saint Vincent de Paul»</text>
</svg>

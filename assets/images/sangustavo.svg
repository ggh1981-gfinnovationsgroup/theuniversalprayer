<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <defs>
    <radialGradient id="sgu-bg" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#0c1808"/><stop offset="100%" stop-color="#040804"/>
    </radialGradient>
    <radialGradient id="sgu-atm" cx="50%" cy="38%" r="46%">
      <stop offset="0%" stop-color="#2a5018" stop-opacity="0.28"/><stop offset="100%" stop-color="#2a5018" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sgu-r1" x1="50%" y1="0%" x2="10%" y2="100%">
      <stop offset="0%" stop-color="#4a8030" stop-opacity="1"/><stop offset="100%" stop-color="#184010" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="sgu-r2" x1="50%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#f5e060" stop-opacity="1"/><stop offset="100%" stop-color="#c9a84c" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="sgu-gl"><feGaussianBlur stdDeviation="9" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="sgu-g2"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="600" fill="url(#sgu-bg)"/>
  <rect width="400" height="600" fill="url(#sgu-atm)"/>
  <!-- Rays: forest green left, gold right -->
  <polygon points="198,262 -25,610 115,610" fill="url(#sgu-r1)" filter="url(#sgu-gl)" opacity="0.72"/>
  <polygon points="198,262 20,600  85,600"  fill="#4a8030" opacity="0.38"/>
  <polygon points="202,262 425,610 285,610" fill="url(#sgu-r2)" filter="url(#sgu-gl)" opacity="0.70"/>
  <polygon points="202,262 375,600 315,600" fill="#f5e060" opacity="0.34"/>
  <!-- Cassock (black) -->
  <path d="M166,155 Q140,205 126,395 Q200,418 274,395 Q260,205 234,155 Z" fill="#1a1828" opacity="0.95"/>
  <!-- Cassock highlight -->
  <path d="M178,160 Q158,215 150,378 Q172,395 200,396 Q188,222 182,163 Z" fill="#2a2838" opacity="0.45"/>
  <!-- Purple stole -->
  <path d="M192,168 L188,395" stroke="#6040a0" stroke-width="10" stroke-linecap="round" opacity="0.85"/>
  <path d="M208,168 L212,395" stroke="#6040a0" stroke-width="10" stroke-linecap="round" opacity="0.85"/>
  <!-- Cross embroidery on stole -->
  <rect x="186" y="268" width="10" height="2" rx="1" fill="#c8a0e0"/>
  <rect x="189" y="265" width="4" height="8" rx="1" fill="#c8a0e0"/>
  <rect x="207" y="268" width="10" height="2" rx="1" fill="#c8a0e0"/>
  <rect x="210" y="265" width="4" height="8" rx="1" fill="#c8a0e0"/>
  <!-- White priest collar -->
  <rect x="185" y="155" width="30" height="12" rx="3" fill="#f0ece8"/>
  <!-- Left arm -->
  <path d="M162,215 Q126,248 116,305 Q126,314 138,308 Q146,272 162,232 Z" fill="#1a1828" opacity="0.95"/>
  <!-- Right arm -->
  <path d="M238,215 Q274,248 284,305 Q274,314 262,308 Q254,272 238,232 Z" fill="#1a1828" opacity="0.95"/>
  <!-- Hands -->
  <ellipse cx="122" cy="310" rx="14" ry="10" fill="#d4a06a" opacity="0.90"/>
  <ellipse cx="278" cy="310" rx="14" ry="10" fill="#d4a06a" opacity="0.90"/>
  <!-- Open Bible -->
  <path d="M128,298 Q165,286 200,288 Q235,286 272,298 L270,328 Q234,318 200,320 Q166,318 130,328 Z" fill="#f8f0e0" opacity="0.95"/>
  <line x1="138" y1="304" x2="196" y2="300" stroke="#8a7040" stroke-width="1" opacity="0.5"/>
  <line x1="138" y1="310" x2="196" y2="306" stroke="#8a7040" stroke-width="1" opacity="0.5"/>
  <line x1="138" y1="316" x2="196" y2="312" stroke="#8a7040" stroke-width="1" opacity="0.5"/>
  <line x1="204" y1="300" x2="262" y2="304" stroke="#8a7040" stroke-width="1" opacity="0.5"/>
  <line x1="204" y1="306" x2="262" y2="310" stroke="#8a7040" stroke-width="1" opacity="0.5"/>
  <line x1="204" y1="312" x2="262" y2="316" stroke="#8a7040" stroke-width="1" opacity="0.5"/>
  <line x1="200" y1="288" x2="200" y2="320" stroke="#8a7040" stroke-width="2"/>
  <!-- Neck -->
  <rect x="193" y="142" width="14" height="16" rx="4" fill="#d4a06a" opacity="0.90"/>
  <!-- Head -->
  <ellipse cx="200" cy="108" rx="26" ry="30" fill="#d4a06a" opacity="0.92"/>
  <path d="M174,108 Q176,72 200,68 Q224,72 226,108 Q219,87 200,85 Q181,87 174,108 Z" fill="#2a1a10" opacity="0.82"/>
  <!-- Halo -->
  <circle cx="200" cy="108" r="53" fill="none" stroke="#e8c97a" stroke-width="1.8" stroke-opacity="0.65" filter="url(#sgu-g2)"/>
  <circle cx="200" cy="108" r="47" fill="none" stroke="#e8c97a" stroke-width="0.5" stroke-opacity="0.22"/>
  <!-- Frame -->
  <rect x="6" y="6" width="388" height="588" rx="8" fill="none" stroke="#c9a84c" stroke-width="1.2" stroke-opacity="0.5"/>
  <rect x="12" y="12" width="376" height="576" rx="5" fill="none" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.18"/>
  <!-- Panel -->
  <rect x="18" y="528" width="364" height="66" rx="6" fill="#040804" opacity="0.88"/>
  <line x1="46" y1="535" x2="354" y2="535" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.28"/>
  <text x="200" y="548" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#c9a84c" letter-spacing="3" opacity="0.9">SAN GUSTAVO  ·  SAINT GUSTAVO</text>
  <text x="200" y="567" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#a0d870" font-style="italic">«Llamado por tu nombre»</text>
  <text x="200" y="585" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#f5e060" font-style="italic" opacity="0.8">«Called by your name»</text>
</svg>
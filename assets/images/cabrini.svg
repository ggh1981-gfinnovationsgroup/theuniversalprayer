<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <defs>
    <radialGradient id="cb-bg" cx="50%" cy="36%" r="72%">
      <stop offset="0%" stop-color="#122f5f"/>
      <stop offset="100%" stop-color="#07162e"/>
    </radialGradient>
    <linearGradient id="cb-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f2d07a"/>
      <stop offset="100%" stop-color="#b0822a"/>
    </linearGradient>
    <linearGradient id="cb-habit" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#060606"/>
    </linearGradient>
    <linearGradient id="cb-veil" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#262626"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <radialGradient id="cb-skin" cx="50%" cy="36%" r="60%">
      <stop offset="0%" stop-color="#f4cfaa"/>
      <stop offset="100%" stop-color="#bf8660"/>
    </radialGradient>
    <filter id="cb-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="400" height="600" fill="url(#cb-bg)"/>
  <polygon points="200,252 0,600 0,420" fill="#d4b05a" opacity="0.25"/>
  <polygon points="200,252 400,420 400,600" fill="#8fb1f0" opacity="0.2"/>

  <circle cx="200" cy="128" r="58" fill="none" stroke="url(#cb-gold)" stroke-width="2.1" opacity="0.9" filter="url(#cb-glow)"/>
  <circle cx="200" cy="128" r="50" fill="none" stroke="#f2d07a" stroke-width="0.8" opacity="0.4"/>

  <!-- Female religious silhouette with broad veil and black habit -->
  <path d="M146,176 Q112,236 106,478 L294,478 Q288,236 254,176 Q228,194 200,198 Q172,194 146,176 Z" fill="url(#cb-habit)" opacity="0.95"/>
  <path d="M166,208 Q158,252 156,474" stroke="#2a2a2a" stroke-width="2" opacity="0.45" fill="none"/>
  <path d="M234,208 Q242,252 244,474" stroke="#2a2a2a" stroke-width="2" opacity="0.45" fill="none"/>

  <!-- Veil framing the face -->
  <path d="M136,176 Q150,136 174,116 Q200,102 226,116 Q250,136 264,176 Q248,164 230,160 Q214,158 200,158 Q186,158 170,160 Q152,164 136,176 Z" fill="url(#cb-veil)" opacity="0.96"/>

  <!-- Arms and hands -->
  <path d="M154,226 Q126,250 118,316" stroke="#141414" stroke-width="18" stroke-linecap="round" fill="none"/>
  <path d="M246,226 Q274,252 282,318" stroke="#141414" stroke-width="18" stroke-linecap="round" fill="none"/>
  <ellipse cx="116" cy="320" rx="12" ry="9" fill="url(#cb-skin)"/>
  <ellipse cx="284" cy="322" rx="12" ry="9" fill="url(#cb-skin)"/>

  <!-- Scapular and cross -->
  <rect x="176" y="230" width="48" height="76" rx="6" fill="#6d4520" opacity="0.92"/>
  <line x1="200" y1="246" x2="200" y2="290" stroke="#f0cc72" stroke-width="2.2" opacity="0.72"/>
  <line x1="188" y1="258" x2="212" y2="258" stroke="#f0cc72" stroke-width="2.2" opacity="0.72"/>

  <!-- Neck and face (soft feminine features) -->
  <rect x="189" y="156" width="22" height="18" rx="6" fill="url(#cb-skin)"/>
  <ellipse cx="200" cy="132" rx="31" ry="37" fill="url(#cb-skin)"/>
  <path d="M170,132 Q176,118 186,114" stroke="#7c5238" stroke-width="1.3" opacity="0.35" fill="none"/>
  <path d="M230,132 Q224,118 214,114" stroke="#7c5238" stroke-width="1.3" opacity="0.35" fill="none"/>

  <!-- Brows and eyes -->
  <path d="M182,124 Q190,120 197,124" stroke="#1c130f" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M203,124 Q210,120 218,124" stroke="#1c130f" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <ellipse cx="190" cy="131" rx="4.2" ry="3.6" fill="#0e0a08"/>
  <ellipse cx="210" cy="131" rx="4.2" ry="3.6" fill="#0e0a08"/>
  <circle cx="191" cy="130" r="0.9" fill="#fff" opacity="0.55"/>
  <circle cx="211" cy="130" r="0.9" fill="#fff" opacity="0.55"/>

  <!-- Nose and gentle smile -->
  <path d="M200,135 L197,145 Q200,147 203,145 Z" fill="#9a6a4f" opacity="0.25"/>
  <path d="M191,153 Q200,159 209,153" stroke="#8e5d4a" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Rosary and book symbols -->
  <g opacity="0.84">
    <rect x="76" y="394" width="42" height="56" rx="3" fill="#51331a"/>
    <line x1="82" y1="405" x2="112" y2="405" stroke="#cfad74" stroke-width="1"/>
    <line x1="82" y1="416" x2="112" y2="416" stroke="#cfad74" stroke-width="1"/>
    <line x1="82" y1="427" x2="112" y2="427" stroke="#cfad74" stroke-width="1"/>
  </g>
  <g opacity="0.84">
    <circle cx="300" cy="406" r="3" fill="#d6b773"/>
    <circle cx="307" cy="413" r="3" fill="#d6b773"/>
    <circle cx="314" cy="420" r="3" fill="#d6b773"/>
    <circle cx="321" cy="427" r="3" fill="#d6b773"/>
    <line x1="321" y1="427" x2="330" y2="440" stroke="#d6b773" stroke-width="1.5"/>
    <line x1="330" y1="440" x2="330" y2="451" stroke="#d6b773" stroke-width="1.5"/>
    <line x1="324" y1="446" x2="336" y2="446" stroke="#d6b773" stroke-width="1.5"/>
  </g>

  <rect x="8" y="8" width="384" height="584" rx="8" fill="none" stroke="#cbaa68" stroke-width="1.2" opacity="0.55"/>
  <rect x="16" y="16" width="368" height="568" rx="6" fill="none" stroke="#cbaa68" stroke-width="0.5" opacity="0.22"/>

  <rect x="18" y="523" width="364" height="67" rx="6" fill="#050d1a" opacity="0.92"/>
  <text x="200" y="542" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e0c27d" letter-spacing="1.8">SANTA FRANCISCA JAVIER CABRINI · ST. FRANCES XAVIER CABRINI</text>
  <text x="200" y="560" text-anchor="middle" font-family="Georgia,serif" font-size="12.8" fill="#a8c6ff" font-style="italic">"Habito negro, armadura de fe"</text>
  <text x="200" y="578" text-anchor="middle" font-family="Georgia,serif" font-size="10.6" fill="#f0cc72" font-style="italic" opacity="0.88">"Black habit, armor of faith"</text>
</svg>

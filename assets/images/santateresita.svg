<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#3a0a18"/>
      <stop offset="100%" stop-color="#0d0208"/>
    </radialGradient>
    <radialGradient id="glowHalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e87898" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#8a2050" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="habitGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a1a1a"/>
      <stop offset="100%" stop-color="#1a0808"/>
    </linearGradient>
    <linearGradient id="scapularGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8d8c0"/>
      <stop offset="100%" stop-color="#d0b898"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="500" fill="url(#bgGrad)"/>

  <!-- Subtle rose petal shapes in background -->
  <ellipse cx="60" cy="80" rx="18" ry="28" fill="#8a2050" opacity="0.08" transform="rotate(-20,60,80)"/>
  <ellipse cx="340" cy="120" rx="15" ry="24" fill="#8a2050" opacity="0.08" transform="rotate(15,340,120)"/>
  <ellipse cx="50" cy="400" rx="20" ry="30" fill="#8a2050" opacity="0.06" transform="rotate(10,50,400)"/>
  <ellipse cx="350" cy="380" rx="16" ry="25" fill="#8a2050" opacity="0.07" transform="rotate(-15,350,380)"/>

  <!-- Halo glow -->
  <ellipse cx="200" cy="145" rx="72" ry="72" fill="url(#glowHalo)"/>

  <!-- Halo ring -->
  <circle cx="200" cy="145" r="60" fill="none" stroke="#c9a84c" stroke-width="2" opacity="0.85" filter="url(#glow)"/>
  <circle cx="200" cy="145" r="56" fill="none" stroke="#c9a84c" stroke-width="0.5" opacity="0.4"/>

  <!-- Halo stars -->
  <g filter="url(#glow)">
    <text x="197" y="90" text-anchor="middle" font-size="9" fill="#c9a84c">★</text>
    <text x="238" y="103" text-anchor="middle" font-size="8" fill="#c9a84c">★</text>
    <text x="251" y="143" text-anchor="middle" font-size="8" fill="#c9a84c">★</text>
    <text x="238" y="183" text-anchor="middle" font-size="8" fill="#c9a84c">★</text>
    <text x="197" y="198" text-anchor="middle" font-size="9" fill="#c9a84c">★</text>
    <text x="155" y="183" text-anchor="middle" font-size="8" fill="#c9a84c">★</text>
    <text x="142" y="143" text-anchor="middle" font-size="8" fill="#c9a84c">★</text>
    <text x="155" y="103" text-anchor="middle" font-size="8" fill="#c9a84c">★</text>
  </g>

  <!-- Face area -->
  <ellipse cx="200" cy="148" rx="40" ry="46" fill="#f5e8d8"/>

  <!-- Carmelite veil (dark brown/black, covers head) -->
  <ellipse cx="200" cy="115" rx="52" ry="36" fill="#1a0808"/>
  <path d="M148,115 Q140,160 145,220 L165,220 Q158,170 158,130 Z" fill="#1a0808"/>
  <path d="M252,115 Q260,160 255,220 L235,220 Q242,170 242,130 Z" fill="#1a0808"/>

  <!-- White inner headband (Carmelite habit detail) -->
  <path d="M160,135 Q200,128 240,135 Q238,150 200,152 Q162,150 160,135 Z" fill="#e8d8c0"/>

  <!-- Peaceful face features -->
  <!-- Eyes: looking slightly downward, serene -->
  <ellipse cx="188" cy="148" rx="6" ry="5" fill="#3a1808" opacity="0.8"/>
  <ellipse cx="212" cy="148" rx="6" ry="5" fill="#3a1808" opacity="0.8"/>
  <ellipse cx="188" cy="148" rx="3" ry="2.5" fill="#1a0808"/>
  <ellipse cx="212" cy="148" rx="3" ry="2.5" fill="#1a0808"/>
  <!-- Gentle eye highlights -->
  <circle cx="189" cy="147" r="1" fill="white" opacity="0.6"/>
  <circle cx="213" cy="147" r="1" fill="white" opacity="0.6"/>
  <!-- Eyebrows: soft arches -->
  <path d="M182,141 Q188,138 194,140" fill="none" stroke="#3a1808" stroke-width="1.2" opacity="0.6"/>
  <path d="M206,140 Q212,138 218,141" fill="none" stroke="#3a1808" stroke-width="1.2" opacity="0.6"/>
  <!-- Nose -->
  <path d="M200,155 Q198,160 196,162 Q200,164 204,162 Q202,160 200,155" fill="none" stroke="#c4956a" stroke-width="1" opacity="0.5"/>
  <!-- Smile (gentle, peaceful) -->
  <path d="M194,172 Q200,177 206,172" fill="none" stroke="#c4956a" stroke-width="1.5" opacity="0.7"/>
  <!-- Rosy cheeks -->
  <ellipse cx="183" cy="162" rx="9" ry="5" fill="#e87898" opacity="0.15"/>
  <ellipse cx="217" cy="162" rx="9" ry="5" fill="#e87898" opacity="0.15"/>

  <!-- Neck -->
  <rect x="190" y="182" width="20" height="15" rx="4" fill="#f5e8d8"/>

  <!-- Carmelite habit (dark brown/black body) -->
  <path d="M155,195 Q145,225 140,360 L260,360 Q255,225 245,195 Z" fill="url(#habitGrad)"/>

  <!-- White Carmelite scapular -->
  <path d="M178,195 Q182,200 182,360 L218,360 Q218,200 222,195 Z" fill="url(#scapularGrad)" opacity="0.9"/>

  <!-- Cord belt at waist area -->
  <path d="M150,260 Q200,268 250,260" fill="none" stroke="#e8d8c0" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <circle cx="200" cy="264" r="5" fill="#e8d8c0" opacity="0.5"/>

  <!-- LEFT ARM: holding bouquet of roses -->
  <path d="M155,215 Q142,258 134,302" fill="none" stroke="#1a0808" stroke-width="22" stroke-linecap="round" opacity="0.9"/>
  <path d="M155,215 Q142,258 134,302" fill="none" stroke="#2a1010" stroke-width="20" stroke-linecap="round"/>

  <!-- Rose bouquet (left hand) -->
  <g transform="translate(120,275)">
    <!-- Stems -->
    <line x1="8" y1="50" x2="2" y2="15" stroke="#3a6a1a" stroke-width="1.5"/>
    <line x1="12" y1="50" x2="14" y2="15" stroke="#3a6a1a" stroke-width="1.5"/>
    <line x1="16" y1="50" x2="24" y2="20" stroke="#3a6a1a" stroke-width="1.5"/>
    <!-- Rose leaves -->
    <ellipse cx="-2" cy="30" rx="7" ry="4" fill="#3a6a1a" transform="rotate(-40,-2,30)"/>
    <ellipse cx="22" cy="32" rx="7" ry="4" fill="#3a6a1a" transform="rotate(30,22,32)"/>
    <!-- Rose 1 (left, pink) -->
    <circle cx="2" cy="8" r="9" fill="#cc3a60"/>
    <circle cx="2" cy="7" r="7" fill="#e05878"/>
    <ellipse cx="-1" cy="6" rx="5" ry="4" fill="#f08898"/>
    <ellipse cx="3" cy="5" rx="3" ry="2.5" fill="#ffc0cc"/>
    <!-- Rose 2 (center, deep rose) -->
    <circle cx="14" cy="5" r="10" fill="#8a1a30"/>
    <circle cx="14" cy="4" r="8" fill="#aa2a48"/>
    <ellipse cx="11" cy="3" rx="5" ry="4" fill="#cc4060"/>
    <ellipse cx="15" cy="2" rx="3" ry="2.5" fill="#ee7090"/>
    <!-- Rose 3 (right, lighter) -->
    <circle cx="26" cy="10" r="8" fill="#dd5070"/>
    <circle cx="26" cy="9" r="6" fill="#ee7090"/>
    <ellipse cx="24" cy="8" rx="4" ry="3.5" fill="#ffaabb"/>
    <ellipse cx="27" cy="7" rx="2.5" ry="2" fill="#ffd0dd"/>
  </g>

  <!-- RIGHT ARM: holding crucifix -->
  <path d="M245,215 Q258,255 264,298" fill="none" stroke="#1a0808" stroke-width="22" stroke-linecap="round" opacity="0.9"/>
  <path d="M245,215 Q258,255 264,298" fill="none" stroke="#2a1010" stroke-width="20" stroke-linecap="round"/>

  <!-- Crucifix (right hand) -->
  <g transform="translate(260,270)">
    <!-- Cross -->
    <rect x="-3" y="-40" width="6" height="60" rx="1.5" fill="#5a3010"/>
    <rect x="-18" y="-25" width="36" height="6" rx="1.5" fill="#5a3010"/>
    <!-- Christ body outline -->
    <ellipse cx="0" cy="-22" rx="5" ry="6" fill="#f0e0cc"/>
    <path d="M-10,-18 Q-2,-15 0,-10 Q2,-15 10,-18" fill="#f0e0cc" opacity="0.8"/>
    <!-- Arms on cross -->
    <path d="M-17,-22 Q-10,-20 -7,-18" fill="none" stroke="#f0e0cc" stroke-width="3" stroke-linecap="round"/>
    <path d="M7,-18 Q10,-20 17,-22" fill="none" stroke="#f0e0cc" stroke-width="3" stroke-linecap="round"/>
    <!-- Feet -->
    <path d="M-3,5 Q0,10 3,5" fill="none" stroke="#f0e0cc" stroke-width="3" stroke-linecap="round"/>
    <!-- INRI text plate -->
    <rect x="-8" y="-48" width="16" height="8" rx="1" fill="#8a6030"/>
    <text x="0" y="-42" text-anchor="middle" font-size="4" fill="#f0e0cc" font-family="serif">INRI</text>
  </g>

  <!-- Falling roses (Teresita's promise) -->
  <g filter="url(#softGlow)" opacity="0.8">
    <!-- Rose petals floating -->
    <ellipse cx="75" cy="280" rx="8" ry="5" fill="#e05878" opacity="0.6" transform="rotate(-25,75,280)"/>
    <ellipse cx="90" cy="310" rx="6" ry="4" fill="#cc3a60" opacity="0.5" transform="rotate(15,90,310)"/>
    <ellipse cx="310" cy="265" rx="7" ry="5" fill="#e05878" opacity="0.55" transform="rotate(20,310,265)"/>
    <ellipse cx="325" cy="300" rx="8" ry="5" fill="#dd5070" opacity="0.5" transform="rotate(-10,325,300)"/>
    <ellipse cx="68" cy="350" rx="5" ry="3" fill="#f08898" opacity="0.4" transform="rotate(30,68,350)"/>
    <ellipse cx="332" cy="345" rx="6" ry="4" fill="#cc3a60" opacity="0.45" transform="rotate(-20,332,345)"/>
  </g>

  <!-- Decorative gold stars -->
  <g filter="url(#glow)" opacity="0.65">
    <text x="55" y="175" font-size="12" fill="#c9a84c">✦</text>
    <text x="328" y="155" font-size="11" fill="#c9a84c">✦</text>
    <text x="62" y="430" font-size="9" fill="#e87898">✿</text>
    <text x="325" y="420" font-size="9" fill="#e87898">✿</text>
    <text x="42" y="240" font-size="8" fill="#e87898">✿</text>
    <text x="348" y="230" font-size="8" fill="#e87898">✿</text>
  </g>

  <!-- Bottom label -->
  <rect x="50" y="428" width="300" height="66" rx="6" fill="#1a0208" opacity="0.88"/>
  <text x="200" y="445" text-anchor="middle" font-family="'Palatino Linotype', Georgia, serif" font-size="11" fill="#c9a84c" letter-spacing="1">SANTA TERESITA DEL NIÑO JESÚS</text>
  <text x="200" y="459" text-anchor="middle" font-family="'Palatino Linotype', Georgia, serif" font-size="9.5" fill="#e8c97a" letter-spacing="0.5" font-style="italic" opacity="0.8">St. Thérèse of the Child Jesus</text>
  <text x="200" y="473" text-anchor="middle" font-family="'Palatino Linotype', Georgia, serif" font-size="9" fill="#e87898" letter-spacing="0.8">DOCTORA DE LA IGLESIA · 1 OCT</text>
  <text x="200" y="487" text-anchor="middle" font-family="'Palatino Linotype', Georgia, serif" font-size="8" fill="#e87898" letter-spacing="0.5" font-style="italic" opacity="0.75">Doctor of the Church · Oct 1</text>
</svg>

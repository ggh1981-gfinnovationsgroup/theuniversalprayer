    <linearGradient id="ag-r1" x1="50%" y1="0%" x2="10%" y2="100%">
      <stop offset="0%" stop-color="#8060e0" stop-opacity="1"/><stop offset="100%" stop-color="#301860" stop-opacity="0.4"/>

  <text x="200" y="548" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#c9a84c" letter-spacing="3" opacity="0.9">ANGEL DE LA GUARDA  ·  GUARDIAN ANGEL</text>
  <text x="200" y="567" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#c8b8ff" font-style="italic">«El Ángel de la Guarda»</text>
  <text x="200" y="585" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#f8f8f0" font-style="italic" opacity="0.8">«The Guardian Angel»</text>

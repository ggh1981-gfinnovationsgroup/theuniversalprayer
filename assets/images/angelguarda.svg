<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <defs>
    <radialGradient id="ag-bg" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#0c0c18"/><stop offset="100%" stop-color="#060610"/>
    </radialGradient>
    <linearGradient id="ag-r1" x1="50%" y1="0%" x2="10%" y2="100%">
      <stop offset="0%" stop-color="#8060e0" stop-opacity="1"/><stop offset="100%" stop-color="#301860" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="ag-r2" x1="50%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#f8f8f0" stop-opacity="1"/><stop offset="100%" stop-color="#c0c0d0" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="ag-gl"><feGaussianBlur stdDeviation="9" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="ag-g2"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

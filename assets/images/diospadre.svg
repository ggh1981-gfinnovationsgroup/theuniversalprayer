<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" aria-label="Dios Padre - luz y bendicion desde el cielo">
  <defs>
    <radialGradient id="dpGlow" cx="50%" cy="32%" r="52%">
      <stop offset="0%" stop-color="#fff8dc" stop-opacity="0.85"/>
      <stop offset="55%" stop-color="#e8c97a" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="dpRay" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff3a0"/>
      <stop offset="55%" stop-color="#f5a623"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="dpHand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e8dfc0"/>
    </linearGradient>
  </defs>

  <!-- Heavenly glow -->
  <circle cx="50" cy="34" r="30" fill="url(#dpGlow)"/>

  <!-- Rays -->
  <g stroke="#c9a84c" stroke-width="0.8" opacity="0.45" stroke-linecap="round">
    <line x1="50" y1="10" x2="50" y2="2"/>
    <line x1="50" y1="10" x2="57" y2="3" transform="rotate(22,50,10)"/>
    <line x1="50" y1="10" x2="57" y2="3" transform="rotate(-22,50,10)"/>
    <line x1="50" y1="10" x2="57" y2="3" transform="rotate(44,50,10)"/>
    <line x1="50" y1="10" x2="57" y2="3" transform="rotate(-44,50,10)"/>
    <line x1="50" y1="10" x2="57" y2="3" transform="rotate(66,50,10)"/>
    <line x1="50" y1="10" x2="57" y2="3" transform="rotate(-66,50,10)"/>
  </g>

  <!-- Trinity triangle -->
  <path d="M50,14 L60,34 L40,34 Z" fill="none" stroke="#e8c97a" stroke-width="0.7" opacity="0.45"/>

  <!-- Central ray -->
  <path d="M50,16 C49,12 47,9 50,6 C53,9 51,12 50,16 Z" fill="url(#dpRay)" opacity="0.9"/>

  <!-- Left blessing hand -->
  <g fill="url(#dpHand)" stroke="#c9a84c" stroke-width="0.5" opacity="0.92">
    <ellipse cx="33" cy="46" rx="8" ry="5.5" transform="rotate(-20,33,46)"/>
    <path d="M25,44 C21,38 20,32 24,28 C26,32 28,36 30,40 Z"/>
    <path d="M30,40 C32,34 35,30 39,28 C37,34 34,38 32,42 Z"/>
    <path d="M32,42 C34,36 37,32 41,30 C39,36 36,40 34,44 Z"/>
  </g>

  <!-- Right blessing hand -->
  <g fill="url(#dpHand)" stroke="#c9a84c" stroke-width="0.5" opacity="0.92">
    <ellipse cx="67" cy="46" rx="8" ry="5.5" transform="rotate(20,67,46)"/>
    <path d="M75,44 C79,38 80,32 76,28 C74,32 72,36 70,40 Z"/>
    <path d="M70,40 C68,34 65,30 61,28 C63,34 66,38 68,42 Z"/>
    <path d="M68,42 C66,36 63,32 59,30 C61,36 64,40 66,44 Z"/>
  </g>

  <!-- Light descending to earth -->
  <path d="M50,50 L50,78" stroke="#c9a84c" stroke-width="1.2" opacity="0.4" stroke-linecap="round"/>
  <circle cx="50" cy="80" r="4.5" fill="#c9a84c" opacity="0.22"/>
  <circle cx="50" cy="80" r="2" fill="#fff3a0" opacity="0.55"/>

  <!-- Side rays -->
  <path d="M38,58 C34,62 30,66 28,70 C32,66 36,62 40,58 Z" fill="url(#dpRay)" opacity="0.55"/>
  <path d="M62,58 C66,62 70,66 72,70 C68,66 64,62 60,58 Z" fill="url(#dpRay)" opacity="0.55"/>

  <text x="50" y="93" text-anchor="middle" font-family="Georgia, serif" font-size="5.5" fill="#c9a84c" opacity="0.75">Mt 6,9</text>
</svg>

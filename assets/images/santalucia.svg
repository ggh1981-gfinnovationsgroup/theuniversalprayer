<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <defs>
    <radialGradient id="stl-bg" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#0e0c10"/><stop offset="100%" stop-color="#080408"/>
    </radialGradient>
    <linearGradient id="stl-r1" x1="50%" y1="0%" x2="10%" y2="100%">
      <stop offset="0%" stop-color="#c84848" stop-opacity="1"/><stop offset="100%" stop-color="#602020" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="stl-r2" x1="50%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#f8e840" stop-opacity="1"/><stop offset="100%" stop-color="#d0a830" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="stl-gl"><feGaussianBlur stdDeviation="9" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="stl-g2"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="600" fill="url(#stl-bg)"/>
  <rect width="400" height="600" fill="#3a1018" opacity="0.10"/>
  <polygon points="198,265 -25,610 115,610" fill="url(#stl-r1)" filter="url(#stl-gl)" opacity="0.72"/>
  <polygon points="198,265 20,600  85,600"  fill="#c84848" opacity="0.36"/>
  <polygon points="202,265 425,610 285,610" fill="url(#stl-r2)" filter="url(#stl-gl)" opacity="0.70"/>
  <polygon points="202,265 375,600 315,600" fill="#f8e840" opacity="0.34"/>
  <!-- White dress -->
  <path d="M168,155 Q140,205 126,390 Q200,415 274,390 Q260,205 232,155 Z" fill="#f0ece0" opacity="0.90"/>
  <!-- Red mantle (martyr) -->
  <path d="M168,155 Q124,192 108,318 Q122,330 148,312 Q150,228 178,168 Z" fill="#c02020" opacity="0.80"/>
  <path d="M232,155 Q260,198 270,318 Q290,322 296,300 Q286,198 248,158 Z" fill="#c02020" opacity="0.74"/>
  <!-- Left arm: lamp (eyes on plate = Lucia's iconography) -->
  <path d="M140,215 Q112,252 104,292" stroke="#f0ece0" stroke-width="17" fill="none" stroke-linecap="round" opacity="0.85"/>
  <!-- Right arm: palm branch -->
  <path d="M260,215 Q285,252 292,292" stroke="#c02020" stroke-width="16" fill="none" stroke-linecap="round" opacity="0.80"/>
  <!-- Hands -->
  <ellipse cx="104" cy="295" rx="12" ry="15" fill="#d4b090" opacity="0.9"/>
  <ellipse cx="292" cy="295" rx="12" ry="15" fill="#d4b090" opacity="0.9"/>
  <!-- Dish with eyes (Lucia's symbol) -->
  <ellipse cx="104" cy="316" rx="14" ry="8" fill="#f8f4e8" opacity="0.82"/>
  <ellipse cx="98"  cy="316" rx="4" ry="3" fill="#5080c0" opacity="0.78"/>
  <circle  cx="98"  cy="316" r="2" fill="#203050" opacity="0.80"/>
  <ellipse cx="110" cy="316" rx="4" ry="3" fill="#5080c0" opacity="0.78"/>
  <circle  cx="110" cy="316" r="2" fill="#203050" opacity="0.80"/>
  <!-- Palm branch (right) -->
  <path d="M292,295 Q285,272 280,248" stroke="#6aaa30" stroke-width="3" fill="none" opacity="0.78"/>
  <!-- Wreath of lights on head -->
  <circle cx="185" cy="78" r="5" fill="#f8e040" opacity="0.80"/>
  <circle cx="196" cy="72" r="5" fill="#f8e040" opacity="0.82"/>
  <circle cx="208" cy="72" r="5" fill="#f8e040" opacity="0.82"/>
  <circle cx="218" cy="77" r="5" fill="#f8e040" opacity="0.80"/>
  <path d="M182,82 L222,82" stroke="#c8a840" stroke-width="1.5" opacity="0.45"/>
  <!-- White veil -->
  <path d="M168,155 Q142,142 136,126 Q152,112 176,118 Q184,135 188,152 Z" fill="#f0ece0" opacity="0.90"/>
  <path d="M232,155 Q258,142 264,126 Q248,112 224,118 Q216,135 212,152 Z" fill="#f0ece0" opacity="0.86"/>
  <!-- Neck + head -->
  <rect x="193" y="142" width="14" height="16" rx="4" fill="#d4b090" opacity="0.9"/>
  <ellipse cx="200" cy="108" rx="25" ry="29" fill="#d4b090" opacity="0.92"/>
  <path d="M175,107 Q177,73 200,69 Q223,73 225,107 Q218,87 200,85 Q182,87 175,107 Z" fill="#9a7858" opacity="0.60"/>
  <!-- Halo -->
  <circle cx="200" cy="108" r="53" fill="none" stroke="#e8c97a" stroke-width="1.8" stroke-opacity="0.65" filter="url(#stl-g2)"/>
  <circle cx="200" cy="108" r="47" fill="none" stroke="#e8c97a" stroke-width="0.5" stroke-opacity="0.22"/>
  <!-- Frame -->
  <rect x="6" y="6" width="388" height="588" rx="8" fill="none" stroke="#c9a84c" stroke-width="1.2" stroke-opacity="0.5"/>
  <rect x="12" y="12" width="376" height="576" rx="5" fill="none" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.18"/>
  <!-- Panel -->
  <rect x="18" y="528" width="364" height="66" rx="6" fill="#080408" opacity="0.86"/>
  <line x1="46" y1="535" x2="354" y2="535" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.28"/>
  <text x="200" y="548" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#c9a84c" letter-spacing="3" opacity="0.9">SANTA LUCIA  ·  SAINT LUCY</text>
  <text x="200" y="567" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#f07070" font-style="italic">«Santa Lucía, Mártir y Virgen»</text>
  <text x="200" y="585" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#f8e840" font-style="italic" opacity="0.8">«Saint Lucy, Virgin and Martyr»</text>

  <!-- Minimal facial features for visual consistency across intercessors -->
  <g id="tup-face-features" opacity="0.9">
    <ellipse id="tup-eye-left" cx="186" cy="108" rx="3.1" ry="2.2" fill="#2a1a12"/>
    <ellipse id="tup-eye-right" cx="214" cy="108" rx="3.1" ry="2.2" fill="#2a1a12"/>
    <path id="tup-nose" d="M200 112 C198 118, 198 120, 200 123" stroke="#7b4a35" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <path id="tup-mouth" d="M192 132 Q200 137 208 132" stroke="#8f3a3a" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <defs>
    <radialGradient id="stb-bg" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#180808"/><stop offset="100%" stop-color="#0c0404"/>
    </radialGradient>
    <linearGradient id="stb-r1" x1="50%" y1="0%" x2="10%" y2="100%">
      <stop offset="0%" stop-color="#a01818" stop-opacity="1"/><stop offset="100%" stop-color="#500808" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="stb-r2" x1="50%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#f5e060" stop-opacity="1"/><stop offset="100%" stop-color="#c9a84c" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="stb-gl"><feGaussianBlur stdDeviation="9" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="stb-g2"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="600" fill="url(#stb-bg)"/>
  <rect width="400" height="600" fill="#400808" opacity="0.12"/>
  <polygon points="198,265 -25,610 115,610" fill="url(#stb-r1)" filter="url(#stb-gl)" opacity="0.72"/>
  <polygon points="198,265 20,600  85,600"  fill="#a01818" opacity="0.36"/>
  <polygon points="202,265 425,610 285,610" fill="url(#stb-r2)" filter="url(#stb-gl)" opacity="0.70"/>
  <polygon points="202,265 375,600 315,600" fill="#f5e060" opacity="0.34"/>
  <!-- White dress -->
  <path d="M168,155 Q140,205 126,390 Q200,415 274,390 Q260,205 232,155 Z" fill="#f0ece0" opacity="0.90"/>
  <!-- Red mantle -->
  <path d="M168,155 Q124,192 108,318 Q122,330 148,312 Q150,228 178,168 Z" fill="#c02020" opacity="0.82"/>
  <path d="M232,155 Q260,198 270,318 Q290,322 296,300 Q286,198 248,158 Z" fill="#c02020" opacity="0.78"/>
  <!-- Left arm with tower symbol -->
  <path d="M140,215 Q112,252 104,294" stroke="#f0ece0" stroke-width="17" fill="none" stroke-linecap="round" opacity="0.85"/>
  <!-- Right arm with palm branch -->
  <path d="M260,215 Q285,252 292,292" stroke="#c02020" stroke-width="16" fill="none" stroke-linecap="round" opacity="0.80"/>
  <!-- Hands -->
  <ellipse cx="104" cy="297" rx="12" ry="15" fill="#d4b090" opacity="0.9"/>
  <ellipse cx="292" cy="296" rx="12" ry="15" fill="#d4b090" opacity="0.9"/>
  <!-- Tower (3-window tower — symbol of Barbara) -->
  <rect x="86" y="262" width="22" height="34" rx="2" fill="#c8a840" opacity="0.80"/>
  <rect x="91" y="268" width="5" height="7" rx="1" fill="#180808" opacity="0.80"/>
  <rect x="98" y="268" width="5" height="7" rx="1" fill="#180808" opacity="0.80"/>
  <rect x="91" y="280" width="5" height="7" rx="1" fill="#180808" opacity="0.80"/>
  <!-- Palm branch (right) -->
  <path d="M292,296 Q285,275 282,252" stroke="#6aaa30" stroke-width="3" fill="none" opacity="0.80"/>
  <path d="M282,252 Q272,244 275,256 Q278,248 282,252 Q286,244 288,256 Z" fill="#6aaa30" opacity="0.72"/>
  <!-- White veil -->
  <path d="M168,155 Q142,142 136,126 Q152,112 176,118 Q184,135 188,152 Z" fill="#f0ece0" opacity="0.90"/>
  <path d="M232,155 Q258,142 264,126 Q248,112 224,118 Q216,135 212,152 Z" fill="#f0ece0" opacity="0.86"/>
  <!-- Neck + head -->
  <rect x="193" y="142" width="14" height="16" rx="4" fill="#d4b090" opacity="0.9"/>
  <ellipse cx="200" cy="108" rx="25" ry="29" fill="#d4b090" opacity="0.92"/>
  <path d="M175,107 Q177,73 200,69 Q223,73 225,107 Q218,87 200,85 Q182,87 175,107 Z" fill="#9a7858" opacity="0.62"/>
  <!-- Halo -->
  <circle cx="200" cy="108" r="53" fill="none" stroke="#e8c97a" stroke-width="1.8" stroke-opacity="0.65" filter="url(#stb-g2)"/>
  <circle cx="200" cy="108" r="47" fill="none" stroke="#e8c97a" stroke-width="0.5" stroke-opacity="0.22"/>
  <!-- Frame -->
  <rect x="6" y="6" width="388" height="588" rx="8" fill="none" stroke="#c9a84c" stroke-width="1.2" stroke-opacity="0.5"/>
  <rect x="12" y="12" width="376" height="576" rx="5" fill="none" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.18"/>
  <!-- Panel -->
  <rect x="18" y="528" width="364" height="66" rx="6" fill="#0c0404" opacity="0.86"/>
  <line x1="46" y1="535" x2="354" y2="535" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.28"/>
  <text x="200" y="548" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#c9a84c" letter-spacing="3" opacity="0.9">SANTA BARBARA  ·  SAINT BARBARA</text>
  <text x="200" y="567" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#f08080" font-style="italic">«Santa Bárbara, Mártir»</text>
  <text x="200" y="585" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#f5e060" font-style="italic" opacity="0.8">«Saint Barbara, Martyr»</text>
</svg>

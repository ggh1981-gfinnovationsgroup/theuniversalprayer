<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="barb-bg" cx="50%" cy="38%" r="60%">
      <stop offset="0%" stop-color="#1a0000"/>
      <stop offset="100%" stop-color="#060000"/>
    </radialGradient>
    <radialGradient id="barb-glow" cx="50%" cy="35%" r="50%">
      <stop offset="0%" stop-color="rgba(180,20,20,0.22)"/>
      <stop offset="100%" stop-color="rgba(180,20,20,0)"/>
    </radialGradient>
  </defs>

  <!-- Background: deep cardinal red -->
  <rect width="800" height="600" fill="url(#barb-bg)"/>
  <rect width="800" height="600" fill="url(#barb-glow)"/>

  <!-- Border -->
  <rect x="28" y="28" width="744" height="544" rx="6" fill="none" stroke="#c03030" stroke-width="1" stroke-opacity="0.55"/>
  <rect x="36" y="36" width="728" height="528" rx="4" fill="none" stroke="#c03030" stroke-width="0.5" stroke-opacity="0.25"/>

  <!-- Side accent strips -->
  <rect x="28" y="28" width="6" height="544" rx="3" fill="#8a1a1a" opacity="0.75"/>
  <rect x="766" y="28" width="6" height="544" rx="3" fill="#8a1a1a" opacity="0.75"/>

  <!-- Tower — three windows — main symbol -->
  <!-- Tower base -->
  <rect x="335" y="160" width="130" height="240" rx="5" fill="#1e0a0a" stroke="#c03030" stroke-width="1.5" opacity="0.92"/>
  <!-- Tower battlements (top) -->
  <rect x="335" y="148" width="26" height="18" rx="3" fill="#1e0a0a" stroke="#c03030" stroke-width="1.5" opacity="0.92"/>
  <rect x="374" y="148" width="26" height="18" rx="3" fill="#1e0a0a" stroke="#c03030" stroke-width="1.5" opacity="0.92"/>
  <rect x="413" y="148" width="26" height="18" rx="3" fill="#1e0a0a" stroke="#c03030" stroke-width="1.5" opacity="0.92"/>
  <rect x="452" y="148" width="13" height="18" rx="3" fill="#1e0a0a" stroke="#c03030" stroke-width="1.5" opacity="0.92"/>
  <!-- Window 1 (left) -->
  <rect x="350" y="195" width="30" height="40" rx="14" fill="#000" stroke="#c9a84c" stroke-width="1.5" opacity="0.88"/>
  <ellipse cx="365" cy="195" rx="15" ry="4" fill="#000" stroke="#c9a84c" stroke-width="1" opacity="0.80"/>
  <!-- Golden light from window 1 -->
  <rect x="350" y="195" width="30" height="40" rx="14" fill="#c9a84c" opacity="0.10"/>
  <!-- Window 2 (center) -->
  <rect x="385" y="195" width="30" height="40" rx="14" fill="#000" stroke="#c9a84c" stroke-width="1.5" opacity="0.88"/>
  <ellipse cx="400" cy="195" rx="15" ry="4" fill="#000" stroke="#c9a84c" stroke-width="1" opacity="0.80"/>
  <rect x="385" y="195" width="30" height="40" rx="14" fill="#c9a84c" opacity="0.10"/>
  <!-- Window 3 (right) — the Trinitarian window -->
  <rect x="420" y="195" width="30" height="40" rx="14" fill="#000" stroke="#c9a84c" stroke-width="1.5" opacity="0.88"/>
  <ellipse cx="435" cy="195" rx="15" ry="4" fill="#000" stroke="#c9a84c" stroke-width="1" opacity="0.80"/>
  <rect x="420" y="195" width="30" height="40" rx="14" fill="#e8c97a" opacity="0.18"/>
  <!-- Trinity glow from window 3 -->
  <circle cx="435" cy="215" r="10" fill="#e8c97a" opacity="0.12"/>
  <!-- Tower door -->
  <rect x="373" y="355" width="54" height="45" rx="20" fill="#000" stroke="#c03030" stroke-width="1.5" opacity="0.88"/>

  <!-- Palm branch — martyr symbol (right side) -->
  <line x1="545" y1="420" x2="510" y2="220" stroke="#3a8a1a" stroke-width="2.5" stroke-linecap="round" opacity="0.75"/>
  <path d="M 510 260 Q 490 240 475 218 Q 498 238 512 260 Z" fill="#3a8a1a" opacity="0.65"/>
  <path d="M 515 290 Q 498 268 488 244 Q 508 266 517 290 Z" fill="#3a8a1a" opacity="0.60"/>
  <path d="M 518 320 Q 503 296 496 270 Q 513 296 520 320 Z" fill="#3a8a1a" opacity="0.55"/>
  <path d="M 510 260 Q 530 238 542 218 Q 522 240 512 260 Z" fill="#3a8a1a" opacity="0.55"/>
  <path d="M 515 290 Q 532 266 540 244 Q 523 268 516 290 Z" fill="#3a8a1a" opacity="0.50"/>

  <!-- Lightning bolt — allusion to divine justice that struck her father -->
  <path d="M 240 160 L 262 220 L 248 220 L 270 290" stroke="#e8c97a" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.50"/>

  <!-- Stars -->
  <circle cx="155" cy="105" r="2" fill="#c03030" opacity="0.50"/>
  <circle cx="645" cy="125" r="2" fill="#c03030" opacity="0.50"/>
  <circle cx="175" cy="450" r="1.5" fill="#c9a84c" opacity="0.40"/>
  <circle cx="625" cy="430" r="1.5" fill="#c9a84c" opacity="0.40"/>
  <circle cx="192" cy="290" r="1.2" fill="#c9a84c" opacity="0.40"/>
  <circle cx="608" cy="305" r="1.2" fill="#c9a84c" opacity="0.40"/>

  <!-- Name text -->
  <text x="400" y="498" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#e8c97a" letter-spacing="1">Santa Bárbara</text>
  <text x="400" y="520" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#c9a84c" font-style="italic" opacity="0.85">Saint Barbara</text>
  <text x="400" y="546" text-anchor="middle" font-family="Lato, sans-serif" font-size="11" fill="#7a2a2a" letter-spacing="2.5">4 DE DIC · DEC 4</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <defs>
    <radialGradient id="sfn-bg" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#180e00"/><stop offset="100%" stop-color="#0c0700"/>
    </radialGradient>
    <linearGradient id="sfn-r1" x1="50%" y1="0%" x2="10%" y2="100%">
      <stop offset="0%" stop-color="#d08020" stop-opacity="1"/><stop offset="100%" stop-color="#603800" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="sfn-r2" x1="50%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#f5e060" stop-opacity="1"/><stop offset="100%" stop-color="#c9a84c" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="sfn-gl"><feGaussianBlur stdDeviation="9" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="sfn-g2"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="600" fill="url(#sfn-bg)"/>
  <rect width="400" height="600" fill="#603010" opacity="0.10"/>
  <polygon points="198,265 -25,610 115,610" fill="url(#sfn-r1)" filter="url(#sfn-gl)" opacity="0.72"/>
  <polygon points="198,265 20,600  85,600"  fill="#d08020" opacity="0.36"/>
  <polygon points="202,265 425,610 285,610" fill="url(#sfn-r2)" filter="url(#sfn-gl)" opacity="0.70"/>
  <polygon points="202,265 375,600 315,600" fill="#f5e060" opacity="0.34"/>
  <!-- Black Oratorian habit -->
  <path d="M168,155 Q140,205 126,390 Q200,415 274,390 Q260,205 232,155 Z" fill="#1a1610" opacity="0.92"/>
  <!-- Black mantle -->
  <path d="M168,155 Q124,192 108,318 Q122,330 148,312 Q150,228 178,168 Z" fill="#121010" opacity="0.90"/>
  <path d="M232,155 Q260,198 270,318 Q290,322 296,300 Q286,198 248,158 Z" fill="#121010" opacity="0.84"/>
  <!-- Left arm with open book (joyful preacher) -->
  <path d="M140,215 Q112,255 104,295" stroke="#1a1610" stroke-width="17" fill="none" stroke-linecap="round" opacity="0.88"/>
  <!-- Right arm gesturing outward (joyful) -->
  <path d="M260,215 Q295,248 308,272" stroke="#121010" stroke-width="16" fill="none" stroke-linecap="round" opacity="0.85"/>
  <!-- Hands -->
  <ellipse cx="104" cy="298" rx="12" ry="15" fill="#d4a06a" opacity="0.9"/>
  <ellipse cx="308" cy="274" rx="12" ry="15" fill="#d4a06a" opacity="0.9"/>
  <!-- Open book -->
  <rect x="90" y="286" width="28" height="20" rx="2" fill="#f8f0d8" opacity="0.90"/>
  <line x1="104" y1="286" x2="104" y2="306" stroke="#c8a870" stroke-width="1" opacity="0.6"/>
  <path d="M92,292 L102,292" stroke="#c8a870" stroke-width="1" opacity="0.5"/>
  <path d="M92,297 L102,297" stroke="#c8a870" stroke-width="1" opacity="0.5"/>
  <!-- White collar -->
  <rect x="190" y="153" width="20" height="12" rx="3" fill="#f8f8f8" opacity="0.72"/>
  <!-- Neck + head (older, cheerful - bald on top) -->
  <rect x="193" y="142" width="14" height="18" rx="4" fill="#d4a06a" opacity="0.9"/>
  <ellipse cx="200" cy="108" rx="27" ry="31" fill="#d4a06a" opacity="0.92"/>
  <path d="M173,117 Q178,84 200,80 Q222,84 227,117 Q225,104 200,100 Q175,104 173,117 Z" fill="#3a2010" opacity="0.75"/>
  <!-- Halo -->
  <circle cx="200" cy="108" r="53" fill="none" stroke="#e8c97a" stroke-width="1.8" stroke-opacity="0.65" filter="url(#sfn-g2)"/>
  <circle cx="200" cy="108" r="47" fill="none" stroke="#e8c97a" stroke-width="0.5" stroke-opacity="0.22"/>
  <!-- Frame -->
  <rect x="6" y="6" width="388" height="588" rx="8" fill="none" stroke="#c9a84c" stroke-width="1.2" stroke-opacity="0.5"/>
  <rect x="12" y="12" width="376" height="576" rx="5" fill="none" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.18"/>
  <!-- Panel -->
  <rect x="18" y="528" width="364" height="66" rx="6" fill="#0c0700" opacity="0.86"/>
  <line x1="46" y1="535" x2="354" y2="535" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.28"/>
  <text x="200" y="548" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#c9a84c" letter-spacing="3" opacity="0.9">SAN FELIPE NERI  ·  SAINT PHILIP NERI</text>
  <text x="200" y="567" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#f0a040" font-style="italic">«San Felipe Neri, el Apóstol de Roma»</text>
  <text x="200" y="585" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#f5e060" font-style="italic" opacity="0.8">«Saint Philip Neri, Apostle of Rome»</text>

  <!-- Minimal facial features for visual consistency across intercessors -->
  <g id="tup-face-features" opacity="0.9">
    <ellipse id="tup-eye-left" cx="186" cy="108" rx="3.1" ry="2.2" fill="#2a1a12"/>
    <ellipse id="tup-eye-right" cx="214" cy="108" rx="3.1" ry="2.2" fill="#2a1a12"/>
    <path id="tup-nose" d="M200 112 C198 118, 198 120, 200 123" stroke="#7b4a35" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <path id="tup-mouth" d="M192 132 Q200 137 208 132" stroke="#8f3a3a" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  </g>
</svg>

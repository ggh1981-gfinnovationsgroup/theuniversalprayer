<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="ft-bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#050d1f"/>
      <stop offset="100%" stop-color="#030810"/>
    </radialGradient>
    <radialGradient id="ft-glow" cx="50%" cy="38%" r="40%">
      <stop offset="0%" stop-color="#2980b9" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#2980b9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ft-sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fffde7" stop-opacity="1"/>
      <stop offset="40%" stop-color="#f7dc6f" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#f39c12" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#ft-bg)"/>
  <rect width="800" height="600" fill="url(#ft-glow)"/>
  <rect x="28" y="28" width="744" height="544" rx="6" fill="none" stroke="#3498db" stroke-width="1" stroke-opacity="0.4"/>
  <rect x="36" y="36" width="728" height="528" rx="4" fill="none" stroke="#3498db" stroke-width="0.5" stroke-opacity="0.2"/>
  <!-- Blue accent strips -->
  <rect x="28" y="28" width="6" height="544" rx="3" fill="#2471a3" opacity="0.65"/>
  <rect x="766" y="28" width="6" height="544" rx="3" fill="#2471a3" opacity="0.65"/>
  <!-- Miracle of the Sun — rotating sunburst (24 rays alternating long/short) -->
  <line x1="400" y1="195" x2="400" y2="62"  stroke="#f7dc6f" stroke-width="3" stroke-opacity="0.7"/>
  <line x1="400" y1="195" x2="460" y2="72"  stroke="#f7dc6f" stroke-width="2" stroke-opacity="0.55"/>
  <line x1="400" y1="195" x2="510" y2="110" stroke="#f7dc6f" stroke-width="3" stroke-opacity="0.65"/>
  <line x1="400" y1="195" x2="538" y2="155" stroke="#f7dc6f" stroke-width="2" stroke-opacity="0.5"/>
  <line x1="400" y1="195" x2="540" y2="195" stroke="#f7dc6f" stroke-width="3" stroke-opacity="0.65"/>
  <line x1="400" y1="195" x2="536" y2="238" stroke="#f7dc6f" stroke-width="2" stroke-opacity="0.5"/>
  <line x1="400" y1="195" x2="510" y2="280" stroke="#f7dc6f" stroke-width="3" stroke-opacity="0.65"/>
  <line x1="400" y1="195" x2="460" y2="318" stroke="#f7dc6f" stroke-width="2" stroke-opacity="0.55"/>
  <line x1="400" y1="195" x2="400" y2="328" stroke="#f7dc6f" stroke-width="3" stroke-opacity="0.7"/>
  <line x1="400" y1="195" x2="340" y2="318" stroke="#f7dc6f" stroke-width="2" stroke-opacity="0.55"/>
  <line x1="400" y1="195" x2="290" y2="280" stroke="#f7dc6f" stroke-width="3" stroke-opacity="0.65"/>
  <line x1="400" y1="195" x2="264" y2="238" stroke="#f7dc6f" stroke-width="2" stroke-opacity="0.5"/>
  <line x1="400" y1="195" x2="260" y2="195" stroke="#f7dc6f" stroke-width="3" stroke-opacity="0.65"/>
  <line x1="400" y1="195" x2="264" y2="155" stroke="#f7dc6f" stroke-width="2" stroke-opacity="0.5"/>
  <line x1="400" y1="195" x2="290" y2="110" stroke="#f7dc6f" stroke-width="3" stroke-opacity="0.65"/>
  <line x1="400" y1="195" x2="340" y2="72"  stroke="#f7dc6f" stroke-width="2" stroke-opacity="0.55"/>
  <!-- Sun concentric circles -->
  <circle cx="400" cy="195" r="80" fill="none" stroke="#f7dc6f" stroke-width="1" stroke-opacity="0.25"/>
  <circle cx="400" cy="195" r="55" fill="none" stroke="#f7dc6f" stroke-width="1.5" stroke-opacity="0.35"/>
  <!-- Sun disc -->
  <circle cx="400" cy="195" r="40" fill="url(#ft-sun)"/>
  <circle cx="400" cy="195" r="24" fill="#fffde7" opacity="0.95"/>
  <!-- Rosary decade beads (5 small circles around the sun) -->
  <circle cx="400" cy="120" r="5" fill="#3498db" opacity="0.7"/>
  <circle cx="469" cy="148" r="5" fill="#3498db" opacity="0.65"/>
  <circle cx="444" cy="226" r="5" fill="#3498db" opacity="0.65"/>
  <circle cx="356" cy="226" r="5" fill="#3498db" opacity="0.65"/>
  <circle cx="331" cy="148" r="5" fill="#3498db" opacity="0.65"/>
  <!-- Name -->
  <text x="400" y="376" text-anchor="middle" font-family="Georgia,serif" font-size="32" fill="#e8c97a" letter-spacing="1">Virgen de Fátima</text>
  <text x="400" y="416" text-anchor="middle" font-family="Georgia,serif" font-size="15" fill="#3498db" opacity="0.9" font-style="italic">Our Lady of Fátima — Reina del Rosario</text>
  <line x1="284" y1="442" x2="516" y2="442" stroke="#3498db" stroke-width="0.6" stroke-opacity="0.4"/>
  <text x="400" y="474" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#8a6e2f" letter-spacing="3">FEAST DAY · MAY 13</text>
</svg>

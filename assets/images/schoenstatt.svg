<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="sc-bg" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#080f28"/>
      <stop offset="100%" stop-color="#040810"/>
    </radialGradient>
    <radialGradient id="sc-glow" cx="50%" cy="42%" r="44%">
      <stop offset="0%" stop-color="#3a5abf" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#3a5abf" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sc-halo" cx="50%" cy="38%" r="18%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#sc-bg)"/>
  <rect width="800" height="600" fill="url(#sc-glow)"/>
  <rect width="800" height="600" fill="url(#sc-halo)"/>

  <!-- Border frame -->
  <rect x="28" y="28" width="744" height="544" rx="6" fill="none" stroke="#4a6ec0" stroke-width="1" stroke-opacity="0.4"/>
  <rect x="36" y="36" width="728" height="528" rx="4" fill="none" stroke="#4a6ec0" stroke-width="0.5" stroke-opacity="0.2"/>
  <rect x="28" y="28" width="6" height="544" rx="3" fill="#2a4aa0" opacity="0.5"/>
  <rect x="766" y="28" width="6" height="544" rx="3" fill="#2a4aa0" opacity="0.5"/>

  <!-- Soft radiant glow behind figure -->
  <ellipse cx="400" cy="210" rx="160" ry="180" fill="#1a3a8a" opacity="0.18"/>

  <!-- 12 stars in a crown arc -->
  <text x="400" y="72"  font-family="Arial" font-size="15" fill="#e8c97a" opacity="0.95" text-anchor="middle">★</text>
  <text x="440" y="78"  font-family="Arial" font-size="12" fill="#e8c97a" opacity="0.85" text-anchor="middle">★</text>
  <text x="474" y="95"  font-family="Arial" font-size="11" fill="#e8c97a" opacity="0.80" text-anchor="middle">★</text>
  <text x="498" y="120" font-family="Arial" font-size="11" fill="#e8c97a" opacity="0.75" text-anchor="middle">★</text>
  <text x="508" y="152" font-family="Arial" font-size="11" fill="#e8c97a" opacity="0.72" text-anchor="middle">★</text>
  <text x="502" y="185" font-family="Arial" font-size="10" fill="#e8c97a" opacity="0.68" text-anchor="middle">★</text>
  <text x="360" y="78"  font-family="Arial" font-size="12" fill="#e8c97a" opacity="0.85" text-anchor="middle">★</text>
  <text x="326" y="95"  font-family="Arial" font-size="11" fill="#e8c97a" opacity="0.80" text-anchor="middle">★</text>
  <text x="302" y="120" font-family="Arial" font-size="11" fill="#e8c97a" opacity="0.75" text-anchor="middle">★</text>
  <text x="292" y="152" font-family="Arial" font-size="11" fill="#e8c97a" opacity="0.72" text-anchor="middle">★</text>
  <text x="298" y="185" font-family="Arial" font-size="10" fill="#e8c97a" opacity="0.68" text-anchor="middle">★</text>
  <text x="310" y="214" font-family="Arial" font-size="10" fill="#e8c97a" opacity="0.62" text-anchor="middle">★</text>

  <!-- Mantle (outer shape of Our Lady — wide flowing blue) -->
  <ellipse cx="400" cy="240" rx="110" ry="150" fill="#1a3a8a" opacity="0.85"/>
  <!-- Inner robe (lighter blue) -->
  <ellipse cx="400" cy="250" rx="70" ry="120" fill="#2a5ab0" opacity="0.60"/>

  <!-- Head / face area -->
  <circle cx="400" cy="130" r="44" fill="#1e3570" opacity="0.9"/>
  <circle cx="400" cy="130" r="36" fill="#c4a882" opacity="0.55"/>

  <!-- Veil lines suggesting the traditional Madonna veil -->
  <path d="M 370 115 Q 355 145 358 175 Q 368 210 380 235" stroke="#8aa8d8" stroke-width="1.5" fill="none" stroke-opacity="0.5"/>
  <path d="M 430 115 Q 445 145 442 175 Q 432 210 420 235" stroke="#8aa8d8" stroke-width="1.5" fill="none" stroke-opacity="0.5"/>

  <!-- Small Child Jesus indication on right arm -->
  <circle cx="446" cy="210" r="18" fill="#c4a882" opacity="0.40"/>
  <circle cx="446" cy="200" r="11" fill="#c4a882" opacity="0.35"/>

  <!-- Small Schoenstatt chapel (Urheiligtum) at the base -->
  <!-- Chapel body -->
  <rect x="350" y="316" width="100" height="60" rx="2" fill="#1a2a5a" stroke="#4a6ec0" stroke-width="1" stroke-opacity="0.6"/>
  <!-- Chapel roof (triangular pediment) -->
  <polygon points="345,316 455,316 400,278" fill="#1e3570" stroke="#4a6ec0" stroke-width="1" stroke-opacity="0.5"/>
  <!-- Chapel door arch -->
  <path d="M 385 376 L 385 344 Q 400 334 415 344 L 415 376 Z" fill="#0a1530" stroke="#4a6ec0" stroke-width="0.8" stroke-opacity="0.5"/>
  <!-- Chapel cross on top -->
  <line x1="400" y1="268" x2="400" y2="252" stroke="#e8c97a" stroke-width="2" stroke-opacity="0.9"/>
  <line x1="393" y1="260" x2="407" y2="260" stroke="#e8c97a" stroke-width="2" stroke-opacity="0.9"/>
  <!-- Chapel window -->
  <circle cx="400" cy="330" r="7" fill="none" stroke="#4a6ec0" stroke-width="1" stroke-opacity="0.6"/>
  <line x1="400" y1="323" x2="400" y2="337" stroke="#4a6ec0" stroke-width="0.8" stroke-opacity="0.5"/>
  <line x1="393" y1="330" x2="407" y2="330" stroke="#4a6ec0" stroke-width="0.8" stroke-opacity="0.5"/>

  <!-- IHS emblem circle -->
  <circle cx="400" cy="420" r="22" fill="none" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.55"/>
  <text x="400" y="426" text-anchor="middle" font-family="Georgia,serif" font-size="13" fill="#c9a84c" opacity="0.75" letter-spacing="1">IHS</text>

  <!-- Names -->
  <text x="400" y="466" text-anchor="middle" font-family="Georgia,serif" font-size="27" fill="#e8c97a" letter-spacing="1">Virgen de Schoenstatt</text>
  <text x="400" y="497" text-anchor="middle" font-family="Georgia,serif" font-size="13" fill="#7a9ad8" opacity="0.85" font-style="italic">Our Lady of Schoenstatt</text>
  <line x1="268" y1="516" x2="532" y2="516" stroke="#4a6ec0" stroke-width="0.6" stroke-opacity="0.4"/>
  <text x="400" y="538" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#8a6e2f" letter-spacing="2">MATER TER ADMIRABILIS · 18 OCT 1914</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <defs>
    <radialGradient id="sti-bg" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#180c04"/><stop offset="100%" stop-color="#060302"/>
    </radialGradient>
    <radialGradient id="sti-atm" cx="50%" cy="38%" r="46%">
      <stop offset="0%" stop-color="#8a4010" stop-opacity="0.26"/><stop offset="100%" stop-color="#8a4010" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sti-r1" x1="50%" y1="0%" x2="10%" y2="100%">
      <stop offset="0%" stop-color="#c06020" stop-opacity="1"/><stop offset="100%" stop-color="#602808" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="sti-r2" x1="50%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#f5e060" stop-opacity="1"/><stop offset="100%" stop-color="#c9a84c" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="sti-gl"><feGaussianBlur stdDeviation="9" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="sti-g2"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="600" fill="url(#sti-bg)"/>
  <rect width="400" height="600" fill="url(#sti-atm)"/>
  <!-- Rays: amber-orange left, gold right -->
  <polygon points="198,265 -25,610 115,610" fill="url(#sti-r1)" filter="url(#sti-gl)" opacity="0.72"/>
  <polygon points="198,265 20,600  85,600"  fill="#c06020" opacity="0.38"/>
  <polygon points="202,265 425,610 285,610" fill="url(#sti-r2)" filter="url(#sti-gl)" opacity="0.70"/>
  <polygon points="202,265 375,600 315,600" fill="#f5e060" opacity="0.34"/>
  <!-- Franciscan habit (brown) -->
  <path d="M166,158 Q138,208 124,390 Q200,415 276,390 Q262,208 234,158 Z" fill="#7a5020" opacity="0.92"/>
  <!-- Habit highlight -->
  <path d="M178,162 Q158,215 150,375 Q172,392 200,395 Q188,222 182,165 Z" fill="#9a6830" opacity="0.45"/>
  <!-- Habit shadow -->
  <path d="M222,162 Q242,215 250,375 Q228,392 200,395 Q212,222 218,165 Z" fill="#5a3810" opacity="0.40"/>
  <!-- White Franciscan cord belt -->
  <path d="M148,272 Q200,280 252,272" fill="none" stroke="#e8e0d0" stroke-width="4" stroke-linecap="round"/>
  <circle cx="170" cy="274" r="5" fill="#e0d8c8"/>
  <circle cx="200" cy="278" r="5" fill="#e0d8c8"/>
  <circle cx="230" cy="274" r="5" fill="#e0d8c8"/>
  <path d="M200,278 Q196,296 194,318 Q198,328 200,332" fill="none" stroke="#e8e0d0" stroke-width="3" stroke-linecap="round"/>
  <!-- White wimple / veil -->
  <path d="M172,130 Q174,96 200,90 Q226,96 228,130 L228,170 Q214,176 200,176 Q186,176 172,170 Z" fill="#e8e4dc" opacity="0.92"/>
  <path d="M172,130 Q160,136 156,162 Q172,170 172,170 Z" fill="#dedad0" opacity="0.80"/>
  <path d="M228,130 Q240,136 244,162 Q228,170 228,170 Z" fill="#dedad0" opacity="0.80"/>
  <!-- Left arm -->
  <path d="M154,212 Q120,242 110,295 Q122,304 134,298 Q140,260 154,230 Z" fill="#7a5020" opacity="0.90"/>
  <!-- Left hand -->
  <ellipse cx="116" cy="300" rx="15" ry="10" fill="#d4a06a" opacity="0.90" transform="rotate(-12,116,300)"/>
  <!-- Roses (miracle: bread turned to roses) -->
  <circle cx="103" cy="284" r="9" fill="#cc2040" opacity="0.90"/>
  <circle cx="116" cy="276" r="8" fill="#e03050" opacity="0.90"/>
  <circle cx="129" cy="280" r="7" fill="#cc2040" opacity="0.88"/>
  <circle cx="103" cy="284" r="5" fill="#f04060" opacity="0.65"/>
  <circle cx="116" cy="276" r="4" fill="#f05070" opacity="0.65"/>
  <line x1="103" y1="293" x2="110" y2="303" stroke="#3a6018" stroke-width="2"/>
  <line x1="116" y1="284" x2="116" y2="298" stroke="#3a6018" stroke-width="2"/>
  <line x1="129" y1="287" x2="120" y2="298" stroke="#3a6018" stroke-width="2"/>
  <!-- Right arm -->
  <path d="M246,212 Q280,242 290,295 Q278,304 266,298 Q260,260 246,230 Z" fill="#7a5020" opacity="0.90"/>
  <!-- Right hand -->
  <ellipse cx="284" cy="300" rx="15" ry="10" fill="#d4a06a" opacity="0.90" transform="rotate(12,284,300)"/>
  <!-- Bread loaf -->
  <ellipse cx="296" cy="290" rx="22" ry="13" fill="#c89030" opacity="0.92"/>
  <ellipse cx="296" cy="288" rx="18" ry="9" fill="#e0a840" opacity="0.88"/>
  <path d="M284,288 Q296,284 308,288" fill="none" stroke="#a07020" stroke-width="1.5"/>
  <path d="M289,293 Q296,290 303,293" fill="none" stroke="#a07020" stroke-width="1"/>
  <!-- Crown set aside at feet -->
  <g transform="translate(172,392)">
    <rect x="0" y="8" width="56" height="15" rx="3" fill="#c8a020" opacity="0.82"/>
    <polygon points="0,8 9,0 18,8" fill="#c8a020" opacity="0.82"/>
    <polygon points="18,8 28,0 38,8" fill="#c8a020" opacity="0.82"/>
    <polygon points="38,8 47,0 56,8" fill="#c8a020" opacity="0.82"/>
    <circle cx="9" cy="2" r="3" fill="#e8d060" opacity="0.88"/>
    <circle cx="28" cy="1" r="3" fill="#e8d060" opacity="0.88"/>
    <circle cx="47" cy="2" r="3" fill="#e8d060" opacity="0.88"/>
  </g>
  <!-- Head -->
  <ellipse cx="200" cy="108" rx="27" ry="31" fill="#d4a06a" opacity="0.92"/>
  <path d="M174,108 Q176,72 200,68 Q224,72 226,108 Q219,87 200,85 Q181,87 174,108 Z" fill="#3a2810" opacity="0.78"/>
  <!-- Halo -->
  <circle cx="200" cy="108" r="53" fill="none" stroke="#e8c97a" stroke-width="1.8" stroke-opacity="0.65" filter="url(#sti-g2)"/>
  <circle cx="200" cy="108" r="47" fill="none" stroke="#e8c97a" stroke-width="0.5" stroke-opacity="0.22"/>
  <!-- Frame -->
  <rect x="6" y="6" width="388" height="588" rx="8" fill="none" stroke="#c9a84c" stroke-width="1.2" stroke-opacity="0.5"/>
  <rect x="12" y="12" width="376" height="576" rx="5" fill="none" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.18"/>
  <!-- Panel -->
  <rect x="18" y="528" width="364" height="66" rx="6" fill="#060302" opacity="0.88"/>
  <line x1="46" y1="535" x2="354" y2="535" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.28"/>
  <text x="200" y="548" text-anchor="middle" font-family="Arial,sans-serif" font-size="7.5" fill="#c9a84c" letter-spacing="2.5" opacity="0.9">STA. ISABEL DE HUNGRÍA  ·  ST. ELIZABETH OF HUNGARY</text>
  <text x="200" y="567" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#f0a050" font-style="italic">«Reina de los pobres»</text>
  <text x="200" y="585" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#f5e060" font-style="italic" opacity="0.8">«Queen of the poor»</text>

  <!-- Minimal facial features for visual consistency across intercessors -->
  <g id="tup-face-features" opacity="0.9">
    <ellipse id="tup-eye-left" cx="186" cy="108" rx="3.1" ry="2.2" fill="#2a1a12"/>
    <ellipse id="tup-eye-right" cx="214" cy="108" rx="3.1" ry="2.2" fill="#2a1a12"/>
    <path id="tup-nose" d="M200 112 C198 118, 198 120, 200 123" stroke="#7b4a35" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <path id="tup-mouth" d="M192 132 Q200 137 208 132" stroke="#8f3a3a" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  </g>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560" width="400" height="560">
  <defs>
    <linearGradient id="pb-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2c0606"/>
      <stop offset="50%" stop-color="#6d0d12"/>
      <stop offset="100%" stop-color="#120304"/>
    </linearGradient>

    <radialGradient id="pb-aura" cx="50%" cy="45%" r="56%">
      <stop offset="0%" stop-color="#fff4d8" stop-opacity="0.85"/>
      <stop offset="45%" stop-color="#ffd48a" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#7a1414" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="pb-gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffefb8"/>
      <stop offset="50%" stop-color="#d59c2d"/>
      <stop offset="100%" stop-color="#8f5d12"/>
    </linearGradient>

    <linearGradient id="pb-silver" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f3f3f3"/>
      <stop offset="50%" stop-color="#d0d0d0"/>
      <stop offset="100%" stop-color="#9a9a9a"/>
    </linearGradient>

    <linearGradient id="pb-cup" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5d38a"/>
      <stop offset="45%" stop-color="#d89b33"/>
      <stop offset="100%" stop-color="#8f5a15"/>
    </linearGradient>

    <linearGradient id="pb-blood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff6a6a"/>
      <stop offset="45%" stop-color="#d21414"/>
      <stop offset="100%" stop-color="#7d0808"/>
    </linearGradient>

    <radialGradient id="pb-spark" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff9ea"/>
      <stop offset="60%" stop-color="#ffd468"/>
      <stop offset="100%" stop-color="#b46f12"/>
    </radialGradient>

    <filter id="pb-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="pb-soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>

  </style>

  <rect width="400" height="560" fill="url(#pb-bg)"/>
  <ellipse class="aura" cx="200" cy="270" rx="170" ry="230" fill="url(#pb-aura)"/>

  <g class="sun">
    <line x1="200" y1="68" x2="200" y2="40" stroke="#ffd95a" stroke-width="2.5" opacity=".8"/>
    <line x1="244" y1="84" x2="260" y2="66" stroke="#ffd95a" stroke-width="2.5" opacity=".8"/>
    <line x1="268" y1="130" x2="296" y2="130" stroke="#ffd95a" stroke-width="2.5" opacity=".8"/>
    <line x1="244" y1="176" x2="260" y2="194" stroke="#ffd95a" stroke-width="2.5" opacity=".8"/>
    <line x1="200" y1="192" x2="200" y2="220" stroke="#ffd95a" stroke-width="2.5" opacity=".8"/>
    <line x1="156" y1="176" x2="140" y2="194" stroke="#ffd95a" stroke-width="2.5" opacity=".8"/>
    <line x1="132" y1="130" x2="104" y2="130" stroke="#ffd95a" stroke-width="2.5" opacity=".8"/>
    <line x1="156" y1="84" x2="140" y2="66" stroke="#ffd95a" stroke-width="2.5" opacity=".8"/>
  </g>

  <g class="rl">
    <polygon points="198,250 0,560 0,355" fill="#ffd46a" opacity=".38"/>
    <polygon points="198,250 0,470 62,560" fill="#ffc84e" opacity=".28"/>
  </g>
  <g class="rr">
    <polygon points="202,250 400,470 338,560" fill="#ffd46a" opacity=".38"/>
    <polygon points="202,250 400,355 400,560" fill="#ffc84e" opacity=".28"/>
  </g>

  <g filter="url(#pb-soft)">
    <g class="s1">
      <circle cx="46" cy="70" r="3" fill="url(#pb-spark)"/>
      <polygon points="46,60 48,68 46,76 44,68" fill="#fff6dc"/>
      <polygon points="36,68 44,70 52,68 44,66" fill="#fff6dc"/>
    </g>
    <g class="s2">
      <circle cx="352" cy="76" r="2.6" fill="url(#pb-spark)"/>
      <polygon points="352,66 354,74 352,82 350,74" fill="#fff6dc"/>
      <polygon points="342,74 350,76 358,74 350,72" fill="#fff6dc"/>
    </g>
    <g class="s3">
      <circle cx="330" cy="295" r="2.2" fill="url(#pb-spark)"/>
    </g>
  </g>

  <g filter="url(#pb-glow)">
    <rect x="192" y="86" width="16" height="148" rx="4" fill="url(#pb-silver)"/>
    <rect x="152" y="132" width="96" height="16" rx="4" fill="url(#pb-silver)"/>
    <path d="M 200 110 L 186 134 L 214 134 Z" fill="url(#pb-gold)"/>
  </g>

  <g>
    <ellipse cx="200" cy="305" rx="62" ry="16" fill="#4f0909" opacity=".45"/>

    <path d="M 148 286 C 160 332 170 368 200 398 C 230 368 240 332 252 286 Z"
          fill="url(#pb-cup)" stroke="#6d3f0b" stroke-width="2"/>

    <ellipse cx="200" cy="286" rx="56" ry="12" fill="#f0c16b" stroke="#6d3f0b" stroke-width="2"/>
    <ellipse cx="200" cy="286" rx="45" ry="8" fill="#7f0d0d" opacity=".82"/>

    <rect x="192" y="398" width="16" height="62" rx="7" fill="url(#pb-cup)" stroke="#6d3f0b" stroke-width="2"/>
    <ellipse cx="200" cy="470" rx="38" ry="12" fill="url(#pb-cup)" stroke="#6d3f0b" stroke-width="2"/>

    <ellipse class="cup-glow" cx="200" cy="336" rx="72" ry="78" fill="none" stroke="#ffde94" stroke-width="2" opacity=".6"/>
  </g>

  <g class="drop" filter="url(#pb-soft)">
    <path d="M 190 204 C 186 214 186 222 190 228 C 194 234 202 234 206 228 C 210 222 210 214 206 204 C 202 196 194 196 190 204 Z" fill="url(#pb-blood)"/>
    <path d="M 205 228 C 201 238 201 246 205 252 C 209 258 217 258 221 252 C 225 246 225 238 221 228 C 217 220 209 220 205 228 Z" fill="url(#pb-blood)"/>
    <path d="M 176 230 C 172 238 172 246 176 252 C 180 258 188 258 192 252 C 196 246 196 238 192 230 C 188 222 180 222 176 230 Z" fill="url(#pb-blood)"/>
  </g>

  <g filter="url(#pb-soft)" opacity=".92">
    <circle cx="116" cy="430" r="22" fill="#7d1430"/>
    <circle cx="131" cy="448" r="18" fill="#8f1b3b"/>
    <circle cx="96" cy="450" r="17" fill="#6c1029"/>

    <circle cx="284" cy="430" r="22" fill="#7d1430"/>
    <circle cx="269" cy="448" r="18" fill="#8f1b3b"/>
    <circle cx="304" cy="450" r="17" fill="#6c1029"/>

    <path d="M 88 492 C 112 470 138 468 162 492" fill="none" stroke="#c8a14d" stroke-width="4"/>
    <path d="M 238 492 C 262 468 288 470 312 492" fill="none" stroke="#c8a14d" stroke-width="4"/>
  </g>

  <!-- ══ NAME PANEL BILINGÜE ══ -->
  <rect x="10" y="490" width="380" height="60" fill="#160607" opacity=".96"/>
  <line x1="10" y1="490" x2="390" y2="490" stroke="url(#pb-gold)" stroke-width="1.8" opacity=".78"/>
  <!-- ES -->
  <text x="100" y="508" text-anchor="middle"
        font-family="Georgia,'Times New Roman',serif"
        font-size="11" font-weight="bold" letter-spacing="1.2" fill="#f7e4b7" opacity=".98">PRECIOSÍSIMA</text>
  <text x="100" y="522" text-anchor="middle"
        font-family="Georgia,'Times New Roman',serif"
        font-size="11" font-weight="bold" letter-spacing="1.2" fill="#f7e4b7" opacity=".98">SANGRE</text>
  <text x="100" y="536" text-anchor="middle"
        font-family="Georgia,'Times New Roman',serif"
        font-size="8" letter-spacing="1.4" fill="#d4a44c" opacity=".88">1 DE JULIO</text>
  <!-- Divider -->
  <line x1="200" y1="496" x2="200" y2="544" stroke="url(#pb-gold)" stroke-width="0.9" opacity=".50"/>
  <!-- EN -->
  <text x="300" y="508" text-anchor="middle"
        font-family="Georgia,'Times New Roman',serif"
        font-size="11" font-weight="bold" letter-spacing="1.2" fill="#f7e4b7" opacity=".98">MOST PRECIOUS</text>
  <text x="300" y="522" text-anchor="middle"
        font-family="Georgia,'Times New Roman',serif"
        font-size="11" font-weight="bold" letter-spacing="1.2" fill="#f7e4b7" opacity=".98">BLOOD</text>
  <text x="300" y="536" text-anchor="middle"
        font-family="Georgia,'Times New Roman',serif"
        font-size="8" letter-spacing="1.4" fill="#d4a44c" opacity=".88">JULY 1</text>
  <!-- Tagline -->
  <text x="200" y="546" text-anchor="middle"
        font-family="Georgia,'Times New Roman',serif"
        font-size="7" letter-spacing="2.5" fill="#b87c28" opacity=".68">SANGUIS CHRISTI · BLOOD OF CHRIST</text>
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <defs>
    <style>
      @keyframes blink { 0%, 49%, 51%, 100% { opacity: 1; } 50% { opacity: 0.1; } }
      @keyframes glow { 0%, 100% { filter: drop-shadow(0 0 2px rgba(232, 201, 122, 0.4)); } 50% { filter: drop-shadow(0 0 5px rgba(232, 201, 122, 0.8)); } }
      @keyframes breathe { 0%, 100% { transform: scaleY(1); } 50% { transform: scaleY(1.02); } }
      .eye-left { animation: blink 4s infinite; }
      .eye-right { animation: blink 4s infinite 0.1s; }
      .symbol { animation: glow 2.5s infinite; transform-origin: center; }
      .body { animation: breathe 3s infinite; transform-origin: center 250px; }
    </style>
    <radialGradient id="bg" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#14070a"/>
      <stop offset="100%" stop-color="#070305"/>
    </radialGradient>
    <linearGradient id="r1" x1="50%" y1="0%" x2="10%" y2="100%">
      <stop offset="0%" stop-color="#a01818" stop-opacity="1"/>
      <stop offset="100%" stop-color="#4a0810" stop-opacity="0.42"/>
    </linearGradient>
    <linearGradient id="r2" x1="50%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#f5e060" stop-opacity="1"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="gl">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="600" fill="url(#bg)"/>

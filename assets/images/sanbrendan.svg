<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <defs>
    <radialGradient id="sb-bg" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#071018"/><stop offset="100%" stop-color="#040810"/>
    </radialGradient>
    <linearGradient id="sb-r1" x1="50%" y1="0%" x2="10%" y2="100%">
      <stop offset="0%" stop-color="#2870c8" stop-opacity="1"/><stop offset="100%" stop-color="#082050" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="sb-r2" x1="50%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#40d0c8" stop-opacity="1"/><stop offset="100%" stop-color="#1090a0" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="sb-gl"><feGaussianBlur stdDeviation="9" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="sb-g2"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="600" fill="url(#sb-bg)"/>
  <rect width="400" height="600" fill="#104060" opacity="0.12"/>
  <polygon points="198,265 -25,610 115,610" fill="url(#sb-r1)" filter="url(#sb-gl)" opacity="0.72"/>
  <polygon points="198,265 20,600  85,600"  fill="#2870c8" opacity="0.36"/>
  <polygon points="202,265 425,610 285,610" fill="url(#sb-r2)" filter="url(#sb-gl)" opacity="0.68"/>
  <polygon points="202,265 375,600 315,600" fill="#40d0c8" opacity="0.34"/>
  <!-- Blue monastic habit -->
  <path d="M168,155 Q140,205 126,390 Q200,415 274,390 Q260,205 232,155 Z" fill="#1a4a88" opacity="0.84"/>
  <!-- Darker blue mantle -->
  <path d="M168,155 Q124,192 108,318 Q122,330 148,312 Q150,228 178,168 Z" fill="#102050" opacity="0.85"/>
  <path d="M232,155 Q260,198 270,318 Q290,322 296,300 Q286,198 248,158 Z" fill="#102050" opacity="0.78"/>
  <!-- Left arm with oar -->
  <path d="M140,215 Q112,255 104,295" stroke="#1a4a88" stroke-width="17" fill="none" stroke-linecap="round" opacity="0.85"/>
  <!-- Right arm open -->
  <path d="M260,215 Q288,255 296,295" stroke="#102050" stroke-width="16" fill="none" stroke-linecap="round" opacity="0.80"/>
  <!-- Hands -->
  <ellipse cx="104" cy="298" rx="12" ry="15" fill="#c8a06a" opacity="0.9"/>
  <ellipse cx="296" cy="298" rx="12" ry="15" fill="#c8a06a" opacity="0.9"/>
  <!-- Oar -->
  <line x1="104" y1="298" x2="80"  y2="180" stroke="#6a4a28" stroke-width="5" stroke-opacity="0.82"/>
  <rect  x="74" y="174" width="12" height="26" rx="2" fill="#5a3a18" opacity="0.75"/>
  <!-- Small boat silhouette -->
  <path d="M130,460 Q200,445 270,460 Q270,475 130,475 Z" fill="#1a4a88" opacity="0.55"/>
  <path d="M145,460 L145,447" stroke="#6a4a28" stroke-width="2.5" opacity="0.6"/>
  <path d="M255,460 L255,447" stroke="#6a4a28" stroke-width="2.5" opacity="0.6"/>
  <!-- Neck + head (elder, white beard) -->
  <rect x="193" y="142" width="14" height="18" rx="4" fill="#c8a06a" opacity="0.9"/>
  <ellipse cx="200" cy="108" rx="27" ry="31" fill="#c8a06a" opacity="0.92"/>
  <path d="M173,107 Q176,72 200,68 Q224,72 227,107 Q219,88 200,86 Q181,88 173,107 Z" fill="#d8d8e0" opacity="0.75"/>
  <path d="M180,132 Q184,150 200,155 Q216,150 220,132 Q212,143 200,144 Q188,143 180,132 Z" fill="#d0d0d8" opacity="0.65"/>
  <!-- Halo -->
  <circle cx="200" cy="108" r="53" fill="none" stroke="#e8c97a" stroke-width="1.8" stroke-opacity="0.65" filter="url(#sb-g2)"/>
  <circle cx="200" cy="108" r="47" fill="none" stroke="#e8c97a" stroke-width="0.5" stroke-opacity="0.22"/>
  <!-- Frame -->
  <rect x="6" y="6" width="388" height="588" rx="8" fill="none" stroke="#c9a84c" stroke-width="1.2" stroke-opacity="0.5"/>
  <rect x="12" y="12" width="376" height="576" rx="5" fill="none" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.18"/>
  <!-- Panel -->
  <rect x="18" y="528" width="364" height="66" rx="6" fill="#040810" opacity="0.86"/>
  <line x1="46" y1="535" x2="354" y2="535" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.28"/>
  <text x="200" y="548" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#c9a84c" letter-spacing="3" opacity="0.9">SAN BRENDAN  ·  SAINT BRENDAN THE NAVIGATOR</text>
  <text x="200" y="567" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#60c0d8" font-style="italic">«San Brendan el Navegante»</text>
  <text x="200" y="585" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#40d0c8" font-style="italic" opacity="0.8">«Saint Brendan the Navigator»</text>

  <!-- Minimal facial features for visual consistency across intercessors -->
  <g id="tup-face-features" opacity="0.9">
    <ellipse id="tup-eye-left" cx="186" cy="108" rx="3.1" ry="2.2" fill="#2a1a12"/>
    <ellipse id="tup-eye-right" cx="214" cy="108" rx="3.1" ry="2.2" fill="#2a1a12"/>
    <path id="tup-nose" d="M200 112 C198 118, 198 120, 200 123" stroke="#7b4a35" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <path id="tup-mouth" d="M192 132 Q200 137 208 132" stroke="#8f3a3a" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  </g>
</svg>

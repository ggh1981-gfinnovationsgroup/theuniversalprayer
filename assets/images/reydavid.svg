<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <defs>
    <radialGradient id="rd-bg" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#14100a"/><stop offset="100%" stop-color="#060400"/>
    </radialGradient>
    <radialGradient id="rd-atm" cx="50%" cy="38%" r="46%">
      <stop offset="0%" stop-color="#c8a020" stop-opacity="0.22"/><stop offset="100%" stop-color="#c8a020" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rd-r1" x1="50%" y1="0%" x2="10%" y2="100%">
      <stop offset="0%" stop-color="#c8a020" stop-opacity="1"/><stop offset="100%" stop-color="#604808" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="rd-r2" x1="50%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#f5e060" stop-opacity="1"/><stop offset="100%" stop-color="#c9a84c" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="rd-gl"><feGaussianBlur stdDeviation="9" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="rd-g2"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="600" fill="url(#rd-bg)"/>
  <rect width="400" height="600" fill="url(#rd-atm)"/>
  <!-- Stars (night sky) -->
  <circle cx="60" cy="42" r="1.5" fill="#f0d060" opacity="0.7"/>
  <circle cx="122" cy="26" r="1" fill="#f0e080" opacity="0.6"/>
  <circle cx="280" cy="32" r="1" fill="#f0e080" opacity="0.5"/>
  <circle cx="350" cy="52" r="1.5" fill="#f0d060" opacity="0.6"/>
  <circle cx="40" cy="88" r="1" fill="#f0e080" opacity="0.5"/>
  <circle cx="372" cy="80" r="1" fill="#f0e080" opacity="0.6"/>
  <circle cx="335" cy="145" r="0.8" fill="#f0d060" opacity="0.5"/>
  <!-- Rays: amber left, bright gold right -->
  <polygon points="198,265 -25,610 115,610" fill="url(#rd-r1)" filter="url(#rd-gl)" opacity="0.68"/>
  <polygon points="198,265 20,600  85,600"  fill="#c8a020" opacity="0.34"/>
  <polygon points="202,265 425,610 285,610" fill="url(#rd-r2)" filter="url(#rd-gl)" opacity="0.70"/>
  <polygon points="202,265 375,600 315,600" fill="#f5e060" opacity="0.34"/>
  <!-- Royal mantle (gold/brown) left -->
  <path d="M160,162 Q118,202 108,345 Q124,356 148,348 Q152,252 165,182 Z" fill="#8a5a10" opacity="0.62"/>
  <!-- Royal mantle right -->
  <path d="M240,162 Q282,202 292,345 Q278,356 252,348 Q248,252 235,182 Z" fill="#8a5a10" opacity="0.58"/>
  <!-- Gold mantle trim -->
  <path d="M160,162 Q118,202 108,345" stroke="#c8a020" stroke-width="2.2" fill="none" opacity="0.65"/>
  <path d="M240,162 Q282,202 292,345" stroke="#c8a020" stroke-width="2.2" fill="none" opacity="0.58"/>
  <!-- Robe body (dark royal brown/red) -->
  <path d="M160,162 Q140,210 130,462 Q162,478 200,480 Q238,478 270,462 Q260,210 240,162 Q220,176 200,178 Q180,176 160,162 Z" fill="#4a2808" opacity="0.95"/>
  <!-- Robe highlight -->
  <path d="M174,165 Q156,218 148,444 Q174,462 200,464 Q186,225 180,168 Z" fill="#6a3810" opacity="0.42"/>
  <!-- Gold belt/sash -->
  <rect x="143" y="300" width="114" height="10" rx="4" fill="#c8a020" opacity="0.82"/>
  <!-- Left arm (holds harp) -->
  <path d="M160,195 Q122,238 112,305 Q124,315 138,308 Q146,265 162,214 Z" fill="#4a2808" opacity="0.92"/>
  <!-- Harp (left side) -->
  <g transform="translate(100,272)">
    <path d="M8,76 Q4,38 18,5 Q46,-8 60,10 L50,80 Z" fill="#6a4010" stroke="#8a5810" stroke-width="1.2"/>
    <line x1="8" y1="76" x2="18" y2="5" stroke="#8a5810" stroke-width="3.5"/>
    <path d="M18,5 Q50,-12 60,10" stroke="#8a5810" stroke-width="3" fill="none"/>
    <line x1="20" y1="7" x2="50" y2="78" stroke="#f0d060" stroke-width="0.8" opacity="0.9"/>
    <line x1="27" y1="5" x2="51" y2="74" stroke="#f0d060" stroke-width="0.8" opacity="0.8"/>
    <line x1="35" y1="3" x2="51" y2="70" stroke="#f0d060" stroke-width="0.8" opacity="0.8"/>
    <line x1="44" y1="2" x2="50" y2="65" stroke="#f0d060" stroke-width="0.8" opacity="0.7"/>
    <line x1="53" y1="3" x2="50" y2="60" stroke="#f0d060" stroke-width="0.8" opacity="0.7"/>
    <line x1="60" y1="10" x2="49" y2="54" stroke="#f0d060" stroke-width="0.8" opacity="0.6"/>
  </g>
  <!-- Left hand -->
  <ellipse cx="118" cy="308" rx="13" ry="9" fill="#c89060" opacity="0.88"/>
  <!-- Right arm (holds scroll) -->
  <path d="M240,195 Q278,238 288,305 Q276,315 262,308 Q254,265 238,214 Z" fill="#4a2808" opacity="0.92"/>
  <!-- Scroll (right side) -->
  <g transform="translate(236,275)">
    <rect x="0" y="0" width="52" height="62" rx="3" fill="#e8d8a0"/>
    <rect x="-4" y="-3" width="60" height="8" rx="4" fill="#c8a060"/>
    <rect x="-4" y="57" width="60" height="8" rx="4" fill="#c8a060"/>
    <line x1="6" y1="14" x2="46" y2="14" stroke="#6a4010" stroke-width="1" opacity="0.55"/>
    <line x1="6" y1="21" x2="46" y2="21" stroke="#6a4010" stroke-width="1" opacity="0.5"/>
    <line x1="6" y1="28" x2="46" y2="28" stroke="#6a4010" stroke-width="1" opacity="0.45"/>
    <line x1="6" y1="35" x2="46" y2="35" stroke="#6a4010" stroke-width="1" opacity="0.4"/>
    <text x="26" y="10" text-anchor="middle" font-family="Georgia,serif" font-size="5.5" fill="#3a2000" opacity="0.8">Ps 23</text>
  </g>
  <!-- Right hand -->
  <ellipse cx="280" cy="308" rx="13" ry="9" fill="#c89060" opacity="0.88"/>
  <!-- Crown (above head) -->
  <rect x="162" y="70" width="76" height="14" rx="2" fill="#c8a020"/>
  <rect x="165" y="72" width="70" height="10" rx="2" fill="#b88a10"/>
  <polygon points="172,70 177,52 182,70" fill="#c8a020"/>
  <polygon points="197,70 202,48 207,70" fill="#d4b030"/>
  <polygon points="218,70 223,52 228,70" fill="#c8a020"/>
  <circle cx="179" cy="59" r="2.5" fill="#e04040" opacity="0.9"/>
  <circle cx="202" cy="56" r="3" fill="#4080e0" opacity="0.9"/>
  <circle cx="225" cy="59" r="2.5" fill="#40c040" opacity="0.9"/>
  <!-- Neck -->
  <rect x="193" y="138" width="14" height="18" rx="4" fill="#c89060" opacity="0.88"/>
  <!-- Head -->
  <ellipse cx="200" cy="108" rx="27" ry="32" fill="#d4a870" opacity="0.92"/>
  <!-- Hair (dark, mature king) -->
  <path d="M174,104 Q176,68 200,62 Q224,68 226,104 Q220,82 200,80 Q180,82 174,104 Z" fill="#2a1800" opacity="0.88"/>
  <ellipse cx="173" cy="116" rx="8" ry="18" fill="#2a1800" opacity="0.72"/>
  <ellipse cx="227" cy="116" rx="8" ry="18" fill="#2a1800" opacity="0.72"/>
  <!-- Beard -->
  <path d="M178,124 Q178,148 200,156 Q222,148 222,124 Q214,136 200,138 Q186,136 178,124 Z" fill="#2a1800" opacity="0.68"/>
  <!-- Eyes -->
  <ellipse cx="190" cy="105" rx="5" ry="4" fill="#1a0800"/>
  <ellipse cx="210" cy="105" rx="5" ry="4" fill="#1a0800"/>
  <circle cx="191" cy="104" r="1.5" fill="#ffffff" opacity="0.5"/>
  <circle cx="211" cy="104" r="1.5" fill="#ffffff" opacity="0.5"/>
  <!-- Halo: two thin gold rings (not filled) -->
  <circle cx="200" cy="108" r="53" fill="none" stroke="#e8c97a" stroke-width="1.8" stroke-opacity="0.65" filter="url(#rd-g2)"/>
  <circle cx="200" cy="108" r="47" fill="none" stroke="#e8c97a" stroke-width="0.5" stroke-opacity="0.22"/>
  <!-- Star of David faint background motif -->
  <g opacity="0.06" transform="translate(200,400)">
    <polygon points="0,-42 8,-14 36,-14 12,5 20,32 0,16 -20,32 -12,5 -36,-14 -8,-14" fill="#f0d060"/>
    <polygon points="0,42 -8,14 -36,14 -12,-5 -20,-32 0,-16 20,-32 12,-5 36,14 8,14" fill="#f0d060"/>
  </g>
  <!-- Double golden frame -->
  <rect x="6" y="6" width="388" height="588" rx="8" fill="none" stroke="#c9a84c" stroke-width="1.2" stroke-opacity="0.5"/>
  <rect x="12" y="12" width="376" height="576" rx="5" fill="none" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.18"/>
  <!-- Panel -->
  <rect x="18" y="528" width="364" height="66" rx="6" fill="#060400" opacity="0.88"/>
  <line x1="46" y1="535" x2="354" y2="535" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.28"/>
  <text x="200" y="548" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#c9a84c" letter-spacing="3" opacity="0.9">REY DAVID · KING DAVID</text>
  <text x="200" y="567" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#f0d060" font-style="italic">«Profeta y Salmista»</text>
  <text x="200" y="585" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#c8a020" font-style="italic" opacity="0.8">«Prophet and Psalmist»</text>
</svg>

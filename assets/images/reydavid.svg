<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">
  <defs>
    <radialGradient id="skyrd" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#2a1a00"/>
      <stop offset="55%" stop-color="#1a0f00"/>
      <stop offset="100%" stop-color="#0a0800"/>
    </radialGradient>
    <radialGradient id="gloryrd" cx="50%" cy="42%" r="32%">
      <stop offset="0%" stop-color="#c8a020" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#8a6010" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#2a1a00" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="halord" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0d060"/>
      <stop offset="60%" stop-color="#c8a020"/>
      <stop offset="100%" stop-color="#8a6010"/>
    </radialGradient>
    <radialGradient id="facerd" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#e8c08a"/>
      <stop offset="100%" stop-color="#c89060"/>
    </radialGradient>
    <linearGradient id="roberd" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6a3a00"/>
      <stop offset="100%" stop-color="#3a1a00"/>
    </linearGradient>
    <linearGradient id="mantlerd" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8a5a10"/>
      <stop offset="100%" stop-color="#5a3800"/>
    </linearGradient>
    <linearGradient id="panelrd" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e1200"/>
      <stop offset="100%" stop-color="#0a0800"/>
    </linearGradient>
  </defs>

  <!-- Background — night sky -->
  <rect width="400" height="600" fill="url(#skyrd)"/>
  <circle cx="200" cy="250" r="130" fill="url(#gloryrd)"/>

  <!-- Stars in the sky -->
  <circle cx="60" cy="40" r="1.5" fill="#f0d060" opacity="0.9"/>
  <circle cx="120" cy="25" r="1" fill="#f0e080" opacity="0.8"/>
  <circle cx="200" cy="15" r="1.5" fill="#f0d060" opacity="0.9"/>
  <circle cx="280" cy="30" r="1" fill="#f0e080" opacity="0.7"/>
  <circle cx="350" cy="50" r="1.5" fill="#f0d060" opacity="0.8"/>
  <circle cx="40" cy="90" r="1" fill="#f0e080" opacity="0.6"/>
  <circle cx="370" cy="110" r="1" fill="#f0e080" opacity="0.7"/>
  <circle cx="90" cy="130" r="0.8" fill="#f0d060" opacity="0.5"/>
  <circle cx="330" cy="80" r="0.8" fill="#f0d060" opacity="0.6"/>

  <!-- Star of David (background, large) -->
  <g opacity="0.08" transform="translate(200,260)">
    <polygon points="0,-55 10,-18 48,-18 17,7 27,44 0,22 -27,44 -17,7 -48,-18 -10,-18" fill="#f0d060"/>
    <polygon points="0,55 -10,18 -48,18 -17,-7 -27,-44 0,-22 27,-44 17,-7 48,18 10,18" fill="#f0d060"/>
  </g>

  <!-- Halo -->
  <circle cx="200" cy="145" r="55" fill="url(#halord)" opacity="0.92"/>
  <circle cx="200" cy="145" r="50" fill="none" stroke="#f0d060" stroke-width="2.5" opacity="0.7"/>
  <!-- Star of David on halo -->
  <g opacity="0.45" transform="translate(200,145)">
    <polygon points="0,-18 3.5,-6 16,-6 6,2 9,15 0,8 -9,15 -6,2 -16,-6 -3.5,-6" fill="none" stroke="#f0d060" stroke-width="1"/>
    <polygon points="0,18 -3.5,6 -16,6 -6,-2 -9,-15 0,-8 9,-15 6,-2 16,6 3.5,6" fill="none" stroke="#f0d060" stroke-width="1"/>
  </g>

  <!-- Crown (royal crown above head) -->
  <!-- Crown base -->
  <rect x="155" y="82" width="90" height="18" rx="3" fill="#c8a020"/>
  <rect x="158" y="85" width="84" height="12" rx="2" fill="#b88a10"/>
  <!-- Crown points -->
  <polygon points="170,82 175,62 180,82" fill="#c8a020"/>
  <polygon points="195,82 200,58 205,82" fill="#d4b030"/>
  <polygon points="220,82 225,62 230,82" fill="#c8a020"/>
  <!-- Gemstones on crown -->
  <circle cx="177" cy="70" r="3" fill="#e04040" opacity="0.9"/>
  <circle cx="200" cy="66" r="4" fill="#4080e0" opacity="0.9"/>
  <circle cx="223" cy="70" r="3" fill="#40c040" opacity="0.9"/>
  <!-- Crown band gems -->
  <circle cx="168" cy="91" r="2" fill="#e0c040" opacity="0.8"/>
  <circle cx="182" cy="91" r="2" fill="#c04040" opacity="0.8"/>
  <circle cx="200" cy="91" r="2.5" fill="#e0c040" opacity="0.9"/>
  <circle cx="218" cy="91" r="2" fill="#c04040" opacity="0.8"/>
  <circle cx="232" cy="91" r="2" fill="#e0c040" opacity="0.8"/>

  <!-- Face -->
  <ellipse cx="200" cy="158" rx="36" ry="42" fill="url(#facerd)"/>

  <!-- Hair and beard — dark with grey highlights (mature king) -->
  <!-- Side hair -->
  <ellipse cx="168" cy="155" rx="10" ry="22" fill="#2a1800"/>
  <ellipse cx="232" cy="155" rx="10" ry="22" fill="#2a1800"/>
  <!-- Beard -->
  <path d="M175 175 Q180 205 200 215 Q220 205 225 175" fill="#2a1800"/>
  <path d="M180 175 Q184 198 200 208 Q216 198 220 175" fill="#3a2200"/>
  <!-- Mustache -->
  <path d="M183 178 Q200 186 217 178" stroke="#2a1800" stroke-width="3" fill="none"/>
  <!-- Grey highlights in beard -->
  <path d="M192 190 Q195 205 200 210" stroke="#8a7050" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M208 190 Q205 205 200 210" stroke="#8a7050" stroke-width="1.5" fill="none" opacity="0.5"/>

  <!-- Eyes -->
  <ellipse cx="188" cy="152" rx="5" ry="4" fill="#1a0800"/>
  <ellipse cx="212" cy="152" rx="5" ry="4" fill="#1a0800"/>
  <circle cx="189" cy="151" r="1.5" fill="#fff" opacity="0.6"/>
  <circle cx="213" cy="151" r="1.5" fill="#fff" opacity="0.6"/>
  <!-- Eyebrows (strong, older king) -->
  <path d="M182 145 Q188 141 194 144" stroke="#2a1800" stroke-width="2.5" fill="none"/>
  <path d="M206 144 Q212 141 218 145" stroke="#2a1800" stroke-width="2.5" fill="none"/>
  <!-- Nose -->
  <path d="M198 157 Q196 168 198 172 Q200 174 202 172 Q204 168 202 157" fill="#c89060" opacity="0.5"/>

  <!-- Royal robe (upper body) -->
  <path d="M140 220 Q160 210 200 208 Q240 210 260 220 L270 380 Q200 395 130 380 Z" fill="url(#roberd)"/>
  <!-- Mantle / royal cloak -->
  <path d="M110 230 Q130 215 160 210 L155 360 Q120 370 105 340 Z" fill="url(#mantlerd)"/>
  <path d="M290 230 Q270 215 240 210 L245 360 Q280 370 295 340 Z" fill="url(#mantlerd)"/>
  <!-- Mantle trim (gold) -->
  <path d="M110 230 Q130 215 160 210" stroke="#c8a020" stroke-width="2.5" fill="none"/>
  <path d="M290 230 Q270 215 240 210" stroke="#c8a020" stroke-width="2.5" fill="none"/>

  <!-- Belt / sash (gold) -->
  <rect x="140" y="295" width="120" height="10" rx="4" fill="#c8a020" opacity="0.85"/>

  <!-- Harp (left hand) — iconic instrument of the Psalmist -->
  <g transform="translate(105, 270)">
    <!-- Harp body -->
    <path d="M10 80 Q5 40 20 5 Q50 -10 65 10 L55 85 Z" fill="#6a4010" stroke="#8a5810" stroke-width="1.5"/>
    <!-- Harp pillar -->
    <line x1="10" y1="80" x2="20" y2="5" stroke="#8a5810" stroke-width="4"/>
    <!-- Harp neck -->
    <path d="M20 5 Q55 -15 65 10" stroke="#8a5810" stroke-width="3.5" fill="none"/>
    <!-- Strings -->
    <line x1="22" y1="8" x2="55" y2="82" stroke="#f0d060" stroke-width="0.8" opacity="0.9"/>
    <line x1="28" y1="6" x2="56" y2="80" stroke="#f0d060" stroke-width="0.8" opacity="0.9"/>
    <line x1="35" y1="4" x2="57" y2="77" stroke="#f0d060" stroke-width="0.8" opacity="0.8"/>
    <line x1="43" y1="3" x2="57" y2="74" stroke="#f0d060" stroke-width="0.8" opacity="0.8"/>
    <line x1="52" y1="3" x2="57" y2="70" stroke="#f0d060" stroke-width="0.8" opacity="0.7"/>
    <line x1="61" y1="6" x2="56" y2="65" stroke="#f0d060" stroke-width="0.8" opacity="0.7"/>
    <line x1="65" y1="12" x2="55" y2="60" stroke="#f0d060" stroke-width="0.8" opacity="0.6"/>
  </g>

  <!-- Scroll / psalm (right hand) -->
  <g transform="translate(235, 280)">
    <!-- Scroll body -->
    <rect x="0" y="0" width="55" height="65" rx="3" fill="#e8d8a0"/>
    <!-- Scroll ends -->
    <rect x="-4" y="-3" width="63" height="8" rx="4" fill="#c8a060"/>
    <rect x="-4" y="60" width="63" height="8" rx="4" fill="#c8a060"/>
    <!-- Text lines on scroll -->
    <line x1="6" y1="15" x2="49" y2="15" stroke="#6a4010" stroke-width="1" opacity="0.6"/>
    <line x1="6" y1="22" x2="49" y2="22" stroke="#6a4010" stroke-width="1" opacity="0.5"/>
    <line x1="6" y1="29" x2="49" y2="29" stroke="#6a4010" stroke-width="1" opacity="0.5"/>
    <line x1="6" y1="36" x2="49" y2="36" stroke="#6a4010" stroke-width="1" opacity="0.5"/>
    <line x1="6" y1="43" x2="49" y2="43" stroke="#6a4010" stroke-width="1" opacity="0.4"/>
    <line x1="6" y1="50" x2="49" y2="50" stroke="#6a4010" stroke-width="1" opacity="0.4"/>
    <!-- Psalm 23 reference -->
    <text x="27" y="10" text-anchor="middle" font-family="Georgia,serif" font-size="5.5" fill="#3a2000" opacity="0.8">Ps 23</text>
  </g>

  <!-- Lower robe / legs -->
  <path d="M155 370 L148 510 L175 510 L200 430 L225 510 L252 510 L245 370 Z" fill="#3a1a00"/>
  <!-- Robe fold lines -->
  <line x1="172" y1="370" x2="168" y2="430" stroke="#5a2a00" stroke-width="1" opacity="0.5"/>
  <line x1="200" y1="370" x2="200" y2="440" stroke="#5a2a00" stroke-width="1" opacity="0.5"/>
  <line x1="228" y1="370" x2="232" y2="430" stroke="#5a2a00" stroke-width="1" opacity="0.5"/>

  <!-- Sandals / feet suggestion -->
  <ellipse cx="162" cy="512" rx="20" ry="7" fill="#2a1800"/>
  <ellipse cx="238" cy="512" rx="20" ry="7" fill="#2a1800"/>

  <!-- Ground / Jerusalem stone suggestion -->
  <rect x="0" y="510" width="400" height="90" fill="#1a1000" opacity="0.7"/>
  <!-- Stone floor pattern -->
  <line x1="0" y1="520" x2="400" y2="520" stroke="#3a2800" stroke-width="1" opacity="0.5"/>
  <line x1="0" y1="535" x2="400" y2="535" stroke="#3a2800" stroke-width="1" opacity="0.3"/>
  <line x1="80" y1="510" x2="80" y2="540" stroke="#3a2800" stroke-width="1" opacity="0.4"/>
  <line x1="200" y1="510" x2="200" y2="540" stroke="#3a2800" stroke-width="1" opacity="0.4"/>
  <line x1="320" y1="510" x2="320" y2="540" stroke="#3a2800" stroke-width="1" opacity="0.4"/>

  <!-- Name panel (bilingual, required) -->
  <rect x="18" y="528" width="364" height="66" rx="6" fill="url(#panelrd)" opacity="0.92"/>
  <rect x="18" y="528" width="364" height="66" rx="6" fill="none" stroke="#c8a020" stroke-width="1" opacity="0.5"/>
  <text x="200" y="548" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#c9a030" letter-spacing="3" opacity="0.95">REY DAVID  ·  KING DAVID</text>
  <text x="200" y="567" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#f0d060" font-style="italic">«Profeta y Salmista»</text>
  <text x="200" y="585" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#c8a020" font-style="italic" opacity="0.85">«Prophet and Psalmist»</text>
</svg>

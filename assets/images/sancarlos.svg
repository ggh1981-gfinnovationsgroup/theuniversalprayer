<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="carlos-bg" cx="50%" cy="38%" r="60%">
      <stop offset="0%" stop-color="#1a0505"/>
      <stop offset="100%" stop-color="#080202"/>
    </radialGradient>
    <radialGradient id="carlos-glow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="rgba(140,40,25,0.22)"/>
      <stop offset="100%" stop-color="rgba(140,40,25,0)"/>
    </radialGradient>
  </defs>

  <!-- Background: cardinal red -->
  <rect width="800" height="600" fill="url(#carlos-bg)"/>
  <rect width="800" height="600" fill="url(#carlos-glow)"/>

  <!-- Border -->
  <rect x="28" y="28" width="744" height="544" rx="6" fill="none" stroke="#8a2a1a" stroke-width="1" stroke-opacity="0.60"/>
  <rect x="36" y="36" width="728" height="528" rx="4" fill="none" stroke="#8a2a1a" stroke-width="0.5" stroke-opacity="0.28"/>

  <!-- Side accent strips -->
  <rect x="28" y="28" width="6" height="544" rx="3" fill="#8a2a1a" opacity="0.70"/>
  <rect x="766" y="28" width="6" height="544" rx="3" fill="#8a2a1a" opacity="0.70"/>

  <!-- Cardinal galero (wide-brimmed hat) at top center -->
  <!-- Brim of galero -->
  <ellipse cx="400" cy="200" rx="170" ry="35" fill="#8a1a1a" stroke="#c9a84c" stroke-width="1.5" opacity="0.92"/>
  <!-- Crown of galero -->
  <path d="M 310 200 Q 320 145 400 138 Q 480 145 490 200 Z" fill="#8a1a1a" stroke="#c9a84c" stroke-width="1.5" opacity="0.92"/>
  <!-- Galero top button -->
  <circle cx="400" cy="138" r="7" fill="#c9a84c" opacity="0.80"/>
  <!-- Hat band detail -->
  <ellipse cx="400" cy="200" rx="165" ry="30" fill="none" stroke="#c9a84c" stroke-width="0.8" opacity="0.35"/>
  <!-- Tassels hanging from galero (3 on each side) -->
  <!-- Left tassels -->
  <line x1="245" y1="205" x2="230" y2="265" stroke="#c9a84c" stroke-width="1.2" opacity="0.70"/>
  <circle cx="230" cy="272" r="5" fill="#c9a84c" opacity="0.70"/>
  <line x1="235" y1="210" x2="210" y2="295" stroke="#c9a84c" stroke-width="1.2" opacity="0.60"/>
  <circle cx="210" cy="302" r="5" fill="#c9a84c" opacity="0.60"/>
  <line x1="230" y1="218" x2="195" y2="325" stroke="#c9a84c" stroke-width="1.2" opacity="0.50"/>
  <circle cx="195" cy="332" r="5" fill="#c9a84c" opacity="0.50"/>
  <!-- Right tassels -->
  <line x1="555" y1="205" x2="570" y2="265" stroke="#c9a84c" stroke-width="1.2" opacity="0.70"/>
  <circle cx="570" cy="272" r="5" fill="#c9a84c" opacity="0.70"/>
  <line x1="565" y1="210" x2="590" y2="295" stroke="#c9a84c" stroke-width="1.2" opacity="0.60"/>
  <circle cx="590" cy="302" r="5" fill="#c9a84c" opacity="0.60"/>
  <line x1="570" y1="218" x2="605" y2="325" stroke="#c9a84c" stroke-width="1.2" opacity="0.50"/>
  <circle cx="605" cy="332" r="5" fill="#c9a84c" opacity="0.50"/>

  <!-- Pectoral cross hanging below galero -->
  <!-- Cross vertical bar -->
  <rect x="394" y="245" width="12" height="80" rx="3" fill="#c9a84c" opacity="0.88"/>
  <!-- Cross horizontal bar -->
  <rect x="374" y="270" width="52" height="10" rx="3" fill="#c9a84c" opacity="0.88"/>
  <!-- Cross center jewel -->
  <circle cx="400" cy="275" r="7" fill="#8a1a1a" stroke="#c9a84c" stroke-width="1.5" opacity="0.88"/>

  <!-- Chain for cross -->
  <path d="M 400 200 Q 405 230 400 245" fill="none" stroke="#c9a84c" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.50"/>

  <!-- Coat of arms shield suggestion at bottom center -->
  <!-- Shield outline -->
  <path d="M 360 355 L 360 395 Q 360 420 400 435 Q 440 420 440 395 L 440 355 Z" fill="none" stroke="#8a2a1a" stroke-width="1.5" opacity="0.55"/>
  <path d="M 365 360 L 365 395 Q 365 415 400 428 Q 435 415 435 395 L 435 360 Z" fill="#0d0303" stroke="#8a2a1a" stroke-width="0.8" opacity="0.60"/>
  <!-- Small cross inside shield -->
  <line x1="400" y1="370" x2="400" y2="418" stroke="#8a2a1a" stroke-width="2" opacity="0.50"/>
  <line x1="381" y1="387" x2="419" y2="387" stroke="#8a2a1a" stroke-width="2" opacity="0.50"/>

  <!-- Decorative cross corners -->
  <line x1="90" y1="72" x2="90" y2="95" stroke="#8a2a1a" stroke-width="1.5" opacity="0.38"/>
  <line x1="78" y1="83" x2="102" y2="83" stroke="#8a2a1a" stroke-width="1.5" opacity="0.38"/>
  <line x1="710" y1="72" x2="710" y2="95" stroke="#8a2a1a" stroke-width="1.5" opacity="0.38"/>
  <line x1="698" y1="83" x2="722" y2="83" stroke="#8a2a1a" stroke-width="1.5" opacity="0.38"/>

  <!-- Name text -->
  <text x="400" y="498" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#e8c97a" letter-spacing="1">San Carlos Borromeo</text>
  <text x="400" y="520" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#c9a84c" font-style="italic" opacity="0.85">Saint Charles Borromeo</text>
  <text x="400" y="546" text-anchor="middle" font-family="Lato, sans-serif" font-size="11" fill="#5a1a0a" letter-spacing="2.5">4 DE NOV · NOV 4</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <defs>
    <radialGradient id="skc-bg" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#180808"/><stop offset="100%" stop-color="#0c0404"/>
    </radialGradient>
    <linearGradient id="skc-r1" x1="50%" y1="0%" x2="10%" y2="100%">
      <stop offset="0%" stop-color="#c83030" stop-opacity="1"/><stop offset="100%" stop-color="#601010" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="skc-r2" x1="50%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#f5e060" stop-opacity="1"/><stop offset="100%" stop-color="#c9a84c" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="skc-gl"><feGaussianBlur stdDeviation="9" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="skc-g2"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="600" fill="url(#skc-bg)"/>
  <rect width="400" height="600" fill="#500818" opacity="0.12"/>
  <polygon points="198,265 -25,610 115,610" fill="url(#skc-r1)" filter="url(#skc-gl)" opacity="0.72"/>
  <polygon points="198,265 20,600  85,600"  fill="#c83030" opacity="0.36"/>
  <polygon points="202,265 425,610 285,610" fill="url(#skc-r2)" filter="url(#skc-gl)" opacity="0.70"/>
  <polygon points="202,265 375,600 315,600" fill="#f5e060" opacity="0.34"/>
  <!-- Cardinal/bishop red vestment (chasuble) -->
  <path d="M172,155 Q144,205 128,390 Q200,415 272,390 Q256,205 228,155 Z" fill="#c02020" opacity="0.82"/>
  <!-- White alba under -->
  <path d="M178,155 Q158,200 148,380 Q200,398 252,380 Q242,200 222,155 Z" fill="#f8f0f0" opacity="0.20"/>
  <!-- Red mantle sides -->
  <path d="M168,155 Q122,192 108,318 Q122,330 148,312 Q148,228 175,165 Z" fill="#a01818" opacity="0.84"/>
  <path d="M232,155 Q262,198 268,318 Q290,322 296,300 Q288,198 246,160 Z" fill="#a01818" opacity="0.78"/>
  <!-- Left arm blessing (bishop) -->
  <path d="M145,200 Q115,240 108,278" stroke="#c02020" stroke-width="18" fill="none" stroke-linecap="round" opacity="0.86"/>
  <!-- Right arm with book -->
  <path d="M255,200 Q285,235 290,275" stroke="#a01818" stroke-width="17" fill="none" stroke-linecap="round" opacity="0.82"/>
  <!-- Hands -->
  <ellipse cx="107" cy="280" rx="12" ry="15" fill="#d4a06a" opacity="0.9"/>
  <ellipse cx="291" cy="278" rx="12" ry="15" fill="#d4a06a" opacity="0.9"/>
  <!-- Pectoral cross -->
  <line x1="200" y1="200" x2="200" y2="228" stroke="#f5e060" stroke-width="2.5" opacity="0.75"/>
  <line x1="192" y1="210" x2="208" y2="210" stroke="#f5e060" stroke-width="2.5" opacity="0.75"/>
  <!-- Book (right) -->
  <rect x="280" y="267" width="22" height="18" rx="2" fill="#f8f0d8" opacity="0.88"/>
  <path d="M282,273 L300,273" stroke="#c8a870" stroke-width="1" opacity="0.5"/>
  <!-- Mitre (bishop hat) above halo -->
  <path d="M178,60 L178,32 Q200,18 222,32 L222,60 L200,48 Z" fill="#c02020" opacity="0.70"/>
  <line x1="200" y1="48" x2="200" y2="20" stroke="#f5e060" stroke-width="1.5" opacity="0.55"/>
  <!-- Neck + head -->
  <rect x="193" y="142" width="14" height="18" rx="4" fill="#d4a06a" opacity="0.9"/>
  <ellipse cx="200" cy="108" rx="27" ry="31" fill="#d4a06a" opacity="0.92"/>
  <path d="M173,107 Q176,72 200,68 Q224,72 227,107 Q219,88 200,86 Q181,88 173,107 Z" fill="#3a2010" opacity="0.85"/>
  <!-- Halo -->
  <circle cx="200" cy="108" r="53" fill="none" stroke="#e8c97a" stroke-width="1.8" stroke-opacity="0.65" filter="url(#skc-g2)"/>
  <circle cx="200" cy="108" r="47" fill="none" stroke="#e8c97a" stroke-width="0.5" stroke-opacity="0.22"/>
  <!-- Frame -->
  <rect x="6" y="6" width="388" height="588" rx="8" fill="none" stroke="#c9a84c" stroke-width="1.2" stroke-opacity="0.5"/>
  <rect x="12" y="12" width="376" height="576" rx="5" fill="none" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.18"/>
  <!-- Panel -->
  <rect x="18" y="528" width="364" height="66" rx="6" fill="#0c0404" opacity="0.86"/>
  <line x1="46" y1="535" x2="354" y2="535" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.28"/>
  <text x="200" y="548" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#c9a84c" letter-spacing="3" opacity="0.9">SAN CARLOS BORROMEO  ·  SAINT CHARLES BORROMEO</text>
  <text x="200" y="567" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#f08080" font-style="italic">«San Carlos Borromeo»</text>
  <text x="200" y="585" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#f5e060" font-style="italic" opacity="0.8">«Saint Charles Borromeo»</text>

  <!-- Minimal facial features for visual consistency across intercessors -->
  <g id="tup-face-features" opacity="0.9">
    <ellipse id="tup-eye-left" cx="186" cy="108" rx="3.1" ry="2.2" fill="#2a1a12"/>
    <ellipse id="tup-eye-right" cx="214" cy="108" rx="3.1" ry="2.2" fill="#2a1a12"/>
    <path id="tup-nose" d="M200 112 C198 118, 198 120, 200 123" stroke="#7b4a35" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <path id="tup-mouth" d="M192 132 Q200 137 208 132" stroke="#8f3a3a" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  </g>
</svg>

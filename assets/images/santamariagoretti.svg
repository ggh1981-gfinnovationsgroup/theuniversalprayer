<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560" width="400" height="560" role="img" aria-label="Santa Maria Goretti - Ruega por nosotros / Pray for us">
  <defs>
    <linearGradient id="mg-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f5ea4"/>
      <stop offset="58%" stop-color="#3f8fca"/>
      <stop offset="100%" stop-color="#72bde9"/>
    </linearGradient>

    <radialGradient id="mg-aura" cx="50%" cy="42%" r="52%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.74"/>
      <stop offset="45%" stop-color="#c8e7ff" stop-opacity="0.34"/>
      <stop offset="100%" stop-color="#3f8fca" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="mg-rayL" x1="0" y1="0" x2="1" y2="1">

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" role="img" aria-labelledby="title desc">
  <title id="title">San Eduardo el Confesor</title>
  <desc id="desc">Icono devocional de San Eduardo con corona, cruz y manto real.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1d3557"/>
      <stop offset="100%" stop-color="#0b1d33"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7e6b2"/>
      <stop offset="100%" stop-color="#c89f42"/>
    </linearGradient>
    <radialGradient id="skin" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#f3d2b2"/>
      <stop offset="100%" stop-color="#c58a5d"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="400" height="600" fill="url(#bg)"/>
  <circle cx="200" cy="190" r="105" fill="none" stroke="url(#gold)" stroke-opacity="0.55" stroke-width="2"/>

  <path d="M125 510c2-118 10-238 75-283 64 45 73 165 75 283H125z" fill="#4f2f2e"/>
  <path d="M145 510c3-98 15-178 55-226 41 48 52 128 55 226H145z" fill="#8b1733"/>
  <path d="M150 248c12-20 30-32 50-32s38 12 50 32" fill="none" stroke="#6f2238" stroke-width="22" stroke-linecap="round"/>

  <ellipse cx="200" cy="170" rx="39" ry="47" fill="url(#skin)"/>
  <rect x="185" y="208" width="30" height="26" rx="10" fill="url(#skin)"/>
  <path d="M170 146c8-7 18-10 30-10s22 3 30 10" stroke="#342014" stroke-width="2" fill="none" stroke-linecap="round"/>
  <ellipse cx="186" cy="168" rx="4.5" ry="3.8" fill="#15110f"/>
  <ellipse cx="214" cy="168" rx="4.5" ry="3.8" fill="#15110f"/>
  <path d="M192 189c5 5 11 5 16 0" stroke="#8f5f43" stroke-width="2" fill="none" stroke-linecap="round"/>

  <path d="M150 145c7-30 24-52 50-52s43 22 50 52" fill="#3b261d"/>

  <path d="M150 135h100l-8 21H158z" fill="url(#gold)" stroke="#a67d2f" stroke-width="2"/>
  <circle cx="168" cy="145" r="4" fill="#fff1cd"/>
  <circle cx="200" cy="145" r="4" fill="#fff1cd"/>
  <circle cx="232" cy="145" r="4" fill="#fff1cd"/>

  <rect x="186" y="272" width="28" height="86" rx="8" fill="#2f3449" stroke="#c6a247" stroke-opacity="0.55"/>
  <path d="M200 283v64M182 315h36" stroke="url(#gold)" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>

  <path d="M108 350c20 15 52 30 92 30s72-15 92-30" stroke="#5f0f25" stroke-width="16" stroke-linecap="round" fill="none"/>
  <circle cx="110" cy="353" r="11" fill="url(#skin)"/>
  <circle cx="290" cy="353" r="11" fill="url(#skin)"/>

  <rect x="22" y="520" width="356" height="68" rx="8" fill="#08152a" opacity="0.93"/>
  <text x="200" y="540" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#e6c783" letter-spacing="1.3">SAN EDUARDO EL CONFESOR · SAINT EDWARD THE CONFESSOR</text>
  <text x="200" y="558" text-anchor="middle" font-family="Georgia,serif" font-size="11.6" fill="#a7cdf6" font-style="italic">"Rey justo y siervo de Dios"</text>
  <text x="200" y="576" text-anchor="middle" font-family="Georgia,serif" font-size="10.6" fill="#f0cc72" font-style="italic" opacity="0.9">"Just king and servant of God"</text>

  <rect x="8" y="8" width="384" height="584" rx="8" fill="none" stroke="#cbaa68" stroke-opacity="0.48"/>
</svg>

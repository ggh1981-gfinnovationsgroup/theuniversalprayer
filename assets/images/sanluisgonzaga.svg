<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560" width="400" height="560">
  <defs>
    <!-- Background: deep midnight blue, Jesuit night -->
    <linearGradient id="slg-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#04060f"/>
      <stop offset="100%" stop-color="#080c1a"/>
    </linearGradient>
    <!-- Ray left: cool blue-white -->
    <linearGradient id="slg-r1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3060c0" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#081028" stop-opacity="0.0"/>
    </linearGradient>
    <!-- Ray right: lily white-gold -->
    <linearGradient id="slg-r2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8c0e8" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#302850" stop-opacity="0.0"/>
    </linearGradient>
    <!-- Halo glow -->
    <radialGradient id="slg-halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#d0c0f0" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#d0c0f0" stop-opacity="0.0"/>
    </radialGradient>
    <!-- Ambient glow -->
    <radialGradient id="slg-glow" cx="50%" cy="45%" r="38%">
      <stop offset="0%" stop-color="#1828a0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1828a0" stop-opacity="0.0"/>
    </radialGradient>
    <!-- Jesuit cassock (black) -->
    <linearGradient id="slg-cassock" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#181820"/>
      <stop offset="100%" stop-color="#0c0c14"/>
    </linearGradient>
    <!-- Surplice (white choir garment over cassock) -->
    <linearGradient id="slg-surplice" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8e8f4"/>
      <stop offset="100%" stop-color="#c0c0d8"/>
    </linearGradient>
    <!-- Lily petals -->
    <linearGradient id="slg-lily" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d8d8f0"/>
    </linearGradient>
    <!-- Gold ornament -->
    <linearGradient id="slg-gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8d060"/>
      <stop offset="100%" stop-color="#a09020"/>
    </linearGradient>
    <!-- IHS medallion -->
    <radialGradient id="slg-ihs" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2848c0"/>
      <stop offset="100%" stop-color="#101838"/>
    </radialGradient>
    <!-- Soft glow filter -->
    <filter id="slg-sg" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Lily glow -->
    <filter id="slg-lg" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="560" fill="url(#slg-bg)"/>

  <!-- Ambient glow -->
  <ellipse cx="200" cy="240" rx="150" ry="190" fill="url(#slg-glow)"/>

  <!-- 4 Polygon rays -->
  <polygon points="198,265 0,560 0,400" fill="url(#slg-r1)" opacity="0.7"/>
  <polygon points="198,265 0,480 80,560" fill="url(#slg-r1)" opacity="0.5"/>
  <polygon points="202,265 400,480 320,560" fill="url(#slg-r2)" opacity="0.5"/>
  <polygon points="202,265 400,400 400,560" fill="url(#slg-r2)" opacity="0.7"/>

  <!-- Halo glow -->
  <circle cx="200" cy="147" r="58" fill="url(#slg-halo)" filter="url(#slg-sg)"/>
  <!-- Halo ring -->
  <circle cx="200" cy="147" r="48" fill="none" stroke="#c8c0e8" stroke-width="2" opacity="0.8"/>
  <circle cx="200" cy="147" r="45" fill="none" stroke="#ffffff" stroke-width="0.6" opacity="0.4"/>

  <!-- Black Jesuit cassock (full length) -->
  <path d="M152,212 Q140,240 135,300 L130,430 Q130,442 142,444 L258,444 Q270,442 270,430 L265,300 Q260,240 248,212 Z"
        fill="url(#slg-cassock)" stroke="#28283a" stroke-width="1" opacity="0.98"/>

  <!-- White surplice over cassock (shorter, to waist) -->
  <path d="M160,212 Q152,228 150,260 L150,335 Q150,342 158,344 L242,344 Q250,342 250,335 L250,260 Q248,228 240,212 Z"
        fill="url(#slg-surplice)" stroke="#a8a8c8" stroke-width="1" opacity="0.92"/>

  <!-- Surplice lace edge at hem -->
  <path d="M150,335 Q155,342 160,335 Q165,342 170,335 Q175,342 180,335 Q185,342 190,335 Q195,342 200,335 Q205,342 210,335 Q215,342 220,335 Q225,342 230,335 Q235,342 240,335 Q245,342 250,335"
        fill="none" stroke="#c8c8e0" stroke-width="1.5" opacity="0.7"/>

  <!-- Surplice center crease -->
  <line x1="200" y1="215" x2="200" y2="340" stroke="#b0b0cc" stroke-width="1" opacity="0.4"/>

  <!-- IHS medallion on chest (Jesuit symbol) -->
  <circle cx="200" cy="262" r="18" fill="url(#slg-ihs)" stroke="#e8d060" stroke-width="1.5" opacity="0.95"/>
  <text x="200" y="267" font-family="Georgia, serif" font-size="11" font-weight="bold"
        fill="#e8d060" text-anchor="middle" letter-spacing="1">IHS</text>
  <!-- Cross above IHS -->
  <line x1="200" y1="247" x2="200" y2="252" stroke="#e8d060" stroke-width="1.5" opacity="0.9"/>
  <line x1="197" y1="249" x2="203" y2="249" stroke="#e8d060" stroke-width="1" opacity="0.9"/>

  <!-- Left arm — holding lily stem -->
  <path d="M160,225 Q142,248 132,276 Q128,290 133,298 Q142,285 150,268 L158,245 Z"
        fill="#181820" stroke="#28283a" stroke-width="0.8"/>
  <!-- Left hand -->
  <ellipse cx="132" cy="303" rx="11" ry="9" fill="#d4b890" stroke="#b09060" stroke-width="0.8"/>

  <!-- Lily stem -->
  <line x1="122" y1="302" x2="108" y2="210" stroke="#487830" stroke-width="3" stroke-linecap="round"/>
  <!-- Lily branch left -->
  <line x1="115" y1="258" x2="100" y2="245" stroke="#487830" stroke-width="2" stroke-linecap="round"/>
  <!-- Lily branch right -->
  <line x1="112" y1="240" x2="124" y2="228" stroke="#487830" stroke-width="2" stroke-linecap="round"/>

  <!-- Lily flowers (3 blooms) — purity symbol -->
  <g filter="url(#slg-lg)">
    <!-- Top bloom -->
    <ellipse cx="108" cy="207" rx="10" ry="14" fill="url(#slg-lily)" stroke="#d8d8f0" stroke-width="0.8" opacity="0.95"/>
    <ellipse cx="101" cy="209" rx="8" ry="12" fill="url(#slg-lily)" stroke="#d8d8f0" stroke-width="0.8" opacity="0.85" transform="rotate(-20 101 209)"/>
    <ellipse cx="115" cy="209" rx="8" ry="12" fill="url(#slg-lily)" stroke="#d8d8f0" stroke-width="0.8" opacity="0.85" transform="rotate(20 115 209)"/>
    <!-- Gold stamens -->
    <circle cx="108" cy="208" r="3" fill="#e8d060" opacity="0.9"/>
    <circle cx="102" cy="210" r="2.5" fill="#e8d060" opacity="0.8"/>
    <circle cx="114" cy="210" r="2.5" fill="#e8d060" opacity="0.8"/>
    <!-- Side bloom left -->
    <ellipse cx="98" cy="243" rx="8" ry="11" fill="url(#slg-lily)" stroke="#d8d8f0" stroke-width="0.8" opacity="0.88" transform="rotate(-30 98 243)"/>
    <circle cx="99" cy="244" r="2.5" fill="#e8d060" opacity="0.85"/>
    <!-- Side bloom right -->
    <ellipse cx="126" cy="227" rx="8" ry="11" fill="url(#slg-lily)" stroke="#d8d8f0" stroke-width="0.8" opacity="0.88" transform="rotate(25 126 227)"/>
    <circle cx="125" cy="228" r="2.5" fill="#e8d060" opacity="0.85"/>
  </g>

  <!-- Right arm — hands folded in prayer / holding crucifix -->
  <path d="M240,225 Q258,248 266,272 Q270,286 265,294 Q256,281 248,264 L242,244 Z"
        fill="#181820" stroke="#28283a" stroke-width="0.8"/>
  <!-- Right hand -->
  <ellipse cx="266" cy="299" rx="11" ry="9" fill="#d4b890" stroke="#b09060" stroke-width="0.8"/>

  <!-- Small crucifix in right hand -->
  <line x1="266" y1="285" x2="266" y2="315" stroke="#c8a840" stroke-width="3" stroke-linecap="round"/>
  <line x1="258" y1="293" x2="274" y2="293" stroke="#c8a840" stroke-width="3" stroke-linecap="round"/>
  <!-- Corpus suggestion -->
  <ellipse cx="266" cy="299" rx="3" ry="4" fill="#d4b078" opacity="0.8"/>

  <!-- Neck -->
  <rect x="192" y="188" width="16" height="26" rx="4" fill="#d4b890"/>

  <!-- Head (young — 23 years old) -->
  <ellipse cx="200" cy="163" rx="30" ry="35" fill="#d4b890"/>

  <!-- Hair — young Italian nobleman, neat, dark -->
  <path d="M170,158 Q172,130 182,116 Q191,105 200,103 Q209,105 218,116 Q228,130 230,158"
        fill="#1a1208" stroke="#100c06" stroke-width="1" opacity="0.95"/>
  <!-- Hair parting -->
  <path d="M200,103 Q200,115 200,128" stroke="#2a1a10" stroke-width="1.5" fill="none" opacity="0.5"/>

  <!-- No beard — he was only 23 -->
  <!-- Very light facial hair suggestion only -->
  <path d="M186,183 Q193,187 200,186 Q207,187 214,183" fill="none" stroke="#c09070" stroke-width="0.8" opacity="0.3"/>

  <!-- Eyes — young, serene, slightly downcast (contemplative) -->
  <ellipse cx="188" cy="158" rx="4.5" ry="4.8" fill="#f0e8d8"/>
  <ellipse cx="212" cy="158" rx="4.5" ry="4.8" fill="#f0e8d8"/>
  <!-- Slight downcast — looking toward the crucifix -->
  <circle cx="188" cy="160" r="2.8" fill="#2a1808"/>
  <circle cx="212" cy="160" r="2.8" fill="#2a1808"/>
  <circle cx="188" cy="160" r="1.3" fill="#080604"/>
  <circle cx="212" cy="160" r="1.3" fill="#080604"/>
  <circle cx="189" cy="159" r="0.7" fill="white" opacity="0.8"/>
  <circle cx="213" cy="159" r="0.7" fill="white" opacity="0.8"/>
  <!-- Upper eyelids (slightly closed, contemplative) -->
  <path d="M183,156 Q188,154 193,156" stroke="#8a6040" stroke-width="1.2" fill="none" opacity="0.6"/>
  <path d="M207,156 Q212,154 217,156" stroke="#8a6040" stroke-width="1.2" fill="none" opacity="0.6"/>

  <!-- Eyebrows — young, fine -->
  <path d="M183,151 Q188,148 193,150" stroke="#1a1208" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M207,150 Q212,148 217,151" stroke="#1a1208" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- Nose — young, fine -->
  <path d="M198,163 Q195,171 194,176 Q197,179 200,178 Q203,179 206,176 Q205,171 202,163" fill="#c09870" stroke="#a07850" stroke-width="0.7" opacity="0.65"/>

  <!-- Mouth — serene, slight smile -->
  <path d="M192,184 Q200,188 208,184" stroke="#9a6848" stroke-width="1.6" fill="none" stroke-linecap="round" opacity="0.8"/>

  <!-- Halo cross marks -->
  <line x1="200" y1="99" x2="200" y2="107" stroke="#c8c0e8" stroke-width="2" opacity="0.7"/>
  <line x1="152" y1="147" x2="160" y2="147" stroke="#c8c0e8" stroke-width="2" opacity="0.7"/>
  <line x1="240" y1="147" x2="248" y2="147" stroke="#c8c0e8" stroke-width="2" opacity="0.7"/>
  <line x1="200" y1="187" x2="200" y2="195" stroke="#c8c0e8" stroke-width="2" opacity="0.7"/>

  <!-- Gold frame -->
  <line x1="20" y1="20" x2="380" y2="20" stroke="#c8c0e8" stroke-width="1.2" opacity="0.55"/>
  <line x1="20" y1="22" x2="380" y2="22" stroke="#c8c0e8" stroke-width="0.5" opacity="0.25"/>
  <line x1="20" y1="500" x2="380" y2="500" stroke="#c8c0e8" stroke-width="1.2" opacity="0.55"/>
  <line x1="20" y1="498" x2="380" y2="498" stroke="#c8c0e8" stroke-width="0.5" opacity="0.25"/>
  <line x1="20" y1="20" x2="20" y2="500" stroke="#c8c0e8" stroke-width="1.2" opacity="0.55"/>
  <line x1="380" y1="20" x2="380" y2="500" stroke="#c8c0e8" stroke-width="1.2" opacity="0.55"/>
  <rect x="16" y="16" width="8" height="8" fill="none" stroke="#c8c0e8" stroke-width="1.2" opacity="0.65"/>
  <rect x="376" y="16" width="8" height="8" fill="none" stroke="#c8c0e8" stroke-width="1.2" opacity="0.65"/>
  <rect x="16" y="496" width="8" height="8" fill="none" stroke="#c8c0e8" stroke-width="1.2" opacity="0.65"/>
  <rect x="376" y="496" width="8" height="8" fill="none" stroke="#c8c0e8" stroke-width="1.2" opacity="0.65"/>

  <!-- Name panel -->
  <rect x="0" y="500" width="400" height="60" fill="#04060f" opacity="0.97"/>
  <line x1="0" y1="500" x2="400" y2="500" stroke="#c8c0e8" stroke-width="1.5" opacity="0.75"/>
  <text x="200" y="519" font-family="Georgia, serif" font-size="15" font-weight="bold"
        fill="#e8d060" text-anchor="middle" letter-spacing="2">SAN LUIS GONZAGA</text>
  <text x="200" y="537" font-family="Georgia, serif" font-size="10.5"
        fill="#b0a8d8" text-anchor="middle" letter-spacing="1.2">PATRÓN DE LA JUVENTUD · PATRON OF YOUTH</text>
  <text x="200" y="552" font-family="Georgia, serif" font-size="10"
        fill="#807898" text-anchor="middle" letter-spacing="1">21 DE JUNIO · JUNE 21</text>
</svg>

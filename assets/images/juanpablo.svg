<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="jpBg" cx="50%" cy="38%" r="60%">
      <stop offset="0%" stop-color="#0f1c35"/>
      <stop offset="100%" stop-color="#050b18"/>
    </radialGradient>
    <radialGradient id="jpGlow" cx="50%" cy="38%" r="45%">
      <stop offset="0%" stop-color="rgba(220,190,80,0.18)"/>
      <stop offset="100%" stop-color="rgba(220,190,80,0)"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#jpBg)"/>
  <rect width="800" height="600" fill="url(#jpGlow)"/>

  <!-- Accent strips: white (papal) -->
  <rect x="0" y="0" width="7" height="600" fill="#f0ece4" opacity="0.65"/>
  <rect x="7" y="0" width="3" height="600" fill="#d4af37" opacity="0.5"/>
  <rect x="790" y="0" width="7" height="600" fill="#f0ece4" opacity="0.65"/>
  <rect x="787" y="0" width="3" height="600" fill="#d4af37" opacity="0.5"/>

  <!-- Papal Cross (Ferula) — 3 horizontal bars -->
  <!-- Vertical shaft -->
  <rect x="385" y="85" width="30" height="390" rx="5" fill="#d4af37"/>
  <!-- Top bar (shortest) -->
  <rect x="345" y="125" width="110" height="20" rx="5" fill="#d4af37"/>
  <!-- Middle bar -->
  <rect x="305" y="210" width="190" height="22" rx="5" fill="#d4af37"/>
  <!-- Bottom bar (longest) -->
  <rect x="265" y="305" width="270" height="24" rx="5" fill="#d4af37"/>

  <!-- Inner gold highlight lines -->
  <rect x="395" y="85" width="8" height="390" rx="2" fill="#f5d97a" opacity="0.35"/>

  <!-- Tiara (3 stacked crowns) at top of cross -->
  <ellipse cx="400" cy="84" rx="58" ry="24" fill="none" stroke="#f0ece4" stroke-width="2.5" opacity="0.75"/>
  <ellipse cx="400" cy="68" rx="48" ry="19" fill="none" stroke="#f0ece4" stroke-width="2" opacity="0.65"/>
  <ellipse cx="400" cy="55" rx="35" ry="14" fill="none" stroke="#f0ece4" stroke-width="2" opacity="0.55"/>
  <!-- Small cross atop tiara -->
  <line x1="400" y1="43" x2="400" y2="30" stroke="#d4af37" stroke-width="3" stroke-linecap="round"/>
  <line x1="393" y1="37" x2="407" y2="37" stroke="#d4af37" stroke-width="3" stroke-linecap="round"/>

  <!-- "M" — Totus Tuus Marian monogram beneath cross -->
  <text x="400" y="505" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="52" font-style="italic" fill="#d4af37" opacity="0.55" letter-spacing="3">Totus Tuus</text>

  <!-- Subtle star field -->
  <circle cx="160" cy="140" r="1.8" fill="#ffd700" opacity="0.45"/>
  <circle cx="210" cy="85"  r="1.3" fill="#ffd700" opacity="0.35"/>
  <circle cx="620" cy="120" r="1.8" fill="#ffd700" opacity="0.45"/>
  <circle cx="665" cy="195" r="1.3" fill="#ffd700" opacity="0.35"/>
  <circle cx="130" cy="360" r="1.5" fill="#ffd700" opacity="0.35"/>
  <circle cx="670" cy="390" r="1.5" fill="#ffd700" opacity="0.35"/>
  <circle cx="300" cy="460" r="1.3" fill="#ffd700" opacity="0.28"/>
  <circle cx="520" cy="450" r="1.3" fill="#ffd700" opacity="0.28"/>

  <!-- Feast day -->
  <text x="400" y="568" text-anchor="middle" font-family="Lato, sans-serif" font-size="13" fill="#8a7a60" letter-spacing="2.5">22 DE OCTUBRE · OCTOBER 22</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <defs>
    <radialGradient id="sm-bg" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#0c1020"/><stop offset="100%" stop-color="#060810"/>
    </radialGradient>
    <radialGradient id="sm-atm" cx="50%" cy="38%" r="46%">
      <stop offset="0%" stop-color="#203070" stop-opacity="0.30"/><stop offset="100%" stop-color="#c0c0d8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sm-r1" x1="50%" y1="0%" x2="10%" y2="100%">
      <stop offset="0%" stop-color="#4868d0" stop-opacity="1"/><stop offset="100%" stop-color="#101848" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="sm-r2" x1="50%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#d0dce8" stop-opacity="1"/><stop offset="100%" stop-color="#9090b8" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="sm-gl"><feGaussianBlur stdDeviation="9" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="sm-g2"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="600" fill="url(#sm-bg)"/>
  <rect width="400" height="600" fill="url(#sm-atm)"/>
  <!-- Rays: steel blue left, silver right -->
  <polygon points="198,265 -25,610 115,610" fill="url(#sm-r1)" filter="url(#sm-gl)" opacity="0.75"/>
  <polygon points="198,265 20,600  85,600"  fill="#4868d0" opacity="0.40"/>
  <polygon points="202,265 425,610 285,610" fill="url(#sm-r2)" filter="url(#sm-gl)" opacity="0.72"/>
  <polygon points="202,265 375,600 315,600" fill="#d0dce8" opacity="0.36"/>
  <!-- Wings -->
  <path d="M168,178 Q100,115 12,10 Q-2,-2 8,32 Q55,62 118,145 Q148,168 168,192 Z" fill="#8898d8" opacity="0.74"/>
  <path d="M168,183 Q108,138 30,38 Q12,24 24,52 Q72,80 128,158 Q152,175 168,195 Z" fill="#b8c8e8" opacity="0.64"/>
  <path d="M168,188 Q128,162 68,105 Q50,92 58,118 Q100,135 148,178 Q162,187 168,200 Z" fill="#6878c0" opacity="0.58"/>
  <path d="M168,183 Q105,132 18,18" stroke="#4868d0" stroke-width="1.0" fill="none" opacity="0.44"/>
  <path d="M168,185 Q112,145 38,52" stroke="#4868d0" stroke-width="1.0" fill="none" opacity="0.37"/>
  <path d="M168,187 Q122,158 72,108" stroke="#4868d0" stroke-width="1.0" fill="none" opacity="0.28"/>
  <path d="M232,178 Q300,115 388,10 Q402,-2 392,32 Q345,62 282,145 Q252,168 232,192 Z" fill="#8898d8" opacity="0.74"/>
  <path d="M232,183 Q292,138 370,38 Q388,24 376,52 Q328,80 272,158 Q248,175 232,195 Z" fill="#b8c8e8" opacity="0.64"/>
  <path d="M232,188 Q272,162 332,105 Q350,92 342,118 Q300,135 252,178 Q238,187 232,200 Z" fill="#6878c0" opacity="0.58"/>
  <path d="M232,183 Q295,132 382,18" stroke="#4868d0" stroke-width="1.0" fill="none" opacity="0.44"/>
  <path d="M232,185 Q288,145 362,52" stroke="#4868d0" stroke-width="1.0" fill="none" opacity="0.37"/>
  <path d="M232,187 Q278,158 328,108" stroke="#4868d0" stroke-width="1.0" fill="none" opacity="0.28"/>
  <!-- Silver armor (breastplate) -->
  <path d="M172,155 Q148,200 140,350 Q200,368 260,350 Q252,200 228,155 Z" fill="#9090a8" opacity="0.78"/>
  <!-- Red/purple battle cape over shoulder -->
  <path d="M168,155 Q122,192 108,318 Q122,330 148,312 Q148,228 175,165 Z" fill="#7a1030" opacity="0.86"/>
  <path d="M232,155 Q262,198 268,318 Q290,322 296,300 Q288,198 246,160 Z" fill="#7a1030" opacity="0.78"/>
  <!-- Left arm raised with sword -->
  <path d="M145,200 Q115,240 105,270" stroke="#9090a8" stroke-width="20" fill="none" stroke-linecap="round" opacity="0.88"/>
  <!-- Right arm with shield -->
  <path d="M255,200 Q285,235 292,268" stroke="#9090a8" stroke-width="20" fill="none" stroke-linecap="round" opacity="0.85"/>
  <!-- Shield (right) -->
  <path d="M278,265 L310,265 L310,298 L294,312 L278,298 Z" fill="#4868d0" opacity="0.75"/>
  <line x1="294" y1="265" x2="294" y2="312" stroke="#d0dce8" stroke-width="1" opacity="0.5"/>
  <line x1="278" y1="282" x2="310" y2="282" stroke="#d0dce8" stroke-width="1" opacity="0.5"/>
  <!-- Sword (left, upraised) -->
  <line x1="104" y1="270" x2="104" y2="180" stroke="#d0dce8" stroke-width="5" stroke-opacity="0.9"/>
  <line x1="94"  y1="215" x2="114" y2="215" stroke="#d0dce8" stroke-width="4" stroke-opacity="0.9"/>
  <!-- Hand (right) -->
  <ellipse cx="293" cy="272" rx="13" ry="16" fill="#d4a06a" opacity="0.9"/>
  <!-- Hand (left on sword) -->
  <ellipse cx="104" cy="274" rx="12" ry="14" fill="#d4a06a" opacity="0.9"/>
  <!-- Belt armor -->
  <rect x="165" y="295" width="70" height="12" rx="3" fill="#c9a84c" opacity="0.6"/>
  <!-- Neck -->
  <rect x="193" y="142" width="14" height="18" rx="4" fill="#d4a06a" opacity="0.9"/>
  <!-- Head -->
  <ellipse cx="200" cy="108" rx="26" ry="30" fill="#d4a06a" opacity="0.92"/>
  <!-- Helmet (warrior helm) removed, showing glowing head -->
  <path d="M174,107 Q176,72 200,68 Q224,72 226,107 Q218,87 200,85 Q182,87 174,107 Z" fill="#2a2048" opacity="0.85"/>
  <!-- Halo -->
  <circle cx="200" cy="108" r="53" fill="none" stroke="#e8c97a" stroke-width="1.8" stroke-opacity="0.65" filter="url(#sm-g2)"/>
  <circle cx="200" cy="108" r="47" fill="none" stroke="#e8c97a" stroke-width="0.5" stroke-opacity="0.22"/>
  <!-- Frame -->
  <rect x="6" y="6" width="388" height="588" rx="8" fill="none" stroke="#c9a84c" stroke-width="1.2" stroke-opacity="0.5"/>
  <rect x="12" y="12" width="376" height="576" rx="5" fill="none" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.18"/>
  <!-- Panel -->
  <rect x="18" y="528" width="364" height="66" rx="6" fill="#060810" opacity="0.86"/>
  <line x1="46" y1="535" x2="354" y2="535" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.28"/>
  <text x="200" y="548" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#c9a84c" letter-spacing="3" opacity="0.9">SAN MIGUEL ARCANGEL  ·  SAINT MICHAEL</text>
  <text x="200" y="567" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#b0c8f8" font-style="italic">«San Miguel Arcángel»</text>
  <text x="200" y="585" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#d0dce8" font-style="italic" opacity="0.8">«Saint Michael the Archangel»</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="sr2-bg" cx="50%" cy="40%" r="62%">
      <stop offset="0%" stop-color="#0a1e14"/>
      <stop offset="100%" stop-color="#050f0a"/>
    </radialGradient>
    <radialGradient id="sr2-glow" cx="50%" cy="38%" r="46%">
      <stop offset="0%" stop-color="rgba(60,180,120,0.22)"/>
      <stop offset="100%" stop-color="rgba(60,180,120,0)"/>
    </radialGradient>
    <radialGradient id="sr2-fish-glow" cx="50%" cy="68%" r="36%">
      <stop offset="0%" stop-color="rgba(100,210,160,0.16)"/>
      <stop offset="100%" stop-color="rgba(100,210,160,0)"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#sr2-bg)"/>
  <rect width="800" height="600" fill="url(#sr2-glow)"/>
  <rect width="800" height="600" fill="url(#sr2-fish-glow)"/>

  <!-- Border -->
  <rect x="28" y="28" width="744" height="544" rx="6" fill="none" stroke="#2e7a50" stroke-width="1" stroke-opacity="0.52"/>
  <rect x="36" y="36" width="728" height="528" rx="4" fill="none" stroke="#2e7a50" stroke-width="0.5" stroke-opacity="0.24"/>

  <!-- Side accent strips -->
  <rect x="28" y="28" width="6" height="544" rx="3" fill="#1a5c3a" opacity="0.68"/>
  <rect x="766" y="28" width="6" height="544" rx="3" fill="#1a5c3a" opacity="0.68"/>

  <!-- Stars -->
  <circle cx="155" cy="105" r="2"   fill="#88ddbb" opacity="0.42"/>
  <circle cx="215" cy="72"  r="1.5" fill="#88ddbb" opacity="0.34"/>
  <circle cx="645" cy="98"  r="2"   fill="#88ddbb" opacity="0.42"/>
  <circle cx="668" cy="178" r="1.5" fill="#88ddbb" opacity="0.36"/>
  <circle cx="138" cy="365" r="1.8" fill="#88ddbb" opacity="0.30"/>
  <circle cx="665" cy="385" r="1.8" fill="#88ddbb" opacity="0.30"/>

  <!-- Light rays -->
  <g opacity="0.11" fill="#3a9a60">
    <polygon points="400,300 376,100 400,120 424,100"/>
    <polygon points="400,300 594,268 580,295 596,322"/>
    <polygon points="400,300 424,498 400,480 376,498"/>
    <polygon points="400,300 206,332 220,306 203,278"/>
    <polygon points="400,300 543,142 546,174 576,152"/>
    <polygon points="400,300 557,448 527,438 543,467"/>
    <polygon points="400,300 262,448 278,420 250,426"/>
    <polygon points="400,300 240,160 260,185 234,202"/>
  </g>

  <!-- Walking staff -->
  <line x1="355" y1="100" x2="365" y2="440" stroke="#a0784a" stroke-width="8" stroke-linecap="round" opacity="0.85"/>
  <!-- Staff top hook -->
  <path d="M 355 100 Q 340 84 352 72 Q 366 62 374 78" fill="none" stroke="#a0784a" stroke-width="6" stroke-linecap="round" opacity="0.80"/>
  <!-- Staff highlight -->
  <line x1="358" y1="108" x2="368" y2="430" stroke="#d4a870" stroke-width="2" stroke-linecap="round" opacity="0.28"/>

  <!-- Main halo/icon circle -->
  <circle cx="400" cy="194" r="64" fill="#060e0a" stroke="#2e7a50" stroke-width="2" stroke-opacity="0.72"/>
  <circle cx="400" cy="194" r="58" fill="none" stroke="#88ddbb" stroke-width="0.8" stroke-opacity="0.30"/>

  <!-- Cross inside circle -->
  <line x1="400" y1="150" x2="400" y2="238" stroke="#88ddbb" stroke-width="2.5" stroke-opacity="0.72"/>
  <line x1="366" y1="176" x2="434" y2="176" stroke="#88ddbb" stroke-width="2.5" stroke-opacity="0.72"/>

  <!-- IHS monogram -->
  <text x="400" y="203" text-anchor="middle" font-family="Georgia,serif" font-size="20"
        fill="#88ddbb" opacity="0.85" letter-spacing="2">IHS</text>

  <!-- Fish (symbol of Tobias/Book of Tobit) -->
  <!-- Fish body -->
  <ellipse cx="430" cy="390" rx="52" ry="26" fill="#1a5c3a" stroke="#3ab870" stroke-width="2" opacity="0.90"/>
  <!-- Fish tail -->
  <path d="M 378 390 L 354 370 L 350 390 L 354 410 Z" fill="#1a5c3a" stroke="#3ab870" stroke-width="1.5" opacity="0.85"/>
  <!-- Fish scales (simple arcs) -->
  <path d="M 400 374 Q 412 380 400 386" fill="none" stroke="#3ab870" stroke-width="1.2" opacity="0.50"/>
  <path d="M 414 370 Q 426 376 414 382" fill="none" stroke="#3ab870" stroke-width="1.2" opacity="0.50"/>
  <path d="M 428 368 Q 440 374 428 380" fill="none" stroke="#3ab870" stroke-width="1.2" opacity="0.50"/>
  <path d="M 402 382 Q 414 388 402 394" fill="none" stroke="#3ab870" stroke-width="1.2" opacity="0.50"/>
  <path d="M 416 378 Q 428 384 416 390" fill="none" stroke="#3ab870" stroke-width="1.2" opacity="0.50"/>
  <!-- Fish eye -->
  <circle cx="464" cy="385" r="6" fill="#0a1e14"/>
  <circle cx="466" cy="383" r="3" fill="#88ddbb" opacity="0.90"/>
  <!-- Fish mouth -->
  <path d="M 480 390 Q 484 386 482 382" fill="none" stroke="#3ab870" stroke-width="2" stroke-linecap="round" opacity="0.70"/>
  <!-- Fish fin -->
  <path d="M 430 364 Q 426 348 418 342 Q 432 350 440 364 Z" fill="#2e7a50" opacity="0.80"/>

  <!-- Name -->
  <text x="400" y="490" text-anchor="middle" font-family="Georgia,serif" font-size="22"
        fill="#a0ddb8" letter-spacing="1">San Rafael Arcángel</text>
  <text x="400" y="511" text-anchor="middle" font-family="Georgia,serif" font-size="14"
        fill="#5aaa88" font-style="italic" opacity="0.85">Saint Raphael the Archangel</text>

  <!-- Motto -->
  <text x="400" y="536" text-anchor="middle" font-family="Georgia,serif" font-size="12"
        font-style="italic" fill="#2e7a50" opacity="0.60" letter-spacing="2">Rāfāʾēl — Dios sana</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <defs>
    <radialGradient id="pp-bg" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#1e0e08"/><stop offset="100%" stop-color="#0a0400"/>
    </radialGradient>
    <radialGradient id="pp-atm" cx="50%" cy="38%" r="46%">
      <stop offset="0%" stop-color="#6a3818" stop-opacity="0.28"/><stop offset="100%" stop-color="#6a3818" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="pp-r1" x1="50%" y1="0%" x2="10%" y2="100%">
      <stop offset="0%" stop-color="#c07840" stop-opacity="1"/><stop offset="100%" stop-color="#5a2808" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="pp-r2" x1="50%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#f5e060" stop-opacity="1"/><stop offset="100%" stop-color="#c9a84c" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="pp-gl"><feGaussianBlur stdDeviation="9" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="pp-g2"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="600" fill="url(#pp-bg)"/>
  <rect width="400" height="600" fill="url(#pp-atm)"/>
  <!-- Rays: brown-amber left, gold right -->
  <polygon points="198,265 -25,610 115,610" fill="url(#pp-r1)" filter="url(#pp-gl)" opacity="0.75"/>
  <polygon points="198,265 20,600  85,600"  fill="#c07840" opacity="0.40"/>
  <polygon points="202,265 425,610 285,610" fill="url(#pp-r2)" filter="url(#pp-gl)" opacity="0.72"/>
  <polygon points="202,265 375,600 315,600" fill="#f5e060" opacity="0.36"/>
  <!-- Brown Capuchin habit -->
  <path d="M168,155 Q140,205 126,390 Q200,415 274,390 Q260,205 232,155 Z" fill="#7a4a28" opacity="0.90"/>
  <!-- White rope/cord at waist -->
  <path d="M145,285 Q200,296 255,285" stroke="#f0e8d0" stroke-width="5" fill="none" stroke-opacity="0.7" stroke-linecap="round"/>
  <!-- Hood over shoulders -->
  <path d="M168,155 Q148,165 140,185 L165,175 Z" fill="#6a3818" opacity="0.85"/>
  <path d="M232,155 Q252,165 260,185 L235,175 Z" fill="#6a3818" opacity="0.85"/>
  <!-- Arms slightly open, hands toward viewer -->
  <path d="M142,215 Q112,255 105,295" stroke="#7a4a28" stroke-width="18" fill="none" stroke-linecap="round" opacity="0.88"/>
  <path d="M258,215 Q288,255 295,295" stroke="#7a4a28" stroke-width="18" fill="none" stroke-linecap="round" opacity="0.88"/>
  <!-- Hands showing stigmata -->
  <ellipse cx="104" cy="300" rx="13" ry="16" fill="#d4a06a" opacity="0.9"/>
  <ellipse cx="296" cy="300" rx="13" ry="16" fill="#d4a06a" opacity="0.9"/>
  <!-- Stigmata marks -->
  <circle cx="104" cy="300" r="4" fill="#8b0000" opacity="0.7"/>
  <circle cx="296" cy="300" r="4" fill="#8b0000" opacity="0.7"/>
  <!-- Neck -->
  <rect x="193" y="142" width="14" height="18" rx="4" fill="#d4a06a" opacity="0.9"/>
  <!-- Head -->
  <ellipse cx="200" cy="108" rx="27" ry="31" fill="#d4a06a" opacity="0.92"/>
  <!-- Grey/white beard and hair -->
  <path d="M173,107 Q176,72 200,68 Q224,72 227,107 Q219,88 200,86 Q181,88 173,107 Z" fill="#5a5050" opacity="0.82"/>
  <path d="M182,130 Q185,150 200,155 Q215,150 218,130 Q210,145 200,146 Q190,145 182,130 Z" fill="#808080" opacity="0.7"/>
  <!-- Capuchin hood/cap on head -->
  <path d="M174,108 Q176,72 200,68 Q224,72 226,108 Q220,88 200,86 Q180,88 174,108 Z" fill="none" stroke="#6a3818" stroke-width="3" opacity="0.6"/>
  <!-- Halo -->
  <circle cx="200" cy="108" r="53" fill="none" stroke="#e8c97a" stroke-width="1.8" stroke-opacity="0.65" filter="url(#pp-g2)"/>
  <circle cx="200" cy="108" r="47" fill="none" stroke="#e8c97a" stroke-width="0.5" stroke-opacity="0.22"/>
  <!-- Stigmata on feet -->
  <circle cx="168" cy="405" r="5" fill="#8b0000" opacity="0.55"/>
  <circle cx="232" cy="405" r="5" fill="#8b0000" opacity="0.55"/>
  <!-- Frame -->
  <rect x="6" y="6" width="388" height="588" rx="8" fill="none" stroke="#c9a84c" stroke-width="1.2" stroke-opacity="0.5"/>
  <rect x="12" y="12" width="376" height="576" rx="5" fill="none" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.18"/>
  <!-- Panel -->
  <rect x="18" y="528" width="364" height="66" rx="6" fill="#0a0400" opacity="0.86"/>
  <line x1="46" y1="535" x2="354" y2="535" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.28"/>
  <text x="200" y="548" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#c9a84c" letter-spacing="3" opacity="0.9">PADRE PIO DE PIETRELCINA  ·  PADRE PIO</text>
  <text x="200" y="567" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#f5e060" font-style="italic">«San Pío de Pietrelcina»</text>
  <text x="200" y="585" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#d4c040" font-style="italic" opacity="0.8">«Saint Padre Pio»</text>

  <!-- Minimal facial features for visual consistency across intercessors -->
  <g id="tup-face-features" opacity="0.9">
    <ellipse id="tup-eye-left" cx="186" cy="108" rx="3.1" ry="2.2" fill="#2a1a12"/>
    <ellipse id="tup-eye-right" cx="214" cy="108" rx="3.1" ry="2.2" fill="#2a1a12"/>
    <path id="tup-nose" d="M200 112 C198 118, 198 120, 200 123" stroke="#7b4a35" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <path id="tup-mouth" d="M192 132 Q200 137 208 132" stroke="#8f3a3a" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  </g>
</svg>

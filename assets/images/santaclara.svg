<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <defs>
    <radialGradient id="scl-bg" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#181000"/><stop offset="100%" stop-color="#0c0800"/>
    </radialGradient>
    <linearGradient id="scl-r1" x1="50%" y1="0%" x2="10%" y2="100%">
      <stop offset="0%" stop-color="#d89020" stop-opacity="1"/><stop offset="100%" stop-color="#6a4408" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="scl-r2" x1="50%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#e8c060" stop-opacity="1"/><stop offset="100%" stop-color="#c9a84c" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="scl-gl"><feGaussianBlur stdDeviation="9" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="scl-g2"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="600" fill="url(#scl-bg)"/>
  <rect width="400" height="600" fill="#503808" opacity="0.10"/>
  <polygon points="198,265 -25,610 115,610" fill="url(#scl-r1)" filter="url(#scl-gl)" opacity="0.72"/>
  <polygon points="198,265 20,600  85,600"  fill="#d89020" opacity="0.36"/>
  <polygon points="202,265 425,610 285,610" fill="url(#scl-r2)" filter="url(#scl-gl)" opacity="0.70"/>
  <polygon points="202,265 375,600 315,600" fill="#e8c060" opacity="0.34"/>
  <!-- Grey Poor Clare habit -->
  <path d="M168,155 Q140,205 126,390 Q200,415 274,390 Q260,205 232,155 Z" fill="#9a9888" opacity="0.88"/>
  <!-- Grey mantle -->
  <path d="M168,155 Q124,192 108,318 Q122,330 148,312 Q150,228 178,168 Z" fill="#787870" opacity="0.85"/>
  <path d="M232,155 Q260,198 270,318 Q290,322 296,300 Q286,198 248,158 Z" fill="#787870" opacity="0.78"/>
  <!-- Rope cord around waist -->
  <path d="M130,270 Q200,280 270,270" stroke="#c8a840" stroke-width="3" fill="none" opacity="0.65"/>
  <!-- Both arms raised holding monstrance -->
  <path d="M140,215 Q112,200 100,175" stroke="#9a9888" stroke-width="17" fill="none" stroke-linecap="round" opacity="0.85"/>
  <path d="M260,215 Q288,200 300,175" stroke="#787870" stroke-width="16" fill="none" stroke-linecap="round" opacity="0.80"/>
  <!-- Hands raised -->
  <ellipse cx="100" cy="172" rx="12" ry="15" fill="#d4b090" opacity="0.9"/>
  <ellipse cx="300" cy="172" rx="12" ry="15" fill="#d4b090" opacity="0.9"/>
  <!-- Monstrance (held aloft) -->
  <circle cx="200" cy="158" r="22" fill="none" stroke="#e8c060" stroke-width="2.5" opacity="0.85" filter="url(#scl-g2)"/>
  <circle cx="200" cy="158" r="14" fill="#f8e890" opacity="0.75"/>
  <line x1="200" y1="136" x2="200" y2="172" stroke="#e8c060" stroke-width="2.5" opacity="0.82"/>
  <line x1="178" y1="155" x2="222" y2="161" stroke="#e8c060" stroke-width="2.5" opacity="0.78"/>
  <!-- White veil -->
  <path d="M168,155 Q142,142 136,126 Q152,112 176,118 Q184,135 188,152 Z" fill="#f0ece0" opacity="0.88"/>
  <path d="M232,155 Q258,142 264,126 Q248,112 224,118 Q216,135 212,152 Z" fill="#f0ece0" opacity="0.84"/>
  <!-- Neck + head -->
  <rect x="193" y="142" width="14" height="16" rx="4" fill="#d4b090" opacity="0.9"/>
  <ellipse cx="200" cy="108" rx="25" ry="29" fill="#d4b090" opacity="0.92"/>
  <path d="M175,107 Q177,73 200,69 Q223,73 225,107 Q218,87 200,85 Q182,87 175,107 Z" fill="#9a7858" opacity="0.62"/>
  <!-- Halo -->
  <circle cx="200" cy="108" r="53" fill="none" stroke="#e8c97a" stroke-width="1.8" stroke-opacity="0.65" filter="url(#scl-g2)"/>
  <circle cx="200" cy="108" r="47" fill="none" stroke="#e8c97a" stroke-width="0.5" stroke-opacity="0.22"/>
  <!-- Frame -->
  <rect x="6" y="6" width="388" height="588" rx="8" fill="none" stroke="#c9a84c" stroke-width="1.2" stroke-opacity="0.5"/>
  <rect x="12" y="12" width="376" height="576" rx="5" fill="none" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.18"/>
  <!-- Panel -->
  <rect x="18" y="528" width="364" height="66" rx="6" fill="#0c0800" opacity="0.86"/>
  <line x1="46" y1="535" x2="354" y2="535" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.28"/>
  <text x="200" y="548" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#c9a84c" letter-spacing="3" opacity="0.9">SANTA CLARA DE ASIS  ·  SAINT CLARE OF ASSISI</text>
  <text x="200" y="567" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#e8c060" font-style="italic">«Santa Clara de Asís»</text>
  <text x="200" y="585" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#f5e060" font-style="italic" opacity="0.8">«Saint Clare of Assisi»</text>

  <!-- Minimal facial features for visual consistency across intercessors -->
  <g id="tup-face-features" opacity="0.9">
    <ellipse id="tup-eye-left" cx="186" cy="158" rx="3.1" ry="2.2" fill="#2a1a12"/>
    <ellipse id="tup-eye-right" cx="214" cy="158" rx="3.1" ry="2.2" fill="#2a1a12"/>
    <path id="tup-nose" d="M200 162 C198 168, 198 170, 200 173" stroke="#7b4a35" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <path id="tup-mouth" d="M192 182 Q200 187 208 182" stroke="#8f3a3a" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  </g>
</svg>

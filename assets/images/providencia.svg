<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="pvBg" cx="50%" cy="40%" r="62%">
      <stop offset="0%" stop-color="#150d00"/>
      <stop offset="100%" stop-color="#040200"/>
    </radialGradient>
    <radialGradient id="pvGlow" cx="50%" cy="37%" r="52%">
      <stop offset="0%" stop-color="rgba(212,175,55,0.35)"/>
      <stop offset="100%" stop-color="rgba(212,175,55,0)"/>
    </radialGradient>
    <radialGradient id="pvGlow2" cx="50%" cy="37%" r="25%">
      <stop offset="0%" stop-color="rgba(255,240,150,0.30)"/>
      <stop offset="100%" stop-color="rgba(255,240,150,0)"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#pvBg)"/>
  <rect width="800" height="600" fill="url(#pvGlow)"/>
  <rect width="800" height="600" fill="url(#pvGlow2)"/>

  <!-- Accent strips: gold -->
  <rect x="0"   y="0" width="7" height="600" fill="#d4af37" opacity="0.75"/>
  <rect x="7"   y="0" width="3" height="600" fill="#f5e06a" opacity="0.30"/>
  <rect x="790" y="0" width="7" height="600" fill="#d4af37" opacity="0.75"/>
  <rect x="787" y="0" width="3" height="600" fill="#f5e06a" opacity="0.30"/>

  <!-- Radiating rays — thin lines from the eye center -->
  <g stroke="#d4af37" stroke-width="1.2" opacity="0.22">
    <line x1="400" y1="268" x2="400"  y2="80"/>
    <line x1="400" y1="268" x2="560"  y2="160"/>
    <line x1="400" y1="268" x2="630"  y2="310"/>
    <line x1="400" y1="268" x2="555"  y2="460"/>
    <line x1="400" y1="268" x2="400"  y2="520"/>
    <line x1="400" y1="268" x2="245"  y2="460"/>
    <line x1="400" y1="268" x2="170"  y2="310"/>
    <line x1="400" y1="268" x2="240"  y2="160"/>
    <line x1="400" y1="268" x2="480"  y2="100"/>
    <line x1="400" y1="268" x2="600"  y2="230"/>
    <line x1="400" y1="268" x2="600"  y2="390"/>
    <line x1="400" y1="268" x2="480"  y2="490"/>
    <line x1="400" y1="268" x2="320"  y2="490"/>
    <line x1="400" y1="268" x2="200"  y2="390"/>
    <line x1="400" y1="268" x2="200"  y2="230"/>
    <line x1="400" y1="268" x2="320"  y2="100"/>
  </g>

  <!-- Triangle of Providence (equilateral, pointing up) -->
  <!-- Outer triangle -->
  <polygon points="400,148 545,385 255,385"
           fill="none" stroke="#d4af37" stroke-width="4" stroke-linejoin="round" opacity="0.90"/>
  <!-- Inner triangle (thinner duplicate for depth) -->
  <polygon points="400,162 532,373 268,373"
           fill="none" stroke="#f5e06a" stroke-width="1.5" stroke-linejoin="round" opacity="0.30"/>
  <!-- Triangle fill (very subtle) -->
  <polygon points="400,152 541,381 259,381"
           fill="#d4af37" opacity="0.04"/>

  <!-- Glow around triangle apex -->
  <circle cx="400" cy="148" r="8" fill="#f5e06a" opacity="0.55"/>
  <circle cx="400" cy="148" r="14" fill="#d4af37" opacity="0.18"/>

  <!-- Eye of Providence — centered inside triangle -->
  <!-- Eye outer (white of eye) -->
  <ellipse cx="400" cy="268" rx="62" ry="32" fill="#f5e06a" opacity="0.15" stroke="#d4af37" stroke-width="2" />
  <!-- Eye shape (almond / vesica) -->
  <path d="M 338 268 Q 369 238 400 232 Q 431 238 462 268 Q 431 298 400 304 Q 369 298 338 268 Z"
        fill="#1a1000" stroke="#d4af37" stroke-width="2.5" opacity="0.95"/>
  <!-- Iris -->
  <circle cx="400" cy="268" r="22" fill="#2a1a00" stroke="#d4af37" stroke-width="1.5" opacity="0.92"/>
  <!-- Pupil -->
  <circle cx="400" cy="268" r="12" fill="#050200" opacity="0.95"/>
  <!-- Iris gold ring -->
  <circle cx="400" cy="268" r="20" fill="none" stroke="#c8a030" stroke-width="1" opacity="0.65"/>
  <!-- Iris detail lines -->
  <line x1="400" y1="248" x2="400" y2="288" stroke="#c8a030" stroke-width="0.8" opacity="0.35"/>
  <line x1="380" y1="258" x2="420" y2="278" stroke="#c8a030" stroke-width="0.8" opacity="0.35"/>
  <line x1="380" y1="278" x2="420" y2="258" stroke="#c8a030" stroke-width="0.8" opacity="0.35"/>
  <!-- Eye highlight -->
  <circle cx="393" cy="261" r="5" fill="#f5e06a" opacity="0.55"/>

  <!-- Small gold stars at triangle corners -->
  <circle cx="400" cy="148" r="3"  fill="#f5e06a" opacity="0.80"/>
  <circle cx="545" cy="385" r="3"  fill="#f5e06a" opacity="0.75"/>
  <circle cx="255" cy="385" r="3"  fill="#f5e06a" opacity="0.75"/>

  <!-- "DEUS PROVIDET" inscription below triangle (subtle) -->
  <text x="400" y="450" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" fill="#d4af37" opacity="0.45" letter-spacing="4">DEUS PROVIDET</text>

  <!-- Scattered stars -->
  <circle cx="160" cy="130" r="1.8" fill="#f5e06a" opacity="0.45"/>
  <circle cx="640" cy="130" r="1.8" fill="#f5e06a" opacity="0.45"/>
  <circle cx="150" cy="430" r="1.5" fill="#d4af37" opacity="0.38"/>
  <circle cx="650" cy="430" r="1.5" fill="#d4af37" opacity="0.38"/>
  <circle cx="200" cy="500" r="1.3" fill="#d4af37" opacity="0.30"/>
  <circle cx="600" cy="500" r="1.3" fill="#d4af37" opacity="0.30"/>

  <!-- Feast day -->
  <text x="400" y="568" text-anchor="middle" font-family="Lato, sans-serif" font-size="13" fill="#7a6020" letter-spacing="2.5">DIVINA PROVIDENCIA · DIVINE PROVIDENCE</text>
</svg>

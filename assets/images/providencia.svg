<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <defs>
    <radialGradient id="pv-bg" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#1c1200"/><stop offset="100%" stop-color="#0a0800"/>
    </radialGradient>
    <radialGradient id="pv-atm" cx="50%" cy="38%" r="46%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.30"/><stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="pv-r1" x1="50%" y1="0%" x2="10%" y2="100%">
      <stop offset="0%" stop-color="#f0c040" stop-opacity="1"/><stop offset="100%" stop-color="#8a6000" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="pv-r2" x1="50%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#fff8d0" stop-opacity="1"/><stop offset="100%" stop-color="#e8c060" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="pv-gl"><feGaussianBlur stdDeviation="9" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="pv-g2"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="600" fill="url(#pv-bg)"/>
  <rect width="400" height="600" fill="url(#pv-atm)"/>
  <!-- Rays -->
  <polygon points="198,262 -25,610 115,610" fill="url(#pv-r1)" filter="url(#pv-gl)" opacity="0.75"/>
  <polygon points="198,262 20,600  85,600"  fill="#f0c040" opacity="0.42"/>
  <polygon points="202,262 425,610 285,610" fill="url(#pv-r2)" filter="url(#pv-gl)" opacity="0.72"/>
  <polygon points="202,262 375,600 315,600" fill="#fff8d0" opacity="0.38"/>
  <!-- White robe -->
  <path d="M168,155 Q140,205 126,388 Q200,412 274,388 Q260,205 232,155 Z" fill="#f8f4e8" opacity="0.88"/>
  <!-- Golden mantle left -->
  <path d="M168,155 Q125,192 108,315 Q122,328 148,310 Q152,228 178,168 Z" fill="#c9a84c" opacity="0.82"/>
  <!-- Golden mantle right -->
  <path d="M232,155 Q260,198 268,315 Q288,320 294,298 Q286,198 248,158 Z" fill="#c9a84c" opacity="0.76"/>
  <!-- Arms open/welcoming -->
  <path d="M138,212 Q105,255 95,295" stroke="#f8f4e8" stroke-width="18" fill="none" stroke-linecap="round" opacity="0.84"/>
  <path d="M262,212 Q295,255 305,295" stroke="#f8f4e8" stroke-width="18" fill="none" stroke-linecap="round" opacity="0.84"/>
  <!-- Hands -->
  <ellipse cx="93"  cy="300" rx="13" ry="16" fill="#d4a06a" opacity="0.9"/>
  <ellipse cx="306" cy="300" rx="13" ry="16" fill="#d4a06a" opacity="0.9"/>
  <!-- Neck -->
  <rect x="193" y="142" width="14" height="18" rx="4" fill="#d4a06a" opacity="0.9"/>
  <!-- Head -->
  <ellipse cx="200" cy="110" rx="27" ry="31" fill="#d4a06a" opacity="0.92"/>
  <!-- Hair/beard (Christ) -->
  <path d="M173,107 Q176,72 200,68 Q224,72 227,107 Q219,88 200,86 Q181,88 173,107 Z" fill="#4a2808" opacity="0.88"/>
  <path d="M183,133 Q186,149 200,153 Q214,149 217,133 Q209,143 200,144 Q191,143 183,133 Z" fill="#4a2808" opacity="0.72"/>
  <!-- Halo -->
  <circle cx="200" cy="110" r="53" fill="none" stroke="#e8c97a" stroke-width="1.8" stroke-opacity="0.65" filter="url(#pv-g2)"/>
  <circle cx="200" cy="110" r="47" fill="none" stroke="#e8c97a" stroke-width="0.5" stroke-opacity="0.22"/>
  <line x1="200" y1="57" x2="200" y2="74" stroke="#f0d848" stroke-width="3.5" stroke-linecap="round" stroke-opacity="0.82"/>
  <line x1="187" y1="66" x2="213" y2="66" stroke="#f0d848" stroke-width="3.5" stroke-linecap="round" stroke-opacity="0.82"/>
  <!-- Bread loaf in left hand -->
  <ellipse cx="93" cy="310" rx="14" ry="9" fill="#c9a84c" opacity="0.88"/>
  <!-- Birds (providence) -->
  <path d="M300,190 Q308,184 316,190 Q308,187 300,190 Z" fill="#c9a84c" opacity="0.7"/>
  <path d="M320,175 Q328,169 336,175 Q328,172 320,175 Z" fill="#c9a84c" opacity="0.6"/>
  <!-- Frame -->
  <rect x="6" y="6" width="388" height="588" rx="8" fill="none" stroke="#c9a84c" stroke-width="1.2" stroke-opacity="0.5"/>
  <rect x="12" y="12" width="376" height="576" rx="5" fill="none" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.18"/>
  <!-- Panel -->
  <rect x="18" y="528" width="364" height="66" rx="6" fill="#0a0800" opacity="0.86"/>
  <line x1="46" y1="535" x2="354" y2="535" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.28"/>
  <text x="200" y="548" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#c9a84c" letter-spacing="3" opacity="0.9">DIVINA PROVIDENCIA  ·  DIVINE PROVIDENCE</text>
  <text x="200" y="567" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#f5e060" font-style="italic">«La Divina Providencia»</text>
  <text x="200" y="585" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#d4c040" font-style="italic" opacity="0.8">«Divine Providence»</text>
</svg>

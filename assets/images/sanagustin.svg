<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <defs>
    <radialGradient id="sau-bg" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#0e0818"/><stop offset="100%" stop-color="#080410"/>
    </radialGradient>
    <linearGradient id="sau-r1" x1="50%" y1="0%" x2="10%" y2="100%">
      <stop offset="0%" stop-color="#7828c0" stop-opacity="1"/><stop offset="100%" stop-color="#300c60" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="sau-r2" x1="50%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#f5e060" stop-opacity="1"/><stop offset="100%" stop-color="#c9a84c" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="sau-gl"><feGaussianBlur stdDeviation="9" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="sau-g2"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="600" fill="url(#sau-bg)"/>
  <rect width="400" height="600" fill="#380c60" opacity="0.10"/>
  <polygon points="198,265 -25,610 115,610" fill="url(#sau-r1)" filter="url(#sau-gl)" opacity="0.72"/>
  <polygon points="198,265 20,600  85,600"  fill="#7828c0" opacity="0.36"/>
  <polygon points="202,265 425,610 285,610" fill="url(#sau-r2)" filter="url(#sau-gl)" opacity="0.70"/>
  <polygon points="202,265 375,600 315,600" fill="#f5e060" opacity="0.34"/>
  <!-- Bishop purple vestments -->
  <path d="M168,155 Q140,205 126,390 Q200,415 274,390 Q260,205 232,155 Z" fill="#5a1890" opacity="0.82"/>
  <!-- Purple mantle + white alb showing -->
  <path d="M168,155 Q124,192 108,318 Q122,330 148,312 Q150,228 178,168 Z" fill="#480878" opacity="0.82"/>
  <path d="M232,155 Q260,198 270,318 Q290,322 296,300 Q286,198 248,158 Z" fill="#480878" opacity="0.75"/>
  <!-- Right arm blessing -->
  <path d="M260,215 Q285,248 292,280" stroke="#480878" stroke-width="16" fill="none" stroke-linecap="round" opacity="0.82"/>
  <!-- Left arm holding flaming heart -->
  <path d="M140,215 Q112,252 104,292" stroke="#5a1890" stroke-width="17" fill="none" stroke-linecap="round" opacity="0.86"/>
  <!-- Hands -->
  <ellipse cx="104" cy="295" rx="12" ry="15" fill="#c8a070" opacity="0.9"/>
  <ellipse cx="292" cy="283" rx="12" ry="15" fill="#c8a070" opacity="0.9"/>
  <!-- Flaming heart (Augustine's symbol) -->
  <path d="M96,312 Q92,305 96,298 Q100,292 104,295 Q108,292 112,298 Q116,305 112,312 Q104,320 96,312 Z" fill="#c82020" opacity="0.88"/>
  <line x1="104" y1="298" x2="104" y2="290" stroke="#f59020" stroke-width="2.5" opacity="0.80"/>
  <path d="M101,290 Q104,284 107,290" fill="#f59020" opacity="0.75"/>
  <!-- Bishop miter above halo -->
  <path d="M178,62 Q185,40 192,32 Q200,28 208,32 Q215,40 222,62 Q210,56 200,55 Q190,56 178,62 Z" fill="#5a1890" opacity="0.78"/>
  <!-- Pectoral cross -->
  <line x1="200" y1="200" x2="200" y2="235" stroke="#e8c060" stroke-width="3" opacity="0.65"/>
  <line x1="190" y1="214" x2="210" y2="214" stroke="#e8c060" stroke-width="2.5" opacity="0.65"/>
  <!-- Neck + head (bearded bishop) -->
  <rect x="193" y="142" width="14" height="16" rx="4" fill="#c8a070" opacity="0.9"/>
  <ellipse cx="200" cy="108" rx="26" ry="30" fill="#c8a070" opacity="0.92"/>
  <path d="M174,107 Q176,72 200,68 Q224,72 226,107 Q219,86 200,84 Q181,86 174,107 Z" fill="#5a3018" opacity="0.80"/>
  <path d="M182,128 Q190,136 200,137 Q210,136 218,128 Q210,131 200,132 Q190,131 182,128 Z" fill="#5a3018" opacity="0.72"/>
  <!-- Halo -->
  <circle cx="200" cy="108" r="53" fill="none" stroke="#e8c97a" stroke-width="1.8" stroke-opacity="0.65" filter="url(#sau-g2)"/>
  <circle cx="200" cy="108" r="47" fill="none" stroke="#e8c97a" stroke-width="0.5" stroke-opacity="0.22"/>
  <!-- Frame -->
  <rect x="6" y="6" width="388" height="588" rx="8" fill="none" stroke="#c9a84c" stroke-width="1.2" stroke-opacity="0.5"/>
  <rect x="12" y="12" width="376" height="576" rx="5" fill="none" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.18"/>
  <!-- Panel -->
  <rect x="18" y="528" width="364" height="66" rx="6" fill="#080410" opacity="0.86"/>
  <line x1="46" y1="535" x2="354" y2="535" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.28"/>
  <text x="200" y="548" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#c9a84c" letter-spacing="3" opacity="0.9">SAN AGUSTIN  ·  SAINT AUGUSTINE OF HIPPO</text>
  <text x="200" y="567" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#c080f8" font-style="italic">«San Agustín de Hipona»</text>
  <text x="200" y="585" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#f5e060" font-style="italic" opacity="0.8">«Saint Augustine of Hippo»</text>

  <!-- Minimal facial features for visual consistency across intercessors -->
  <g id="tup-face-features" opacity="0.9">
    <ellipse id="tup-eye-left" cx="186" cy="108" rx="3.1" ry="2.2" fill="#2a1a12"/>
    <ellipse id="tup-eye-right" cx="214" cy="108" rx="3.1" ry="2.2" fill="#2a1a12"/>
    <path id="tup-nose" d="M200 112 C198 118, 198 120, 200 123" stroke="#7b4a35" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <path id="tup-mouth" d="M192 132 Q200 137 208 132" stroke="#8f3a3a" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  </g>
</svg>

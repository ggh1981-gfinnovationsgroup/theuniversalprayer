<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <defs>
    <radialGradient id="ic-bg" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#061428"/><stop offset="100%" stop-color="#020810"/>
    </radialGradient>
    <radialGradient id="ic-atm" cx="50%" cy="38%" r="46%">
      <stop offset="0%" stop-color="#1a5fa0" stop-opacity="0.28"/><stop offset="100%" stop-color="#1a5fa0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ic-r1" x1="50%" y1="0%" x2="10%" y2="100%">
      <stop offset="0%" stop-color="#3a8fd8" stop-opacity="1"/><stop offset="100%" stop-color="#0d2a6a" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="ic-r2" x1="50%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#e8f4ff" stop-opacity="1"/><stop offset="100%" stop-color="#a0c8f0" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="ic-gl"><feGaussianBlur stdDeviation="9" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="ic-g2"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="600" fill="url(#ic-bg)"/>
  <rect width="400" height="600" fill="url(#ic-atm)"/>
  <!-- Rays from chest -->
  <polygon points="198,262 -25,610 115,610" fill="url(#ic-r1)" filter="url(#ic-gl)" opacity="0.75"/>
  <polygon points="198,262 20,600  85,600"  fill="#3a8fd8" opacity="0.42"/>
  <polygon points="202,262 425,610 285,610" fill="url(#ic-r2)" filter="url(#ic-gl)" opacity="0.72"/>
  <polygon points="202,262 375,600 315,600" fill="#e8f4ff" opacity="0.38"/>
  <!-- White robe -->
  <path d="M168,155 Q140,205 126,388 Q200,412 274,388 Q260,205 232,155 Z" fill="#f0f4ff" opacity="0.88"/>
  <!-- Blue mantle left -->
  <path d="M168,155 Q125,192 108,315 Q122,328 148,310 Q152,228 178,168 Z" fill="#1a5fa0" opacity="0.88"/>
  <!-- Blue mantle right -->
  <path d="M232,155 Q260,198 268,315 Q288,320 294,298 Q286,198 248,158 Z" fill="#1a5fa0" opacity="0.82"/>
  <!-- Arms folded in prayer -->
  <path d="M142,218 Q160,248 168,272" stroke="#f0f4ff" stroke-width="16" fill="none" stroke-linecap="round" opacity="0.82"/>
  <path d="M258,218 Q240,248 232,272" stroke="#1a5fa0" stroke-width="15" fill="none" stroke-linecap="round" opacity="0.78"/>
  <!-- Hands (folded) -->
  <ellipse cx="200" cy="278" rx="22" ry="12" fill="#d4a06a" opacity="0.85"/>
  <!-- Neck -->
  <rect x="193" y="142" width="14" height="18" rx="4" fill="#d4a06a" opacity="0.9"/>
  <!-- Head -->
  <ellipse cx="200" cy="110" rx="26" ry="30" fill="#d4a06a" opacity="0.92"/>
  <!-- Veil (blue) -->
  <path d="M174,100 Q172,65 200,60 Q228,65 226,100 Q220,78 200,76 Q180,78 174,100 Z" fill="#1a5fa0" opacity="0.88"/>
  <path d="M174,100 Q155,125 150,165 L168,155 Z" fill="#1a5fa0" opacity="0.78"/>
  <path d="M226,100 Q245,125 250,165 L232,155 Z" fill="#1a5fa0" opacity="0.72"/>
  <!-- Face highlight -->
  <ellipse cx="200" cy="112" rx="20" ry="24" fill="#e8c8a0" opacity="0.35"/>
  <!-- Halo -->
  <circle cx="200" cy="108" r="52" fill="none" stroke="#e8c97a" stroke-width="1.8" stroke-opacity="0.62" filter="url(#ic-g2)"/>
  <circle cx="200" cy="108" r="46" fill="none" stroke="#e8c97a" stroke-width="0.5" stroke-opacity="0.22"/>
  <!-- Stars on mantle -->
  <text x="145" y="195" font-family="Arial" font-size="9"  fill="#e8c97a" opacity="0.7">★</text>
  <text x="248" y="210" font-family="Arial" font-size="8"  fill="#e8c97a" opacity="0.65">★</text>
  <text x="132" y="255" font-family="Arial" font-size="8"  fill="#e8c97a" opacity="0.6">★</text>
  <text x="260" y="268" font-family="Arial" font-size="7"  fill="#e8c97a" opacity="0.55">★</text>
  <!-- Immaculate Heart -->
  <path d="M200,254 C188,241 172,241 172,257 C172,274 200,287 200,287 C200,287 228,274 228,257 C228,241 212,241 200,254 Z" fill="#c0392b" opacity="0.88" filter="url(#ic-g2)"/>
  <!-- Sword through heart -->
  <line x1="182" y1="242" x2="218" y2="282" stroke="#c8c8c8" stroke-width="2.5" stroke-opacity="0.9"/>
  <polygon points="182,242 178,236 186,238" fill="#c8c8c8" opacity="0.9"/>
  <!-- Roses around heart -->
  <circle cx="188" cy="255" r="5" fill="#e74c3c" opacity="0.75"/>
  <circle cx="212" cy="255" r="5" fill="#e74c3c" opacity="0.75"/>
  <!-- Flames on heart -->
  <path d="M196,248 C194,240 190,235 193,229 C195,224 198,229 198,234 C199,229 201,224 203,229 C206,235 202,240 200,248 Z" fill="#f39c12" opacity="0.88"/>
  <!-- Heart glow -->
  <circle cx="200" cy="267" r="24" fill="#1a5fa0" opacity="0.12" filter="url(#ic-gl)"/>
  <!-- Frame -->
  <rect x="6" y="6" width="388" height="588" rx="8" fill="none" stroke="#c9a84c" stroke-width="1.2" stroke-opacity="0.5"/>
  <rect x="12" y="12" width="376" height="576" rx="5" fill="none" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.18"/>
  <!-- Panel -->
  <rect x="18" y="528" width="364" height="66" rx="6" fill="#020810" opacity="0.86"/>
  <line x1="46" y1="535" x2="354" y2="535" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.28"/>
  <text x="200" y="548" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" fill="#c9a84c" letter-spacing="2.5" opacity="0.9">INMACULADO CORAZON  ·  IMMACULATE HEART</text>
  <text x="200" y="567" text-anchor="middle" font-family="Georgia,serif" font-size="13.5" fill="#b8d8f8" font-style="italic">«Inmaculado Corazón de María»</text>
  <text x="200" y="585" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#90b8e0" font-style="italic" opacity="0.8">«Immaculate Heart of Mary»</text>
</svg>

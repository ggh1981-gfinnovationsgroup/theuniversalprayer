<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="icBg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#062045"/>
      <stop offset="100%" stop-color="#020c22"/>
    </radialGradient>
    <radialGradient id="icGlow" cx="50%" cy="38%" r="48%">
      <stop offset="0%" stop-color="rgba(41,128,185,0.25)"/>
      <stop offset="100%" stop-color="rgba(41,128,185,0)"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#icBg)"/>
  <rect width="800" height="600" fill="url(#icGlow)"/>

  <!-- Accent strips: Marian blue + white -->
  <rect x="0"   y="0" width="7" height="600" fill="#2980b9" opacity="0.8"/>
  <rect x="7"   y="0" width="3" height="600" fill="#f0ece4" opacity="0.4"/>
  <rect x="790" y="0" width="7" height="600" fill="#2980b9" opacity="0.8"/>
  <rect x="787" y="0" width="3" height="600" fill="#f0ece4" opacity="0.4"/>

  <!-- Soft blue halo ring around heart -->
  <circle cx="400" cy="295" r="135" fill="none" stroke="#2980b9" stroke-width="1.5" opacity="0.35"/>
  <circle cx="400" cy="295" r="118" fill="none" stroke="#2980b9" stroke-width="1"   opacity="0.2"/>

  <!-- Roses flanking heart (left side) -->
  <!-- Left rose -->
  <circle cx="265" cy="295" r="18" fill="#c0665b" opacity="0.85"/>
  <circle cx="255" cy="285" r="11" fill="#e08880" opacity="0.7"/>
  <circle cx="272" cy="284" r="10" fill="#b85050" opacity="0.65"/>
  <circle cx="265" cy="278" r="8"  fill="#e08880" opacity="0.55"/>
  <!-- Left rose petals -->
  <ellipse cx="248" cy="295" rx="8" ry="5" fill="#c0665b" opacity="0.6" transform="rotate(-20 248 295)"/>
  <ellipse cx="280" cy="292" rx="8" ry="5" fill="#c0665b" opacity="0.6" transform="rotate(15 280 292)"/>
  <!-- Left rose leaves -->
  <ellipse cx="252" cy="312" rx="10" ry="5" fill="#2a7a3a" opacity="0.7" transform="rotate(-35 252 312)"/>
  <ellipse cx="278" cy="315" rx="10" ry="5" fill="#2a7a3a" opacity="0.7" transform="rotate(30 278 315)"/>

  <!-- Right rose -->
  <circle cx="535" cy="295" r="18" fill="#c0665b" opacity="0.85"/>
  <circle cx="525" cy="285" r="11" fill="#e08880" opacity="0.7"/>
  <circle cx="542" cy="284" r="10" fill="#b85050" opacity="0.65"/>
  <circle cx="535" cy="278" r="8"  fill="#e08880" opacity="0.55"/>
  <ellipse cx="518" cy="292" rx="8" ry="5" fill="#c0665b" opacity="0.6" transform="rotate(-15 518 292)"/>
  <ellipse cx="550" cy="295" rx="8" ry="5" fill="#c0665b" opacity="0.6" transform="rotate(20 550 295)"/>
  <ellipse cx="522" cy="312" rx="10" ry="5" fill="#2a7a3a" opacity="0.7" transform="rotate(-30 522 312)"/>
  <ellipse cx="548" cy="315" rx="10" ry="5" fill="#2a7a3a" opacity="0.7" transform="rotate(35 548 315)"/>

  <!-- Immaculate Heart — outlined, gold border -->
  <path d="M 400 390 C 340 360 295 330 295 285 C 295 255 315 235 340 235 C 358 235 375 245 400 265 C 425 245 442 235 460 235 C 485 235 505 255 505 285 C 505 330 460 360 400 390 Z"
        fill="#0a1835" stroke="#d4af37" stroke-width="3" opacity="0.95"/>
  <!-- Inner heart fill (subtle blue) -->
  <path d="M 400 380 C 348 352 305 325 305 285 C 305 261 322 243 344 243 C 362 243 378 252 400 272 C 422 252 438 243 456 243 C 478 243 495 261 495 285 C 495 325 452 352 400 380 Z"
        fill="#0c2050" opacity="0.8"/>

  <!-- Flames on top of heart (3 flames) -->
  <path d="M 378 238 C 372 215 365 200 375 188 C 382 180 388 190 383 202 C 390 190 393 175 400 170 C 407 175 410 190 405 202 C 409 192 416 182 423 190 C 430 200 422 216 418 238"
        fill="#e8a020" opacity="0.85"/>
  <path d="M 388 236 C 384 220 381 208 387 198 C 392 190 396 198 394 208 C 398 198 401 187 400 182 C 403 188 406 198 404 208 C 406 198 410 192 414 200 C 418 210 414 224 412 236"
        fill="#f0c040" opacity="0.65"/>

  <!-- Sword (silver/white, blade through heart) -->
  <!-- Blade -->
  <polygon points="400,175 394,360 406,360" fill="#d0d8f0" opacity="0.88"/>
  <polygon points="400,175 399,360 402,360" fill="#ffffff" opacity="0.35"/>
  <!-- Guard -->
  <rect x="370" y="355" width="60" height="10" rx="3" fill="#d4af37" opacity="0.85"/>
  <!-- Pommel -->
  <ellipse cx="400" cy="373" rx="10" ry="7" fill="#d4af37" opacity="0.80"/>

  <!-- Crown of stars at top -->
  <g opacity="0.75" fill="#f5e06a">
    <polygon points="400,130 403,140 414,140 405,147 408,157 400,150 392,157 395,147 386,140 397,140" transform="translate(0,-5)"/>
    <polygon points="370,145 373,153 381,153 375,158 377,166 370,161 363,166 365,158 359,153 367,153" transform="scale(0.75) translate(130,55)"/>
    <polygon points="430,145 433,153 441,153 435,158 437,166 430,161 423,166 425,158 419,153 427,153" transform="scale(0.75) translate(-40,55)"/>
  </g>

  <!-- Monogram IHS subtle -->
  <text x="400" y="340" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-style="italic" fill="#5a8ab8" opacity="0.45" letter-spacing="2">♡</text>

  <!-- Star field -->
  <circle cx="155" cy="130" r="1.8" fill="#f0ece4" opacity="0.35"/>
  <circle cx="645" cy="140" r="1.8" fill="#f0ece4" opacity="0.35"/>
  <circle cx="175" cy="460" r="1.4" fill="#2980b9" opacity="0.45"/>
  <circle cx="625" cy="450" r="1.4" fill="#2980b9" opacity="0.45"/>
  <circle cx="200" cy="300" r="1.3" fill="#f0ece4" opacity="0.28"/>
  <circle cx="600" cy="285" r="1.3" fill="#f0ece4" opacity="0.28"/>
  <circle cx="300" cy="470" r="1.3" fill="#d4af37" opacity="0.30"/>
  <circle cx="500" cy="460" r="1.3" fill="#d4af37" opacity="0.30"/>

  <!-- Name (bilingual) -->
  <text x="400" y="540" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#e8c97a" letter-spacing="1">Inmaculado Coraz&#xF3;n de Mar&#xED;a</text>
  <text x="400" y="562" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#8ab4d8" font-style="italic" opacity="0.85">Immaculate Heart of Mary</text>
  <text x="400" y="585" text-anchor="middle" font-family="Lato, sans-serif" font-size="10" fill="#4a6a8a" letter-spacing="2">AGOSTO 22 · AUGUST 22</text>
</svg>

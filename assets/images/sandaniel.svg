<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <defs>
    <radialGradient id="sdn-bg" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#14100a"/><stop offset="100%" stop-color="#060402"/>
    </radialGradient>
    <radialGradient id="sdn-atm" cx="50%" cy="38%" r="46%">
      <stop offset="0%" stop-color="#806020" stop-opacity="0.26"/><stop offset="100%" stop-color="#806020" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sdn-r1" x1="50%" y1="0%" x2="10%" y2="100%">
      <stop offset="0%" stop-color="#c08020" stop-opacity="1"/><stop offset="100%" stop-color="#604010" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="sdn-r2" x1="50%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#f5e060" stop-opacity="1"/><stop offset="100%" stop-color="#c9a84c" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="sdn-gl"><feGaussianBlur stdDeviation="9" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="sdn-g2"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="600" fill="url(#sdn-bg)"/>
  <rect width="400" height="600" fill="url(#sdn-atm)"/>
  <!-- Rays: amber left, gold right -->
  <polygon points="198,262 -25,610 115,610" fill="url(#sdn-r1)" filter="url(#sdn-gl)" opacity="0.72"/>
  <polygon points="198,262 20,600  85,600"  fill="#c08020" opacity="0.38"/>
  <polygon points="202,262 425,610 285,610" fill="url(#sdn-r2)" filter="url(#sdn-gl)" opacity="0.70"/>
  <polygon points="202,262 375,600 315,600" fill="#f5e060" opacity="0.34"/>
  <!-- Prophet linen robe (cream/white) -->
  <path d="M166,155 Q140,205 126,460 Q160,476 200,478 Q240,476 274,460 Q260,205 234,155 Z" fill="#e8e0c8" opacity="0.90"/>
  <!-- Robe highlight -->
  <path d="M178,160 Q158,215 150,442 Q174,460 200,462 Q188,222 182,163 Z" fill="#c8baa8" opacity="0.38"/>
  <!-- Robe shadow -->
  <path d="M222,160 Q242,215 250,442 Q226,460 200,462 Q212,222 218,163 Z" fill="#b0a898" opacity="0.35"/>
  <!-- Blue sash belt -->
  <rect x="160" y="272" width="80" height="12" rx="4" fill="#2040a0" opacity="0.72"/>
  <!-- Blue outer mantle draped left -->
  <path d="M164,165 Q118,205 108,338 Q122,348 140,342 Q148,288 164,232 Z" fill="#2040a0" opacity="0.58"/>
  <!-- Left arm holding scroll -->
  <path d="M160,215 Q126,248 114,312 Q126,322 138,316 Q144,282 160,232 Z" fill="#e8e0c8" opacity="0.90"/>
  <!-- Scroll -->
  <rect x="96" y="302" width="42" height="28" rx="5" fill="#f0e8c0" opacity="0.95"/>
  <rect x="92" y="300" width="8" height="32" rx="4" fill="#8a6018"/>
  <rect x="138" y="300" width="8" height="32" rx="4" fill="#8a6018"/>
  <line x1="102" y1="312" x2="136" y2="312" stroke="#8a7030" stroke-width="1" opacity="0.6"/>
  <line x1="102" y1="318" x2="136" y2="318" stroke="#8a7030" stroke-width="1" opacity="0.6"/>
  <line x1="102" y1="324" x2="136" y2="324" stroke="#8a7030" stroke-width="1" opacity="0.6"/>
  <!-- Right arm raised in prayer -->
  <path d="M240,215 Q268,245 278,288 Q268,298 258,292 Q252,268 240,232 Z" fill="#e8e0c8" opacity="0.90"/>
  <!-- Right hand open -->
  <ellipse cx="276" cy="294" rx="13" ry="9" fill="#c8a068" opacity="0.90"/>
  <!-- Left hand -->
  <ellipse cx="118" cy="316" rx="13" ry="9" fill="#c8a068" opacity="0.90"/>
  <!-- Lion at feet (tame, closed eyes) -->
  <ellipse cx="148" cy="468" rx="52" ry="18" fill="#b07818" opacity="0.78"/>
  <circle cx="188" cy="458" r="20" fill="#b07818" opacity="0.78"/>
  <circle cx="188" cy="458" r="26" fill="#7a4808" opacity="0.42"/>
  <path d="M180,455 Q184,452 188,455" fill="none" stroke="#3a2000" stroke-width="1.5" stroke-linecap="round"/>
  <ellipse cx="120" cy="480" rx="10" ry="6" fill="#b07818" opacity="0.65"/>
  <ellipse cx="142" cy="482" rx="10" ry="6" fill="#b07818" opacity="0.65"/>
  <!-- Neck -->
  <rect x="193" y="140" width="14" height="18" rx="4" fill="#c8a068" opacity="0.90"/>
  <!-- Head -->
  <ellipse cx="200" cy="108" rx="27" ry="31" fill="#c8a068" opacity="0.92"/>
  <!-- Dark beard and hair -->
  <path d="M174,108 Q176,72 200,66 Q224,72 226,108 Q220,86 200,84 Q180,86 174,108 Z" fill="#2a1a06" opacity="0.85"/>
  <path d="M182,130 Q182,148 200,154 Q218,148 218,130 Q210,142 200,144 Q190,142 182,130 Z" fill="#2a1a06" opacity="0.65"/>
  <!-- Halo -->
  <circle cx="200" cy="108" r="53" fill="none" stroke="#e8c97a" stroke-width="1.8" stroke-opacity="0.65" filter="url(#sdn-g2)"/>
  <circle cx="200" cy="108" r="47" fill="none" stroke="#e8c97a" stroke-width="0.5" stroke-opacity="0.22"/>
  <!-- Frame -->
  <rect x="6" y="6" width="388" height="588" rx="8" fill="none" stroke="#c9a84c" stroke-width="1.2" stroke-opacity="0.5"/>
  <rect x="12" y="12" width="376" height="576" rx="5" fill="none" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.18"/>
  <!-- Panel -->
  <rect x="18" y="528" width="364" height="66" rx="6" fill="#060402" opacity="0.88"/>
  <line x1="46" y1="535" x2="354" y2="535" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.28"/>
  <text x="200" y="548" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#c9a84c" letter-spacing="3" opacity="0.9">SAN DANIEL PROFETA  ·  SAINT DANIEL THE PROPHET</text>
  <text x="200" y="567" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#f0d060" font-style="italic">«El foso de los leones»</text>
  <text x="200" y="585" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#d4b840" font-style="italic" opacity="0.8">«The lions' den»</text>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#e8d8a0"/>
      <stop offset="50%" stop-color="#b08020"/>
      <stop offset="100%" stop-color="#2a1a04"/>
    </radialGradient>
    <radialGradient id="haloGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe890" stop-opacity="0.95"/>
      <stop offset="65%" stop-color="#d4a020" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#d4a020" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background — warm Babylonian gold/earth tones -->
  <rect width="400" height="600" fill="url(#bgGrad)"/>

  <!-- Babylonian arch / pillars suggestion -->
  <rect x="40" y="200" width="18" height="310" rx="4" fill="#6a4a10" opacity="0.35"/>
  <rect x="342" y="200" width="18" height="310" rx="4" fill="#6a4a10" opacity="0.35"/>
  <path d="M 40 200 Q 200 130 360 200" fill="none" stroke="#6a4a10" stroke-width="10" opacity="0.3" stroke-linecap="round"/>

  <!-- Ground / floor tiles -->
  <rect x="0" y="490" width="400" height="110" fill="#4a3010" opacity="0.25"/>

  <!-- Halo -->
  <ellipse cx="200" cy="150" rx="58" ry="58" fill="url(#haloGrad)"/>
  <circle cx="200" cy="150" r="52" fill="none" stroke="#d4a020" stroke-width="1.8" opacity="0.7"/>

  <!-- Head -->
  <ellipse cx="200" cy="152" rx="29" ry="33" fill="#d8a870"/>

  <!-- Dark beard and hair (prophet look) -->
  <path d="M 173 148 Q 174 120 200 112 Q 226 120 227 148 Q 222 132 200 130 Q 178 132 173 148 Z" fill="#2a1a06"/>
  <!-- Beard -->
  <path d="M 174 166 Q 172 185 180 198 Q 190 206 200 208 Q 210 206 220 198 Q 228 185 226 166 Q 218 172 200 172 Q 182 172 174 166 Z" fill="#2a1a06"/>
  <!-- Ears -->
  <ellipse cx="171" cy="156" rx="5" ry="7" fill="#c89860"/>
  <ellipse cx="229" cy="156" rx="5" ry="7" fill="#c89860"/>

  <!-- Prophet robe — linen/white outer -->
  <path d="M 160 220 Q 140 280 130 460 Q 160 474 200 476 Q 240 474 270 460 Q 260 280 240 220 Q 220 235 200 236 Q 180 235 160 220 Z"
        fill="#e8e0c8"/>
  <!-- Robe shadow / fold lines -->
  <path d="M 175 225 Q 158 288 152 440 Q 174 452 200 453 Q 183 300 178 238 Z" fill="#c8baa8" opacity="0.45"/>
  <path d="M 225 225 Q 242 288 248 440 Q 226 452 200 453 Q 217 300 222 238 Z" fill="#b8aa98" opacity="0.45"/>

  <!-- Belt / sash (blue — Daniel's Hebrew colors) -->
  <rect x="162" y="275" width="76" height="12" rx="4" fill="#2040a0" opacity="0.7"/>

  <!-- Outer mantle (darker blue/brown) draped left -->
  <path d="M 164 222 Q 120 258 110 340 Q 122 346 138 342 Q 148 290 162 265 Z" fill="#2040a0" opacity="0.55"/>

  <!-- Left arm holding scroll -->
  <path d="M 160 248 Q 128 268 116 316 Q 126 325 138 320 Q 145 284 160 264 Z" fill="#e8e0c8"/>
  <!-- Scroll in left hand -->
  <rect x="98" y="305" width="42" height="28" rx="5" fill="#f0e8c0"/>
  <rect x="98" y="305" width="42" height="28" rx="5" fill="none" stroke="#a08020" stroke-width="1.5"/>
  <!-- Scroll ends / rollers -->
  <rect x="94" y="303" width="8" height="32" rx="4" fill="#8a6018"/>
  <rect x="138" y="303" width="8" height="32" rx="4" fill="#8a6018"/>
  <!-- Lines on scroll -->
  <line x1="104" y1="315" x2="136" y2="315" stroke="#8a7030" stroke-width="1" opacity="0.6"/>
  <line x1="104" y1="321" x2="136" y2="321" stroke="#8a7030" stroke-width="1" opacity="0.6"/>
  <line x1="104" y1="327" x2="136" y2="327" stroke="#8a7030" stroke-width="1" opacity="0.6"/>

  <!-- Right arm raised slightly (praying/gesturing) -->
  <path d="M 240 248 Q 268 265 278 310 Q 268 320 258 315 Q 252 282 240 264 Z" fill="#e8e0c8"/>
  <!-- Right hand open -->
  <ellipse cx="276" cy="316" rx="13" ry="9" fill="#d8a870"/>

  <!-- Lion lying at feet (submission — lions' den) -->
  <!-- Lion body -->
  <ellipse cx="145" cy="465" rx="52" ry="20" fill="#c8880c" opacity="0.85"/>
  <!-- Lion head -->
  <circle cx="185" cy="455" r="20" fill="#c8880c" opacity="0.85"/>
  <!-- Mane -->
  <circle cx="185" cy="455" r="25" fill="#7a4400" opacity="0.5"/>
  <!-- Lion eye (closed) -->
  <path d="M 179 452 Q 183 449 187 452" fill="none" stroke="#3a2000" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Lion tail -->
  <path d="M 94 460 Q 80 448 86 438 Q 92 448 96 460 Z" fill="#c8880c" opacity="0.7"/>
  <!-- Lion paws -->
  <ellipse cx="118" cy="478" rx="10" ry="6" fill="#c8880c" opacity="0.7"/>
  <ellipse cx="140" cy="480" rx="10" ry="6" fill="#c8880c" opacity="0.7"/>

  <!-- Angel figure hint (upper right) -->
  <ellipse cx="330" cy="110" rx="22" ry="26" fill="#f8f0d8" opacity="0.45"/>
  <!-- Angel wings suggestion -->
  <path d="M 310 100 Q 290 80 300 60 Q 318 82 318 100 Z" fill="#f8f0d8" opacity="0.3"/>
  <path d="M 350 100 Q 370 80 360 60 Q 342 82 342 100 Z" fill="#f8f0d8" opacity="0.3"/>

  <!-- Stars (Babylonian astrology / Daniel's context) -->
  <g fill="#f8e030" opacity="0.55">
    <polygon points="52,62 55,54 58,62 50,57 60,57" />
    <polygon points="72,40 75,32 78,40 70,35 80,35" />
    <polygon points="340,50 343,42 346,50 338,45 348,45" />
    <polygon points="358,74 361,66 364,74 356,69 366,69" />
  </g>

  <!-- Name panel -->
  <rect x="18" y="528" width="364" height="66" rx="6" fill="#1a1206" opacity="0.90"/>
  <text x="200" y="548" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#c9a030" letter-spacing="3" opacity="0.95">SAN DANIEL  ·  SAINT DANIEL</text>
  <text x="200" y="567" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#f0d870" font-style="italic">«El foso de los leones»</text>
  <text x="200" y="585" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#d8c060" font-style="italic" opacity="0.8">«The lions' den»</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <defs>
    <radialGradient id="sa-bg" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#1e0e08"/><stop offset="100%" stop-color="#0a0400"/>
    </radialGradient>
    <radialGradient id="sa-atm" cx="50%" cy="38%" r="46%">
      <stop offset="0%" stop-color="#8a4018" stop-opacity="0.28"/><stop offset="100%" stop-color="#8a4018" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sa-r1" x1="50%" y1="0%" x2="10%" y2="100%">
      <stop offset="0%" stop-color="#c07030" stop-opacity="1"/><stop offset="100%" stop-color="#5a2808" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="sa-r2" x1="50%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#f5e060" stop-opacity="1"/><stop offset="100%" stop-color="#c9a84c" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="sa-gl"><feGaussianBlur stdDeviation="9" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="sa-g2"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="600" fill="url(#sa-bg)"/>
  <rect width="400" height="600" fill="url(#sa-atm)"/>
  <!-- Rays: brown left, gold right -->
  <polygon points="198,265 -25,610 115,610" fill="url(#sa-r1)" filter="url(#sa-gl)" opacity="0.75"/>
  <polygon points="198,265 20,600  85,600"  fill="#c07030" opacity="0.40"/>
  <polygon points="202,265 425,610 285,610" fill="url(#sa-r2)" filter="url(#sa-gl)" opacity="0.72"/>
  <polygon points="202,265 375,600 315,600" fill="#f5e060" opacity="0.36"/>
  <!-- Brown Franciscan habit -->
  <path d="M168,155 Q140,205 126,390 Q200,415 274,390 Q260,205 232,155 Z" fill="#7a4a28" opacity="0.90"/>
  <!-- White rope cord -->
  <path d="M145,285 Q200,296 255,285" stroke="#f0e8d0" stroke-width="5" fill="none" stroke-opacity="0.7" stroke-linecap="round"/>
  <!-- Left arm holding lily stem -->
  <path d="M138,212 Q110,252 102,292" stroke="#7a4a28" stroke-width="18" fill="none" stroke-linecap="round" opacity="0.88"/>
  <!-- Right arm cradling Child Jesus -->
  <path d="M262,212 Q284,242 282,272" stroke="#7a4a28" stroke-width="17" fill="none" stroke-linecap="round" opacity="0.85"/>
  <!-- Open book as support -->
  <rect x="268" y="268" width="36" height="24" rx="2" fill="#e8d0a0" opacity="0.82"/>
  <line x1="286" y1="268" x2="286" y2="292" stroke="#8a6030" stroke-width="1" opacity="0.45"/>
  <!-- Child Jesus in arms (clearly visible) -->
  <path d="M274,254 Q271,272 286,276 Q301,272 298,254 Z" fill="#f8f4e8" opacity="0.92"/>
  <rect x="282" y="244" width="8" height="12" rx="2" fill="#d4a06a" opacity="0.88"/>
  <circle cx="286" cy="238" r="12" fill="#d4a06a" opacity="0.90"/>
  <circle cx="286" cy="238" r="16" fill="none" stroke="#e8c97a" stroke-width="1.4" stroke-opacity="0.75"/>
  <!-- Child's hand raised in blessing -->
  <line x1="299" y1="255" x2="308" y2="244" stroke="#d4a06a" stroke-width="4" stroke-linecap="round" opacity="0.78"/>
  <!-- White lily on left (symbol of purity) -->
  <line x1="102" y1="292" x2="102" y2="240" stroke="#7aaa40" stroke-width="2.5" opacity="0.8"/>
  <ellipse cx="102" cy="236" rx="6" ry="10" fill="#f8f4e8" opacity="0.88"/>
  <ellipse cx="95"  cy="248" rx="5" ry="9"  fill="#f8f4e8" opacity="0.75"/>
  <!-- Hand -->
  <ellipse cx="103" cy="296" rx="13" ry="16" fill="#d4a06a" opacity="0.9"/>
  <!-- Neck -->
  <rect x="193" y="142" width="14" height="18" rx="4" fill="#d4a06a" opacity="0.9"/>
  <!-- Head (young, beardless Franciscan friar) -->
  <ellipse cx="200" cy="108" rx="26" ry="30" fill="#d4a06a" opacity="0.92"/>
  <!-- Brown tonsure/hood -->
  <path d="M174,106 Q176,72 200,68 Q224,72 226,106 Q219,86 200,84 Q181,86 174,106 Z" fill="#5a3218" opacity="0.82"/>
  <!-- Hood back over shoulders -->
  <path d="M168,155 Q148,162 142,180 L166,170 Z" fill="#6a3818" opacity="0.8"/>
  <path d="M232,155 Q252,162 258,180 L234,170 Z" fill="#6a3818" opacity="0.8"/>
  <!-- Halo -->
  <circle cx="200" cy="108" r="53" fill="none" stroke="#e8c97a" stroke-width="1.8" stroke-opacity="0.65" filter="url(#sa-g2)"/>
  <circle cx="200" cy="108" r="47" fill="none" stroke="#e8c97a" stroke-width="0.5" stroke-opacity="0.22"/>
  <!-- Frame -->
  <rect x="6" y="6" width="388" height="588" rx="8" fill="none" stroke="#c9a84c" stroke-width="1.2" stroke-opacity="0.5"/>
  <rect x="12" y="12" width="376" height="576" rx="5" fill="none" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.18"/>
  <!-- Panel -->
  <rect x="18" y="528" width="364" height="66" rx="6" fill="#0a0400" opacity="0.86"/>
  <line x1="46" y1="535" x2="354" y2="535" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.28"/>
  <text x="200" y="548" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#c9a84c" letter-spacing="3" opacity="0.9">SAN ANTONIO DE PADUA  ·  SAINT ANTHONY</text>
  <text x="200" y="567" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#f5e060" font-style="italic">«San Antonio de Padua»</text>
  <text x="200" y="585" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#d4c040" font-style="italic" opacity="0.8">«Saint Anthony of Padua»</text>
</svg>

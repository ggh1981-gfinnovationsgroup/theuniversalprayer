<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="sj-bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#112218"/>
      <stop offset="100%" stop-color="#0a0d14"/>
    </radialGradient>
    <radialGradient id="sj-glow" cx="50%" cy="38%" r="38%">
      <stop offset="0%" stop-color="#2ecc71" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#2ecc71" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sj-flame" cx="50%" cy="80%" r="60%">
      <stop offset="0%" stop-color="#f39c12" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#e74c3c" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#c0392b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#sj-bg)"/>
  <rect width="800" height="600" fill="url(#sj-glow)"/>

  <!-- Decorative border -->
  <rect x="28" y="28" width="744" height="544" rx="6" fill="none" stroke="#2ecc71" stroke-width="1" stroke-opacity="0.4"/>
  <rect x="36" y="36" width="728" height="528" rx="4" fill="none" stroke="#2ecc71" stroke-width="0.5" stroke-opacity="0.2"/>

  <!-- Green robe accent strip (left) -->
  <rect x="28" y="28" width="6" height="544" rx="3" fill="#27ae60" opacity="0.6"/>
  <!-- Green robe accent strip (right) -->
  <rect x="766" y="28" width="6" height="544" rx="3" fill="#27ae60" opacity="0.6"/>

  <!-- Flame of the Holy Spirit (Pentecost) above medallion -->
  <!-- outer glow -->
  <ellipse cx="400" cy="128" rx="28" ry="46" fill="url(#sj-flame)" opacity="0.5"/>
  <!-- flame body -->
  <path d="M400 84 C394 98 386 112 390 126 C393 136 407 136 410 126 C414 112 406 98 400 84Z"
        fill="#f39c12" opacity="0.9"/>
  <path d="M400 94 C397 104 393 114 396 123 C398 130 402 130 404 123 C407 114 403 104 400 94Z"
        fill="#fffde7" opacity="0.85"/>

  <!-- Medallion circle (image of Jesus) -->
  <circle cx="400" cy="185" r="64" fill="#0d1a10" stroke="#2ecc71" stroke-width="2" stroke-opacity="0.7"/>
  <circle cx="400" cy="185" r="58" fill="none" stroke="#f1c40f" stroke-width="1" stroke-opacity="0.4"/>
  <!-- Cross inside medallion -->
  <line x1="400" y1="148" x2="400" y2="222" stroke="#f1c40f" stroke-width="2.5" stroke-opacity="0.8"/>
  <line x1="372" y1="173" x2="428" y2="173" stroke="#f1c40f" stroke-width="2.5" stroke-opacity="0.8"/>
  <!-- IHS monogram -->
  <text x="400" y="194" text-anchor="middle" font-family="Georgia,serif" font-size="22"
        fill="#f1c40f" opacity="0.9" letter-spacing="2">IHS</text>

  <!-- Green rays emanating from medallion -->
  <line x1="400" y1="121" x2="400" y2="84"  stroke="#2ecc71" stroke-width="1.5" stroke-opacity="0.3"/>
  <line x1="445" y1="140" x2="472" y2="112" stroke="#2ecc71" stroke-width="1" stroke-opacity="0.25"/>
  <line x1="355" y1="140" x2="328" y2="112" stroke="#2ecc71" stroke-width="1" stroke-opacity="0.25"/>
  <line x1="464" y1="185" x2="500" y2="185" stroke="#2ecc71" stroke-width="1" stroke-opacity="0.2"/>
  <line x1="336" y1="185" x2="300" y2="185" stroke="#2ecc71" stroke-width="1" stroke-opacity="0.2"/>

  <!-- Name -->
  <text x="400" y="308" text-anchor="middle" font-family="Georgia,serif" font-size="38"
        fill="#2ecc71" letter-spacing="2">San Judas Tadeo</text>
  <text x="400" y="350" text-anchor="middle" font-family="Georgia,serif" font-size="16"
        fill="#27ae60" opacity="0.85" font-style="italic">Saint Jude Thaddaeus</text>

  <!-- Subtitle -->
  <text x="400" y="386" text-anchor="middle" font-family="Georgia,serif" font-size="14"
        fill="#2ecc71" opacity="0.7" font-style="italic">Patrono de las Causas Imposibles</text>
  <text x="400" y="408" text-anchor="middle" font-family="Georgia,serif" font-size="13"
        fill="#2ecc71" opacity="0.5" font-style="italic">Patron of Impossible Causes</text>

  <!-- Divider -->
  <line x1="280" y1="432" x2="520" y2="432" stroke="#2ecc71" stroke-width="0.6" stroke-opacity="0.45"/>

  <!-- Feast day -->
  <text x="400" y="466" text-anchor="middle" font-family="Arial,sans-serif" font-size="12"
        fill="#27ae60" letter-spacing="3">FEAST DAY · OCTOBER 28</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="juan-bg" cx="50%" cy="38%" r="60%">
      <stop offset="0%" stop-color="#000e2a"/>
      <stop offset="100%" stop-color="#00060e"/>
    </radialGradient>
    <radialGradient id="juan-glow" cx="50%" cy="35%" r="50%">
      <stop offset="0%" stop-color="rgba(40,90,200,0.25)"/>
      <stop offset="100%" stop-color="rgba(40,90,200,0)"/>
    </radialGradient>
  </defs>

  <!-- Background: deep blue -->
  <rect width="800" height="600" fill="url(#juan-bg)"/>
  <rect width="800" height="600" fill="url(#juan-glow)"/>

  <!-- Border -->
  <rect x="28" y="28" width="744" height="544" rx="6" fill="none" stroke="#3a6aaa" stroke-width="1" stroke-opacity="0.55"/>
  <rect x="36" y="36" width="728" height="528" rx="4" fill="none" stroke="#3a6aaa" stroke-width="0.5" stroke-opacity="0.25"/>

  <!-- Side accent strips -->
  <rect x="28" y="28" width="6" height="544" rx="3" fill="#1a3a6a" opacity="0.80"/>
  <rect x="766" y="28" width="6" height="544" rx="3" fill="#1a3a6a" opacity="0.80"/>

  <!-- Eagle — symbol of John the Evangelist -->
  <!-- Eagle body -->
  <ellipse cx="400" cy="280" rx="52" ry="38" fill="#0d1e40" stroke="#3a6aaa" stroke-width="1.5" opacity="0.90"/>
  <!-- Eagle head -->
  <ellipse cx="400" cy="232" rx="26" ry="22" fill="#0d1e40" stroke="#3a6aaa" stroke-width="1.5" opacity="0.90"/>
  <!-- Eagle beak -->
  <path d="M 408 238 L 424 248 L 408 250 Z" fill="#c9a84c" opacity="0.85"/>
  <!-- Eagle eye -->
  <circle cx="408" cy="232" r="4" fill="#c9a84c" opacity="0.90"/>
  <circle cx="409" cy="231" r="1.5" fill="#1a1a2e"/>
  <!-- Left wing -->
  <path d="M 348 275 Q 290 230 260 200 Q 270 255 310 285 Q 330 295 348 290 Z" fill="#0d1e40" stroke="#3a6aaa" stroke-width="1.2" opacity="0.85"/>
  <!-- Right wing -->
  <path d="M 452 275 Q 510 230 540 200 Q 530 255 490 285 Q 470 295 452 290 Z" fill="#0d1e40" stroke="#3a6aaa" stroke-width="1.2" opacity="0.85"/>
  <!-- Wing feather lines left -->
  <line x1="348" y1="283" x2="280" y2="218" stroke="#3a6aaa" stroke-width="0.8" opacity="0.50"/>
  <line x1="346" y1="286" x2="270" y2="230" stroke="#3a6aaa" stroke-width="0.8" opacity="0.40"/>
  <!-- Wing feather lines right -->
  <line x1="452" y1="283" x2="520" y2="218" stroke="#3a6aaa" stroke-width="0.8" opacity="0.50"/>
  <line x1="454" y1="286" x2="530" y2="230" stroke="#3a6aaa" stroke-width="0.8" opacity="0.40"/>
  <!-- Eagle talons -->
  <path d="M 385 318 Q 380 335 374 342 M 400 322 Q 400 340 400 348 M 415 318 Q 420 335 426 342" stroke="#3a6aaa" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.70"/>

  <!-- Chalice below eagle -->
  <!-- Chalice cup -->
  <path d="M 370 360 Q 368 390 385 400 Q 400 410 415 400 Q 432 390 430 360 Z" fill="#0d1e40" stroke="#c9a84c" stroke-width="1.5" opacity="0.88"/>
  <!-- Chalice stem -->
  <rect x="396" y="400" width="8" height="22" fill="#0d1e40" stroke="#c9a84c" stroke-width="1" opacity="0.85"/>
  <!-- Chalice base -->
  <ellipse cx="400" cy="422" rx="22" ry="7" fill="#0d1e40" stroke="#c9a84c" stroke-width="1.5" opacity="0.85"/>
  <!-- Chalice wine -->
  <path d="M 374 374 Q 374 385 385 392 Q 400 400 415 392 Q 426 385 426 374 Z" fill="#3a0a0a" opacity="0.80"/>
  <!-- Chalice glow rim -->
  <path d="M 370 360 Q 400 354 430 360" fill="none" stroke="#e8c97a" stroke-width="1.5" opacity="0.45"/>

  <!-- Stars -->
  <circle cx="155" cy="105" r="2" fill="#3a6aaa" opacity="0.50"/>
  <circle cx="645" cy="125" r="2" fill="#3a6aaa" opacity="0.50"/>
  <circle cx="175" cy="450" r="1.5" fill="#3a6aaa" opacity="0.35"/>
  <circle cx="625" cy="430" r="1.5" fill="#3a6aaa" opacity="0.35"/>
  <circle cx="195" cy="280" r="1.2" fill="#c9a84c" opacity="0.40"/>
  <circle cx="605" cy="300" r="1.2" fill="#c9a84c" opacity="0.40"/>
  <circle cx="130" cy="320" r="1.5" fill="#3a6aaa" opacity="0.30"/>
  <circle cx="670" cy="250" r="1.5" fill="#3a6aaa" opacity="0.30"/>

  <!-- Name text -->
  <text x="400" y="498" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#e8c97a" letter-spacing="1">San Juan Apóstol y Evangelista</text>
  <text x="400" y="520" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#c9a84c" font-style="italic" opacity="0.85">Saint John the Apostle and Evangelist</text>
  <text x="400" y="546" text-anchor="middle" font-family="Lato, sans-serif" font-size="11" fill="#4a5a8a" letter-spacing="2.5">27 DE DIC · DEC 27</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <defs>
    <radialGradient id="sja-bg" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#080c18"/><stop offset="100%" stop-color="#040810"/>
    </radialGradient>
    <linearGradient id="sja-r1" x1="50%" y1="0%" x2="10%" y2="100%">
      <stop offset="0%" stop-color="#4070d0" stop-opacity="1"/><stop offset="100%" stop-color="#102050" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="sja-r2" x1="50%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#f5e060" stop-opacity="1"/><stop offset="100%" stop-color="#c9a84c" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="sja-gl"><feGaussianBlur stdDeviation="9" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="sja-g2"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="600" fill="url(#sja-bg)"/>
  <rect width="400" height="600" fill="#2040a0" opacity="0.10"/>
  <polygon points="198,265 -25,610 115,610" fill="url(#sja-r1)" filter="url(#sja-gl)" opacity="0.72"/>
  <polygon points="198,265 20,600  85,600"  fill="#4070d0" opacity="0.36"/>
  <polygon points="202,265 425,610 285,610" fill="url(#sja-r2)" filter="url(#sja-gl)" opacity="0.70"/>
  <polygon points="202,265 375,600 315,600" fill="#f5e060" opacity="0.34"/>
  <!-- White robe -->
  <path d="M168,155 Q140,205 126,390 Q200,415 274,390 Q260,205 232,155 Z" fill="#f0f0ff" opacity="0.88"/>
  <!-- Red mantle (John Apostle) -->
  <path d="M168,155 Q124,192 108,318 Q122,330 148,312 Q150,228 178,168 Z" fill="#a02020" opacity="0.84"/>
  <path d="M232,155 Q260,198 270,318 Q290,322 296,300 Q286,198 248,158 Z" fill="#a02020" opacity="0.78"/>
  <!-- Left arm with chalice -->
  <path d="M140,215 Q112,255 104,295" stroke="#f0f0ff" stroke-width="17" fill="none" stroke-linecap="round" opacity="0.85"/>
  <!-- Right arm with quill/book -->
  <path d="M260,215 Q288,255 296,295" stroke="#a02020" stroke-width="16" fill="none" stroke-linecap="round" opacity="0.80"/>
  <!-- Hands -->
  <ellipse cx="104" cy="298" rx="12" ry="15" fill="#d4a86a" opacity="0.9"/>
  <ellipse cx="296" cy="298" rx="12" ry="15" fill="#d4a86a" opacity="0.9"/>
  <!-- Chalice (left) -->
  <path d="M96,293 L96,280 L112,280 L112,293 Z" fill="#c9a84c" opacity="0.82"/>
  <ellipse cx="104" cy="280" rx="9" ry="4" fill="#c9a84c" opacity="0.82"/>
  <path d="M100,293 Q104,298 108,293" fill="#c9a84c" opacity="0.6"/>
  <!-- Scroll/book (right) -->
  <rect x="284" y="287" width="24" height="16" rx="2" fill="#f8f0d8" opacity="0.88"/>
  <path d="M286,291 L306,291" stroke="#c8a870" stroke-width="1" opacity="0.5"/>
  <path d="M286,295 L306,295" stroke="#c8a870" stroke-width="1" opacity="0.5"/>
  <!-- Eagle symbol (top corner) -->
  <path d="M330,40 Q348,50 356,65 Q344,60 335,55 Q338,62 336,72 Q328,62 318,60 Q326,50 330,40 Z" fill="#c9a84c" opacity="0.55"/>
  <!-- Neck + head (young, beardless apostle) -->
  <rect x="193" y="142" width="14" height="18" rx="4" fill="#d4a86a" opacity="0.9"/>
  <ellipse cx="200" cy="108" rx="26" ry="30" fill="#d4a86a" opacity="0.92"/>
  <path d="M174,106 Q176,72 200,68 Q224,72 226,106 Q218,86 200,84 Q182,86 174,106 Z" fill="#3a2818" opacity="0.85"/>
  <!-- Halo -->
  <circle cx="200" cy="108" r="53" fill="none" stroke="#e8c97a" stroke-width="1.8" stroke-opacity="0.65" filter="url(#sja-g2)"/>
  <circle cx="200" cy="108" r="47" fill="none" stroke="#e8c97a" stroke-width="0.5" stroke-opacity="0.22"/>
  <!-- Frame -->
  <rect x="6" y="6" width="388" height="588" rx="8" fill="none" stroke="#c9a84c" stroke-width="1.2" stroke-opacity="0.5"/>
  <rect x="12" y="12" width="376" height="576" rx="5" fill="none" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.18"/>
  <!-- Panel -->
  <rect x="18" y="528" width="364" height="66" rx="6" fill="#040810" opacity="0.86"/>
  <line x1="46" y1="535" x2="354" y2="535" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.28"/>
  <text x="200" y="548" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#c9a84c" letter-spacing="3" opacity="0.9">SAN JUAN APOSTOL  ·  SAINT JOHN APOSTLE</text>
  <text x="200" y="567" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#a0c0f8" font-style="italic">«San Juan Apóstol y Evangelista»</text>
  <text x="200" y="585" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#f5e060" font-style="italic" opacity="0.8">«Saint John, Apostle and Evangelist»</text>

  <!-- Minimal facial features for visual consistency across intercessors -->
  <g id="tup-face-features" opacity="0.9">
    <ellipse id="tup-eye-left" cx="186" cy="108" rx="3.1" ry="2.2" fill="#2a1a12"/>
    <ellipse id="tup-eye-right" cx="214" cy="108" rx="3.1" ry="2.2" fill="#2a1a12"/>
    <path id="tup-nose" d="M200 112 C198 118, 198 120, 200 123" stroke="#7b4a35" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <path id="tup-mouth" d="M192 132 Q200 137 208 132" stroke="#8f3a3a" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  </g>
</svg>

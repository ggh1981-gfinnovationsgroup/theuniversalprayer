<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560" width="400" height="560">
  <defs>
    <!-- Background: deep Tudor night, near-black with warm charcoal -->
    <linearGradient id="stm-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0808"/>
      <stop offset="100%" stop-color="#140c08"/>
    </linearGradient>
    <!-- Ray left: deep gold (Tudor livery) -->
    <linearGradient id="stm-r1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c8900a" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#4a3000" stop-opacity="0.0"/>
    </linearGradient>
    <!-- Ray right: Tudor crimson -->
    <linearGradient id="stm-r2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a01828" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#3a0808" stop-opacity="0.0"/>
    </linearGradient>
    <!-- Halo glow: warm gold, martyr -->
    <radialGradient id="stm-halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe0a0" stop-opacity="0.65"/>
      <stop offset="55%" stop-color="#c09020" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#c09020" stop-opacity="0.0"/>
    </radialGradient>
    <!-- Ambient glow -->
    <radialGradient id="stm-glow" cx="50%" cy="46%" r="38%">
      <stop offset="0%" stop-color="#301808" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#301808" stop-opacity="0.0"/>
    </radialGradient>
    <!-- Chancellor's robe: black velvet -->
    <linearGradient id="stm-robe" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#1a1614"/>
      <stop offset="50%" stop-color="#0e0c0a"/>
      <stop offset="100%" stop-color="#060504"/>
    </linearGradient>
    <!-- Fur trim: ermine/squirrel white-grey -->
    <linearGradient id="stm-fur" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8e4e0"/>
      <stop offset="100%" stop-color="#c0bcb8"/>
    </linearGradient>
    <!-- Gold chain of SS -->
    <linearGradient id="stm-chain" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e8c840"/>
      <stop offset="50%" stop-color="#f8e060"/>
      <stop offset="100%" stop-color="#e8c840"/>
    </linearGradient>
    <!-- Book cover: dark red leather -->
    <linearGradient id="stm-book" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7a1010"/>
      <stop offset="100%" stop-color="#480808"/>
    </linearGradient>
    <!-- Gold detail -->
    <linearGradient id="stm-gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0d050"/>
      <stop offset="100%" stop-color="#a08020"/>
    </linearGradient>
    <!-- Soft glow filter -->
    <filter id="stm-sg" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Chain glow -->
    <filter id="stm-cg" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="560" fill="url(#stm-bg)"/>

  <!-- Ambient glow -->
  <ellipse cx="200" cy="240" rx="155" ry="195" fill="url(#stm-glow)"/>

  <!-- 4 Polygon rays -->
  <polygon points="198,265 0,560 0,400" fill="url(#stm-r1)" opacity="0.7"/>
  <polygon points="198,265 0,480 80,560" fill="url(#stm-r1)" opacity="0.5"/>
  <polygon points="202,265 400,480 320,560" fill="url(#stm-r2)" opacity="0.5"/>
  <polygon points="202,265 400,400 400,560" fill="url(#stm-r2)" opacity="0.7"/>

  <!-- Halo glow -->
  <circle cx="200" cy="148" r="56" fill="url(#stm-halo)" filter="url(#stm-sg)"/>
  <!-- Halo ring — gold, martyr -->
  <circle cx="200" cy="148" r="47" fill="none" stroke="#d4a830" stroke-width="2.2" opacity="0.85"/>
  <circle cx="200" cy="148" r="44" fill="none" stroke="#f0c840" stroke-width="0.7" opacity="0.45"/>

  <!-- ═══ BODY: Chancellor's robe ═══ -->
  <!-- Main robe body — black velvet, wide Tudor silhouette -->
  <path d="M132,218 Q118,240 112,300 L108,440 Q108,452 120,454 L280,454 Q292,452 292,440 L288,300 Q282,240 268,218 Z"
        fill="url(#stm-robe)" stroke="#1e1a18" stroke-width="1.5" opacity="0.98"/>

  <!-- Robe left side shadow depth -->
  <path d="M132,218 Q118,250 115,320 L112,440 Q120,454 148,454 L158,320 Q156,252 162,218 Z"
        fill="#060402" opacity="0.6"/>

  <!-- Robe right side shadow depth -->
  <path d="M268,218 Q282,250 285,320 L288,440 Q280,454 252,454 L242,320 Q244,252 238,218 Z"
        fill="#060402" opacity="0.5"/>

  <!-- Fur collar trim — broad white/grey across shoulders -->
  <!-- Main fur band across top of robe -->
  <path d="M128,216 Q165,208 200,206 Q235,208 272,216 Q270,238 264,248 Q240,240 200,238 Q160,240 136,248 Q130,238 128,216 Z"
        fill="url(#stm-fur)" stroke="#b0aca8" stroke-width="1" opacity="0.95"/>
  <!-- Fur texture dots (ermine spots) -->
  <circle cx="148" cy="228" r="2.5" fill="#2a2826" opacity="0.5"/>
  <circle cx="163" cy="233" r="2" fill="#2a2826" opacity="0.4"/>
  <circle cx="180" cy="226" r="2.5" fill="#2a2826" opacity="0.5"/>
  <circle cx="200" cy="230" r="2" fill="#2a2826" opacity="0.4"/>
  <circle cx="220" cy="226" r="2.5" fill="#2a2826" opacity="0.5"/>
  <circle cx="237" cy="232" r="2" fill="#2a2826" opacity="0.4"/>
  <circle cx="252" cy="228" r="2.5" fill="#2a2826" opacity="0.5"/>

  <!-- Front opening fur trim strip — center vertical -->
  <path d="M190,238 L190,454 Q196,456 200,456 Q204,456 210,454 L210,238 Z"
        fill="url(#stm-fur)" stroke="#b0aca8" stroke-width="0.8" opacity="0.85"/>
  <!-- Front fur spots -->
  <circle cx="200" cy="258" r="2" fill="#2a2826" opacity="0.45"/>
  <circle cx="200" cy="278" r="2" fill="#2a2826" opacity="0.45"/>
  <circle cx="200" cy="298" r="2" fill="#2a2826" opacity="0.45"/>
  <circle cx="200" cy="318" r="2" fill="#2a2826" opacity="0.45"/>
  <circle cx="200" cy="338" r="2" fill="#2a2826" opacity="0.45"/>
  <circle cx="200" cy="358" r="2" fill="#2a2826" opacity="0.45"/>
  <circle cx="200" cy="378" r="2" fill="#2a2826" opacity="0.45"/>
  <circle cx="200" cy="398" r="2" fill="#2a2826" opacity="0.45"/>
  <circle cx="200" cy="418" r="2" fill="#2a2826" opacity="0.45"/>

  <!-- Fur cuff trim — left sleeve -->
  <path d="M110,328 Q108,344 112,360 Q122,364 140,362 Q148,344 144,328 Z"
        fill="url(#stm-fur)" stroke="#b0aca8" stroke-width="0.8" opacity="0.9"/>
  <!-- Fur cuff trim — right sleeve -->
  <path d="M290,328 Q292,344 288,360 Q278,364 260,362 Q252,344 256,328 Z"
        fill="url(#stm-fur)" stroke="#b0aca8" stroke-width="0.8" opacity="0.9"/>

  <!-- ═══ CHAIN OF OFFICE (Lord Chancellor SS chain) ═══ -->
  <g filter="url(#stm-cg)">
    <!-- Chain arc over shoulders -->
    <path d="M145,230 Q165,222 200,220 Q235,222 255,230 Q265,244 260,256 Q240,248 200,246 Q160,248 140,256 Q135,244 145,230 Z"
          fill="none" stroke="url(#stm-chain)" stroke-width="5" opacity="0.92"/>
    <!-- SS links suggestion -->
    <path d="M148,232 Q155,226 165,224 Q175,222 185,222 Q195,221 200,221 Q205,221 215,222 Q225,222 235,224 Q245,226 252,232"
          fill="none" stroke="#f0d050" stroke-width="2.5" stroke-dasharray="6,3" opacity="0.7"/>
    <!-- Tudor rose pendant at center of chain -->
    <circle cx="200" cy="250" r="10" fill="#800018" stroke="#e8c840" stroke-width="2" opacity="0.95"/>
    <circle cx="200" cy="250" r="6" fill="#c02030" opacity="0.9"/>
    <circle cx="200" cy="250" r="3" fill="#e8c840" opacity="0.8"/>
    <!-- Rose petals suggestion -->
    <circle cx="200" cy="242" r="3.5" fill="#a01020" opacity="0.7"/>
    <circle cx="208" cy="250" r="3.5" fill="#a01020" opacity="0.7"/>
    <circle cx="200" cy="258" r="3.5" fill="#a01020" opacity="0.7"/>
    <circle cx="192" cy="250" r="3.5" fill="#a01020" opacity="0.7"/>
  </g>

  <!-- ═══ ARMS ═══ -->
  <!-- Left arm — holding prayer book -->
  <path d="M172,238 Q150,258 138,290 Q132,310 132,330 L144,330 Q146,316 150,298 Q158,272 168,258 Z"
        fill="#100e0c" stroke="#1a1816" stroke-width="1"/>
  <!-- Right arm — resting, slight open gesture -->
  <path d="M228,238 Q250,258 262,290 Q268,310 268,330 L256,330 Q254,316 250,298 Q242,272 232,258 Z"
        fill="#100e0c" stroke="#1a1816" stroke-width="1"/>

  <!-- Left hand holding prayer book -->
  <ellipse cx="138" cy="342" rx="13" ry="11" fill="#c8a878" stroke="#a08858" stroke-width="0.8"/>
  <!-- Prayer book in left hand — dark red leather -->
  <rect x="115" y="330" width="38" height="50" rx="3" fill="url(#stm-book)" stroke="#6a0808" stroke-width="1.5"/>
  <rect x="115" y="330" width="5" height="50" rx="2" fill="#500808" opacity="0.8"/>
  <!-- Gold cross on book cover -->
  <line x1="134" y1="340" x2="134" y2="370" stroke="#e8c840" stroke-width="2.5" opacity="0.9"/>
  <line x1="122" y1="355" x2="146" y2="355" stroke="#e8c840" stroke-width="2.5" opacity="0.9"/>
  <!-- Gold clasps -->
  <rect x="116" y="331" width="4" height="4" fill="url(#stm-gold)" rx="1" opacity="0.9"/>
  <rect x="148" y="331" width="4" height="4" fill="url(#stm-gold)" rx="1" opacity="0.9"/>
  <rect x="116" y="374" width="4" height="4" fill="url(#stm-gold)" rx="1" opacity="0.9"/>
  <rect x="148" y="374" width="4" height="4" fill="url(#stm-gold)" rx="1" opacity="0.9"/>

  <!-- Right hand — relaxed, fingers slightly visible -->
  <ellipse cx="262" cy="340" rx="13" ry="11" fill="#c8a878" stroke="#a08858" stroke-width="0.8"/>
  <!-- Fingers suggestion right hand -->
  <line x1="255" y1="334" x2="252" y2="326" stroke="#a08858" stroke-width="1.3" stroke-linecap="round" opacity="0.6"/>
  <line x1="260" y1="332" x2="258" y2="324" stroke="#a08858" stroke-width="1.3" stroke-linecap="round" opacity="0.6"/>
  <line x1="265" y1="332" x2="264" y2="324" stroke="#a08858" stroke-width="1.3" stroke-linecap="round" opacity="0.6"/>
  <line x1="270" y1="334" x2="270" y2="326" stroke="#a08858" stroke-width="1.3" stroke-linecap="round" opacity="0.6"/>

  <!-- ═══ NECK ═══ -->
  <rect x="191" y="190" width="18" height="26" rx="4" fill="#c8a878"/>
  <!-- White shirt collar peeking above robe -->
  <path d="M183,216 Q200,212 217,216 L215,228 Q200,224 185,228 Z"
        fill="#f0ece8" stroke="#d8d4d0" stroke-width="0.8" opacity="0.9"/>

  <!-- ═══ HEAD ═══ -->
  <ellipse cx="200" cy="162" rx="33" ry="37" fill="#c8a878"/>

  <!-- Tudor flat cap (black, broad brim, no crown) -->
  <ellipse cx="200" cy="128" rx="42" ry="14" fill="#0e0c0a" stroke="#1a1816" stroke-width="1.2"/>
  <ellipse cx="200" cy="124" rx="30" ry="10" fill="#181614" stroke="#222018" stroke-width="0.8"/>
  <!-- Cap jewel — small brooch on front -->
  <circle cx="200" cy="122" r="4" fill="#800018" stroke="#e8c840" stroke-width="1.2" opacity="0.9"/>
  <circle cx="200" cy="122" r="2" fill="#e8c840" opacity="0.8"/>

  <!-- Hair under cap — short, dark with grey streaks (he was ~57) -->
  <path d="M168,148 Q167,136 172,130 L228,130 Q233,136 232,148"
        fill="#2a2420" stroke="#1a1410" stroke-width="1" opacity="0.9"/>
  <!-- Grey temple streaks -->
  <path d="M170,148 Q169,142 172,136" stroke="#888480" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M230,148 Q231,142 228,136" stroke="#888480" stroke-width="1.5" fill="none" opacity="0.5"/>

  <!-- Forehead lines (age/wisdom) -->
  <path d="M182,145 Q200,142 218,145" stroke="#a08060" stroke-width="0.8" fill="none" opacity="0.3"/>

  <!-- Eyes — direct, intelligent gaze (More was known for sharp wit) -->
  <ellipse cx="187" cy="158" rx="5" ry="5.5" fill="#f0e8d8"/>
  <ellipse cx="213" cy="158" rx="5" ry="5.5" fill="#f0e8d8"/>
  <circle cx="188" cy="158" r="3.2" fill="#3a2810"/>
  <circle cx="214" cy="158" r="3.2" fill="#3a2810"/>
  <circle cx="188" cy="158" r="1.6" fill="#100806"/>
  <circle cx="214" cy="158" r="1.6" fill="#100806"/>
  <circle cx="189" cy="157" r="0.8" fill="white" opacity="0.85"/>
  <circle cx="215" cy="157" r="0.8" fill="white" opacity="0.85"/>

  <!-- Eyelids subtle -->
  <path d="M182,154 Q187,151 193,154" stroke="#2a1a10" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M207,154 Q213,151 219,154" stroke="#2a1a10" stroke-width="1" fill="none" opacity="0.5"/>

  <!-- Eyebrows — strong, slightly raised (thoughtful expression) -->
  <path d="M181,150 Q187,147 194,150" stroke="#2a2018" stroke-width="2.3" fill="none" stroke-linecap="round"/>
  <path d="M206,150 Q213,147 220,150" stroke="#2a2018" stroke-width="2.3" fill="none" stroke-linecap="round"/>

  <!-- Nose -->
  <path d="M197,162 Q195,173 192,178 Q196,180 200,180 Q204,180 208,178 Q205,173 203,162 Z"
        fill="#b89060" stroke="#a08050" stroke-width="0.5" opacity="0.7"/>

  <!-- Slight smile (More's famous wit) — subtle upward curve -->
  <path d="M188,186 Q194,191 200,192 Q206,191 212,186" stroke="#8a6040" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- Short beard — square cut, Tudor style, dark with grey -->
  <path d="M170,178 Q168,194 170,210 Q182,228 200,232 Q218,228 230,210 Q232,194 230,178 Q218,196 200,198 Q182,196 170,178 Z"
        fill="#2a2018" stroke="#1a1410" stroke-width="0.8" opacity="0.95"/>
  <!-- Beard grey streaks -->
  <path d="M186,195 Q192,202 200,200 Q208,202 214,195" fill="none" stroke="#6a6058" stroke-width="1.5" opacity="0.4"/>
  <path d="M188,212 Q200,218 212,212" fill="none" stroke="#6a6058" stroke-width="1.2" opacity="0.35"/>
  <!-- Mustache -->
  <path d="M184,181 Q192,185 200,183 Q208,185 216,181"
        fill="#1a1810" stroke="#0e0e0a" stroke-width="1.2" opacity="0.9"/>

  <!-- Cheekbones — slight rosiness, English complexion -->
  <ellipse cx="180" cy="168" rx="9" ry="6" fill="#d08870" opacity="0.15"/>
  <ellipse cx="220" cy="168" rx="9" ry="6" fill="#d08870" opacity="0.15"/>

  <!-- ═══ FRAME LINES & ORNAMENTS ═══ -->
  <rect x="8" y="8" width="384" height="484" rx="4" fill="none" stroke="#e8c840" stroke-width="1.5" opacity="0.55"/>
  <rect x="12" y="12" width="376" height="476" rx="3" fill="none" stroke="#e8c840" stroke-width="0.6" opacity="0.3"/>
  <!-- Corner ornaments -->
  <path d="M8,28 L8,8 L28,8"   fill="none" stroke="#e8c840" stroke-width="2" opacity="0.7"/>
  <path d="M372,8 L392,8 L392,28"  fill="none" stroke="#e8c840" stroke-width="2" opacity="0.7"/>
  <path d="M8,464 L8,484 L28,484"  fill="none" stroke="#e8c840" stroke-width="2" opacity="0.7"/>
  <path d="M372,484 L392,484 L392,464" fill="none" stroke="#e8c840" stroke-width="2" opacity="0.7"/>

  <!-- ═══ NAME PANEL ═══ -->
  <rect x="0" y="492" width="400" height="68" fill="#06040a" opacity="0.92"/>
  <line x1="0" y1="492" x2="400" y2="492" stroke="#e8c840" stroke-width="1.2" opacity="0.7"/>
  <!-- Name -->
  <text x="200" y="512" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-size="17" font-weight="bold" letter-spacing="3"
        fill="#f0d870">SAN TOMÁS MORO</text>
  <!-- Title -->
  <text x="200" y="531" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-size="9.5" letter-spacing="1.5" fill="#c8b870" opacity="0.9">CANCILLER · LORD CHANCELLOR · MÁRTIR</text>
  <!-- Date -->
  <text x="200" y="549" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-size="9" letter-spacing="1.2" fill="#a09058" opacity="0.8">22 DE JUNIO · JUNE 22</text>
  <!-- Minimal facial features for visual consistency across intercessors -->
  <g id="tup-face-features" opacity="0.9">
    <ellipse id="tup-eye-left" cx="186" cy="148" rx="3.1" ry="2.2" fill="#2a1a12"/>
    <ellipse id="tup-eye-right" cx="214" cy="148" rx="3.1" ry="2.2" fill="#2a1a12"/>
    <path id="tup-nose" d="M200 152 C198 158, 198 160, 200 163" stroke="#7b4a35" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <path id="tup-mouth" d="M192 172 Q200 177 208 172" stroke="#8f3a3a" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  </g></svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <defs>
    <radialGradient id="sgw-bg" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#071008"/><stop offset="100%" stop-color="#040804"/>
    </radialGradient>
    <linearGradient id="sgw-r1" x1="50%" y1="0%" x2="10%" y2="100%">
      <stop offset="0%" stop-color="#389040" stop-opacity="1"/><stop offset="100%" stop-color="#103818" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="sgw-r2" x1="50%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#f5e060" stop-opacity="1"/><stop offset="100%" stop-color="#c9a84c" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="sgw-gl"><feGaussianBlur stdDeviation="9" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="sgw-g2"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="600" fill="url(#sgw-bg)"/>
  <rect width="400" height="600" fill="#103020" opacity="0.12"/>
  <polygon points="198,265 -25,610 115,610" fill="url(#sgw-r1)" filter="url(#sgw-gl)" opacity="0.72"/>
  <polygon points="198,265 20,600  85,600"  fill="#389040" opacity="0.36"/>
  <polygon points="202,265 425,610 285,610" fill="url(#sgw-r2)" filter="url(#sgw-gl)" opacity="0.70"/>
  <polygon points="202,265 375,600 315,600" fill="#f5e060" opacity="0.34"/>
  <!-- Forest green tunic -->
  <path d="M168,155 Q140,205 126,390 Q200,415 274,390 Q260,205 232,155 Z" fill="#2a5a28" opacity="0.84"/>
  <!-- Brown pilgrim cloak -->
  <path d="M168,155 Q124,192 108,318 Q122,330 148,312 Q150,228 178,168 Z" fill="#6a4818" opacity="0.84"/>
  <path d="M232,155 Q260,198 270,318 Q290,322 296,300 Q286,198 248,158 Z" fill="#6a4818" opacity="0.78"/>
  <!-- Pilgrim staff (left) -->
  <path d="M140,215 Q112,255 104,295" stroke="#2a5a28" stroke-width="17" fill="none" stroke-linecap="round" opacity="0.85"/>
  <line x1="104" y1="295" x2="104" y2="450" stroke="#6a4818" stroke-width="5" stroke-opacity="0.82"/>
  <!-- Right arm open in prayer -->
  <path d="M260,215 Q285,252 292,292" stroke="#6a4818" stroke-width="16" fill="none" stroke-linecap="round" opacity="0.80"/>
  <!-- Hands -->
  <ellipse cx="104" cy="298" rx="12" ry="15" fill="#c8a06a" opacity="0.9"/>
  <ellipse cx="292" cy="296" rx="12" ry="15" fill="#c8a06a" opacity="0.9"/>
  <!-- Pilgrim hat (broad brim) suggestion -->
  <ellipse cx="200" cy="78"  rx="42" ry="8"  fill="#6a4818" opacity="0.58"/>
  <!-- Neck + head -->
  <rect x="193" y="142" width="14" height="18" rx="4" fill="#c8a06a" opacity="0.9"/>
  <ellipse cx="200" cy="108" rx="27" ry="31" fill="#c8a06a" opacity="0.92"/>
  <path d="M173,107 Q176,72 200,68 Q224,72 227,107 Q219,88 200,86 Q181,88 173,107 Z" fill="#3a2810" opacity="0.85"/>
  <path d="M181,132 Q184,149 200,154 Q216,149 219,132 Q211,143 200,144 Q189,143 181,132 Z" fill="#3a2810" opacity="0.70"/>
  <!-- Halo -->
  <circle cx="200" cy="108" r="53" fill="none" stroke="#e8c97a" stroke-width="1.8" stroke-opacity="0.65" filter="url(#sgw-g2)"/>
  <circle cx="200" cy="108" r="47" fill="none" stroke="#e8c97a" stroke-width="0.5" stroke-opacity="0.22"/>
  <!-- Frame -->
  <rect x="6" y="6" width="388" height="588" rx="8" fill="none" stroke="#c9a84c" stroke-width="1.2" stroke-opacity="0.5"/>
  <rect x="12" y="12" width="376" height="576" rx="5" fill="none" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.18"/>
  <!-- Panel -->
  <rect x="18" y="528" width="364" height="66" rx="6" fill="#040804" opacity="0.86"/>
  <line x1="46" y1="535" x2="354" y2="535" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.28"/>
  <text x="200" y="548" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#c9a84c" letter-spacing="3" opacity="0.9">SAN GUILLERMO  ·  SAINT WILLIAM</text>
  <text x="200" y="567" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#90d870" font-style="italic">«San Guillermo»</text>
  <text x="200" y="585" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#f5e060" font-style="italic" opacity="0.8">«Saint William»</text>

  <!-- Minimal facial features for visual consistency across intercessors -->
  <g id="tup-face-features" opacity="0.9">
    <ellipse id="tup-eye-left" cx="186" cy="78" rx="3.1" ry="2.2" fill="#2a1a12"/>
    <ellipse id="tup-eye-right" cx="214" cy="78" rx="3.1" ry="2.2" fill="#2a1a12"/>
    <path id="tup-nose" d="M200 82 C198 88, 198 90, 200 93" stroke="#7b4a35" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <path id="tup-mouth" d="M192 102 Q200 107 208 102" stroke="#8f3a3a" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="sj2-bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#150d02"/>
      <stop offset="100%" stop-color="#0a0702"/>
    </radialGradient>
    <radialGradient id="sj2-glow" cx="50%" cy="38%" r="40%">
      <stop offset="0%" stop-color="#d4a017" stop-opacity="0.24"/>
      <stop offset="100%" stop-color="#d4a017" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#sj2-bg)"/>
  <rect width="800" height="600" fill="url(#sj2-glow)"/>
  <rect x="28" y="28" width="744" height="544" rx="6" fill="none" stroke="#d4a017" stroke-width="1" stroke-opacity="0.4"/>
  <rect x="36" y="36" width="728" height="528" rx="4" fill="none" stroke="#d4a017" stroke-width="0.5" stroke-opacity="0.2"/>
  <!-- Amber accent strips -->
  <rect x="28" y="28" width="6" height="544" rx="3" fill="#a07818" opacity="0.65"/>
  <rect x="766" y="28" width="6" height="544" rx="3" fill="#a07818" opacity="0.65"/>
  <!-- Main stem -->
  <line x1="400" y1="168" x2="400" y2="308" stroke="#3a6b1a" stroke-width="5" stroke-linecap="round"/>
  <!-- Left branch -->
  <path d="M 400 226 Q 377 210 353 202" stroke="#3a6b1a" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Right branch -->
  <path d="M 400 226 Q 423 210 447 202" stroke="#3a6b1a" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Center lily — 3 petals -->
  <ellipse cx="400" cy="140" rx="16" ry="36" fill="#f8f4e8" opacity="0.92"/>
  <ellipse cx="383" cy="147" rx="13" ry="30" fill="#f0ecdc" opacity="0.75" transform="rotate(-22, 383, 147)"/>
  <ellipse cx="417" cy="147" rx="13" ry="30" fill="#f0ecdc" opacity="0.75" transform="rotate(22, 417, 147)"/>
  <circle cx="400" cy="165" r="9" fill="#d4a017" opacity="0.85"/>
  <!-- Center stamen -->
  <line x1="400" y1="107" x2="398" y2="95" stroke="#d4a017" stroke-width="1.5" stroke-opacity="0.8"/>
  <circle cx="398" cy="93" r="3" fill="#d4a017" opacity="0.85"/>
  <!-- Left lily -->
  <ellipse cx="350" cy="180" rx="13" ry="28" fill="#f8f4e8" opacity="0.88"/>
  <ellipse cx="336" cy="184" rx="10" ry="22" fill="#f0ecdc" opacity="0.7" transform="rotate(-18, 336, 184)"/>
  <circle cx="350" cy="198" r="8" fill="#d4a017" opacity="0.78"/>
  <!-- Right lily -->
  <ellipse cx="450" cy="180" rx="13" ry="28" fill="#f8f4e8" opacity="0.88"/>
  <ellipse cx="464" cy="184" rx="10" ry="22" fill="#f0ecdc" opacity="0.7" transform="rotate(18, 464, 184)"/>
  <circle cx="450" cy="198" r="8" fill="#d4a017" opacity="0.78"/>
  <!-- Leaves on stem -->
  <path d="M 400 260 Q 365 242 351 260" stroke="#3a6b1a" stroke-width="2.5" fill="none" stroke-opacity="0.75"/>
  <path d="M 400 280 Q 435 260 449 278" stroke="#3a6b1a" stroke-width="2.5" fill="none" stroke-opacity="0.75"/>
  <!-- Name -->
  <text x="400" y="380" text-anchor="middle" font-family="Georgia,serif" font-size="38" fill="#e8c97a" letter-spacing="2">San José</text>
  <text x="400" y="420" text-anchor="middle" font-family="Georgia,serif" font-size="15" fill="#d4a017" opacity="0.85" font-style="italic">Saint Joseph — Custodio del Redentor</text>
  <line x1="298" y1="446" x2="502" y2="446" stroke="#d4a017" stroke-width="0.6" stroke-opacity="0.4"/>
  <text x="400" y="478" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#8a6e2f" letter-spacing="3">FEAST DAY · MARCH 19</text>
</svg>

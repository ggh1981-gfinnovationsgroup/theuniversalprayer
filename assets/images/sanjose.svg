<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <defs>
    <radialGradient id="sj-bg" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#1a1000"/><stop offset="100%" stop-color="#080600"/>
    </radialGradient>
    <radialGradient id="sj-atm" cx="50%" cy="38%" r="46%">
      <stop offset="0%" stop-color="#8a6018" stop-opacity="0.28"/><stop offset="100%" stop-color="#8a6018" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sj-r1" x1="50%" y1="0%" x2="10%" y2="100%">
      <stop offset="0%" stop-color="#d09030" stop-opacity="1"/><stop offset="100%" stop-color="#6a4000" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="sj-r2" x1="50%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#f5e060" stop-opacity="1"/><stop offset="100%" stop-color="#c9a84c" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="sj-gl"><feGaussianBlur stdDeviation="9" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="sj-g2"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="600" fill="url(#sj-bg)"/>
  <rect width="400" height="600" fill="url(#sj-atm)"/>
  <!-- Rays: amber left, gold right -->
  <polygon points="198,265 -25,610 115,610" fill="url(#sj-r1)" filter="url(#sj-gl)" opacity="0.75"/>
  <polygon points="198,265 20,600  85,600"  fill="#d09030" opacity="0.40"/>
  <polygon points="202,265 425,610 285,610" fill="url(#sj-r2)" filter="url(#sj-gl)" opacity="0.72"/>
  <polygon points="202,265 375,600 315,600" fill="#f5e060" opacity="0.36"/>
  <!-- Tunic (terracotta/amber) -->
  <path d="M168,155 Q140,205 126,390 Q200,415 274,390 Q260,205 232,155 Z" fill="#a06828" opacity="0.86"/>
  <!-- Brown mantle -->
  <path d="M168,155 Q125,192 108,318 Q122,330 148,312 Q150,228 178,168 Z" fill="#6a4018" opacity="0.88"/>
  <path d="M232,155 Q260,198 270,318 Q290,322 296,300 Q286,198 248,158 Z" fill="#6a4018" opacity="0.82"/>
  <!-- Left arm holding flowering staff -->
  <path d="M138,212 Q110,252 102,292" stroke="#a06828" stroke-width="18" fill="none" stroke-linecap="round" opacity="0.88"/>
  <!-- Right arm with Child Jesus (protective) -->
  <path d="M262,212 Q290,252 298,292" stroke="#6a4018" stroke-width="17" fill="none" stroke-linecap="round" opacity="0.85"/>
  <!-- Hands -->
  <ellipse cx="102" cy="297" rx="13" ry="16" fill="#d4a06a" opacity="0.9"/>
  <ellipse cx="298" cy="297" rx="13" ry="16" fill="#d4a06a" opacity="0.9"/>
  <!-- Flowering staff (lily) -->
  <line x1="102" y1="297" x2="102" y2="430" stroke="#7a5a28" stroke-width="4" stroke-opacity="0.8"/>
  <line x1="102" y1="430" x2="102" y2="380" stroke="#7a5a28" stroke-width="4" stroke-opacity="0.8"/>
  <!-- Lily blossom on staff -->
  <ellipse cx="102" cy="286" rx="8" ry="12" fill="#f8f4e8" opacity="0.88"/>
  <ellipse cx="94"  cy="298" rx="6" ry="10" fill="#f8f4e8" opacity="0.75"/>
  <!-- Child Jesus small beside -->
  <ellipse cx="296" cy="285" rx="8" ry="10" fill="#d4a06a" opacity="0.85"/>
  <circle  cx="296" cy="274" r="7" fill="#d4a06a" opacity="0.82"/>
  <circle  cx="296" cy="274" r="9" fill="none" stroke="#e8c97a" stroke-width="0.8" stroke-opacity="0.5"/>
  <!-- Neck -->
  <rect x="193" y="142" width="14" height="18" rx="4" fill="#d4a06a" opacity="0.9"/>
  <!-- Head (Joseph, dark hair, bearded) -->
  <ellipse cx="200" cy="108" rx="27" ry="31" fill="#d4a06a" opacity="0.92"/>
  <!-- Dark hair -->
  <path d="M173,107 Q176,72 200,68 Q224,72 227,107 Q219,88 200,86 Q181,88 173,107 Z" fill="#3a2010" opacity="0.88"/>
  <!-- Beard (full, dark) -->
  <path d="M182,131 Q185,149 200,154 Q215,149 218,131 Q210,143 200,144 Q190,143 182,131 Z" fill="#3a2010" opacity="0.75"/>
  <!-- Halo -->
  <circle cx="200" cy="108" r="53" fill="none" stroke="#e8c97a" stroke-width="1.8" stroke-opacity="0.65" filter="url(#sj-g2)"/>
  <circle cx="200" cy="108" r="47" fill="none" stroke="#e8c97a" stroke-width="0.5" stroke-opacity="0.22"/>
  <!-- Frame -->
  <rect x="6" y="6" width="388" height="588" rx="8" fill="none" stroke="#c9a84c" stroke-width="1.2" stroke-opacity="0.5"/>
  <rect x="12" y="12" width="376" height="576" rx="5" fill="none" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.18"/>
  <!-- Panel -->
  <rect x="18" y="528" width="364" height="66" rx="6" fill="#080600" opacity="0.86"/>
  <line x1="46" y1="535" x2="354" y2="535" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.28"/>
  <text x="200" y="548" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#c9a84c" letter-spacing="3" opacity="0.9">SAN JOSE  ·  SAINT JOSEPH</text>
  <text x="200" y="567" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#f5e060" font-style="italic">«San José, Esposo de María»</text>
  <text x="200" y="585" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#d4c040" font-style="italic" opacity="0.8">«Saint Joseph, Spouse of Mary»</text>
</svg>

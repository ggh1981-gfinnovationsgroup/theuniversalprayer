<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <defs>
    <radialGradient id="sfc-bg" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#140a04"/><stop offset="100%" stop-color="#0a0502"/>
    </radialGradient>
    <linearGradient id="sfc-r1" x1="50%" y1="0%" x2="10%" y2="100%">
      <stop offset="0%" stop-color="#a05820" stop-opacity="1"/><stop offset="100%" stop-color="#502808" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="sfc-r2" x1="50%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#f5e060" stop-opacity="1"/><stop offset="100%" stop-color="#c9a84c" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="sfc-gl"><feGaussianBlur stdDeviation="9" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="sfc-g2"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="600" fill="url(#sfc-bg)"/>
  <rect width="400" height="600" fill="#403010" opacity="0.12"/>
  <polygon points="198,265 -25,610 115,610" fill="url(#sfc-r1)" filter="url(#sfc-gl)" opacity="0.72"/>
  <polygon points="198,265 20,600  85,600"  fill="#a05820" opacity="0.36"/>
  <polygon points="202,265 425,610 285,610" fill="url(#sfc-r2)" filter="url(#sfc-gl)" opacity="0.70"/>
  <polygon points="202,265 375,600 315,600" fill="#f5e060" opacity="0.34"/>
  <!-- Brown Franciscan habit -->
  <path d="M168,155 Q140,205 126,390 Q200,415 274,390 Q260,205 232,155 Z" fill="#8b5a30" opacity="0.88"/>
  <!-- Darker cowl/mantle -->
  <path d="M168,155 Q124,192 108,318 Q122,330 148,312 Q150,228 178,168 Z" fill="#6a4018" opacity="0.85"/>
  <path d="M232,155 Q260,198 270,318 Q290,322 296,300 Q286,198 248,158 Z" fill="#6a4018" opacity="0.78"/>
  <!-- Rope cord around waist -->
  <path d="M130,275 Q200,285 270,275" stroke="#d4b060" stroke-width="3" fill="none" opacity="0.62"/>
  <!-- Both arms outstretched with birds -->
  <path d="M140,215 Q92,218 72,208" stroke="#8b5a30" stroke-width="17" fill="none" stroke-linecap="round" opacity="0.86"/>
  <path d="M260,215 Q308,218 328,208" stroke="#6a4018" stroke-width="16" fill="none" stroke-linecap="round" opacity="0.82"/>
  <!-- Hands -->
  <ellipse cx="71"  cy="206" rx="12" ry="15" fill="#c8a060" opacity="0.9"/>
  <ellipse cx="329" cy="206" rx="12" ry="15" fill="#c8a060" opacity="0.9"/>
  <!-- Small birds on each arm -->
  <ellipse cx="58"  cy="196" rx="9" ry="6" fill="#8a9878" opacity="0.80"/>
  <circle  cx="54"  cy="193" r="5" fill="#8a9878" opacity="0.78"/>
  <ellipse cx="342" cy="196" rx="9" ry="6" fill="#8a9878" opacity="0.78"/>
  <circle  cx="346" cy="193" r="5" fill="#8a9878" opacity="0.76"/>
  <!-- Tau cross at chest -->
  <line x1="200" y1="195" x2="200" y2="235" stroke="#d4b060" stroke-width="4" opacity="0.72"/>
  <line x1="188" y1="198" x2="212" y2="198" stroke="#d4b060" stroke-width="4" opacity="0.72"/>
  <!-- Stigmata marks on hands -->
  <circle cx="71"  cy="207" r="3" fill="#a01818" opacity="0.65"/>
  <circle cx="329" cy="207" r="3" fill="#a01818" opacity="0.65"/>
  <!-- Neck + head (slight beard, peaceful) -->
  <rect x="193" y="142" width="14" height="16" rx="4" fill="#c8a060" opacity="0.9"/>
  <ellipse cx="200" cy="108" rx="26" ry="30" fill="#c8a060" opacity="0.92"/>
  <path d="M174,107 Q176,72 200,68 Q224,72 226,107 Q219,86 200,84 Q181,86 174,107 Z" fill="#5a3818" opacity="0.80"/>
  <path d="M183,128 Q190,135 200,136 Q210,135 217,128 Q210,130 200,131 Q190,130 183,128 Z" fill="#5a3818" opacity="0.55"/>
  <!-- Halo -->
  <circle cx="200" cy="108" r="53" fill="none" stroke="#e8c97a" stroke-width="1.8" stroke-opacity="0.65" filter="url(#sfc-g2)"/>
  <circle cx="200" cy="108" r="47" fill="none" stroke="#e8c97a" stroke-width="0.5" stroke-opacity="0.22"/>
  <!-- Frame -->
  <rect x="6" y="6" width="388" height="588" rx="8" fill="none" stroke="#c9a84c" stroke-width="1.2" stroke-opacity="0.5"/>
  <rect x="12" y="12" width="376" height="576" rx="5" fill="none" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.18"/>
  <!-- Panel -->
  <rect x="18" y="528" width="364" height="66" rx="6" fill="#0a0502" opacity="0.86"/>
  <line x1="46" y1="535" x2="354" y2="535" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.28"/>
  <text x="200" y="548" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" fill="#c9a84c" letter-spacing="3" opacity="0.9">SAN FRANCISCO DE ASIS  ·  SAINT FRANCIS OF ASSISI</text>
  <text x="200" y="567" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#d09840" font-style="italic">«San Francisco de Asís»</text>
  <text x="200" y="585" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#f5e060" font-style="italic" opacity="0.8">«Saint Francis of Assisi»</text>
</svg>

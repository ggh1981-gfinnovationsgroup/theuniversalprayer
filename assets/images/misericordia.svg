<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <defs>
    <radialGradient id="bg-grd" cx="50%" cy="28%" r="72%">
      <stop offset="0%"   stop-color="#16246e"/>
      <stop offset="55%"  stop-color="#0b1438"/>
      <stop offset="100%" stop-color="#03060d"/>
    </radialGradient>
    <radialGradient id="atm-glow" cx="50%" cy="38%" r="46%">
      <stop offset="0%"   stop-color="#3a4eb8" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#0b1438" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ray-red-lg" x1="50%" y1="0%" x2="10%" y2="100%">
      <stop offset="0%"   stop-color="#ff2020" stop-opacity="1"/>
      <stop offset="35%"  stop-color="#e81010" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#aa0808" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="ray-blue-lg" x1="50%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%"   stop-color="#e8f6ff" stop-opacity="1"/>
      <stop offset="35%"  stop-color="#b4dcff" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#6ab8f5" stop-opacity="0.55"/>
    </linearGradient>
    <filter id="glow-red" x="-40%" y="-20%" width="180%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="4"  result="b2"/>
      <feMerge>
        <feMergeNode in="b1"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="b2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-blue" x="-40%" y="-20%" width="180%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="4"  result="b2"/>
      <feMerge>
        <feMergeNode in="b1"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="b2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-center" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="16" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-gold" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- BACKGROUNDS -->
  <rect width="400" height="600" fill="#03060d"/>
  <rect width="400" height="600" fill="url(#bg-grd)"/>
  <ellipse cx="200" cy="230" rx="200" ry="230" fill="url(#atm-glow)"/>

  <!-- RED RAY left of frame (blood / mercy) -->
  <polygon points="198,252 -30,610 140,610" fill="url(#ray-red-lg)" filter="url(#glow-red)" opacity="0.75"/>
  <polygon points="198,252 10,600  110,600" fill="#ff2828" opacity="0.65"/>
  <polygon points="198,252 50,600  95,600"  fill="#ff5040" opacity="0.80"/>
  <polygon points="198,252 -30,520 -30,610 20,610" fill="#dd1010" opacity="0.30"/>

  <!-- PALE-BLUE RAY right of frame (water / grace) -->
  <polygon points="202,252 430,610 260,610" fill="url(#ray-blue-lg)" filter="url(#glow-blue)" opacity="0.75"/>
  <polygon points="202,252 390,600 290,600" fill="#c8e8ff" opacity="0.65"/>
  <polygon points="202,252 350,600 305,600" fill="#e4f4ff" opacity="0.80"/>
  <polygon points="202,252 430,520 430,610 380,610" fill="#88c8f0" opacity="0.30"/>

  <!-- ABSTRACT FIGURE (luminous silhouette) -->
  <ellipse cx="200" cy="340" rx="44" ry="130" fill="#ffffff" opacity="0.025"/>
  <ellipse cx="200" cy="230" rx="62" ry="20"  fill="#ffffff" opacity="0.025"/>

  <!-- SOURCE POINT: heart / chest level -->
  <circle cx="200" cy="252" r="32" fill="#ffffff" opacity="0.08" filter="url(#glow-center)"/>
  <circle cx="200" cy="252" r="14" fill="#fff8e8" opacity="0.14" filter="url(#glow-center)"/>
  <circle cx="200" cy="252" r="6"  fill="#ffffff" opacity="0.35"/>

  <!-- HALO + CROSS (abstract, golden) -->
  <circle cx="200" cy="100" r="56" fill="none" stroke="#e8d040" stroke-width="0.5" stroke-opacity="0.20" filter="url(#glow-gold)"/>
  <circle cx="200" cy="100" r="48" fill="none" stroke="#e8c830" stroke-width="1.8" stroke-opacity="0.60"/>
  <circle cx="200" cy="100" r="41" fill="none" stroke="#e8c830" stroke-width="0.6" stroke-opacity="0.22"/>
  <circle cx="200" cy="100" r="40" fill="#fffbdc" opacity="0.045" filter="url(#glow-gold)"/>
  <line x1="200" y1="56"  x2="200" y2="78"  stroke="#f0d848" stroke-width="3.5" stroke-linecap="round" stroke-opacity="0.80"/>
  <line x1="186" y1="66"  x2="214" y2="66"  stroke="#f0d848" stroke-width="3.5" stroke-linecap="round" stroke-opacity="0.80"/>
  <line x1="200" y1="52"  x2="200" y2="38"  stroke="#e8c830" stroke-width="1" stroke-opacity="0.30"/>
  <line x1="234" y1="63"  x2="248" y2="49"  stroke="#e8c830" stroke-width="1" stroke-opacity="0.25"/>
  <line x1="166" y1="63"  x2="152" y2="49"  stroke="#e8c830" stroke-width="1" stroke-opacity="0.25"/>
  <line x1="248" y1="100" x2="265" y2="100" stroke="#e8c830" stroke-width="1" stroke-opacity="0.22"/>
  <line x1="152" y1="100" x2="135" y2="100" stroke="#e8c830" stroke-width="1" stroke-opacity="0.22"/>
  <line x1="234" y1="137" x2="248" y2="151" stroke="#e8c830" stroke-width="1" stroke-opacity="0.20"/>
  <line x1="166" y1="137" x2="152" y2="151" stroke="#e8c830" stroke-width="1" stroke-opacity="0.20"/>

  <!-- HEAD GLOW (abstract presence) -->
  <ellipse cx="200" cy="100" rx="22" ry="26" fill="#fffbe0" opacity="0.05" filter="url(#glow-center)"/>

  <!-- DECORATIVE FRAME -->
  <rect x="6"  y="6"  width="388" height="588" rx="8" fill="none" stroke="#c9a84c" stroke-width="1.3" stroke-opacity="0.50"/>
  <rect x="12" y="12" width="376" height="576" rx="5" fill="none" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.18"/>

  <!-- INSCRIPTION PANEL -->
  <rect x="18" y="528" width="364" height="66" rx="6" fill="#020508" opacity="0.82"/>
  <line x1="46" y1="535" x2="354" y2="535" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.28"/>

  <!-- Title: bilingual -->
  <text x="200" y="547" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#c9a84c" letter-spacing="3.5" opacity="0.90">DIVINA MISERICORDIA  ·  DIVINE MERCY</text>

  <!-- Spanish inscription -->
  <text x="200" y="566" text-anchor="middle" font-family="Georgia, serif" font-size="14.5" fill="#f5e060" letter-spacing="0.4" font-style="italic">&#x00AB;Jes&#x00FA;s, en Ti conf&#x00ED;o&#x00BB;</text>

  <!-- English inscription -->
  <text x="200" y="585" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#d4c040" letter-spacing="0.3" font-style="italic" opacity="0.80">&#x00AB;Jesus, I trust in You&#x00BB;</text>
</svg>

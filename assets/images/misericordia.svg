<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="dm-bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#06101f"/>
      <stop offset="100%" stop-color="#030810"/>
    </radialGradient>
    <radialGradient id="dm-glow" cx="50%" cy="36%" r="32%">
      <stop offset="0%" stop-color="#1e50c8" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#1e50c8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#dm-bg)"/>
  <!-- RAYOS ROJOS — izquierda (misericordia) -->
  <polygon points="400,192 0,0 0,296" fill="#c0392b" opacity="0.30"/>
  <polygon points="400,192 0,296 0,600" fill="#c0392b" opacity="0.22"/>
  <polygon points="400,192 200,600 0,600" fill="#c0392b" opacity="0.16"/>
  <!-- RAYOS AZUL/BLANCO — derecha (gracia) -->
  <polygon points="400,192 800,0 800,296" fill="#2e86c1" opacity="0.22"/>
  <polygon points="400,192 800,296 800,600" fill="#2e86c1" opacity="0.16"/>
  <polygon points="400,192 600,600 800,600" fill="#2e86c1" opacity="0.12"/>
  <!-- Rayos cruzados arriba/abajo -->
  <polygon points="400,192 100,0 400,0" fill="#2e86c1" opacity="0.1"/>
  <polygon points="400,192 700,0 400,0" fill="#c0392b" opacity="0.14"/>
  <polygon points="400,192 200,600 400,600" fill="#2e86c1" opacity="0.1"/>
  <polygon points="400,192 600,600 400,600" fill="#c0392b" opacity="0.12"/>
  <rect width="800" height="600" fill="url(#dm-glow)"/>
  <!-- Border -->
  <rect x="28" y="28" width="744" height="544" rx="6" fill="none" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.3"/>
  <rect x="36" y="36" width="728" height="528" rx="4" fill="none" stroke="#c9a84c" stroke-width="0.5" stroke-opacity="0.15"/>
  <!-- Franja roja izquierda, azul derecha -->
  <rect x="28" y="28" width="6" height="544" rx="3" fill="#c0392b" opacity="0.65"/>
  <rect x="766" y="28" width="6" height="544" rx="3" fill="#2e86c1" opacity="0.55"/>
  <!-- Corazón sagrado -->
  <path d="M 400 280 C 400 280 310 228 310 174 C 310 132 353 118 400 156 C 447 118 490 132 490 174 C 490 228 400 280 400 280 Z"
        fill="#8e0c0c" stroke="#c0392b" stroke-width="2" stroke-opacity="0.7"/>
  <path d="M 400 258 C 400 258 330 216 330 174 C 330 142 362 132 400 160 C 438 132 470 142 470 174 C 470 216 400 258 400 258 Z"
        fill="#c0392b" opacity="0.45"/>
  <!-- Corona de espinas -->
  <circle cx="400" cy="198" r="98" fill="none" stroke="#6b3510" stroke-width="2.5" stroke-dasharray="5,6" stroke-opacity="0.55"/>
  <!-- Llama -->
  <path d="M 400 105 C 393 120 384 134 389 146 C 393 156 407 156 411 146 C 416 134 407 120 400 105Z" fill="#f39c12" opacity="0.9"/>
  <path d="M 400 114 C 396 126 391 137 394 146 C 396 153 404 153 406 146 C 409 137 404 126 400 114Z" fill="#fffde7" opacity="0.8"/>
  <!-- Cruz dorada encima -->
  <rect x="395" y="88" width="10" height="32" fill="#e8c97a" opacity="0.95"/>
  <rect x="382" y="98" width="36" height="10" fill="#e8c97a" opacity="0.95"/>
  <!-- Nombre -->
  <text x="400" y="364" text-anchor="middle" font-family="Georgia,serif" font-size="34" fill="#e8c97a" letter-spacing="1">Divina Misericordia</text>
  <text x="400" y="402" text-anchor="middle" font-family="Georgia,serif" font-size="15" fill="#c9a84c" opacity="0.85" font-style="italic">Divine Mercy</text>
  <line x1="290" y1="428" x2="510" y2="428" stroke="#c9a84c" stroke-width="0.6" stroke-opacity="0.4"/>
  <text x="400" y="460" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#8a6e2f" letter-spacing="2">FEAST SUNDAY AFTER EASTER</text>
  <text x="400" y="500" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#aed6f1" opacity="0.4" font-style="italic">«Jesús, en Ti confío»</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 110" aria-hidden="true">
  <defs>
    <radialGradient id="v-bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#131c38"/>
      <stop offset="100%" stop-color="#0a0f20"/>
    </radialGradient>
    <linearGradient id="v-sun" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8c97a"/>
      <stop offset="100%" stop-color="#c9a84c"/>
    </linearGradient>
  </defs>
  <rect width="110" height="110" rx="18" fill="url(#v-bg)"/>
  <!-- Sun/light on horizon -->
  <circle cx="55" cy="52" r="13" fill="url(#v-sun)" opacity="0.22"/>
  <circle cx="55" cy="52" r="9"  fill="none" stroke="#e8c97a" stroke-width="2" opacity="0.8"/>
  <circle cx="55" cy="52" r="4"  fill="#c9a84c" opacity="0.7"/>
  <!-- Sun rays -->
  <line x1="55" y1="36" x2="55" y2="40" stroke="#e8c97a" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
  <line x1="55" y1="64" x2="55" y2="68" stroke="#e8c97a" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
  <line x1="39" y1="52" x2="43" y2="52" stroke="#e8c97a" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
  <line x1="67" y1="52" x2="71" y2="52" stroke="#e8c97a" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
  <line x1="44" y1="41" x2="46" y2="44" stroke="#e8c97a" stroke-width="1.4" stroke-linecap="round" opacity="0.5"/>
  <line x1="64" y1="60" x2="66" y2="63" stroke="#e8c97a" stroke-width="1.4" stroke-linecap="round" opacity="0.5"/>
  <line x1="66" y1="41" x2="64" y2="44" stroke="#e8c97a" stroke-width="1.4" stroke-linecap="round" opacity="0.5"/>
  <line x1="46" y1="60" x2="44" y2="63" stroke="#e8c97a" stroke-width="1.4" stroke-linecap="round" opacity="0.5"/>
  <!-- Dune / horizon -->
  <path d="M 18 68 Q 42 60 55 64 Q 68 68 92 60 L 92 80 L 18 80 Z" fill="#2c1f0e" opacity="0.9"/>
  <!-- Path through desert -->
  <path d="M 55 64 L 52 80" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round" opacity="0.6" stroke-dasharray="3 2"/>
  <path d="M 55 64 L 58 80" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round" opacity="0.6" stroke-dasharray="3 2"/>
  <!-- Label -->
  <text x="55" y="97" text-anchor="middle" font-family="Georgia,serif" font-size="7.5" fill="#c9a84c" font-style="italic">La Vida Ordinaria</text>
  <text x="55" y="107" text-anchor="middle" font-family="Georgia,serif" font-size="7" fill="#8a90a8" font-style="italic" opacity="0.75">Ordinary Life</text>
</svg>

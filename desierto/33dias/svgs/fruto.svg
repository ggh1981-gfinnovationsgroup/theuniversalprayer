<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 110" aria-hidden="true">
  <defs>
    <radialGradient id="f-bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#131c38"/>
      <stop offset="100%" stop-color="#0a0f20"/>
    </radialGradient>
  </defs>
  <rect width="110" height="110" rx="18" fill="url(#f-bg)"/>
  <!-- Dove body -->
  <ellipse cx="55" cy="46" rx="14" ry="9" fill="none" stroke="#e8c97a" stroke-width="2" opacity="0.85"/>
  <!-- Dove head -->
  <circle cx="68" cy="41" r="6" fill="none" stroke="#e8c97a" stroke-width="2" opacity="0.85"/>
  <!-- Eye -->
  <circle cx="70" cy="40" r="1.5" fill="#c9a84c" opacity="0.9"/>
  <!-- Beak -->
  <path d="M 73 42 L 78 44 L 73 45" fill="#c9a84c" opacity="0.7"/>
  <!-- Wings spread -->
  <path d="M 45 46 Q 28 36 24 48 Q 30 52 45 50" fill="none" stroke="#c9a84c" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  <path d="M 55 42 Q 50 28 40 26 Q 38 34 45 44" fill="none" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>
  <!-- Tail -->
  <path d="M 41 50 Q 32 58 30 66" fill="none" stroke="#e8c97a" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <path d="M 41 50 Q 36 62 38 70" fill="none" stroke="#e8c97a" stroke-width="1.2" stroke-linecap="round" opacity="0.45"/>
  <!-- Olive branch -->
  <path d="M 70 50 Q 80 64 72 80" fill="none" stroke="#6a9f5e" stroke-width="2" stroke-linecap="round"/>
  <ellipse cx="76" cy="60" rx="5" ry="3" fill="#6a9f5e" opacity="0.75" transform="rotate(-25 76 60)"/>
  <ellipse cx="73" cy="68" rx="4" ry="2.5" fill="#6a9f5e" opacity="0.65" transform="rotate(10 73 68)"/>
  <ellipse cx="70" cy="75" rx="4" ry="2.5" fill="#6a9f5e" opacity="0.6" transform="rotate(-15 70 75)"/>
  <!-- Label -->
  <text x="55" y="97" text-anchor="middle" font-family="Georgia,serif" font-size="8.5" fill="#c9a84c" font-style="italic">El Fruto</text>
  <text x="55" y="107" text-anchor="middle" font-family="Georgia,serif" font-size="7" fill="#8a90a8" font-style="italic" opacity="0.75">The Fruit</text>
</svg>

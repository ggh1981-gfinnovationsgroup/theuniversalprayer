<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="pageTitle">The Universal Prayer</title>
  <meta name="description" id="pageDesc" content="Catholic prayers, novenas and chaplets." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/styles.css" />
</head>
<body class="intercessor-page">

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <a href="/" class="site-logo back-link">
        <span class="cross">✝</span>
        <span class="logo-text" data-i18n="site_title">The Universal Prayer</span>
      </a>
      <button class="lang-toggle" id="langToggle" aria-label="Switch language">
        <span id="langLabel">ES</span>
      </button>
      <button class="hamburger" id="hamburgerBtn" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <!-- SIDE NAV -->
  <div class="side-nav-overlay" id="sideNavOverlay"></div>
  <nav class="side-nav" id="sideNav" aria-label="Intercessors menu">
    <div class="side-nav-header">
      <span class="side-nav-title" data-i18n="menu_title">Intercessors</span>
      <button class="side-nav-close" id="sideNavClose" aria-label="Close menu">✕</button>
    </div>
    <ul class="side-nav-list" id="sideNavList"></ul>
  </nav>
  <div class="loading-screen" id="loadingScreen">
    <div class="loading-cross">✝</div>
  </div>

  <!-- INTERCESSOR CONTENT (hidden until loaded) -->
  <div class="intercessor-wrapper" id="intercessorWrapper" style="display:none">

    <!-- HERO -->
    <section class="intercessor-hero">
      <div class="intercessor-image-wrap">
        <img id="intercessorImg" src="" alt="" class="intercessor-img" />
        <div class="intercessor-img-overlay"></div>
      </div>
      <div class="intercessor-hero-text">
        <h1 class="intercessor-name" id="intercessorName"></h1>
        <p class="feast-day">
          <span class="feast-label" data-i18n="feast_day">Feast Day:</span>
          <span id="feastDay"></span>
        </p>
      </div>
    </section>

    <!-- NAVIGATION TABS -->
    <nav class="tabs-nav" role="tablist">
      <button class="tab-btn active" data-tab="prayer" role="tab" data-i18n="tab_prayer">Prayer</button>
      <button class="tab-btn" data-tab="history" role="tab" data-i18n="tab_history">History</button>
      <button class="tab-btn" data-tab="novena" role="tab" data-i18n="tab_novena">Novena</button>
      <button class="tab-btn chaplet-tab" data-tab="chaplet" role="tab" data-i18n="tab_chaplet">Chaplet</button>
    </nav>

    <!-- TAB PANELS -->
    <main class="tabs-content">

      <!-- PRAYER -->
      <section class="tab-panel active" id="tab-prayer" role="tabpanel">
        <div class="prayer-text content-card" id="prayerText"></div>
      </section>

      <!-- HISTORY -->
      <section class="tab-panel" id="tab-history" role="tabpanel">
        <div class="history-text content-card" id="historyText"></div>
      </section>

      <!-- NOVENA -->
      <section class="tab-panel" id="tab-novena" role="tabpanel">
        <div class="novena-nav">
          <button class="day-btn active" data-day="1">1</button>
          <button class="day-btn" data-day="2">2</button>
          <button class="day-btn" data-day="3">3</button>
          <button class="day-btn" data-day="4">4</button>
          <button class="day-btn" data-day="5">5</button>
          <button class="day-btn" data-day="6">6</button>
          <button class="day-btn" data-day="7">7</button>
          <button class="day-btn" data-day="8">8</button>
          <button class="day-btn" data-day="9">9</button>
        </div>
        <div class="novena-day-label">
          <span data-i18n="day">Day</span> <span id="currentDay">1</span>
        </div>
        <div class="novena-text content-card" id="novenaText"></div>
        <div class="novena-arrows">
          <button class="arrow-btn" id="prevDay" aria-label="Previous day">&#8592;</button>
          <button class="arrow-btn" id="nextDay" aria-label="Next day">&#8594;</button>
        </div>

        <!-- PRAYER SUPPORT PANEL — oraciones de apoyo / supporting prayers -->
        <div class="novena-support-panel" id="novenaSupportPanel">
          <button class="novena-support-toggle" id="novenaSupportToggle" aria-expanded="false">
            <span class="support-label-es">📿 Oraciones para rezar</span>
            <span class="support-label-en" style="display:none">📿 Prayers to pray</span>
            <span class="support-toggle-arrow" id="novenaSupportArrow">▾</span>
          </button>
          <div class="novena-support-content" id="novenaSupportContent" hidden>
            <!-- Populated by JS: Padre Nuestro, Ave María, Gloria, Credo, Coronilla (if available) -->
          </div>
        </div>
      </section>

      <!-- CHAPLET -->
      <section class="tab-panel" id="tab-chaplet" role="tabpanel">
        <div class="chaplet-text content-card" id="chapletText"></div>
        <div class="no-chaplet content-card" id="noChaplet" style="display:none">
          <p data-i18n="no_chaplet">No chaplet available for this intercessor.</p>
        </div>
      </section>

    </main>
  </div>

  <!-- 404 STATE -->
  <div class="not-found" id="notFound" style="display:none">
    <div class="not-found-inner">
      <span class="cross large">✝</span>
      <h2 data-i18n="not_found_title">Intercessor not found</h2>
      <p data-i18n="not_found_text">We could not find this intercessor. Please return to the home page.</p>
      <a href="/" class="btn-home" data-i18n="go_home">Go Home</a>
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="site-footer">
    <p data-i18n="footer_text">A free Catholic devotional resource. No ads. No tracking.</p>
  </footer>

  <script src="../assets/js/main.js"></script>
</body>
</html>

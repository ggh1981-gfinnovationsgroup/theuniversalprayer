<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Universal Prayer</title>
  <meta name="description" content="Catholic prayers, novenas and chaplets for every intercessor. Oraciones, novenas y chaplets católicos." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body class="home-page">

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <div class="site-logo">
        <span class="cross">✝</span>
        <span class="logo-text" data-i18n="site_title">The Universal Prayer</span>
      </div>
      <button class="lang-toggle" id="langToggle" aria-label="Switch language">
        <span id="langLabel">ES</span>
      </button>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-content">
      <h1 class="hero-title" data-i18n="hero_title">Pray with the Saints</h1>
      <p class="hero-subtitle" data-i18n="hero_subtitle">
        Novenas, chaplets and prayers for every intercessor — free, always.
      </p>
    </div>
    <div class="hero-glow"></div>
  </section>

  <!-- INTERCESSORS GRID -->
  <main class="main-content">
    <h2 class="section-title" data-i18n="choose_intercessor">Choose your intercessor</h2>
    <div class="intercessors-grid" id="intercessorsGrid">
      <!-- Cards are injected by JS -->
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <p data-i18n="footer_text">A free Catholic devotional resource. No ads. No tracking.</p>
    <p class="footer-domains">theuniversalprayer.com &nbsp;|&nbsp; laoracionuniversal.com</p>
  </footer>

  <script src="assets/js/main.js"></script>
</body>
</html>

<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="d8glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4a7c3f" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#4a7c3f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="d8vine" x1="0%" y1="0%" x2="100%" y2="100%">

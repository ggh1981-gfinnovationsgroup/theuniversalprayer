  <!-- Tendrils -->
  <path d="M50,58 C56,56 60,52 58,48" fill="none" stroke="#4a7c3f" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <path d="M48,65 C44,68 40,66 38,70" fill="none" stroke="#4a7c3f" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <!-- Grape cluster left -->
  <circle cx="26" cy="68" r="3.5" fill="url(#d8grape)" opacity="0.85"/>
  <circle cx="22" cy="72" r="3.5" fill="url(#d8grape)" opacity="0.85"/>
  <circle cx="30" cy="72" r="3.5" fill="url(#d8grape)" opacity="0.85"/>
  <circle cx="26" cy="76" r="3"   fill="url(#d8grape)" opacity="0.8"/>
  <circle cx="22" cy="64" r="3"   fill="url(#d8grape)" opacity="0.75"/>
  <!-- Grape cluster right -->
  <circle cx="78" cy="54" r="3"   fill="url(#d8grape)" opacity="0.8"/>
  <circle cx="74" cy="58" r="3.5" fill="url(#d8grape)" opacity="0.85"/>
  <circle cx="82" cy="58" r="3"   fill="url(#d8grape)" opacity="0.8"/>
  <circle cx="78" cy="62" r="3"   fill="url(#d8grape)" opacity="0.8"/>

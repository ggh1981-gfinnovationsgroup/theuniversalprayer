  </defs>
  <circle cx="50" cy="50" r="46" fill="url(#d8glow)"/>
  <!-- Main vine stem -->
  <path d="M50,88 C50,88 48,72 50,58 C52,44 46,34 40,22"
        fill="none" stroke="url(#d8vine)" stroke-width="3" stroke-linecap="round"/>

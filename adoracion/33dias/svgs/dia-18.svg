<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="d18glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8c97a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#e8c97a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="d18dove" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fffde8"/>
      <stop offset="100%" stop-color="#e8c97a"/>
    </linearGradient>
  </defs>
  <circle cx="50" cy="50" r="46" fill="url(#d18glow)"/>
  <!-- Rays from above center -->
  <g transform="translate(50,18)" stroke="#e8c97a" stroke-linecap="round" opacity="0.4">
    <line y1="0" y2="16" stroke-width="1.5"/>
    <g transform="rotate(20)"><line y1="0" y2="16" stroke-width="1"/></g>
    <g transform="rotate(-20)"><line y1="0" y2="16" stroke-width="1"/></g>
    <g transform="rotate(40)"><line y1="0" y2="14" stroke-width="0.8"/></g>
    <g transform="rotate(-40)"><line y1="0" y2="14" stroke-width="0.8"/></g>
  </g>
  <!-- Dove body -->
  <ellipse cx="50" cy="44" rx="12" ry="8" fill="url(#d18dove)" opacity="0.92"/>
  <!-- Dove head -->
  <circle cx="62" cy="40" r="5" fill="url(#d18dove)" opacity="0.92"/>
  <!-- Dove beak -->
  <path d="M66,39 L70,40 L66,41 Z" fill="#c9a84c" opacity="0.8"/>
  <!-- Dove eye -->
  <circle cx="63.5" cy="39.5" r="0.8" fill="#5a3a10"/>
  <!-- Left wing up -->
  <path d="M50,44 C42,40 34,34 28,38 C34,42 42,46 50,44 Z" fill="url(#d18dove)" opacity="0.88"/>
  <!-- Right wing (folded back) -->
  <path d="M50,44 C54,52 58,58 56,62 C52,56 50,50 50,44 Z" fill="url(#d18dove)" opacity="0.75"/>
  <!-- Tail -->
  <path d="M38,44 C34,48 30,52 32,56 C36,52 40,48 38,44 Z" fill="url(#d18dove)" opacity="0.7"/>
  <!-- Central glow point (descent direction) -->
  <circle cx="50" cy="30" r="4" fill="#fffde8" opacity="0.6"/>
  <circle cx="50" cy="30" r="2" fill="#fffde8" opacity="0.9"/>
  <!-- Small dots suggesting movement downward -->
  <circle cx="50" cy="20" r="1"   fill="#e8c97a" opacity="0.5"/>
  <circle cx="50" cy="24" r="0.8" fill="#e8c97a" opacity="0.4"/>
  <circle cx="50" cy="27" r="0.6" fill="#e8c97a" opacity="0.35"/>
</svg>

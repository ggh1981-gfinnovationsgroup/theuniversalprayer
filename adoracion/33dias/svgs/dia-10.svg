  <!-- Path edge lines -->
  <line x1="6" y1="94" x2="50" y2="64" stroke="#c9a84c" stroke-width="1.2" opacity="0.7"/>
  <line x1="94" y1="94" x2="50" y2="64" stroke="#c9a84c" stroke-width="1.2" opacity="0.7"/>
  <!-- Ground texture lines -->
  <line x1="12" y1="86" x2="50" y2="66" stroke="#8a6e2f" stroke-width="0.6" opacity="0.4"/>
  <line x1="88" y1="86" x2="50" y2="66" stroke="#8a6e2f" stroke-width="0.6" opacity="0.4"/>
  <line x1="20" y1="80" x2="50" y2="66" stroke="#8a6e2f" stroke-width="0.5" opacity="0.3"/>
  <line x1="80" y1="80" x2="50" y2="66" stroke="#8a6e2f" stroke-width="0.5" opacity="0.3"/>

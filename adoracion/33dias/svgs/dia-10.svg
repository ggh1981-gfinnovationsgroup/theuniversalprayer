  <line x1="43" y1="46" x2="57" y2="46" stroke="#e8c97a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Cross glow -->
  <circle cx="50" cy="46" r="7" fill="#e8c97a" opacity="0.15"/>
  <!-- Converging path — left edge to center -->

<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="d20glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8c97a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e8c97a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="d20gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8c97a"/>
      <stop offset="100%" stop-color="#8a6e2f"/>
    </linearGradient>
  </defs>
  <circle cx="50" cy="50" r="46" fill="url(#d20glow)"/>
  <!-- Equilateral triangle (Trinity) -->
  <path d="M50,12 L84,68 L16,68 Z" fill="none" stroke="url(#d20gold)" stroke-width="2.5" opacity="0.7"/>
  <!-- Three interlocking circles inside -->
  <!-- Top circle -->
  <circle cx="50" cy="34" r="14" fill="none" stroke="#e8c97a" stroke-width="1.8" opacity="0.6"/>
  <!-- Bottom-left circle -->
  <circle cx="36" cy="58" r="14" fill="none" stroke="#e8c97a" stroke-width="1.8" opacity="0.6"/>
  <!-- Bottom-right circle -->
  <circle cx="64" cy="58" r="14" fill="none" stroke="#e8c97a" stroke-width="1.8" opacity="0.6"/>
  <!-- Center glow (where all three overlap) -->
  <circle cx="50" cy="50" r="7" fill="#e8c97a" opacity="0.25"/>
  <circle cx="50" cy="50" r="3" fill="#fffde8" opacity="0.7"/>
  <!-- Triangle vertices glow -->
  <circle cx="50" cy="12" r="3" fill="#e8c97a" opacity="0.5"/>
  <circle cx="84" cy="68" r="3" fill="#e8c97a" opacity="0.5"/>
  <circle cx="16" cy="68" r="3" fill="#e8c97a" opacity="0.5"/>
</svg>

<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="d21moon" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#e8c97a" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#5a3a10" stop-opacity="0.6"/>
    </radialGradient>
    <linearGradient id="d21water" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d1a2e"/>
      <stop offset="100%" stop-color="#1a0a00"/>
    </linearGradient>
    <linearGradient id="d21sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#0d1a2e"/>
    </linearGradient>
  </defs>
  <!-- Night sky -->
  <rect x="4" y="4" width="92" height="50" rx="3" fill="url(#d21sky)" opacity="0.95"/>
  <!-- Stars -->
  <circle cx="18" cy="14" r="0.8" fill="#e8c97a" opacity="0.6"/>
  <circle cx="32" cy="10" r="0.5" fill="#e8c97a" opacity="0.5"/>
  <circle cx="68" cy="12" r="0.7" fill="#e8c97a" opacity="0.55"/>
  <circle cx="80" cy="18" r="0.5" fill="#e8c97a" opacity="0.45"/>
  <circle cx="55" cy="8"  r="0.5" fill="#e8c97a" opacity="0.5"/>
  <circle cx="88" cy="30" r="0.6" fill="#e8c97a" opacity="0.4"/>
  <circle cx="12" cy="35" r="0.5" fill="#e8c97a" opacity="0.4"/>
  <!-- Moon -->
  <circle cx="50" cy="28" r="12" fill="url(#d21moon)" opacity="0.9"/>
  <circle cx="54" cy="25" r="9"  fill="#0a0a1a"       opacity="0.85"/>
  <!-- Still water -->
  <rect x="4" y="54" width="92" height="42" rx="3" fill="url(#d21water)" opacity="0.95"/>
  <!-- Moon reflection on water -->
  <ellipse cx="50" cy="72" rx="8" ry="14" fill="#e8c97a" opacity="0.12"/>
  <ellipse cx="50" cy="72" rx="4" ry="10" fill="#e8c97a" opacity="0.15"/>
  <!-- Horizon line -->
  <line x1="4" y1="54" x2="96" y2="54" stroke="#e8c97a" stroke-width="0.5" opacity="0.3"/>
  <!-- Very subtle water ripples -->
  <ellipse cx="50" cy="68" rx="16" ry="1.5" fill="none" stroke="#e8c97a" stroke-width="0.5" opacity="0.15"/>
  <ellipse cx="50" cy="74" rx="22" ry="2"   fill="none" stroke="#e8c97a" stroke-width="0.5" opacity="0.12"/>
  <ellipse cx="50" cy="80" rx="28" ry="2.5" fill="none" stroke="#e8c97a" stroke-width="0.5" opacity="0.1"/>
</svg>

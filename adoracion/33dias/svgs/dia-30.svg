<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="d30glow" cx="50%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#e8c97a" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#e8c97a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="50" cy="60" r="46" fill="url(#d30glow)"/>
  <!-- Soil line -->
  <line x1="20" y1="68" x2="80" y2="68" stroke="#8a6e2f" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Seed (below soil) -->
  <ellipse cx="50" cy="76" rx="8" ry="5" fill="none" stroke="#c9a84c" stroke-width="1.5" opacity="0.7"/>
  <!-- Roots spreading from seed -->
  <path d="M50,80 C44,84 38,82 34,88" fill="none" stroke="#8a6e2f" stroke-width="1.2" stroke-linecap="round" opacity="0.65"/>
  <path d="M50,80 C56,84 62,82 66,88" fill="none" stroke="#8a6e2f" stroke-width="1.2" stroke-linecap="round" opacity="0.65"/>
  <path d="M50,80 L50,90"             fill="none" stroke="#8a6e2f" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Tiny shoot rising above soil -->
  <line x1="50" y1="68" x2="50" y2="44" stroke="#c9a84c" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
  <!-- Two small leaves on shoot -->
  <path d="M50,52 C44,48 40,44 44,40 C46,44 49,48 50,52" fill="#e8c97a" opacity="0.6"/>
  <path d="M50,56 C56,52 60,48 56,44 C54,48 51,52 50,56" fill="#e8c97a" opacity="0.5"/>
  <!-- Tiny glow at top of shoot -->
  <circle cx="50" cy="40" r="4" fill="#fffde8" opacity="0.5"/>
  <circle cx="50" cy="40" r="2" fill="#fffde8" opacity="0.7"/>
</svg>

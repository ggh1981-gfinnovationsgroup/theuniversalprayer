<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="d6glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="d6lamb" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fffde8"/>
      <stop offset="100%" stop-color="#e8d89a"/>
    </linearGradient>
    <linearGradient id="d6banner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8c97a"/>
      <stop offset="100%" stop-color="#c9a84c"/>
    </linearGradient>
  </defs>
  <circle cx="50" cy="50" r="46" fill="url(#d6glow)"/>
  <!-- Lamb body -->
  <ellipse cx="48" cy="60" rx="22" ry="15" fill="url(#d6lamb)" opacity="0.95"/>
  <!-- Fleece texture bumps -->
  <circle cx="34" cy="56" r="5" fill="#fff" opacity="0.7"/>
  <circle cx="41" cy="52" r="5.5" fill="#fff" opacity="0.75"/>
  <circle cx="50" cy="50" r="5.5" fill="#fff" opacity="0.75"/>
  <circle cx="59" cy="52" r="5" fill="#fff" opacity="0.7"/>
  <circle cx="65" cy="57" r="4.5" fill="#fff" opacity="0.65"/>
  <circle cx="38" cy="62" r="4.5" fill="#fff" opacity="0.65"/>
  <circle cx="48" cy="63" r="4.5" fill="#fff" opacity="0.65"/>
  <circle cx="57" cy="62" r="4" fill="#fff" opacity="0.6"/>
  <!-- Head -->
  <ellipse cx="68" cy="52" rx="9" ry="8" fill="url(#d6lamb)" opacity="0.95"/>
  <!-- Eye -->
  <circle cx="72" cy="50" r="1.5" fill="#5a3a1a" opacity="0.8"/>
  <circle cx="72.6" cy="49.4" r="0.5" fill="#fff" opacity="0.8"/>
  <!-- Ear -->
  <ellipse cx="65" cy="47" rx="3" ry="4.5" fill="#e8d89a" opacity="0.85" transform="rotate(-20 65 47)"/>
  <!-- Legs -->
  <rect x="38" y="72" width="4" height="10" rx="2" fill="#e8d89a" opacity="0.8"/>
  <rect x="44" y="73" width="4" height="9"  rx="2" fill="#e8d89a" opacity="0.8"/>
  <rect x="52" y="73" width="4" height="9"  rx="2" fill="#e8d89a" opacity="0.8"/>
  <rect x="58" y="72" width="4" height="10" rx="2" fill="#e8d89a" opacity="0.8"/>
  <!-- Banner/flag cross pole -->
  <line x1="72" y1="44" x2="72" y2="18" stroke="url(#d6banner)" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Banner flag -->
  <rect x="72" y="18" width="14" height="10" rx="1" fill="#c9a84c" opacity="0.25" stroke="#c9a84c" stroke-width="0.8"/>
  <!-- Cross on flag -->
  <line x1="79" y1="19" x2="79" y2="27" stroke="#c9a84c" stroke-width="1.4" opacity="0.8"/>
  <line x1="75" y1="23" x2="83" y2="23" stroke="#c9a84c" stroke-width="1.4" opacity="0.8"/>
  <!-- Halo ring -->
  <circle cx="68" cy="50" r="13" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.4" stroke-dasharray="2 2"/>
</svg>

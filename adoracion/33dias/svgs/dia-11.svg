<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="d11glow" cx="50%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#e8c97a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="d11scroll" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f5e6c8"/>
      <stop offset="100%" stop-color="#d4b87a"/>
    </linearGradient>
  </defs>
  <circle cx="50" cy="50" r="46" fill="url(#d11glow)"/>
  <!-- Scroll body -->
  <rect x="22" y="42" width="56" height="40" rx="2" fill="url(#d11scroll)" opacity="0.92"/>
  <!-- Scroll top roll -->
  <ellipse cx="50" cy="42" rx="28" ry="5" fill="#d4b87a" opacity="0.95"/>
  <ellipse cx="50" cy="42" rx="22" ry="3.5" fill="#f5e6c8" opacity="0.8"/>
  <!-- Scroll bottom roll -->
  <ellipse cx="50" cy="82" rx="28" ry="5" fill="#d4b87a" opacity="0.95"/>
  <ellipse cx="50" cy="82" rx="22" ry="3.5" fill="#f5e6c8" opacity="0.8"/>
  <!-- Text lines on scroll -->
  <line x1="30" y1="52" x2="70" y2="52" stroke="#8a6e2f" stroke-width="1" opacity="0.5"/>
  <line x1="30" y1="57" x2="70" y2="57" stroke="#8a6e2f" stroke-width="1" opacity="0.5"/>
  <line x1="30" y1="62" x2="70" y2="62" stroke="#8a6e2f" stroke-width="1" opacity="0.5"/>
  <line x1="30" y1="67" x2="58" y2="67" stroke="#8a6e2f" stroke-width="1" opacity="0.4"/>
  <!-- Cross / light above -->
  <line x1="50" y1="10" x2="50" y2="34" stroke="#e8c97a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="40" y1="20" x2="60" y2="20" stroke="#e8c97a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Rays from cross center -->
  <circle cx="50" cy="20" r="10" fill="#e8c97a" opacity="0.12"/>
  <circle cx="50" cy="20" r="6"  fill="#e8c97a" opacity="0.18"/>
  <!-- Light beam from cross to scroll -->
  <path d="M44,34 L40,44 L60,44 L56,34 Z" fill="#e8c97a" opacity="0.15"/>
</svg>

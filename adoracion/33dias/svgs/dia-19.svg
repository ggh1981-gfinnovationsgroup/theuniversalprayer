<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="d19glow" cx="50%" cy="20%" r="65%">
      <stop offset="0%" stop-color="#fffde8" stop-opacity="0.9"/>
      <stop offset="30%" stop-color="#e8c97a" stop-opacity="0.5"/>
      <stop offset="70%" stop-color="#c9a84c" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Radiant light from top center -->
  <circle cx="50" cy="8" r="44" fill="url(#d19glow)" opacity="0.7"/>
  <!-- Long light rays -->
  <g transform="translate(50,8)" stroke="#e8c97a" stroke-linecap="round">
    <line y1="0" y2="70" stroke-width="2.5" opacity="0.3"/>
    <g transform="rotate(15)"> <line y1="0" y2="65" stroke-width="1.5" opacity="0.2"/></g>
    <g transform="rotate(-15)"><line y1="0" y2="65" stroke-width="1.5" opacity="0.2"/></g>
    <g transform="rotate(30)"> <line y1="0" y2="58" stroke-width="1.2" opacity="0.15"/></g>
    <g transform="rotate(-30)"><line y1="0" y2="58" stroke-width="1.2" opacity="0.15"/></g>
    <g transform="rotate(50)"> <line y1="0" y2="48" stroke-width="1"   opacity="0.1"/></g>
    <g transform="rotate(-50)"><line y1="0" y2="48" stroke-width="1"   opacity="0.1"/></g>
  </g>
  <!-- Central glow point at top -->
  <circle cx="50" cy="8"  r="10" fill="#fffde8" opacity="0.8"/>
  <circle cx="50" cy="8"  r="5"  fill="#fffde8" opacity="0.95"/>
  <!-- Outstretched hands (left) -->
  <path d="M50,70 C42,66 30,62 16,68" fill="none" stroke="#c9a84c" stroke-width="4" stroke-linecap="round"/>
  <circle cx="14" cy="68" r="3.5" fill="#c9a84c" opacity="0.7"/>
  <!-- Outstretched hands (right) -->
  <path d="M50,70 C58,66 70,62 84,68" fill="none" stroke="#c9a84c" stroke-width="4" stroke-linecap="round"/>
  <circle cx="86" cy="68" r="3.5" fill="#c9a84c" opacity="0.7"/>
  <!-- Light reaching hands -->
  <line x1="50" y1="20" x2="14" y2="68" stroke="#e8c97a" stroke-width="1" opacity="0.2" stroke-linecap="round"/>
  <line x1="50" y1="20" x2="86" y2="68" stroke="#e8c97a" stroke-width="1" opacity="0.2" stroke-linecap="round"/>
  <!-- Small radiant circle at center between hands -->
  <circle cx="50" cy="62" r="5" fill="#e8c97a" opacity="0.2"/>
  <circle cx="50" cy="62" r="2" fill="#fffde8" opacity="0.4"/>
</svg>

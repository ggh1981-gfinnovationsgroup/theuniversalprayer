<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="d7glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="d7staff" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8c97a"/>
      <stop offset="100%" stop-color="#8a6e2f"/>
    </linearGradient>
  </defs>
  <circle cx="50" cy="50" r="46" fill="url(#d7glow)"/>
  <!-- Shepherd's crook/staff -->
  <path d="M55,85 L55,30 Q55,18 44,18 Q33,18 33,28 Q33,38 44,38"
        fill="none" stroke="url(#d7staff)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Small sheep being carried/cradled in crook area -->
  <ellipse cx="42" cy="30" rx="8" ry="5.5" fill="#fffde8" opacity="0.9"/>
  <circle cx="38" cy="27" r="4" fill="#fffde8" opacity="0.9"/>
  <circle cx="36" cy="28" r="3" fill="#fff" opacity="0.7"/>
  <circle cx="40" cy="26" r="3.5" fill="#fff" opacity="0.75"/>
  <circle cx="45" cy="27" r="3" fill="#fff" opacity="0.7"/>
  <circle cx="47" cy="31" r="2.5" fill="#fff" opacity="0.65"/>
  <!-- Tiny legs -->
  <line x1="37" y1="35" x2="36" y2="40" stroke="#c9a84c" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <line x1="41" y1="36" x2="41" y2="41" stroke="#c9a84c" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <line x1="44" y1="35" x2="45" y2="40" stroke="#c9a84c" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <!-- Sheep head detail -->
  <circle cx="34" cy="26" r="1" fill="#8a6e2f" opacity="0.7"/>
  <!-- Stars / sparkle around -->
  <circle cx="72" cy="25" r="1.5" fill="#c9a84c" opacity="0.6"/>
  <circle cx="78" cy="35" r="1" fill="#c9a84c" opacity="0.5"/>
  <circle cx="75" cy="55" r="1.2" fill="#c9a84c" opacity="0.45"/>
  <circle cx="20" cy="45" r="1" fill="#c9a84c" opacity="0.4"/>
  <circle cx="25" cy="65" r="1.3" fill="#c9a84c" opacity="0.45"/>
  <!-- Ground line -->
  <path d="M15,88 Q50,82 85,88" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.25"/>
</svg>

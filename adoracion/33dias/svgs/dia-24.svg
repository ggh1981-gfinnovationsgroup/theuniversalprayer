<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="d24glow" cx="50%" cy="60%" r="55%">
      <stop offset="0%" stop-color="#e8c97a" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#e8c97a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="50" cy="55" r="46" fill="url(#d24glow)"/>
  <!-- Musical notes rising -->
  <!-- Note 1 (low, left) -->
  <ellipse cx="28" cy="72" rx="5" ry="3.5" fill="#c9a84c" opacity="0.8" transform="rotate(-15,28,72)"/>
  <line x1="33" y1="71" x2="33" y2="52" stroke="#c9a84c" stroke-width="1.8" stroke-linecap="round" opacity="0.8"/>
  <line x1="33" y1="52" x2="42" y2="56" stroke="#c9a84c" stroke-width="1.8" stroke-linecap="round" opacity="0.8"/>
  <!-- Note 2 (mid, center) -->
  <ellipse cx="50" cy="60" rx="5" ry="3.5" fill="#e8c97a" opacity="0.85" transform="rotate(-15,50,60)"/>
  <line x1="55" y1="59" x2="55" y2="38" stroke="#e8c97a" stroke-width="1.8" stroke-linecap="round" opacity="0.85"/>
  <line x1="55" y1="38" x2="64" y2="42" stroke="#e8c97a" stroke-width="1.8" stroke-linecap="round" opacity="0.85"/>
  <!-- Note 3 (high, right) -->
  <ellipse cx="72" cy="48" rx="5" ry="3.5" fill="#fffde8" opacity="0.9" transform="rotate(-15,72,48)"/>
  <line x1="77" y1="47" x2="77" y2="24" stroke="#fffde8" stroke-width="1.8" stroke-linecap="round" opacity="0.9"/>
  <line x1="77" y1="24" x2="86" y2="28" stroke="#fffde8" stroke-width="1.8" stroke-linecap="round" opacity="0.9"/>
  <!-- Small sparkle dots rising (suggesting ascension) -->
  <circle cx="35" cy="42" r="1.5" fill="#e8c97a" opacity="0.5"/>
  <circle cx="52" cy="28" r="1.5" fill="#e8c97a" opacity="0.5"/>
  <circle cx="74" cy="14" r="1.5" fill="#fffde8" opacity="0.6"/>
  <circle cx="42" cy="20" r="1"   fill="#e8c97a" opacity="0.35"/>
  <circle cx="64" cy="10" r="1"   fill="#e8c97a" opacity="0.3"/>
</svg>

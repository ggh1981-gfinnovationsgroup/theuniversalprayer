<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="d33sun" cx="50%" cy="55%" r="65%">
      <stop offset="0%" stop-color="#fffde8" stop-opacity="1"/>
      <stop offset="20%" stop-color="#e8c97a" stop-opacity="0.8"/>
      <stop offset="55%" stop-color="#c9a84c" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="d33sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0a20"/>
      <stop offset="40%" stop-color="#1a0a2e"/>
      <stop offset="70%" stop-color="#3a1a10"/>
      <stop offset="100%" stop-color="#8a3a10"/>
    </linearGradient>
  </defs>
  <!-- Sky background -->
  <rect x="4" y="4" width="92" height="92" rx="4" fill="url(#d33sky)" opacity="0.9"/>
  <!-- Horizon glow (sunrise) -->
  <ellipse cx="50" cy="72" rx="55" ry="30" fill="url(#d33sun)" opacity="0.9"/>
  <!-- Sun rising at horizon -->
  <circle cx="50" cy="72" r="16" fill="#fffde8" opacity="0.95"/>
  <circle cx="50" cy="72" r="10" fill="#fffde8" opacity="0.98"/>
  <!-- Sun rays -->
  <g transform="translate(50,72)" stroke="#e8c97a" stroke-linecap="round">
    <line y1="-16" y2="-28" stroke-width="1.5" opacity="0.5"/>
    <g transform="rotate(30)"> <line y1="-16" y2="-26" stroke-width="1.2" opacity="0.4"/></g>
    <g transform="rotate(60)"> <line y1="-16" y2="-26" stroke-width="1.5" opacity="0.5"/></g>
    <g transform="rotate(90)"> <line y1="-16" y2="-28" stroke-width="1.2" opacity="0.4"/></g>
    <g transform="rotate(120)"><line y1="-16" y2="-26" stroke-width="1.5" opacity="0.5"/></g>
    <g transform="rotate(150)"><line y1="-16" y2="-24" stroke-width="1.2" opacity="0.4"/></g>
    <g transform="rotate(180)"><line y1="-16" y2="-28" stroke-width="1.5" opacity="0.5"/></g>
    <g transform="rotate(210)"><line y1="-16" y2="-24" stroke-width="1.2" opacity="0.35"/></g>
    <g transform="rotate(240)"><line y1="-16" y2="-26" stroke-width="1.5" opacity="0.4"/></g>
    <g transform="rotate(270)"><line y1="-16" y2="-28" stroke-width="1.2" opacity="0.35"/></g>
    <g transform="rotate(300)"><line y1="-16" y2="-26" stroke-width="1.5" opacity="0.4"/></g>
    <g transform="rotate(330)"><line y1="-16" y2="-26" stroke-width="1.2" opacity="0.35"/></g>
  </g>
  <!-- Open gates / doorposts (left and right) -->
  <!-- Left gate post -->
  <line x1="28" y1="20" x2="28" y2="70" stroke="#e8c97a" stroke-width="3" stroke-linecap="round" opacity="0.75"/>
  <!-- Right gate post -->
  <line x1="72" y1="20" x2="72" y2="70" stroke="#e8c97a" stroke-width="3" stroke-linecap="round" opacity="0.75"/>
  <!-- Gate lintel -->
  <line x1="28" y1="22" x2="72" y2="22" stroke="#e8c97a" stroke-width="2.5" stroke-linecap="round" opacity="0.65"/>
  <!-- Two hands reaching toward sun from bottom corners -->
  <path d="M14,88 C18,80 24,76 30,74" fill="none" stroke="#c9a84c" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <path d="M86,88 C82,80 76,76 70,74" fill="none" stroke="#c9a84c" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <circle cx="30" cy="74" r="3" fill="#c9a84c" opacity="0.6"/>
  <circle cx="70" cy="74" r="3" fill="#c9a84c" opacity="0.6"/>
  <!-- Stars (fading as dawn comes) -->
  <circle cx="18" cy="16" r="0.8" fill="#e8c97a" opacity="0.4"/>
  <circle cx="38" cy="12" r="0.5" fill="#e8c97a" opacity="0.35"/>
  <circle cx="62" cy="10" r="0.6" fill="#e8c97a" opacity="0.3"/>
  <circle cx="82" cy="16" r="0.7" fill="#e8c97a" opacity="0.35"/>
</svg>

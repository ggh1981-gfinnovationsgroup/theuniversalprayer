<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="d27glow" cx="50%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#e8c97a" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#e8c97a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="50" cy="30" r="50" fill="url(#d27glow)"/>
  <!-- Figure body -->
  <line x1="50" y1="55" x2="50" y2="78" stroke="#c9a84c" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  <!-- Feet/base -->
  <line x1="42" y1="78" x2="58" y2="78" stroke="#c9a84c" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <!-- Arms outstretched upward (orans position) -->
  <path d="M50,62 C44,58 28,42 18,28" fill="none" stroke="#c9a84c" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  <path d="M50,62 C56,58 72,42 82,28" fill="none" stroke="#c9a84c" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  <!-- Head -->
  <circle cx="50" cy="46" r="7" fill="none" stroke="#c9a84c" stroke-width="2" opacity="0.8"/>
  <!-- Small light at hands -->
  <circle cx="18" cy="28" r="3" fill="#e8c97a" opacity="0.5"/>
  <circle cx="82" cy="28" r="3" fill="#e8c97a" opacity="0.5"/>
  <!-- Rays of light above (heavenward) -->
  <line x1="30" y1="14" x2="36" y2="24" stroke="#e8c97a" stroke-width="1.2" stroke-linecap="round" opacity="0.3"/>
  <line x1="50" y1="8"  x2="50" y2="20" stroke="#e8c97a" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  <line x1="70" y1="14" x2="64" y2="24" stroke="#e8c97a" stroke-width="1.2" stroke-linecap="round" opacity="0.3"/>
  <!-- Small glow at top (heaven) -->
  <circle cx="50" cy="10" r="6" fill="#fffde8" opacity="0.5"/>
  <circle cx="50" cy="10" r="3" fill="#fffde8" opacity="0.7"/>
</svg>

<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="d28glow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#e8c97a" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#e8c97a" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#e8c97a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="50" cy="50" r="46" fill="url(#d28glow)"/>
  <!-- Crown of thorns - circular base -->
  <circle cx="50" cy="50" r="22" fill="none" stroke="#8a6e2f" stroke-width="3.5" opacity="0.8"/>
  <!-- Thorns pointing outward -->
  <g stroke="#8a6e2f" stroke-linecap="round">
    <!-- Thorns on top arc -->
    <line x1="50" y1="28" x2="50" y2="18" stroke-width="2" opacity="0.85"/>
    <line x1="43" y1="29" x2="40" y2="19" stroke-width="1.8" opacity="0.8" transform="rotate(-15,43,29)"/>
    <line x1="57" y1="29" x2="60" y2="19" stroke-width="1.8" opacity="0.8" transform="rotate(15,57,29)"/>
    <line x1="36" y1="34" x2="30" y2="26" stroke-width="1.5" opacity="0.75"/>
    <line x1="64" y1="34" x2="70" y2="26" stroke-width="1.5" opacity="0.75"/>
    <!-- Thorns on side arcs -->
    <line x1="28" y1="50" x2="18" y2="50" stroke-width="2" opacity="0.85"/>
    <line x1="72" y1="50" x2="82" y2="50" stroke-width="2" opacity="0.85"/>
    <line x1="30" y1="40" x2="22" y2="35" stroke-width="1.5" opacity="0.75"/>
    <line x1="70" y1="40" x2="78" y2="35" stroke-width="1.5" opacity="0.75"/>
    <!-- Thorns on bottom arc -->
    <line x1="50" y1="72" x2="50" y2="82" stroke-width="2" opacity="0.8"/>
    <line x1="36" y1="66" x2="30" y2="74" stroke-width="1.5" opacity="0.75"/>
    <line x1="64" y1="66" x2="70" y2="74" stroke-width="1.5" opacity="0.75"/>
  </g>
  <!-- Inner gold glow — redemptive light within the suffering -->
  <circle cx="50" cy="50" r="14" fill="#e8c97a" opacity="0.15"/>
  <circle cx="50" cy="50" r="7"  fill="#fffde8" opacity="0.25"/>
  <circle cx="50" cy="50" r="3"  fill="#fffde8" opacity="0.5"/>
</svg>

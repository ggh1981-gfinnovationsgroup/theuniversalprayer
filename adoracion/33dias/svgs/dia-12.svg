<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="d12glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2d5a1e" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#1a3a0a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="d12trunk" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5a3a10"/>
      <stop offset="50%" stop-color="#8a5a20"/>
      <stop offset="100%" stop-color="#5a3a10"/>
    </linearGradient>
    <linearGradient id="d12leaf" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8c97a"/>
      <stop offset="60%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#8a6e2f"/>
    </linearGradient>
  </defs>
  <circle cx="50" cy="50" r="46" fill="url(#d12glow)"/>
  <!-- Roots -->
  <path d="M50,88 C44,86 36,90 30,88" fill="none" stroke="url(#d12trunk)" stroke-width="2" stroke-linecap="round"/>
  <path d="M50,88 C50,88 46,92 42,94" fill="none" stroke="url(#d12trunk)" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M50,88 C56,86 64,90 70,88" fill="none" stroke="url(#d12trunk)" stroke-width="2" stroke-linecap="round"/>
  <path d="M50,88 C50,88 54,92 58,94" fill="none" stroke="url(#d12trunk)" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M50,88 C50,88 50,92 50,96"  fill="none" stroke="url(#d12trunk)" stroke-width="2"   stroke-linecap="round"/>
  <!-- Trunk -->
  <path d="M46,88 C45,75 44,65 46,55 C47,48 50,42 50,42 C50,42 53,48 54,55 C56,65 55,75 54,88 Z"
        fill="url(#d12trunk)" opacity="0.9"/>
  <!-- Branches -->
  <path d="M50,60 C44,55 36,55 28,50" fill="none" stroke="url(#d12trunk)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M50,52 C56,46 64,44 72,40" fill="none" stroke="url(#d12trunk)" stroke-width="2" stroke-linecap="round"/>
  <path d="M50,46 C44,38 38,32 32,26"  fill="none" stroke="url(#d12trunk)" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M50,42 C56,34 62,28 68,22"  fill="none" stroke="url(#d12trunk)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Golden leaves — cluster left -->
  <ellipse cx="24" cy="48" rx="6" ry="4" fill="url(#d12leaf)" transform="rotate(-20,24,48)" opacity="0.85"/>
  <ellipse cx="30" cy="44" rx="5" ry="3.5" fill="url(#d12leaf)" transform="rotate(10,30,44)"  opacity="0.8"/>
  <ellipse cx="18" cy="44" rx="5" ry="3.5" fill="url(#d12leaf)" transform="rotate(-30,18,44)" opacity="0.75"/>
  <!-- Golden leaves — cluster right -->
  <ellipse cx="74" cy="38" rx="6" ry="4" fill="url(#d12leaf)" transform="rotate(20,74,38)"   opacity="0.85"/>
  <ellipse cx="68" cy="34" rx="5" ry="3.5" fill="url(#d12leaf)" transform="rotate(-10,68,34)" opacity="0.8"/>
  <!-- Golden leaves — upper left -->
  <ellipse cx="28" cy="22" rx="5" ry="3.5" fill="url(#d12leaf)" transform="rotate(-25,28,22)" opacity="0.8"/>
  <ellipse cx="36" cy="18" rx="4.5" ry="3" fill="url(#d12leaf)" transform="rotate(5,36,18)"   opacity="0.75"/>
  <!-- Golden leaves — upper right -->
  <ellipse cx="70" cy="18" rx="5" ry="3.5" fill="url(#d12leaf)" transform="rotate(25,70,18)"  opacity="0.8"/>
  <ellipse cx="62" cy="14" rx="4" ry="3"   fill="url(#d12leaf)" transform="rotate(-5,62,14)"  opacity="0.75"/>
  <!-- Crown leaves — top -->
  <ellipse cx="46" cy="12" rx="5.5" ry="3.5" fill="url(#d12leaf)" transform="rotate(-10,46,12)" opacity="0.9"/>
  <ellipse cx="54" cy="10" rx="5"   ry="3.5" fill="url(#d12leaf)" transform="rotate(10,54,10)"  opacity="0.9"/>
  <ellipse cx="50" cy="8"  rx="5"   ry="3"   fill="#e8c97a"       opacity="0.85"/>
</svg>

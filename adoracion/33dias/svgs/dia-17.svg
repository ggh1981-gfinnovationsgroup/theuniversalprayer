<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="d17sun" cx="50%" cy="38%" r="45%">
      <stop offset="0%" stop-color="#fffde8" stop-opacity="1"/>
      <stop offset="30%" stop-color="#e8c97a" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="d17ground" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3d2000"/>
      <stop offset="100%" stop-color="#1a0a00"/>
    </linearGradient>
  </defs>
  <!-- Night sky / ground -->
  <rect x="4" y="55" width="92" height="42" rx="3" fill="url(#d17ground)" opacity="0.9"/>
  <!-- Horizon glow -->
  <ellipse cx="50" cy="55" rx="44" ry="10" fill="#e8c97a" opacity="0.3"/>
  <!-- Rising sun -->
  <circle cx="50" cy="42" r="18" fill="url(#d17sun)" opacity="0.95"/>
  <circle cx="50" cy="42" r="10" fill="#fffde8" opacity="0.9"/>
  <!-- Sun rays -->
  <g transform="translate(50,42)" stroke="#e8c97a" stroke-linecap="round">
    <line y1="-22" y2="-28" stroke-width="2.5" opacity="0.7"/>
    <g transform="rotate(30)"> <line y1="-22" y2="-28" stroke-width="1.8" opacity="0.5"/></g>
    <g transform="rotate(60)"> <line y1="-22" y2="-28" stroke-width="2.5" opacity="0.7"/></g>
    <g transform="rotate(90)"> <line y1="-22" y2="-28" stroke-width="1.8" opacity="0.5"/></g>
    <g transform="rotate(120)"><line y1="-22" y2="-28" stroke-width="2.5" opacity="0.7"/></g>
    <g transform="rotate(150)"><line y1="-22" y2="-28" stroke-width="1.8" opacity="0.5"/></g>
    <g transform="rotate(180)"><line y1="-22" y2="-28" stroke-width="2.5" opacity="0.7"/></g>
    <g transform="rotate(210)"><line y1="-22" y2="-28" stroke-width="1.8" opacity="0.5"/></g>
    <g transform="rotate(240)"><line y1="-22" y2="-28" stroke-width="2.5" opacity="0.7"/></g>
    <g transform="rotate(270)"><line y1="-22" y2="-28" stroke-width="1.8" opacity="0.5"/></g>
    <g transform="rotate(300)"><line y1="-22" y2="-28" stroke-width="2.5" opacity="0.7"/></g>
    <g transform="rotate(330)"><line y1="-22" y2="-28" stroke-width="1.8" opacity="0.5"/></g>
  </g>
  <!-- Tomb opening (dark arch on ground) -->
  <path d="M34,55 C34,55 34,68 42,72 L58,72 C66,68 66,55 66,55 Z" fill="#0d0500" opacity="0.9"/>
  <path d="M36,55 C36,55 36,66 43,70 L57,70 C64,66 64,55 64,55 Z" fill="#1a0a00" opacity="0.7"/>
  <!-- Rolling stone (circle beside tomb) -->
  <circle cx="70" cy="68" r="7" fill="#5a3a10" opacity="0.7"/>
  <circle cx="70" cy="68" r="5" fill="#8a6e2f" opacity="0.5"/>
  <!-- Cross silhouette on horizon -->
  <line x1="50" y1="20" x2="50" y2="50" stroke="#8a6e2f" stroke-width="1.5" opacity="0.4"/>
  <line x1="44" y1="30" x2="56" y2="30" stroke="#8a6e2f" stroke-width="1.5" opacity="0.4"/>
</svg>
